body:
  text: 巽齋文集卷二十五宋歐陽守道撰説學禮精舍説仁義禮智皆根於心而禮為最著故先聖教人有曰學禮未有曰學仁學義學智也禮於四德為亨於四時為夏以亨視元利貞以夏視春秋冬余所謂最著可以意知矣聖人從其最著者教人使人有所循守故孔氏之書言禮最詳人而學禮雖中人可以循至於上達茍不學禮雖資稟高明不保於往禮之切於學者如此近世之學或忽之灑掃進退之節自幼學時已有所不屑而筋骸肌膚有終其身而無檢束者然而性與天道彼亦未嘗不能言其似也漢儒雖作非粹學然保有殘闕不全之書又為之推尋意緒使傳至於今亦可謂難矣今自內則曲禮諸書家孰或不與語幼學其幸以語之者乃村朴之儒僅能向時文中剽習所謂二五無極之語者而已中庸稱大哉聖人之道洋洋乎發育萬物峻極於天優優大哉而繼以禮儀三百威儀三千實之道固如是也今學禮而性與天道人人自以為有得是豈知三千三百即所謂大哉聖人之道乎先儒性命本原之説轉入時文而人之所以為人者乃略無所嚮望吾夫子所為諄諄以禮訓人者皆可不講而其虛誕無實自謂有得乃有孔門髙弟之所未得聞嗚呼異哉橫渠先生專以禮教學者為且須除去一等俗習而伊川程先生深取之然則欲聞關洛性命之説者亦必有以除去俗習而後可也永新龍君遇前輩也扁其書院曰學禮蓋誠齋先生楊文節為之書而文節長子東山詩之君遇之子清淑清淑之子直方世從事於斯矣直方出示詩翰墨刻為書豫所感以遺之嗟夫豫言過矣直方勿以示人也倘謂余粗有志而以聞於父祖先正者教之則幸甚平坡説平泉李文饒所居也平山吾家六一公所堂也平園周退傳所園也泉也山也園也著稱於天下其人無貴賤賢不肖久近共知也吾知其人又於其記其詞其詩其集得其勝矣有自安成來者盛稱王彛伯所居平坡之勝豫未識彛伯又未見其平坡也意者溪山泉石之勝有足以招隱與不然以人不以地與來言者徴吾詩若文夫其人俟吾他日之知之也其地而勝則徴吾詩若文者其以圖來求心説後林先生李侯為曾君季安書求心二大字而謂季安歸其告某季來遂請求心之説余謂大學之修身在正其心而傳釋之以心不在焉視不見聽不聞食不知其味在之一言所謂正也身在此心當在此身在此而心不在此是謂放心故先儒云心要在腔子裏又以坐馳非司馬子微皆此意也孟子教人求放心夫不放則何求之有放則須求矣雖然放一心求又一心以今之求求昔之放有二心乎夫當求時固已無放矣若直謂此心在外久而未反則無是理也故夫能知求則即此心在內已為之主也於此而又求者非也然則必有事而已矣不然兀然端坐而神馳四逺以求覔前此放心之處不知其未嘗不在此也則求者毋乃適以為放與嗚呼君歸其從事於斯所謂有事者求心之云蓋一回悟之機未可以終身誦之也胡素行字説豫友胡君履剛字素行蓋履之初九素履往無咎而象以為獨行願也君求字説於豫而又以素名堂願得銘於堂之壁伊川先生所謂安履其素而不以欲富與貴之心雜行道之心者亦既敷暢厥旨而寫之於銘矣乃字説無庸又為之詞雖然素履則言之未與君言爻之時義也蓋聞君子之於天下有可行之道是以有欲行之志欲堯舜其君民卒無以堯舜其君民此則後世名為儒者之通患也儒者固常恨無時然而時未必負人也人有負時者矣逺大之事業無窮隱約之歲月有限淺鮮之才識易乏而責望之人情難塞也君子誠有憂世之心將不恨時之不至而常恐其至之亟惜分隂道問學誠恐一旦為時而出追前日而不可得也履之初將有行也顯晦遲速亦何常之有嗚呼君念之哉世方以迂疏待儒者也願君治所以行以息庸人之論孟子曰有天民者達可行於天下而後行之吾寧不得行也如行當使千古無遺憾蕭元質字説西昌蕭君義夫名而不字曰名字一也交遊以為不可各出所見字之君擇焉遂字元質他日以告某曰夫子謂君子義以為質禮以行之孫以出之信以成之所主在義而又取於彼三者子以為何謂也某謝曰此君所熟講也而某何以獻愚雖然請繹之論語一書數有專言義者曰君子義以為上曰君子喻於義此曰君子義以為質蓋道一致而異名之中皆可以互觀也此所謂義如曰天理之正人心之安而已矣君子一念一事動必於此故專以為質猶所謂無本不立也辟之於身有此而後衣冠辟之於木有此而後柯葉有不合此內不以發於其心外不以作於其事如此則終身無一不義之犯而進進於成德矣然而行之必以禮出之必以孫成之必以信非曰義有不足而復待於彼三者也三者所以維持成就乎此也義以為質不以禮節之則乖錯失宜而不得行世非無知義者然而行之常不得其當何哉知義而不知禮也君子以禮行義矣又歉然而不足不敢以義自居也蓋以義自居則將是已而非人已是而人皆非則義亦孤矣是故盡義之實而晦義之名且將以有進也故曰孫以出之行之以禮出之以孫矣則又常自省曰有一不義無以為君子抑是義也敢有纎毫之不實乎實則可以言成不實則無成之可指矣故曰信以成之嗚呼君子之於義維持成就以終其身者固如此也然維持成就者終事也主此以為質者始事也一念一事無不揆之天理之正人心之安有一不然則是質既不完具矣彼維持成就之終事何所麗乎嗚呼吾與元質如之何不兢兢也元質曰然用書以為字説劉自牧字説劉君相巖名夢牛余未省所以字也他日贄詩謁使君後林李先生先生稱之而怪其名不配命豫為更之於是字君曰自牧夫冉耕字伯牛司馬牛名犂皆以牛自命也今劉君亦以牛自命也故以牧字之牛順物也牧養也伊川夫子嘗於易釋畜牛之義曰人之順德由養以成今夫順德者莫過於坤故坤為牛其六二曰直方大不習無不利此坤德之至自然之順也然而必有事焉故聖人發其義以告學者曰敬以直內義以方外敬義立而德不孤夫如是然後進於不習無不利而不疑其所行矣蓋當直內方外猶未離乎習也比諸他卦發順德飬成之義進一説也使君昨謂我劉君佳士當勉就其逺者大者夫一見之頃而愛之如此其至豫與君處數年而未之思也豫是以愧於先生長者之用心也君其以豫説而復於先生其有聞於所以養德者則復以告我張質翁字説禾山張肖玉從豫學請字焉曰玉豫伯仲所共號也請毋以玉取義於肖取義豫曰字君以質可乎曰肖何取於質也曰肖似也今夫象人之形而丹青其服飾惟其長短小大得其人之狀則服飾可以意取也長短小大之不類而惟服飾之似之求則吾不知其為誰故曰繪事後素髙宗審象求相得諸傅巖惟肖非肖其服飾也服飾夫人所同也後儒稱孔門速肖七十果哉言也衆以一有若似夫子曾子猶曰不然誰謂七十皆肖哉肖如何之速哉姑借傅巗肖象之肖言之逢掖之衣章甫之冠象環之珮可肖溫而厲威而不猛恭而安不可肖學者願肖夫子肖其外而已乎徒肖其外而已世有以聖人為欺者多矣嗚呼豫之字君以質也君其時時思之何以有合於聖人而無自欺於心也哉學不可以偽為名不可以虛取以切近之思求真實之得其於聖功庶矣乎嗚呼君以豫言遍請於鄉曲長上之愛君者朱謙夫名説子生父命之名子既孤不更名為有事於先人不可以不祝也安成朱君謙夫名亨仲請於豫曰亨仲初入小學以亨仲名他日遂字謙夫深惟謙亨之義亨出於謙今反以亨為名以謙為字理有未順願更之夫諸卦言亨多矣誠未見亨之特屬於謙也豫曰君之名非命於君父與而君何忍更之君泫然曰亨仲之名實不出於父也亨仲未受名於父而孤今雖名猶未名倘辱命之使有切於行已也者庶幾因名思義以從事終身後亦有以見先人於地下且孝子之念親也夙興夜寐無忝爾所生之為懼孤而不更名者其一事耳父昔未命則今異乎人之更故願有以教之也豫敬諾而請名君以厚夫謙九三為成卦之主而勞謙為卦德之盛夫子贊之曰勞而不伐有功而不得厚之至也人之持身也無如自厚伐德也者皆自薄也自厚莫如謙君其名厚而字謙豫聞之豫先世之家訓曰物無不惡薄者薄必先壞因君之請舉以告君此豫童年之所聞而今常常以告家人者也君不外我我其敢外君君請豫書之曰願服之無斁也敬書以贈贈戴天從六杉説杉美材也吾州地宜杉工為室無小大必材於杉杉幸則合抱而材不幸拱把而材合抱較拱把幸矣為人材均不幸也凡物不願用於人用於人不得全於天文江戴君天從門有六杉焉甚愛之因自號六杉處士豫謂天從六杉主於君幸矣抑是杉也非樗吾懼終不免也封植之滋久睥睨之兹衆杉乎吾不知爾之柱於誰氏之居也天從而主於此杉勿使度材者涉君之地涉君之地何以使見樗而不見杉天從君勿以君之名纍是杉為杉不幸矣又重纍君之名其尋斧斤也速矣噫豫滋為杉也懼愛蘭説彭叔英歸自渝川謂豫張君復之畹以蘭臭味同者詩焉亦賦諸余謝不能為愛蘭説以贈蘭於世罕遇主人愛蘭蘭遇乎未也蘭愛主人斯遇矣在屈畹者必蘭滋畹蘭者必屈不然地可畹畹可蘭何限愛蘭復之為蘭所愛是以為蘭也慶拒馬説昨承問今所謂拒馬者未見此名所出疑是今人俗稱謂拒捍門外來馬不得奔衝而入爾制度形象皆未見撿尋爾雅釋宫類釋器類並無之釋宫類説門之名及門旁小小備用者甚詳此則無有因思周禮天官之屬有所謂掌舍者內有枑字枑字左從木右從互從木之狀且有注釋謂之行馬舍內一重舍外一重以為間衛似是此物但注釋亦未甚詳想是鄭氏注時漢人常用之故鄭以為人共識不須詳釋耳又枑字一作匱枑音互在韻之十一暮匱音巨在韻之八語據周禮本文云掌王之會同之舍設梐枑再重梐音陛在韻之十一薺梐字下釋行馬也枑字下釋亦曰行馬也如此梐枑似是一物而兩名又枑一作匱雖從木與捍拒之拒從才者不同然同是巨字音則今人所謂拒馬蓋即此聲耳梐枑王同會之舍所用也王出外與諸侯同會則設此以為間衛其下在他所則有轅門轅門以環車為之有戟門戟門以木為之亦謂之材門有旌門旌門以旌為之有人門人門以長大之人環立為之此皆王在外之所用也而皆非一定植立不易之物隨其所在臨時設為之耳然則無所謂制度也既無所謂制度則未見其屬尊卑上下之等級也今之轅門戟門已與周禮之轅戟不同也矣則所謂枑者亦何與於尊卑上下之等級乎又撿今條法觀今儀制則亦未見有所謂拒馬之不可用但門有間厦之不同及庶人不許作烏頭門耳官品之最髙者立戟門戟門有數旌表門閭者設綽楔以木植立然非此樣也今之為拒者已衆矣未見其以違法得罪蓋法所無有人亦不相點撿也點對一畨如此録云釋疑略記前史有賜門設行馬者忘其何人矣今之貴品有賜戟無賜行馬然則貴家之為拒馬蓋自為之也自為之則無所謂制度矣如齋説果山文時望扁燕坐之室曰如齋諸公賦詩而豫不得其説以問方外之士欣然對曰君胡未之思耶此中有大趣得之者可蹈水火雷起足下而不驚豺虎蛇虺縱橫於前而吾木石然也彼無所致其毒害豫曰子言愈幻矣豫求如之義而不得子無以幻甚之曰物皆幻也身亦幻也起田家子俄而軒冕朝而雲霄暮而泥塗幻之又幻也達者一以為虛假故視寵如辱視辱如寵人方怒而罵詈我我曰是為幻以戲我也我以幻受之且世未有喜怒之正也未有毁譽之真也而又安知夫怒之非我喜毁之非我譽也兩無實相付之於如如也者其迹其然矣而卒不然也然不然相尋於無窮而吾超然之觀常居其表故彼紛紛者常為我役方且委身以受其紛紛人為我喜我亦喜人為我悲我亦悲悲喜亦應物也而真悲真喜安在乎夫如齋知之矣子區區為儒者之學未足以進豫異其説他日以問如齋王俊甫字説古今言堯克明俊德未甚分明大學之引用此語以俊為峻文雖不同意亦未逺蓋亦謂髙明之極耳愚讀古書每於一字之間推其始於何世堯典於諸書為最古篇首有此一字蓋百世言德者莫先焉豈可徒習其句讀而已哉天地人謂之三才天有天之才地有地之才人有人之才才也者所謂俊德也天行健天才也地勢坤地才也靈於萬物人才也人人有此而堯克明之豫嘗謂大學明明德之語與此所謂明俊德無二而俊之為言尤當深味味此則知自古無衰颯凡陋之聖質而吾黨之士皆可以尚志矣潭貢士王君名堯字俊甫與豫遊愛其有邁往出塵之意故書以贈之噫不知德之為才謂我上才而下德矣夫寶祐甲寅秋七月二十有五日與俊甫論文罷二鼓矣俊甫歸尚有燭寸許廬陵歐陽某書四民説帝王之世士出於農而工商之類蓋有士之行矣後世農工商皆非古所謂士雜於三人者之中亦各隨其習焉又有本非其素而習近之者故未嘗為農而近農未嘗為工而近工未嘗為商而近商為國者知取士命官而不知布滿中外乃彼三人者也三人之中得商不若得工得工不若得農世所謂善人長者願有餘而識不足大扺皆農士之類也世又下衰農士不加多而工士與商士更盛凡以藝能技巧供人耳目之玩皆工士也以權謀智力從事功利之途皆商士也工士與商士更盛則農士在所鄙賤矣其不加多者世所驅也世又益衰於是有遊末之士有吏胥之士有盜竊之士夫名為士而實遊末實吏胥實竊盜兼是數者充塞人間使救死不贍之民遭其蠶食有國者猶以文運昌士類衆為喜嗚呼此孟子所謂上無禮下無學賊民興喪無日者可不重駭而亟救之乎丹説丹砂古謂之丹夏書荆州四石丹其一也書生始以丹砂釋丹秦漢間擅丹穴之利致巨富曰丹穴不曰丹砂穴後人則不然稱地所産曰丹砂而稱方士之所煉曰丹不思所謂丹者正是石類之一名以其色之丹故因以名之砂石也石可碎如砂也自禹貢以來用以采飾而已後來方士煉以服餌亦不改地産名之本也然方士所謂為不一品所用不一石通謂之丹豈蒙其名而未之思與以豫觀方士丹方固多循名求實必以丹砂所成者為第一蓋丹於五色則丹於五行則火於五臟則心丹砂最飬心神從其類也世有內外丹之説均為修煉深究其理心為百體之君心得正則神全而體安可以固真元養夀命此則至簡至易之理耳永嘉周友梅元素所煉丹自其祖南恩使君好接方外之士多得至人之方世祕其傳故友梅火候手法與尋常逈異豫雖不能盡曉苐服之輒驗斯可信也偶與談丹之名義遂書此以贈之景定癸亥六月十六日甲子廬陵歐陽某書義齋説贈周義甫周義甫學於嶽麓書院豫數讀其課而最警切之義甫亦肯受豫言知豫為愛已也如此義甫日有益豫將歸義甫請曰義甫與兄弟講習於家中書院而扁曰義願聞子言豫歎義甫知所以為士矣孟子曰義之實從兄是也夫以弟之從兄故曰義以兄愛弟不曰義乎孟子且以弟之順德言之舉此所以見彼也正如仁之實事親是也且以子之順德言之仁之於父子命也則父之於子子之於父一耳抑義甫所請乃為兄弟講習之故蓋將於兄弟而兼朋友之益焉切切偲偲怡怡如也可謂士矣義甫盍復熟孔孟之訓豫無以告也義甫固請豫曰豫聞之長沙宰令狐君有言伯夷思與鄉人立其冠不正望望然去之若將凂焉雖曰清而失之隘然見人不善而惡之者猶謂人不當有不善故才見而即惡之也栁下惠爾為爾我為我雖袒裼裸裎於我側爾焉能凂我哉和則和矣毋乃謂人之善不善吾當一切聽之乎毋乃謂已當獨由人道而不以人待人乎此之謂不恭推此言之伯夷非嚴於持身而待人亦嚴乃愛人也栁下惠自處於無過則已矣非愛人也世傳盜跖為惠下季之弟而謂季即惠固不可知然使果如所傳則夷之弟有齊而為惠之弟者有不忍言矣隘責人已甚者也不恭付人於不足責者也二者流弊不恭為甚與其不恭也寧隘嗟乎美哉其言之也豫自聞此常欲書而存之因義甫之請以為此於兄弟相愛相正之意猶切也故以遺之善言不可不書所從受故著令狐君之爵里字雖名亦書之君字叔正名楷今承議郎義甫字宜之或曰名宜之字宜甫近年處學者名字往往不辨也潭之醴陵人寶祐二年七月既望廬陵歐陽某書於定王臺前之寓舍浩齋説君知所謂浩然之氣又求説於豫孟子以來諸老先生之發明豫不復為君道請言兩戰當兩戰時非特直者氣盈曲者亦氣盈也氣之方盈雖使孫吳觀陳蘇張往來其間莫能決其勝負雖然請少待之直者將可使敗而不可挫曲者惟無敗敗則士尤其將將尤其上矣誰挫之彼自挫也是則氣非難於盈難於持久判曲直不在旁觀不在衆説而常在於主帥倐然發露之本心心之公理不可掩也嘗試論之氣有實有虛實氣浩然之真虛氣浩然之似實者至徑健而最和平氣之常也虛者乍粗暴而卒消靡客氣之暫也君往者介豫謁後林先生德人君子之容貌詞氣君既望之即之聽之矣别去幾年今不逺千里再往真有心於親炙者與豫索居久於夙昔之見未有進也幸持豫虛實之説以請益巽齋文集卷二十五
