body:
  text: 巽齋文集卷十七宋歐陽守道撰記螺山靈泉院記環廬陵十里佛寺萃於西南而東北特少出東門循江左達於吉水巋然一螺山靈泉院爾佛寺相望或以為民蠧至於相去絶逺則有山也無與養茂林有泉也無與疏清流山困於樵牧水汙於畎澮而一憩之清一酌之甘有不可得况望登臨遊賞供耳目之清致哉然則佛寺間見於村墟煙火之外亦好事者之所快也螺山者宛委如螺掘地不盈尺輒得金螺無數大僅如珠而形奪真其南有井深不盈四尺清潔甘寒冬夏不竭泉旁有塔塔旁有寺是謂靈泉豫暇日數造焉識其主僧曰元鑑鑑請於豫曰豫寺之創相傳始於東晉升平自今日等而上之元鑑之師曰妙心妙心之師曰惟本惟本之師曰宗海四世相傳一以修造莊嚴為事蓋鼎新佛殿海也重建法堂本也甃徑路建山門定光佛殿心與鑑也今又度弟子四人矣使吾弟子之於我又如我之於先師敝者葺之闕者增之則茲寺與茲山茲泉遂當為城東北之勝然寺自始創至今無片碑幸為我作記且以告後之人豫笑曰寺豈託碑以久乎升平者東晉穆帝之末年也元年歲在丁巳盡五年止自元年至於今寶祐四年丙辰得四十丁巳蓋九百年矣九百年基址如故天壤間如此者幾何蓋上自天子離宫次而王侯别墅以至雄藩巨鎮之觀遊通津要路之館驛計其占山水之勝極棟宇之麗用意之初豈不欲貽之無窮而其記述題詠出於名筆者何限然遺迹之存百不一二弔古之士訪求於黍稷茨棘間而不得幸而得其石刻於野人則磯漁梁礪樵斧之餘亦往往斷裂磨滅矣蓋土木與翰墨兩不足恃如此爾所謂區區之寺當彼盛麗之時誰復比數哉而存至於今何也立不足爭之所也天下之至寶莫大乎世人之所不爭世人之不爭者世外之人乃常得而擅有之宜乎彼有記述題詠而無救於速壞此無片碑而無害於久存也鑑曰善哉君言乃契於吾佛雖然吾久具石以候君矣願即斯言書之使凡讀之者悵然永慨而於得喪少有警焉舍愛離癡或因君之言則一言功德乃勝於我修造莊嚴百千萬億分豫曰諾是為螺山靈泉院記圓通閣記佛之道儒者難言之一人佛言衆誚且排為是置不復詰億佛書具在昔者先儒目力往往及之矣目力未知之及而衆誚且排之逆畏豫不知其説也故不若相與究乖合之極而折之以公昔者豫聞先儒之説西方氣厚故生異人又曰佛書逺勝莊子蓋欲取而觀之久矣恨其徒偽益其師之説使部帙猥多以眩惑流俗今年春僧法榮者以所造圓通閣成求文以記之豫惟圓通二字之義圓者無滯通者無塞此其説未有戾於吾黨也則遂取所謂首楞嚴經者讀之既而歎曰彼師弟之間難疑反復毫釐之差有所必辨是亦非茍然者焉用遽非之蓋其徒所稱阿難者本釋迦氏之弟慕其兄之學而學焉兄弟之間談説圓通一時在會者因各言所得凡二十有五人而觀世音獨推其初實自聞入聞之説出二十有五人者莫不恍然自失也所謂聞者以聲為塵以聞為性聲塵有起滅聞性無存亡曰本聞曰聞復曰自聞曰反聞斂之為凝寂散之為光明夫是以上合諸佛與諸佛同一慈力下合衆生與衆生同一悲仰語雖幻異然其寂感之大歸亦可睹矣彼又以為聞也者不依形而立故不待生而存不隨死而亡此則佛之所以為佛而吾儒之所不屑究言也然先正猶一言之曰聚體知死之不亡者可與言性此又豈以佛嘗言之而不肯與之同邪是則無感者性之體能感者性之神循有感以求無感大虛至靜粲然吾前矣使佛氏而不知此固無足論佛氏而知此則亦豈不足驗此理之所同哉雖然彼所得者在不依形以立而所失者亦不依形以立也謂其不依形以立而遂指身為幻一無所事焉則理有大不然者矣法榮佛者吾亦未暇與之盡言也嗟乎法榮能建圓通閣矣爾以爾師所言圓通者為何義邪閣中位觀世音像而嚴事之爾以為觀世音者得其所得有不堅志精思而不能忘此邪嗚呼焉用彼之問豫方重有感也閣在永樂寺寺在梅山山在廬陵縣儒行鄉豫之先祖墓三世與之鄰云主是寺者本銓榮其徒也容安書院記安成王君貴珏扁其居室曰容安而以書求文為記其書曰珏之初意非取於陶靖節容膝易安之義也豫得書盡一日不能曉蓋思索載籍中二字連文者他無之王君豈有所祖而豫未之知乎豫將復書徴其所自又念往復滋多事姑率意言之以塞豫責夫靖節容膝易安之語自是無求者也而豫又得一語於東坡蘇公曰人之所履者容足之外皆為無用之地而不可廢也故慮不在千里之外則患在几席之下矣蘇公特主於逺慮然安危之理在焉有味乎其言哉豫將借之而言豫所謂容之説蓋豫所謂容非靖節所謂容膝亦非東坡所謂容足而東坡意則近於豫之所欲言也夫所謂容者豫欲使之有餘地也尺寸之地自謂至安而無餘地以優其容則安者危矣故君宅心坦夷接物和易所以利人者乃所以利已也左崖右岸前機後穽置人於至險而自立於尺寸其安幾何秦穆公言其心休休其有容則能保子孫黎民亦職有利哉其不能容者不能保我子孫黎民亦曰殆哉此宅心接物廣狹安危之分也豫請以是為王君堂記雖然容則安不容則危固也然豫尚有以進王君秦誓所謂容謂不能容人之有技與彥聖者也善惡在前略無剖判而曰吾優為之容則不可人之不善君子固有以待之矣其冠不正望望然去之隘也袒裼裸裎於我側焉能凂我不恭也隘之患不過疾人之不為善耳不恭之患則已為人而不以人類待人此豈可哉君子於人無所不容雖不善亦容之然其容之也將使入吾之并包而熟吾之誘化有忠惻之心焉彼已胥入於善則彼已亦胥處於安矣不然容且有弊何安之有君試思之登雲莊記乙丑初冬豫與二三子適於野遇輸官租者盈道豫前至一田舍憩焉餘粒在地一童子掃而拾之蓋輸租者之居也壁間有詩曰雲兮雲兮變化有神靈兮捲起地下黃飛去天上青兮仙人乘雲天尺五借我清隂覆赤土雲間逍遙人間苦年年苦時望君雨豫問童子誰題此詩對曰廬陵縣有登雲莊田吾翁與鄉鄰耕之此詩吾翁作也問爾亦曉此乎童子不對仰瞻雲而歌之其聲婉轉悠揚豫為之感動顧二三子曰識之此我輩人語也他日令君鄱陽熊侯訪豫語及登雲莊豫以所見詩告侯驚焉曰是語俚其意長所望於庇民之君子豈淺乎震龍初領此邑知學有貢士莊以市量計田租八十有七斛爾嘉熙間前宰永嘉項公模所創謝公子強稍增之意美矣而田少即動心曰使得終三年去吾力尚可拓此於是錙銖纍積得錢一千餘緡以買田歲復收租九十八斛有竒一道士以屯田二十解獻視其意無他且為數也微遂收之而附焉郡國貢士縣續食漢法也今士出鄰境莫我肯恤為令者自以區區致吾意米又重不可負則易錢而藏之士將行發新舊莊三歲之藏而分贐焉諸貢於鄉於漕於胄監者若往年嘗貢而再上春官者若階對者其數有差而嘗有籍於吾學則加優學之前廊司其出納今年春嘗一贐矣名今莊曰登雲别於前莊且示相期也然吾意彼田舍翁知之矣豫因請於侯曰士受侯賜甚厚顧以米易錢歲無常直米賤錢少米貴錢多為贐貢士計者幸其貴而多乎抑寧賤而少乎侯太息曰吾固嘗以語此於學之士也去年民艱食邑無廩可發獨有此二莊耳不能待此區區者以贐士欲亟借此區區者以賙民賙於此無以贐於彼則視時之宜姑損其半而出之損微而施狹矣吏猶疑而告曰若爾來年得贐之士將患少吾視吏不足語語於學之士曰今茲為我積錢明年受此贐者必諸君也諸君得志宜有膏澤下於民且行時豈自一錢以上盡為㸑桂炊玉資哉乞我新豐一酌之餘分彼翳桑一餉之飽諒與我同此心夫直雖損時之半較之豐歲猶贏也吾黨豈幸直之貴者乎則皆欣然曰諸生若竊第入仕損已益民可也焉有妄擬公家之賜以為已有而計較多少乎夫此一舉而士與民兩利焉則其勢自相維持而無弊請自今日永為後法吾祝贊之曰諸君皆志士仁人也天心至仁諸君此志當天心矣高科非諸君而誰此吾去年以二莊平糶之始也子為我記之豫遂為之記曰士之用心常如所以對侯是無負於登雲名莊之意我輩田舍翁真有望於斯人矣咸淳元年十月丙寅邑人歐陽某記吉州吉水縣存濟莊記豫觀郡縣年飢勸糶之令何嘗不太息哉積米之終歸於糶富而仁者亦不待勸官於荒政類亡具也而勸糶為第一策當其未講行之先貧者持錢告糴猶有所也富者視時增直猶有漸也令一出立異矣夫富非一槩甚富之謂勸之糶者雖僅僅自給之家亦與焉彼生理索薄計口而食之外猶有餘糧未有不以易錢雖欲待價不能待也官呼而諭之曰爾糶數若干以某月某日違吾令罪爾歸則相戒曰吾雖有米今不可自糶矣自糶而一空如其無以應官命且奈何昨者糶今者閉不得已也又有名雖為富而米實無餘者以情告而官不信也縱信之則諭之曰爾不足於米而有餘於錢如之何可免承命而退趨而就積米之家糴而為之備不敢後他人也轉糴爭先而積米者執增直之權以要之暮視旦不同矣大率此令常在冬春之交而行之於六七十日之後已令未行之間官與富者為擾擾而貧者受閉糴之害受增直之害二害皆官趣之及糶之日直愈髙而不可復下雖強為裁抑無救也又有行之猝遽而立取辦者敷之貧弱而不堪命者一切聽於吏而姦欺百出矣嗟乎此得謂之荒政乎夫此勸糶也於古未聞吾聞勸分矣今則詔勸糶為勸分也然則勸分何如曰仁哉國家之政勸分素有良法也正賦什取一之外又伯取一焉謂之義米是富者無豐無歉歲歲皆分也無仁無不仁人人皆分也無勸之名有分之實正賦十萬貯之義倉不為不多矣而又非歲歲常發也飢而後一發苐以與貧者而不取直耳與之者誰此米得之富者富者與之也長民者不推原置倉之初意而有時取直焉則是富者本以分惠而官乃同之正賦而有之何謂義米乎歲飢再以勸糶為勸分富者得無辭於官乎而况勸糶之害如彼又不重不利於貧者乎嗚呼盍亦反其本矣三山陳升之為吉水也連年值歉蓋嘗以例勸糶而睹其害也慨然曰義倉非縣得專使縣得專吾勸糶為吾黨他日可專之則吾自以分之而不取直約而計之使吾日分一斛則彼飢人之日食二升者可五十人也有千斛五萬人得一日之飽矣吾恨力不及此萬一亦幸邑未至有五萬人之當濟吾且開其端後有君子因吾所為而增益之濟固無算也適有邑所可得之田又節費而賈益之歲收租可四百斛若日濟二萬人一日而盡人減十之九旬日而盡若夫天相吾邑家粗給人粗足待濟者少則米支一月未可知之又幸而多豐少歉數年而後一發所濟益加衆矣今施固未博也於是名其莊曰存濟莊以寓其心焉邑之士民胥請記於某曰陳君所謂存濟及物於人必有所濟者乎豫曰身無病而以藥施人病者得愈藥之者為之體康不自飲而以酒飲之者為之酣適侯見人飢於前則食不下咽飢者得飽則侯之甘食此有快於心無德於色者也記非侯意雖然豫欲談勸糶之害於有官君子久矣微侯此舉以發豫之鬱積後之覽者儻有感於斯文其能遂如侯之望因是莊而增益之乎何獨吉水賢大夫之凡為邑者其必有倣而為之也咸淳四年月正元日承事郎主簿華州雲臺觀歐陽某記龍須山旃檀林記龍須山法雲禪寺有堂曰旃檀林在佛殿西以待其徒之自逺方來者景定三年春主山朴庵紹月撤舊新之屬豫為記余聞旃檀異國之名香佛屢稱之其曰以赤旃檀作諸殿堂髙廣嚴好百千比丘於其中止謂此香木之可以立僧廬也而諸佛中亦有旃檀香如來之號則取其道行清潔與此香同故以為名證諸楚辭以香草比君子而處之桂棟蘭橑之室同一意也夫佛亦寓言耳舍其王位而自甘於寂寞無人之境彼豈復以宫室之美纍心然自其教入中國昧者得其莊嚴供養之説造寺奉僧極其侈靡使中國多得此木亦必舉以為其所謂殿堂矣農夫細民蓬茅不足以自蔽王公大人未有以動其心者獨於奉僧則不靳也而僧之安居華屋亦若固有之嗟夫佛之初意其果然耶好潔惡穢人之同居處所以安身至於潔而止若夫齋戒薰沭使其表裏清淨無垢則佛之所以教其徒亦猶吾儒之所謂潔其身者明德之有馨香果在內不在外也紹月之語豫曰草木猶愛臭味之同吾林下人自謂曰苾芻而以旃檀林奉客所望於來者厚矣衆如林然皆我氣類勿有間之與善人居久而與之俱化者也豫於是慨然有感矣是山豫之先塋在焉展省松楸之餘入方丈見此老每覺清言有味繼今又當時造茲堂庶幾遇其自逺方來者以觀此老者之所與友潭州湘隂縣學記湘隂長沙之屬邑在全楚南境之僻逺處也吾夫子轍環天下楚之君亦有意聘焉為子西所止狂接輿歌而過夫子曰鳯兮鳯兮何德之衰當是時楚於天下幾盡有南方而先聖之教不得行乎其國况乎今之所謂湘隂望其國都猶千百里豈知東魯之有吾夫子哉然楚國自有豪傑之士如陳良者尊慕夫子之道於百年之後而湘隂則汨羅之水在焉屈平死忠邑人至今能指其處君子讀離騷而哀之謂使平學於北方則制行又當有合乎中庸然則夫子存時雖聖教不得行乎此而其地其人雖去聖千載可與為顔曽可與為遊夏與洙泗間一也宋興海內一統慶歷中詔郡邑皆立學湘隂學建於元祐遷於崇寧復於淳熙景定五年趙侯與縱又一新之蓋舊學濱江水潦所及又基址迫隘介乎館驛民㕓之間屋朽而欹不修且壞故盡撤而改為築之使髙拓之使廣侯有不容已者學成而祭器俱新悉從禮制近年邑有主學命於朝侯又相攸以營其居焉夫道之興廢先聖不能必子襟刺鄭泮水頌魯於刪詩兩存之此意固以勸戒來者然當時髙弟出仕有民社者不一人也絃歌之聲自武城外無聞焉豈諸子所至視教化為不急哉明王不興天下莫宗夫子况乎門人誦其所聞而施之有政吾知其以迂濶取譏也是則有志焉而不得遂者多矣今有地百里無不立學如趙侯之為湘隂竭兩年之力於此以幸惠邑之秀民使有安居以誦習先聖之訓昔者及門之士豈得為今之所為乎噫是固一時也然亦存乎其人國家能詔郡邑皆立學不能使為郡邑者皆留意於學俗吏茍存學之名春秋不得不祀先聖先師終歲不得不盡闕諸生廩給如是而已綱常非學不明俗化非學不厚暴亂非學不戢刑罰非學不清國家以有學奠安閭里以有學順睦弱不勝衣循循蹈規矩之士談詩書講道義以燕間而世道隂賴之蓋吾宋三百餘年收效於此久矣此趙侯所為汲汲而有識之士以為不如此則先聖所謂雖有粟吾焉得而食諸者也是役也市材食工為費不資而遷驛館易民㕓之費不與焉侯以已俸佐之而遜地者捐力者亦感動於侯之義既成侯以書來求記曰子盍一言以遺湘士噫豫固迂濶之尤者其復何云惟湘之士深念去聖人之世與聖人之居如彼其久且逺今也宫牆如在目中誦聲相聞如與諸子列侍以聽博文約禮之訓此聖朝道化之澤而賢大夫為邑識本末知先後之賜也世道升降何常惟人心天理終可恃趙侯秩滿行矣此學方新遊其中者又推所學以淑鄉里將見邑人皆有士君子之行而人才出焉得行道以兼善天下子孝臣忠以長我國家豈無出於是學者乎豫與趙侯共期之趙侯寓居福州登戊戌進士第今官宣教郎是年秋八月十有九日庚申廬陵歐陽某記巽齋文集卷十七
