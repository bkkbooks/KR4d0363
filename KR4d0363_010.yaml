body:
  text: 巽齋文集卷十宋歐陽守道撰序送胡素行赴省序廬陵郡上胡夢高素行於春官得人矣士固取有用也使皆如予書癖焉用之漢取明經術通世務者予昔與君之先人古潭君友毎讀書未甞不及世用而予無古潭之才每歎斯人胸中自有一部水心外藁而未之筆惜其僅得一第竟不及用其有俟於素行也素行為布衣才名在諸公間君而第知君者當交相慶方信古潭為老蘇矣雖然請贈一言才遇時而後見臨事而後見君此行以詩賦論策取知春官而已天子亮陰不言未遑親策君經綸滿腹無由一吐於大廷則又何以語他人為前時知已在天朝在方面者正不必使之知在何所試前試後靜坐客舍屏絶書問休飬精神且了身事以歸且吾方為禮部進士而縉紳先生與四方之聞人相傳曰素行至矣將屬目焉此招忌之階也鳯鳴高岡周詩歌之西狩獲麟春秋悲之鳯長羽族高岡去人逺來莫知所自去莫知所之其鳴也可聞而不可即麟非鳯比也不能倐來倐去乃輕身出原野而混雜於豭豵狐兔之間噫不謂麟為四靈之一而於此不靈也聖人感此自傷而春秋之筆絶君今遭逢明時出為世瑞為周鳯不為魯麟斯予所以贈言已雖然君何以告居者景定五年嵗除後五日丙寅歐陽某序送張季德序季德以丙辰冬十二月朔别予歸高安予與之俱至名屋山望科嶺夜宿於彭氏庵初季德請予願得一言名其讀書之室予未有以告而甞出象山語録使讀之季德有省是夜遂與言曰舜居深山之中與木石居與鹿豕遊其異於深山之野人也幾希及其聞一善言見一善行若決江河沛然莫之能禦也此章予甞講焉以為舜得力處究當在深山時其後聞見感觸只是一分事此講義是十年前作想必見之今夕更説若決江河沛然莫之能禦水之流行見禦土石若用人力開導則必與除去所禦者所禦者不除則水止於此矣水有大小土石有多寡以水之小而遇土石之多非藉人力之至安能除之今江河之決水力浩大流行所至捲土石而去土石有盡而水無窮自此但有江河豈復有土石若使水力小則人力雖弊弊其除幾何此所謂沛然莫之能禦蓋水力自勝土石不以人力勝土石也吾心天理氣力自大諸所障蔽乃是外來何足以相當若自處小弱而弊弊然與之較勝負曽不知此中蓄而未發者是以大水源不敢肆然放去任他吞吐而欲日竭畚鍤之力先與水開通千萬里其徒勞也甚矣豈知此水一決土石自當辟易何用如此也原其用力徒勞如此蓋由不敢自信畏土石過甚而憂水不足以勝之若能自信泰然無事予於季德此别無他語只願季德反觀吾心天理大與不大真見此大吾事都了不見此大雖憂惱終身亦無了期説此章已又説孔子志學一章曰人言孔子之學十五年十年一進然以予觀之固是十五年十年一進而其進豈是逐步躋攀曰立曰不惑曰知天命曰耳順曰從心所欲不踰矩句句字字皆是十分快利光明未説從心所欲不踰矩只耳順已似從心所欲不踰矩未説耳順只知天命已似耳順未説知天命只不惑已似知天命未説不惑只立已似不惑若無後一級則先一級有何不可今不於快利光明者觀聖人却看取聖人只是逐節竅通透則此章内本無此意此乃子夏子游諸子之學顏曽不然也況孔子乎又與季德言予讀書不㑹錯綜牽合縱有不曉亦復何妨大理觀聖賢言道理譬如觀草木生意枝葉扶疎縱有偏側不害其為天然園丁弄巧必一枝對一枝一葉對一葉乍時見之若好然生意固不如是又與季德言震霆一奮白日一出清風一發陽達陰散皆不俄頃天地豁然此豈復有待哉是夜語稍多彼此皆快於心次日書之因以贈别某再拜翼乎如鴻毛遇順風沛然如巨魚縱大壑此象山語録中所舉王子淵是夕語此意是縱肆無拘礙處縱肆於物欲則不可若天理中得縱肆豈不快活請待補公據籍序士赴太學補試得之乃若勝於鄉貢試禮部即第即仕不必論未第則視入太學者自公私試以往無日非積累進取之途固有間矣然自科照下郡試於州初志固望鄉貢即第仕也望鄉貢而中次榜視之也輕視之也輕故以造郡請公據之事往往不甚勇而其時又迫新舊嵗之交以他故牽制者多其或去郡逺則須數日而後返比其得據為費已重且士不慣與郡吏接彼易其生疎可以邀索則所取人人殊予甞見士有持據歸計費至萬錢省此費而為入京旅食之用豈不有助士固有重費不較者予之所較為寒士也予以身體之也李周鄉其亦若予以身體之與手造一籍請於鄉里所素往還者俾各以所中次榜實習諱名而自書之量請據之費為齎入郡而類請以歸之由周鄉而請據所省多矣或曰郡必責人親領至於狀用識官防偽冒也代請可乎予曰人而偽雖責以親領亦偽所謂識官彼亦偽書之耳將焉辨如其不為偽雖代請亦無偽況周鄉之私籍所謂實習諱名皆其人自書則既有憑矣上之人於士母亦望其本心純實自不為偽豈謂區區闗防足以革偽耶且吾廬陵之士未肯為偽也偽而冒請一待補據其利害幾何哉周鄉索籍引書以遺之巽齋歐陽某公權省題詩序壽翁來訪與予縱言至省題詩予歎此詩幼學之所從事而書市所刋或雜以輕薄子鄙䙝語口授之業不為删擇或反賞愛其流麗而使效習之如此而責以習尚莊謹不可得已是亦賊夫人之子最先者與壽公出篋中詩一帙蓋其所自作者即席讀數首如花朝遊賞為題結句乃説農務月夜宴集為題結句乃説書燈予掩巻謂壽翁曰君詩若盡然幼學之一幸也畱一二日擬盡讀屬有客至不果為書其首而歸之贈劉登龍安成劉登龍以𢎞毅自命曰吾書此二字於忩几朝夕對之有不𢎞不毅則曰吾負曽子之訓非士也請予贈言嗟乎君乃求言於予予何以佐君予非不願為𢎞而思蹙狹以就小吾非不願為毅而思斂退以就懦焉蹙狹就小非𢎞病也斂退就懦非毅病也以為不若是𢎞毅非所謂𢎞毅乃放逸而粗暴也君欲學曽子日誦戰戰兢兢如臨深淵如履薄冰之詩則可與從事於所謂𢎞毅矣廬陵歐陽某書送劉童子序予往歲叨恩入史舘同列有年最高者一人曰鄱陽張君最少者一人曰四明王君張年七十有八號老儒王纔二十有二爾予甞語王君曰二君間無予間之君當班張後合為百歲人舘中異事也王君葢以幼年能文授官即入舘讀書待年而仕即與聞史事㑹進史與張君同日通籍未幾俱為通守朝廷異待俊秀如此吾廬陵毎歲中童子選者常居四方十之二三而能文者亦時有之國家人才之盛至於童子頴拔相望葢文盛極矣二劉童子前年叔姪同以記誦中而後皆以能文其一尚在十歲之内今又以文試吾知試之必高選也將行鄉之先生長者俱有贈言童子之父與可不鄙亦請予一言也謂童子曰將以何業試曰通詩義以詩試予曰小子何莫學夫詩興觀羣怨與夫博識抑末也其大者用於邇事父逺事君三百篇中惟忠惟孝豈徒以資學文而已乎爾父攜爾適千七百里之京師爾父固朝夕視爾也母曰嗟予季行役愛季之心又切矣誰言寸草心報得三春暉後之詩亦古詩意也菁菁者莪在彼中阿長育人才譬之微草亦得豐茂聖天子之賜也使爾不生於聖朝文明之世前代厭棄經學鄙賤儒生固有皓首窮山不霑寸禄者矣孰使爾生十年遽得以文發身乎得官之後又何以報吾君願秉精忠節終身立聖朝先正由通科致通顯者其初立志如此爾師也童子拱手曰謹受教遂書以贈送胡童子序胡君國寶之子囦生十歲能讀五經如流將入京試童子舉來訪别國寶請予試之予老矣舊所讀多遺忘謾舉一篇而囦暗讀成章不休既退予呼予家諸兒誚之曰汝年長於彼也汝於五經如何汝亦讀韓文公訓符之詩乎兩家子少而相聚嬉戱及其長也一學一不學而龍猪判焉今汝以嬉戱度日也而不知専心讀書者已如彼則龍猪之判不待他日矣諸兒黙然其一獨笑且應曰小子不敢不學然如詩所云則此亦一嬉戱也彼亦一嬉戱也何優劣之云乎小嬉戲即印纍纍綬若若大嬉戱即武夫前呵從者塞途謂彼為讀書所得則直一嬉戱之甚者爾真讀書者無彼想慕則與其印綬從於他時不若斑衣竹馬於今日也予見其言有理欲重誚之而不可遂書以遺胡童子噫童子今幼學以記誦為長往試中書省必受恩免解或得官也天資頴異如此胡君必大其成至德觀蕭曼翁九皐吟藁序羽士蕭君曼翁九皐吟豈但世間食烟火人不敢讀想天上蔡少霞山𤣥卿亦合相避然抱膝或危坐無言欲斷魂男兒蓬矢志如此老乾坤等句又似昌黎所云臣有膽與氣臣非黄冠師者東坡云漢世盛稱仙人安期生甞以䇿干項羽不能用知此等人決非碌碌往往胸中抱負鬱無所施故晦迹泉石烟霞間耳君所居古洪至德觀予甞至觀中古屋老矣在水中央一塵不到真隠者所栖也洪自許旌陽以來多仙蘇雲卿去今纔百年蹤跡疑尙可訪君詩甚清而貌甚武豈亦其流耶咸淳元年五月上弦來訪望日告别書此還其卷廬陵腐儒歐陽某序贈劉道士序道立三極士尊四民道士之名黄冠師擅之予不知其説也昔人謂周穆王用道士説賓西王母於瑶池之上穆王尙書中賢王豈有此哉秦皇漢武求神仙時稱方士不稱道士太史公特標黄老之學為道家然黄老自與神仙異旨今之為道士者又非盡出於黄老也道士之盛其魏大武崔浩以後乎亦不能常盛雖以李唐尊老子為祖而道家之見信不過三四君延至於今其説存而不廢要其得志之時亦無幾耳計其間無可利顧不知何以願為其徒者之代不乏也唐有士大夫棄官為道士者今無之惟閭里少弱之子誤投其身不克自返勢不得不終老於此亦可悲也劉師慶椿者來自南鄉之徊仙自言觀無常產其師於歉歲命主觀事極力支持不敢辭難今歲差熟鄉人頗有施錢穀者師以為易為也復自主之而慶椿去以其所作四六之文示予曰吾將有四方之役惟所遇焉問何挾以行曰吾所能者道士之常業而文其一也嗚呼予行四方之迹少未甞見大宫觀第以吾鄉之觀雖有田業之處一道士所得食或不過五六斛而衣服百須皆無所出或觀而無田者生計尤難故往往為丹藥符籙禳禬之術以投合夫見信者以餬其口能文如慶椿乃其類中之難得者其師縱之去可惜已以予觀於椿所作偶儷精而筆意圓用工不已當有識拔而委用之者是既有文以資身宜其一去之輕也雖然予又為之太息道士有凡俗中為清高毎以自頤況飛能高鳴能逺與人相逺而無求者頤所以異於凡羽也見狎庭檻間雖日得食失其所以為頤矣我生如寄良竒孤三尺長脛閣瘦軀俯仰而喙便有餘何至以身為子娯椿也甞讀坡仙此詩乎嗟乎勿謂我有可出之資勿謂世有易遇之人今日固能輕去後日其能早歸乎其藏吾序於心勿忘咸淳元年乙丑九月甲寅立冬廬陵歐陽某序送孫季山序士君子仕行其志固曰上以正主下以庇民而其私家亦豈不願門户之昌子孫族黨之䝉其福澤吾州先賢如獻簡孫公在紹興間危言激論覬上心之寤以安社稷在諸公間可謂藎臣矣慶元學黨之禍公以從臣坐罪斥天不假年不及見嘉定更化而其子孫顧畏身後碑銘久而後有所屬故雖吾州言獻簡事者不甚暴白予甞得其奏疏讀之其視晦翁諸老之精忠豈有間哉當公存時昆弟皆以文章有聲名號三孫而公又立朝大節如此予固願識其後人而恨未之遍有名埜而字季山者公諸孫也十年前識之名列右選一官甚卑而詩文清苦持游諸公間往往敬愛之予甞言之於淮憲豐城李公李公參謀制閫將白用之矣㑹李公被召不果葢别去數年今乃知其為船司監門既滿留番禺不能歸嗟乎獻簡諸孫而若此乎予杜門日長與人交多慶元諸賢之後甞識趙丞相呉侍郎畏齋之孫各一人與君而三丞相神道碑畏齋家集獻簡家集皆三家諸孫手授見其後人而思其先世未甞不慨然也往年為趙氏記堂前年呉氏求記祠堂未及作區區高山仰止之意今於孫君猶是心也君有書來自言願見廣大帥簡齋謝公乃復為之序謝公之心蓋以一夫不得所為已慼者昔公宰廬陵予嘗侍坐從容語及劉靜春家子孫族屬公惻然思所以振德之無所不用其至蓋至於無可奈何而後已予於劉氏非先世之契好而公自閩來江於劉氏門戸之興替亦何足以遽動公心而公如此者尙德懷人無今昔近逺也孫若有官且既久留於公之封部其可挈提若差易焉君此行其有遇乎謝公於廬陵如眉山蘇公於餘杭蘇公自謂於杭人有宿世因縁既去而見杭人則喜得杭人書則喜孫氏雖家吾邑境外而吾州通謂之廬陵人在嶺海之陬公有不惻然者乎吾賀君遇矣贈張横孫序闗西張君横孫字渠伯寓居豫章横渠先生五世孫也攜其家譜見後林李公公書其後曰先生所以垂世立教繼往聖而開來學者厯千載如一日初無待於外學者不可不思況克念厥紹者乎後林此語可謂嚴正張君方以倉使學齋申奏於朝有望一官而得聞此則得之不得視之亦輕矣然後林所謂無待於外者所以勉張君之德業使自立也學齋後之申奏使有世澤者所以振張氏之子孫使有藉以立也横渠先生之子孫微矣予詳問君以今存者幾人君曰惟予與弟二人耳已未有子弟未娶又苦貧甚嗟乎今已不絶如綫如他日何天爵可以自求若人爵則國家所以奬善勸教後林學齋之用心為張君地一也佩後林之訓在君終學齋之請則有當世之賢君子在歐陽生兵書序歐陽生經世安福族也年方壯慨然有四方之志去年春甫識之袖出所撰兵書索予著語予謂兵所少非書如子之志宜求能用子者杖䇿君門一言契合與之出力共事可也文武兩途以予觀於儒學之士著書立言者往往不遇於當時故求傳於來世子志於武事若亦以著書求傳則當世亦安用子言矣君索著語不已予重謝之曰昔龎安常有聖散子方療傷寒疾如神東坡先生為之序以為阥阦二証無所不治其所用藥迥出常情之表聖散子由此盛傳宣和末太學生誦蘇文甚習適諸齋大疫人人皆以此方經東坡主張之故服之多死後人不免歸咎於序方之筆而東坡初意乃活人盛心也兵之難言與醫等而其闗係人命之死生何啻百千萬倍予未學軍旅縱使子書高出孫呉予敢不懲聖散子方乎雖然子之志不可無一言以庻幾萬一傳聞於當世諸公間今又得選官之路甚多謁選於辟總總以萬計彼猥瑣庸腐夤縁而得者有不識弓馬釰槊為何物至若武舉設科名非不美然亦為文士假途其號絶倫者挽强引重市井粗才或勉强習數月以幸一中既得之後筋力竟􅉵今如子之肯讀兵書又出意見以撰陣法器械是可謂有志者若使有人左提右挈安知予他日不埀功名於竹帛乎雖然予又為子自謀士別三日當刮目待吳下阿䝉前後如兩人子今未遇當及此暇熟講而精思之務使毫髪無遺憾人不以李信趙括輩議已為趙充國為王忠嗣全師制勝乃所謂善兵也提挈子者在他人姑勿與知敬上人詩集序雲壑上人示予詩巻詩好語甚多而謂予曰願有聞於方來以為君托嗟乎予於世落落矣朋友或出予舊藁於外予每止之曰使我有身後名不如當時一杯酒況能有以及子乎雖然上人此詩非埋没者也世有東坡先生則參寥之徒與之俱存上人未甚出山安知斯世無復如東坡必不可遇子姑藏之名山深處異時光燄出草木間予知非他物必子詩也廬陵歐陽某書巽齋文集巻十
