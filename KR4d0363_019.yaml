body:
  text: 巽齋文集卷十九宋歐陽守道撰跋跋索馬九綱書豫兒時見禮部貢院試進士策問馬政有謂南馬不堪用惟産於西北者良其説自易乾為馬乾西北之卦也問先生曰有是乎先生笑曰若然則坤牛兊羊巽雞艮犬之類皆指方位物産乎南自有良馬不善市故良馬不至冀馬所生無興國焉蘇秦説楚以楚有帶甲百萬車千乘騎千匹天下莫能當但能絶秦則燕代良馬必實外廄此則所恃有土産徐待外馬耳因亹亹為豫言馬當此時鄉校教小學亦及當世實用如此蓋舉子程文有以發之耳今三十餘年程文非精義格言不談後生小子得如豫之幼所從師之言問馬政亦少也己未庚申之禍士子精義格言書册避敵於山中爾敵退又坐臯比矣今因王國望介圭示豫以所藏淮閫賈忠肅公與嶺南經略胡公索馬九綱書曰得此為助不小此正省闈發策時也感今昔為之一慨咸淳五年正月十八日廬陵歐陽守道公權書書劉飬源詩集頃年方侯蒙仲得豫文藁於淮南而愛之聞其嘗以呈大丞相魯公豫未識蒙仲也去年秋蒙仲自邵武召為祕書郎而豫先備員正字日徯其至以質前事未幾聞已仙去豫寓居安邊所北與後村先生鄰先生喜對語頗許其識筆墨畦徑然豫思意絶懶故藁不以自隨新作無一篇不知先生何以許之也天台劉君養源教豫以江村詩四卷留之十日養源索回又留五日嗚呼天之厚豫至矣始者無所因而辱知於未識之方侯既而得事後村先生則方侯師也今養源方侯之畏友後村之所敬慶而有意於與豫言詩使豫夙有講聞之素則今當何如其進益惜也夙未有講聞也養源詩方侯為之敘而后村先生又題二百餘字謂詩當於詩家評養源豫敢評哉然豫雖不學詩自有詩以來諸名家詩偶在目前未嘗不快讀未嘗不欣然會心以其所愛於古人者而髙下養源之作其欣然會心處不知古人養源耶養源古人耶許之既難則吾將付之於無評蓋世有得珍殽異果於貴公子之席者初不辨其何品亟攫亟咽不少休他客不然也或告不知者曰座中未有如爾之叨者某所某物也爾豈知味者乎其人對曰豫惟不知知且咀嚼移時而不敢多取矣故不善評詩而得快讀未為無真樂如其善評讀安能快養源試以豫語告後村先生先生當發一笑景定壬戌六月乙酉朔廬陵歐陽某書題晏尚書紹興奏藁尚書晏公紹興戊午議和封事稿其孫衡山令邁刻石摹本遺豫豫敬受之取忠簡胡公同時封事稿合為一軸而題後曰管仲以尊周之名義霸齊吾夫子猶稱之曰微管仲吾其被髮左衽矣吾宋中天之禍不為楚之九縣者幾希夫子以百年前嘗有管仲二百年後吾得不為慮其利害切於我身也天下臣子戴一人而君之吾君天地間正統帝王吾於中國草衣木食亦與有榮矣而况立人之朝而親見天地之大變至此朝衣冠暮闕生不如死豈曰有激云乎哉胡公曰吾有蹈東海而死耳寧能處小朝廷求活耶以君父屈膝之後舉朝將盡為陪臣皂隸也晏公亦曰彼將授陛下一兩鎮節鉞吳越一王號還可從乎本朝大臣諸將盡行封拜還可從乎二公思君父國家與其身通為一體隱痛至此今去之百三十六年仇敵亡滅無遺類矣而某讀此二藁猶再拜流涕曰吾祖吾父至此吾身吾子吾孫幸得為大宋民不更事二姓者誰之賜也嗚呼讀論語者不思夫子微管仲一語乃利害之切我身也如皆思之則謀人國事當不自誤矣不然者吾猶置身何地哉嗚呼二公此藁吾子吾孫尚永寶之此亦爾曹得免於更事二姓之所自題韓子蒼贊韓魏公畫像觀陵陽韓公記金人拜相州僧寺魏國忠獻公畫像事為之太息不已彼雖敵國然所敬所慢施於中國之人蓋未嘗不嗟王衍之死排牆郭令公之受羅拜前代此事不少靖康之禍使吾國有人稍堪為魏公役彼亦安敢易視一日敵使至宰相奉命待之時圍城破在旦夕吾相對使者歌曰細雨共斜風作輕寒彼與副相視怪笑以此人愚駭不識緩急至此也哀哉陵陽公有憂持此圖以靖邊壘噫更可得數十萬人下拜爾拜已長驅誰與禦之人之云亡邦國殄瘁咸淳己巳季春丙午朔廬陵歐陽某敬書書廬陵六君子畫像後里中朱君少張繪六一翁而下六君子出以示余曰聞六君子之風天下一敬心也况於生是邦者乎余曰嗟乎少張余之對斯圖也無惑乎哉六君子之外仕宦通顯者幾人其不入斯圖也余不欲泛問六君子之外隱德韜光者幾人其不入斯圖也吾不能盡問姑就君此圖而論世焉若東山先生去今固未逺也先生風節玊立山峙而於後進嘗樂引之比其沒時豫年且弱冠如蚤有聞獨不許一窺其門牆哉今年日益長學日不進而先生遺像與君子並列視之等為古人誦了翁責沈之作面熱而汗下也吾州儒風不減鄒魯山川之氣未歇安知世復無斯人者東坡有言膠西多隱君子使蓋公真往來其間於何足以見之詩不云乎髙山仰止景行行止又不云乎我日斯邁而月斯征夙興夜寐無忝爾所生感歎之餘為拜手書其後跋與劉書記嶽麓和詩後昔遊嶽麓巢林劉君時為潭帥書記過豫山中嘗賦三絶豫和之十有二年矣君沒無主後久之未葬所居異邑不得聞也今春有來見者視其謁稱契家子劉辰讓問其字曰起雲則以同姓為君後者蓋甫定於去歲眉目清秀舉止有容知必能續其詩書之傳出示豫舊所和詩見之愴然嗟夫豫之詩不足藏也而斯子猶能存之則其能保有乃父之手澤可知巳記荆溪先生嘗目巢林君為枯松古柏其存也清苦如此身後猶為可痛松柏巨能數十圍而其子才如黍粟為人所采種於他山或隨風而飄豈不或生然去本逺矣君自有子尚存為閩中同姓逹官後不可復還此他山之種隨風之飄者也枯老者不可見仍以同類稚栽於其林松之林仍有松柏之林仍有柏但是同類亦復何傷歲月長茂蒼然如昔少慰舊人之思豫於起雲望之切矣巽齋歐陽某書書歐公帖歐陽氏居廬陵自唐率更令之孫為刺史於此郡始刺史以前廬陵無此氏猶眉山之蘇自唐相味道始也今吾郡吾氏支派甚衆必皆刺史子孫而譜不可考矣文忠謂子孫或居安福或居吉水或居廬陵或之者疑之也蓋此時已不能盡知故其所書之名才止數房然譜所不書謂之非此族類則不可也此卷蓋譜之初本與世次碑本不同碑本刋定而後入石初本記録稍異來者見之猶有考訂於碑之外周益公刋公外集嘗兩存之而此卷又與外集所收者小異豫舊名巽不知公之堂姪名巽也石本外集本皆無有今乃知之此卷字體殊有公筆意但頗嫩弱又略有誤字如云歙子孫微字上加弱字先作若塗去再作弱殆若未曉文義者又如崇公生二子長曰眪次則文忠而曰眪之下有曰卒二字然後及曰某則文忠名也三曰字並列則為兄弟三人矣然豈有人名曰卒者耶此第二曰字蓋早字之誤也誤字至於如此而不悟疑其為公家童幼之所書初學而習公字體者莫知其的為誰矣書紙書背其靣則吳長文奎以翰林侍讀學士出知鄆州時與公啓所謂樞密侍郎則副使時也以此信其為必出於公家傳至於今斯亦可寶景定四年正月望劉君以示豫友周君子直子直轉以示豫為書其後歸之題姚幼開皆山樵語皆山樵語永豐姚君幼開詩卷也幼開豈樵者徒哉氣韻清潤筆力遒徑而自題其詩為樵語噫我知之矣江湖間以詩人自命吾謂其侣魚蝦而友麋鹿然開卷視之則題曰呈某人者往往貴人也貴人者豈真與四方上下相從為雲龍耶幼開皆不然豫識君有年未嘗聞十日逺遊也故其得句皆在山中樵人安得識君詩律吕然相爾汝間有詩真意自我得之盡入吟境故曰君以樵語名其詩謂有采取於樵者多也最可喜者君罕出故詩無適俗韻人得一生如此難矣溪邊古路三義口獨立斜陽數過人豫平生不堪回首君試問共語之樵廬陵城中有歐陽公權者亦頗可語還許邀入同社否書歐陽氏族譜豫歐陽氏家吉州自唐中世刺史府君始大約距今五百餘年子孫散居諸邑或徙他州不可盡考姑以見居而未徙者言之户不啻百計丁不啻千計矣其間最著僅文忠公一人自刺史府君視子孫可謂最著者之少也族譜非最著者其誰宜為宜乎公之為之也然公譜未廣又頗有誤如曰自通三世生琮為州刺史唐末黃巢攻陷州縣府君率州人扞賊鄉里賴以保全琮八世生萬為安福令萬之下八世曰郴仕南唐為州軍事衙推官如此則十有七世之內三仕於吉矣然刺史為率更四世孫率更父子仕唐初而四世孫乃捍黃巢之亂是為當僖宗之世唐有天下至此二百六十餘年之久唐帝且十有六傳而吾家才四世也推官為刺史十四世孫既曰刺史捍巢賊而推官乃仕南唐南唐有國始終不過四五十年上去廣明之亂近何四五十年之近而吾家已十四世也吾於公所次譜猶疑之如此來者又可知巳按唐歐陽琟碑顔魯公撰并書其書上世名諱與率更以前同又名從玉旁比之刺史諱相類琟似是刺史從兄弟然其卒在大歷中則刺史亦必是此時人若吾家果有扞巢賊事當是刺史以後六七世孫不可係此於刺史事迹內也文忠公遊宦四方歸鄉之日無幾其修譜又不暇咨於族人是以雖數世之近直下之派而屢有失亡最後獨質之吕夏卿以為的據夏卿雖博學安能盡知他人世系之詳哉今宗人民先所録自刺史直至於今蓋歲月又增三之一而世益蕃衍矣民先年髙而康強方册之外用力不分足以肆其考訂如使詳核無遺憾而因以證前誤豈非來者之幸乎豫前後所見同姓諸譜但在廬陵諸邑者已六七本各巨帙細書至鄰郡清江宜春長沙同姓亦各有譜往往出以相示參較上世率不相合皆無一本略同者此不可曉也安得遍與諸家借聚與民先細訂之乎姑識此以俟他日書葉監酒慶元封事霍氏權震天下而茂陵徐生請以時制抑毋使至亡元載當國舉朝屛息不敢言而晉州男子郇披葦席丐道途願言三十事徐於霍郇於元貴賤戚疏何啻萬倍而捐一旦之命蹈不測之禍指切言之雖不見聽而二家既敗之後其言得存於信史猶足以表疏賤中之有人也今觀葉公洪慶元封事其忠憤明切又逺出二人之上是時趙丞相死朱文公諸賢盡斥公紹興酒官也封事托胄敢諷臺諫殺宰相斥忠賢以私人為統帥遍布中外今既㺯權後當㺯兵必有董卓桓溫之禍而請上親有道之士考古今講政理勿於深宫以嬉戲怠詩書然後強主威去私黨自同時諸賢所言雖文公亦何以復加書入托胄大怒即有削籍編置建昌之命他日建昌徙贑迫以峻限蓋將斃之於道其不死者天也嘉定更有旨敘復告詞甚美而公止調雩都丞以死諸公亦無為力言之者未知國史復存其姓名如徐郇否乎公家撫之城中豫遊撫道過屬邑崇仁見道旁有小屋封閉其印文曰歐陽祕閣徘徊久之問逆旅主人對曰建炎上書乞誅國賊諱徹之别業也乃今又得公於城中撫固多表表巨人至於歐以諸生葉以監酒二忠相望於七十年間嗚呼盛哉顔魯公昔為州刺史州人奉蒸嘗至今歐葉固已聞風興起繼歐葉者尚世有人跋陸象山包克堂遺墨今年春後林先生第一書道旴江吳君聖可來見聖可大父顯仲公師象山而友克堂者也二先生翰墨具在讀之凜然得此老之為人然象山於其少壯時喜其淳厚質直教以依本分三字歷舉孔門忠信等語戒之不必務外以失其本心而克堂於其老也見其語不凡刻時觀化告别好友如期而逝為作墓志標以異人之號本分之與異微似相反豫思之異日未得其説聖可令豫書數字於諸公跋之後不敢輕也一夕展開中宵忽若有悟曰所謂異人亦無他正好驗此老所得於本分中耳大率人於死生之變有能精明不亂必其平生一依本分無愧於為人本分也者如子止於孝父止於慈之類人道之正也曽子易簀之言曰吾何求哉吾得正而斃焉斯已矣平生得正至此更無分毫缺少不滿之處故於垂絶而自幸焉康節卲子病革對程子亦有觀化一巡之語其將逝也大書詩曰俯仰天地間浩然獨無愧卲子千古人豪然細讀擊壤集中每見兢兢敬畏修省之意更在從容間適之表此其浩然無愧以生以死豈一朝一夕之積哉充本分之極至於卲子至於曽子臨終皆如此亦無得不謂之異人非竒怪變幻之謂蓋舉世昏𡨕醉生夢死之中得見如此人絶少耳本分至於為大聖負手曳杖逍遙於門既歌而入當户而坐告門人以夢奠寢七日而沒此一時也不本分至於為大愚咿嚶涕泣留連妾婦分香賣履區處衣物平生姦偽死見真性亦此一時也生死正自常理非謂所學至此作竒特受用苐人要其終此時最可以驗人之平生嗚呼吳公得象山片言真能作本分人若其出入佛老要是有見之後玲瓏通透無所凝滯於彼説爾徹底依本分三字乃本領之大者聖可家有世學里有父師嗜學不厭取友四方豫因其來增此聞見可謂幸矣歸過後林先生願以豫言質之宏齋包先生天下大老舉世宗師而聖可以先世師友之好日從之遊若侍丈席舉此就正而復以可否告我又幸之甚也别教三年不敢以書瀆故私有望於聖可廬陵後學歐陽某敬書跋包宏齋贈周載仲詩疇昔之夜豫夢周君載仲若相遇於道者既揖即勞之曰載仲久别地下無苦君平生一卷書今當得力載仲慘然曰幸甚得力但分略虧豫曰仍舊秀才有何不可君領豫説然似以豫知其已死欲相避也道旁有一空屋無人居疾趨隱於門內豫已去數步回首呼曰載仲君以幽明殊趣不肯久即我乎雖然豫豈敢不别即望門長揖使之聞之而後去次日嘗以告君之邑人聶吉甫今未旬而君之子岐孫文子來訪嗟夫豈文子作意訪我而君魂魄先之乎文子純實無華謹重有畏君為有後矣袖出君所得宏齋先生包公所贈君名孫二本詩墨迹如新君之遺後人與包公之所期望皆甚悠逺也文子謹守父書之外生理蕭然嗟乎世以不仁致富禍其子孫或衰殘或絶滅或雖保而造物隂陽其姓者固多矣而天之未定赫奕光寵真足以纍世者亦豈無之清修之士一介不妄取身存而食并日出易衣身殁而後人無措足之地或重不幸而無子亦往往而是若曰積之於身其後必昌蓋有時而不然也然君子知所自信終不以彼易此或告之者曰爾曷不隨俗為惡為惡則能兼人所有以為爾資朝為之暮立效飽暖豐餘字育繁多瞑目而無後憂君子亦曰此亦食異類之食滋異類之種而已豈願以身與子孫舍人而趨異類哉故雖厄窮困苦子孫幼稚啼飢號寒終不以可憐之色動少悔之心而又何赫奕光寵之羡文子其益思爾父之訓仰前輩之風他日二本者知學有立雖三世一貧可也况消息相代未必常如今日之所觀乎巽齋文集卷十九
