body:
  text: 巽齋文集卷九宋歐陽守道撰序送王槐城序國用分教古洪借其姻家吳氏舟以往吳氏舟峽所造蓋送太守還者也國用登舟豫送之國用視所攜具不能稱舟所容之十一而悔曰豫何為借是豫川行五百里爾而篙師棹卒之費為錢六十千又懼舟之太輕反以取危也則取凡重滯之物實之而後敢行豫謂之曰君獨知借舟也乎官亦借也物以舟載猶志以位行也世之王公大人志不足而位有餘者甚於君之借舟幾倍矣而未嘗自顧所有不能稱位所容之十一也君舟之虛費君自任之而悔彼位之虛費國任之民任之彼豈有悔也乎彼又豈懼位為人不稱而反以取危乎故愚以謂道足以福天下然後不可以無公相之位澤足以被郡縣然後不可以無守宰之位借彼之官行我之志不可以非所借而借也如君者借舟則已侈借官則已廉以君之材而收科十有四年尚方再為郡博士郡博士名雖尊所職不出乎諸生之課試其於千里政教之大者了無與也然以其借之廉也故旁觀為君屈而君無愧願君遂以借舟推之益拓吾之所行而不使他日有虛位且不以虛費纍國與民如今日之於篙師棹卒也位與人稱而不取危也雖貴極人爵可以若固有之而孰以虛借罪君乎雖然尚有説以進君舟以載物也既登陸雖量容萬斛吾不顧矣世豈有愛舟而不忍舍者位以行志也志以行舍位而去之古賢皆然也後世則有得位而不肯釋者焉何哉彼不識勞逸也量容萬斛之舟雖安吾以行川故用之孰與吾平地宫室環堵而尤安也貴窮人爵之位雖尊吾以行志故藉之孰與吾不願乎其外者之尤尊也士有行而至欲得位也猶其欲得舟也在舟勞舍舟逸矣然則他日幸而志行軒冕猶足久戀乎哉噫君方為郡博士而豫言及此亦可謂早計也夫送趙仕可序豫友趙仕可為宜春獄掾旬月必有書寄豫其推鞫判擬間於獄成録其副與書俱至曰某於職事盡心焉耳矣求以無負夙昔之所聞而俱未能也豫讀之見仕可不負掾宜春之獄經仕可手者其庶幾不寃乎仕可父在時多施藥其傅杖瘡者藥至痛止所居近縣破膚流血者日扶曳其門仕可登科人多稱其父陰德之報豫以詩送仕可與新昌尉首舉是事告之曰爾父愍人善心如此今爾居官一箠撻可輕用乎仕可服而行之今為獄掾能以忠懇得囚之情其為姦欺者其聰明亦足以察之豫愛仕可之切吉袁間人士往來豫未嘗不問告豫以仕可所為者無異辭也袁人知仕可從豫學仕可無怨於袁人豫心亦稍慰矣然仕可雖宗室子發迹書生一寒無援家又無升合之田居官得俸入才支出官滿日歸依然故貧數其登科之嵗於今且十有四年其不能無望於寸進固人情也故書來時時相訴以脫選之難而頗有望於衰老無用之人以為是嘗有列於朝在廷諸老與外之州牧侯伯或頗有雅故可以吹噓而薦送之者求一言以轉道姓名與其平生之志業噫仕可求於我疏矣以豫之生硬崛強使向時不僥幸際遇特恩改秩則雖以一階初品沒豫齒可也曽是不能自為身謀者而能宛轉為朋友覔舉狀乎且豫豈特於此不能哉直甚恥之已之所恥亦願為朋友惜此恥官可不改而俯仰歸投不可為也國家立法選人必受舉而後改官所以厲其職業服勤所事求為可知也如舉狀必待求而得則亦不足貴矣豫以是辭仕可甚峻而勉仕可愈力仕可之季弟良可告豫曰先生之訓正理也顧今之求舉者滔滔皆是前輩文集中為人作求舉書者多矣世皆不以為罪先生若為吾兄才不足以字民則豈惟不當改秩雖今獄掾不當為也吾兄之廉勤明恕先生知之矣使少進於今濟人及物之心事又將有所施忍不借一語之助拔而出之乎不然其猶慮吾兄之易所守負所學以辱舉主乎今者吾兄使某請得一書以告刑部文郎中也刑部嘗知吾兄而獄官正其所𨽻此書而不與某兄弟其何所獲罪豫無以對雖然豫之不能為此書不可強也次序其語歸之仕可使緣為書以請焉仕可可舉之此在文君而非為僭也不可舉而舉其不肯也可舉而不舉其不忍也餘則非豫所知或者文君方舉官猶有待於他日也豫固欠文君書隔歲者負罪放逐之人不敢以書入國門爾送鍾煥甫序永新鍾君煥甫訪别問所往曰往見宏齋先生蓋聞先生教人使之自見本心其著之於講説甚備而豫猶謂不端拜座下覩先生之光明無以發我心之光明也我之望於先生大矣豫驚曰光明在子乃欲覩先生之光明以發已然則先生之光明子不有以受之耶夫發在先生而受在子然則受者為主也子於受時觀之此即子之至虛至靈至光明者也太虛之中懸象著明莫大乎日月先儒謂月本無光受日之光竊嘗思之既曰能受則光之質固在月矣置鑑於日中日光射之鑑之列影滿室使置他銅日光固不入也然則光之質固在鑑也而況月乎夫先生之教人不能與人以光明能指示人以皆有光明則是不惟待學者以受光之月也乃謂人人皆赫然當空之日夫豈惟先生將自古聖賢之待學者所有與已全同不待我之分毫假借也雖然子方往見而豫言此子若誤認豫言是謂豫告子可以往可以無往也非也今子必往往則親先生之光明而反之於心曰先生人也我亦人也我之光明何以不與先生若然後歸而盡取先生之書讀之以尋先生之教人所以去外翳而視全體者夫光明誠在子能若此則是以先生之光明之大全者準已也光明有分毫之不及先生是以必有翳之者分毫不去也子以先生之光明何如耶先生今為天下之老平生大節瑩無纎瑕德業文章可以炳然照後世此何從來也易之晉曰明出地上晉君子以自昭明德明德不自昭而誰為昭之哉至於升曰利見大人南征吉子之往所謂利見大人矣利見於南南離明之地也子之名從日從丙自昭明德而南征吉具是義矣豫故兩舉其象語以送之贈朱月窗序吉水朱月忩用白顧書談命與尋常術家絶異豫所聞命術多矣此則未之聞也不知白顧書何人作既探索五行幽隱如此何以不傳於人不知月忩何以獨得之月忩初入文山盤之中盤之中主人為校其書而序之以寄豫曰此當在太乙統紀之上太乙統紀雖精必得此法乃活豫驚焉留月忩踰月以所記賢愚貴賤貧富壽夭之命百數十雜然試之月忩俯首默思俄頃間較量剖析皆如熟見其人有不中者寡矣談命至此真當為諸説之冠顧月忩足未出郡境今之知之者少故豫亦得以淹留之若盤之中主人之序一出月忩聲名焱起豫欲與之縱言不可得矣其説大槩生旺祿馬官福財貴或有所不取而空亡戰克刑害鬼劫乃有時而為用虛者實實者虛有者無無者有有往有復有散有聚有分有合脫去故常而後變化出焉蓋自一竒一耦錯而為八卦重而為六十四該天地萬物之理命以十干十二支配合於年月日時亦如之其數極一百三萬六千八百是一百三萬六千八百者在一百三十期中乃一百二十六年各為一造化而無一相似雖然陰陽之運日新然大數亦在是矣如又以時之初中末數之則三倍於此但人之生無能盡記時之初中末者故亦容有不盡驗而非其術之不能該也今人見生旺祿馬官福財貴即謂之吉而不知吉中之凶見空亡戰克刑害鬼劫即謂之凶而不知凶中之吉此執滯之見耳若千萬千百之中未足以得一二而何以曲盡變化乎月忩之説如此非月忩獨能也其書他人所無也書今為盤之中主人所留豫稍暇當往觀焉樂以忘憂是亦一助送孫伯寅序淳祐辛丑十月望豫蚤作有叩吾門者曰富川孫某願白事亟肅之問其字曰伯寅貌聲甚哀視其服衰也曰某不能子二親逝不能葬弟洎妹又逝家四喪焉不敢死以有大事也嵗月且久幸仁人戚之其有能使安於窀穸言已泫然以涕豫弔之既則謂之曰君母乃即富而仁者謀焉貧者無以仁也若何君曰吾無望君人與君厚者我將往訴之兾君一言焉豫曰君以誠感人以仁遇誠與仁一也土石之無情也天地造物之不可測也以悲以泣城頽石裂六月而霜者誠之至也記曰墟墓之間未施哀於民而民哀詩曰凡民有喪匍匐救之人同一初而為形骸所隔故休戚有不相謀及其悲傷慘戚一有所接目不及注視耳不及傾聽亟往救之不顧顛踣此獨何哉當此一時形骸更無與隔蓋所謂同一初者至此最易認顧君所感之誠何如爾人有難動者乎誰非人子誰非人兄弟乎然豫尚有一説昨與朋遊間談孟子所論四端愚因言曰端者自性而情第一念也情出於性方第一念無不善者第二念然後有善有不善只如惻懚之心仁之端也惻怛隱痛今人遇物之可哀者初念皆然少焉略有轉移漸見彼無與於已之狀則不恤矣於此始有充與不充之判故端也者未有轉移之時也君盍迎其端豫前之説君感人之事豫後之説人應君之事令夫君純乎至哀之誠則人亦純乎相哀之誠君行矣盡君之所以感之者而已矣豫言無以加也同一初者天也方發之第一念者亦天也母恃豫言君其恃天送陳子究序永豐陳子子究過我出其文一巨編且以蕭大山贈言為豫告大山之言曰清者文生生之源也古人以清得名亦以清得貧清貧之禍小清名之福大且懼子究厄於貧而文生生之不俊故豫之説以壯子究之心而奪其羇窮無聊之態大山愛子究厚矣愚謂常人以外物有無豐嗇為貧富文之所謂貧富不然也天地之生物不窮而人之賦分有限自祿萬鍾以降至於閻閭農賈貴賤不侔茍其用物宏而取數多則世均以為富矣閭閻農賈之富末矣祿萬鍾者吾未見其果不貧也貧富何以異有與無之相形耳老蘇有言千金之子天子之宰相求一言之幾乎道不可得今吾一世有彼之所無豈不足以高視一世夫此固吾之所謂富也不得吾之富者雖祿萬鍾吾猶貧之以此視彼不優乎哉天地至清之氣常靳於與千百億萬之中得之者不一二甚者曠世代而無人幸而一人焉得之則天地之所有將盡捐之斯人而無所遺欠上下四方之宇古往今來之宙有形有色有象有數皆將奄而有之外以供其耳目內以發其心思出其緒餘為言語文章而天下後世金玉之蓋文人之富如此是故有千百億兆之所無富冠乎千百億兆矣有曠世代之所無富絶乎千百嵗之上下矣富冠乎千百億兆且千百嵗上下而餘芳遺韻又將流之無窮愈逺而彌昌則是富也天地不以輕與固宜而人亦孰可以當此與者故曰多文以為富非夫用物宏而取數多之為富也吾子究之文其富於清者歟富於世人之所謂富乎哉何千金之璧之不貴而戚於一瓦缶之未得也誠使子究即日祿萬鍾資生通用之具纍不窮之積充牣其家而奪其胸中之所有使昭昭者憒焉皓皓者滓焉沈酣於富貴利達之場以消盡詩書道德之味吾知子究愈戚戚矣彼此各一貧富也愚言之是與否子究他日並以諗諸大山擬解試䇿序世書賈誼治安策服其精熟世故漢廷諸老國事在手不誼若也誼有新書傳於世故相周益公以為治安策往往在新書中蓋其觸事思索各有區處預為篇段一日告君盡取諸夙所擬者乎豫比讀之信然然則詔舉進士之嵗吾鄉諸齋擬策四出其間有志當世者亦書策可行孰謂非誼之流亞歟士無志當世雖金紫煌煌近天子清光遇對或應故事襲腐語彼視擬策猶而心也而擬策者出於窮澗頺壁之下兄弟師友不朝夕溫飽之間相向輒言曰上心若何正東宫若何教民病若何蘇邊憂若何解一得其説細書盈紙出入經史典故古今格言而潤色之以文采嗚呼如使當世大開古者士傳言之路則轉而上聞未必無益既不能然則刋刻流布傳於同試場屋之士使得吾説者皆有以告有司如此而應科舉亦何負科舉哉使得對天子其不應故事襲腐語以負人祿位者歟劉君南叟景豐所刋當今上策是已南叟有徑氣議論顧理是非恥軟熟雷同此編其所作與采之於同志槩可知也王廉翁詩集序廬陵之盛也無専以詩名者非詩不名文詩在其中也惟廬陵先生王公民瞻専以詩名瀘溪有文而詩専名以送胡忠簡貶新州二篇也是詩出禍三十年既而名具天壤傳固係於所託如此假令公以一茶丞老於家俗眼薄其官且並薄其詩今安有所謂瀘溪先生也哉然公之詩家不自刋刋者同邑士劉伯深問瀘溪詩之伯深焉今官湖王丈廉翁官止一尉而詩聲在人三十年矣余不識詩不能評聞之識者評公作非今人詩古名家詩也惜不偶忠簡無瀘溪一段竒遇今既沒又未有可人如劉氏者出力而必傳之殘編逸帙未保其往也其子玉成山立甫既除喪思以此事寄之當世好事君子嗚呼象犀珠玉雖不適用要不使在泥塗中吾嘗有味於斯言且廬陵百二十年詩名再歸王氏安知今之官湖非昔之瀘溪哉山立姑少俟送術士羅師禹序里中有羅師禹以言命為古心江先生所知而吾州之知有師禹者十無一二士大夫官吾州或知師禹而不能致而師禹亦不泛焉求之於所不知歲二月訪某於天牖遽曰豫願見通守應侯令君張侯久今二侯倅於是若以一言為我先容某曰豫㕓民㕓民而子欲使奉書於通守令君以薦言命之士可不可也且二侯有富貴命無富貴心子將何以動之雖然請與子言豫言命優於子夫富貴外物也而觀其所容容有分限不容則溢今二侯圭俎鍾鼎纍世矣玉堂金馬即日矣而謙和豈弟即之也溫如未嘗富貴者也則所容豈有量哉命非豫所知也則惟賢者宜富宜貴天固以富貴與賢者國家以富貴待賢者富貴非賢者而誰也二侯無富貴心未必與子言命雖然豫於二侯以其賢子於二侯以其天不可以豫説廢子説子行矣師禹行巽齋文集卷九
