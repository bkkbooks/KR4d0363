body:
  text: 巽齋文集卷二十一宋歐陽守道撰跋題李希聖詩卷乙卯孟夏久晴新雨余小圃在舍後課僮鋤菜鄰人報客在門急出齋肅碧野李君希聖也僮折牆角枯橘枝後豫出及泉煮茶希聖取别後詩卷共余讀僮若反於圃者余送客終豫鋤則僮不知所之矣余圃有常課是日以詩廢次日某君訪其晚某君訪皆論詩如希聖豫僮每幸豫之有客也輒舍鋤以嬉豫責僮僮曰主翁讀客詩充然有飽色此去日對佳詩雖終歲無事於圃不亦可乎余熟視僮久之無以罪也與之叩鋤而歌歌曰出有客兮入有圃客吟風兮我鋤雨客之懷兮湖海我竭力兮愛此寸土客瓢天漿兮粻瓊靡我擷我蔬兮不能足我容塵兮客厭去終老此圃兮與而侣他日希聖索豫書詩卷就以遺之書崇嶽集嶽忠武王之死孰殺之金人不能殺王於戰能殺王於獄蓋自遣檜來相而金人之命行乎江南矣其所欲殺豈獨一嶽王檜方次第掃除以報而藝祖在天丕降罪疾殛之然後三四忠賢幸免中國再有生氣王不幸最先死死且孥哀哉崇嶽集者陳君華叔之所集而間以已作率悼王也君若生同王時若不偕王北向則雖與王俱執亦甘心焉張睢陽死得李瀚首作傳白其心事於百世許逺南霽雲身後之誣繼得韓退之明之文之不可以已也如是華叔之作雖在王心迹既白之後觀其悲感慨歎不能自已有以見其慕尚君家犬豕寧當以檜黨骨飼之哉豫幼與華叔同課試藝見此集嘉其心故為之書書曾樽齋過六一祠堂詩吾家六一翁生於綿長於隨鄉貢後貫開封仕官於朝於京洛淮楚三河老於潁薨葬於開封鄭夫人以崇公歸葬公方幼蓋未能歷知先世丘壠至鄭夫人歸葬公年五十矣葬已即行晚年請守洪州為上冢計不獲命其在北方嘗有書寄所謂十四弟者令以時照管墳墓附錢數百綿與看守之家今書見集中若回陂等處公之三世祖妣今聞馬鬛如故然雍門周之悲豈能盡免獨瀧岡有阡表在見敬於邦人如陳君暲者蓋纍世下馬於董相陵也陳君賢矣哉君出示曾樽齋過祠下之詩樽齋後繼作者衆而樽齋意在言外特可感嗚呼茲事洪容齋嘗極歎之外坐念馬少遊平生語益以悽然書充泉銘後山土石而已矣含滋蓄潤出雲為雨天地之生意在焉不如是土燥石枯而山亦圮矣山土石而已乎山有泉山之脈也生意流行莫著於此如人之脈流行一身切脈者能切於可見之處而已指所切之處以言脈而曰脈專在是不可也劉君瑩中取孟子四端之充如泉始逹之云扁肄習之所曰充泉夫人於泉也偶見其已出者耳生意在山曾謂是一勺者無亦因其所出而思之則行乎土石之中可雲可雨者皆茲泉之體也人心四端之發泉也亦偶可見者耳孟子教人以充充之之極豈有加益於吾之本然者亦曰是中所有不可限量吾幸因所發而知之當使達於外者宏肆直遂而無窒礙壅底可也見泉於一勺曰不浚則流不長見仁義禮智於四端曰不充則用不大可謂能用其力矣若未見吾心本體之大全則夫源源而不窮者彼且以所充為何從而來也瑩中有志為已之學朝夕思所謂充者而古心江先生為銘以詔之既首言全體之大矣瑩中并以豫言思之則極其所充無一由外得者天之與我豈不至足無欠也哉是銘偶非先生親筆瑩中以豫嘗辱受教於先生也俾書其副因薦所聞書朱文公與趙忠定公帖西漢盛時吏稱奉法循理為漢吏非奉法之難而奉法循理之難蓋漢法容有不近人情者在奉行者以理揆度之也本朝非漢比列聖忠厚法之外乎理者蓋鮮如朱文公所告趙忠定公數事法非不詳也故殺子孫者因喪嫁娶者喪葬踰制者夜聚曉散者各有明禁忠定之賢奉法有餘而循理在其中矣文公猶件列以告何哉意前此帥閫者坐視頺俗廢法以為寬是以流弊日甚忠定政教未遽孚也文公所告無一字出法之外於以見列聖立法之心即所謂理而文公窮理之學制而用之則皆法矣學仕非二事理法非二物法吏不知學固不足道學士大夫不讀法亦豈可哉槎溪張朴夫出此帖相示殊有感乎我心題重刋四書後夫子沒而微言絶七十子喪而大義乖揆之於今士不見朱子四書殆不名士何遺言顯晦久逺相遼絶朱子在時以所學進講明天子繼作益尊其書以惠萬世其視闕里之教存不達於時王沒重厄於戰國秦者所遇故殊矣抑余嘗謂東漢太學門之石經後周國子監之九經板雖事出衰季而有功於斯文甚大使前世早有之何至編殘簡斷而諸儒傳授如彼其勞也四書摹本富矣今吾廬陵胡繼宗又手自校正而刻之字畫甚精嗚呼安得此於秦漢間哉題吳畏齋家集余友蒙泉吳君伯雨嘗為余言本朝立任子法可謂待士大夫之厚然限以定格厚之中乃有薄焉庸庸之人仕至某官無不可任子者或數世皆庸庸而任子不絶甚者雖有罪亦如之計其自先世以至於今受祿無算蓋有元勳盛德之家所未能及者矣而元勳盛德之家不幸易世之後受恩澤者仕偶不顯祿以中絶則遂為布衣或以流落厄窮國家豈忍薄於此反厚於彼哉則限以定格之過也謂宜有以變通之格雖當任而世次相承原無勳德者與嘗有罪者勿復任不然則亦為之限父既以格任子子不復任孫惟受任之後能自奮立乃聽復任若其世有勳德其後仕偶不顯祿以中絶者朝廷常與檢舉官其後一人世祿之逺近必以勳德之輕重為算彼有所損此有所增入仕之數不溢稱物之施適宜則觀沮兩得矣今觀畏齋先生吳公之後祿已中絶而朝廷又官之此為愜於人心嗟夫儻遂為定法而一出於公道其與泛泛卑之於按格者豈不甚逺矣哉題醴陵李氏族譜生乎今之世而欲上考世系於厥初生民以來未有得其真者也李姓至唐髙祖而為帝王當唐之初知氏族儒臣考古敘升降貴賤甚詳然卒莫能究國姓之所自出故信指李為姓之説則嘗尊老子為玄元皇帝矣信易理為李之説則又尊臯陶為德明皇帝矣兩無的據莫可信也而又沿婁劉之繆以國姓與人或既與而復奪之夫一姓至於常有帝王則推考上世謂宜精實今既不然而又自亂之則何以復見别生分類之舊哉醴陵萊山李君萬全示余李氏族譜讀其篇端謂李不出隴西之最先曰崇曰璣二人皆曇之子而曇則老子後嘗為秦御史大夫者也曇生四子伯為崇仲為璣而戰國至秦獨書其顯者曰趙大將軍牧牧為璣之子其考訂亦勞矣然余猶疑之御史大夫者秦既有天下之官制而牧之行事在秦未并六國之先以此譜世次考之曇為祖牧為孫孫顯於六國尚存之前而祖仕於秦既并天下之後何也又况戰國之時李氏之著者自牧以外甚多有理有信有齊皆見於趙或魏又有自周洛陽客於秦者曰斯大槩時之先後不甚逺豈皆得為老子之後耶蓋嘗思其故自唐有天下尊老子等之天帝故李姓一欲其出於此然不思漢太史公嘗傳老子録其世次至漢景帝時已嘗與其六七世孫遊其人能言老子事亦安有所謂天帝之説至於就以老子上祖臯陶則尤不可考春秋時臯陶後有國見滅於楚國微而姓不著此於老子何與耶然則是譜之作意者必襲唐以來之所考訂不然何其決然祖老子也故曰生乎今之世而欲上考世系於厥初生民以來未有得其真者也然則為萊山李氏子孫者宜何考曰余觀君之世自君以上推其可知之祖名字第行卒葬已十有六世十有六世者君家之的知而決不誣者也歿者慎終追逺存者嚴廟祀保墳墓親親以睦正倫理篤恩義姑斷自此以下而子子孫孫勿替引之則亦已矣自此以上弗可復知君其如之何右書於長沙城中之寓館時筆墨之外無書可檢記憶史傳亦未能自保其無誤也題孔氏家傳孔公諱宗旦為雍州司户知儂智髙必反以告州守陳拱手書靣請纍十餘次拱曰司户狂耶智髙反南方數千萬人死拱降賊死孔公罵賊不降亦死其初拱之自待與待公但分狂與不狂耳由今觀之狂者乃并坐不狂者受禍哀哉不知世所謂不狂者其靣目果何等想見神氣絶癡略無思慮多寢飽食視聽昏而肉甚豐也以狂受罵於斯人者世豈易得哉然前古事如孔公比亦甚衆余欲援一二書孔公家傳後輒歎息遂已雍州有狂司户東京亦曾有狂留守狂司户見罵於陳拱狂留守見罵於黃潛善如此狂者原非惡病寶祐甲寅秋七月十有九日廬陵歐陽某寓長沙城中燭下書以遺公之孫夢髙題吳建翁詩卷嗟乎此吾鄉畏友吳建翁之詩而朱墨其間荆溪先生之筆也粲粲乎班班乎月下雲影煙際山光春江桃浪秋空雁行吾慶子之遭也子之詩日昌子之聲日揚先生為歐陽子為蘇先生為蘇子為秦黃與陳張嗟乎前哲日逺此意淪亡蓋夫世之大人君王常與吾黨後進為春陽遇其生氣何山不蒼何林不芳其不然者乃與世間美才為霜遇其殺氣何木不傷何草不黃其心之廣狹即氣之生殺其大者乃關係人才世道而豈論乎一技之文章吾將與子誦菁莪詩升先生之堂而慷慨極論夫後元之絳章武之葛天寶之李正觀之房子謂吾言其過矣夫抑動心來日相與仰天宇而俯八荒也寶祐元年九月癸卯跋續後漢書晦齋先生蕭季韶諱常吾州耆儒也作續後漢書以正陳夀志三國之失丞相益國周文忠公為之序余從其孫梁孫得讀之録本藏之家他日以告史君豐城李侯義山侯曰蜀傳獻帝為曹氏所弒昭烈遽稱大號實不然也久之亦知獻帝之亡恙矣大號可久居乎吾嘗謂昭烈君臣不滿於子何如余曰春秋之法失國之君生名之國君卒而后名曰某國某侯卒今生而名責其不死社稷雖生猶死也國者先君之國為先君守之守之不可則繼以死彼獻帝者以天下之共主一日而帝魏甘心焉即其奉璽綬歸孽丕之日不死猶死矣春秋一年不二君亦不曠年無君建安庚子之冬漢天子位為丕所篡次年四月昭烈始稱大號於漢中蓋已曠數月矣然則以昭烈之元上接建安末歲為正統何疑於獻帝之猶存乎蕭氏書法與朱公通鑑綱目合綱目於建興十二年書魏山陽公卒若曰獻帝至此特魏之山陽公魏有山陽公而漢無獻帝也蕭氏作書時通鑑綱目未出可觀我心所同然矣李侯因欲刋其書於郡齋會去不果今西昌陳君次公取而刋之潭州州學上距書成之歲蓋甲子一周矣其得不泯於世可不謂幸哉陳君以斯文為己任而梁孫之力貧篤學保有手澤以待今日晦齋為不亡矣梁孫命某書其後乃書前之復李侯者遺之題姚雪篷答張子學問張子學與姚雪篷問答一卷甲寅歲以示余當問答時歲在壬寅子學才年二十有三問端精密皆未易答者而正蒙中語居多雪篷一二為剖析皆可敬哉今相去十有三年子學歉然又於我乎問豫無雪篷之見無用以問豫為也然豫平日用意與子學不同豫觀天下之理每於其粲然者孔孟之學粲然者也禹治河以入中國者為始後世謂河出崑崙果出昆崘吾亦謂入中國者即其出昆崘者矣子學更思之題懷芳小草後蘇子美居姑蘇買水石作滄浪亭大涵肆於六經而時發其憤悶於歌詩至其所激往往驚絶又喜行草書短章醉墨爭為人所傳吾家六一翁銘其墓曰嗟子之中兮有韞無施文章發見兮星日光輝雖𡨕𡨕以掩恨兮不昭昭而永垂豫友胡伯雨懷芳園亭之勝當不減滄浪而歌詩妙語天出比之子美有其竒偉而無其傷怨此四詞又得豫同年劉澤民書之二美合并宜有傳於人然二君皆不滿中夀澤民加少遺墨散落無與收拾今之知澤民書者已無幾况敢望百年天壤間伯雨之子蒙亨亟夀此於石見者初以為古帖也既見氏名始共為二君太息嗚呼豫為伯雨求墓銘於荆溪吳先生先生從之發昭昭於𡨕𡨕恃有此耳亦可以悲夫題北枝小藁詩興吉士遇時之盛曰梧桐生矣于彼朝陽言得氣之先也談鳴玉况梅之北枝以名其文稿讀者謂鳴玉自遲晚遇故云豫謂不然物性各有宜不必槩以先得和氣為快如梅枝正宜此耳生意在物內含蓄為滋液外發見為英華人徒以其發見者愛之遂欲窮消息之理則淺露而易不若深沈而難也一根之梅南北枝相去幾何昔人較之寒暖淺之為知梅矣暖故生意淺露寒故生意深沈氣至而花如謝東山所謂正恐不免而何以早為哉又况梅宜瘦不宜肥宜踈不宜繁就使純乎向暖則得時之盛將與桃李競妍而失其所以為梅矣鳴玉詩文有慕髙潔輕榮達意宜乎自况於北枝也然則不以梧桐朝陽望鳴玉乎曰由上之人急出人才之用言之則梧桐宜朝陽由士之自飬言也則為梅足矣北枝何寒之有寶祐甲寅冬至題蕭氏順安堂銘説後蕭君季清扁其堂曰順安古綿文本心為之銘鄉先生危恕齋為之説君一以示余余讀之而復於君曰文以窮理盡性樂天知命為順安必也聖乎危言逆順安危之理勢余所知也請從其後贊數語夫順則安不順則危固也然順不必安有時而危雖有時而危君子視之甚安也不順不必危有時而安雖有時而安君子視之甚危也詩曰不識不知順帝之則君子順理而已若預計其所安則有擇便求利之心焉古之人蓋有信已而不偶於俗行道而見尤於時無愧於心而反以取危其身者矣雖君子之智不自納於罟擭陷穽然所遇不齊亦末如之何也必不得已置安危於度外而惟一順於理之歸亦可以浩然矣夫安危之判不大於生死然而孔子戒求生以害仁孟子許舍生而取義茍有合於仁義則生死不足計而何安與不安之知故夫仁義者所以安之理而不必安也湯文王周公孔子吾未見其常處於安也不常處於安湯文王周公孔子猶安也人之欲安也一起居飲食欲安一出處語默欲安欲安之心重則凡可以得安者無不為也夫可以得安者無不為則茍涉於不順者亦可為也故曰順不必安不順不必危君子見其為順則雖不必安亦趨之見其為不順則雖不必危亦舍之如此則吾心安而不眩於目矣君以此固有之理而順達之如水順流如木順升前之罹百憂多變如恕齋所為歎者不留於胸中而日入於夷猶舒肆之境意所謂順安者君既享有之矣而豫猶進此語亦將竊附於無入不自得之疏義也君意何如季清曰書之乃書於二君銘説之次巽齋文集卷二十一
