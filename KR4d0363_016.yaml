body:
  text: 巽齊文集卷十六宋歐陽守道撰記靈佑廟記勑賜靈佑廟威顯善利靈應英烈王神姓康諱保裔國初北邊名將也父諱再遇從太祖征澤潞死太行山下鄉民廟其所王在後周即有戰功入本朝連守數州最後以彰國節為髙陽關都部署遇契丹入寇范廷召自中山分兵迎擊來求援王領兵赴之日已暮約詰朝戰是夕廷召遁質眀敵騎獨圍王數重左右請易甲以逃王曰臨難無茍免此吾效死日也大呼决戰數十合矢盡至以弩擊殺傷甚衆遂死之事聞真宗震悼優詔贈侍中王有母年八十有四矣即遣內司賓勞問封陳國太夫人妻薛氏先卒追封河東郡夫人子繼英自供奉官授六宅使順州刺史繼彬繼眀繼宗及孫悉加寵秩諸子感泣謝伏地不能起上惻然慰勞且顧左右以其父子兩世戰沒嗟惜之事見國史咸平三年距今淳祐戊申二百五十年矣赫赫若前日事也王洛陽人死於河間大江之南馬跡不及而南渡以後威靈著於茲土豈其平生狥國死有餘忠中州既經靖康之難人謀不臧而收復無日則其英魂毅魄固將視衣冠所在而依之耶朝家懷柔百神所在郡邑有以王之封號為請皆即日報可自王之身以及父母妻子命書稠叠恩數甚盛以死勤事之報至於今未已嗚呼盛矣非為其但以禍福驚動世人也廬陵屬邑皆有王之别廟逺近人士嵗時走集莫敢遑寧然其所以事神往往知畏而不知敬造妖襲訛日新月盛甚專以司疫冠其徽稱蓋無復知有王之平生者江南巫鬼自昔已然王重不幸以其凜凜不磨之忠乃見儕於伯强之列薦享黷慢罔有馨香則有荷校赭衣自為纍囚巫操其權禁貫在口有敢出一語證其理之不然巫之黨戰戰相恐若謂禍且立至何辜斯人神願樂於立威如此哉推原所以蓋學士大夫未有考信方冊誦言王之平生是以蚩蚩之氓震於妖訛莫之或止竊嘗論之人神一也易言原始反終故知死生之說精氣為物游魂為變是故知鬼神之情狀鬼神未易知也吾且一死生物變而觀之則今之不可度思者昔之與我同類者也人之生也動天地感鬼神惟一念及其歿也超太清役萬化亦一念王以戰殁之身不殞先烈於家為孝子於國為忠臣一念之正上帝臨之是用界命為神使主下土禦菑捍患以宏庇於生人今雖杳在𡨕漠此念豈有異於平生哉且王為人謹厚謙退好禮崇儒及其捐軀狥義乃卓然有立如此此與前史所稱張巡段秀實何異有識之士試以是思之盛德之容尚可想見不然則隂威慘烈之氣象是固繪畫之士所假以震眩流俗者展轉怪妄其亦何所不至今之所以事神亦可謂一國俱若病狂者矣厚誣之極吾意王亦厭之氣志之動不得不假手於人而息邪說正人心是在有人民社稷者之職分豫章李侯某奉詔守郡間以民事禱於神眀言出應隨如響斯答嘗與郡人歐陽某從容言曰古人為政兼理神人未嘗如後世析之以為二也他日聞王有廟於此而祀事不經滋甚慨然悼王節之昧昧與斯人之蔽䝉如前所云既式遏之爰命某作記祠下偉此一舉契於神心某拜手稽首既取國史所載而刻之石而終之曰賢太守加惠此邦至矣流俗未易曉也是邦逢掖居此屋十之三守正不回化俗而不為俗化者非所望於斯人邪夫物怪神姦理之反常惟至於知天者無所惑札瘥疵癘氣之失正惟學至於立命者無所懼且懼妄庸人爾理則無是又况王之忠孝凡有人心之所共敬雖微驚動斯人之禍福猶將百世祀之入此廟者欽仰髙風景行行止是則有以媚於神而亦我國家崇眀祀詔方來之意乃有不吉不迪獲罪於天與民彛神不爾囚爾亦無所逃於天地之間某文字不工無以發眀王之盛德獨念賢太守開釋流俗之意首告於是邦有識之士以致之民閭閻下里之惑之懼自此其有瘳乎不然不惟無救又從臾之無責乎爾則亦無責乎爾六月某日謹記歐陽監丞祠堂記靖康建炎間廬陵郡死國事者二人歐陽公死燕山忠襄公死金陵死一爾有異焉楊公死城歐陽公死使命死城故事平得即祠其所死使命故無所於祠豈惟無所於祠雖所居鄉未之祠也茲大闕典百十有六年其從孫文龍始得地於慧燈寺之旁屋之率宗人爼豆焉書遺余願有以記有謂余曰歐陽公誠死使命與致命於敵國不從我死之義也公之往也吾國則有辭矣敵焰方熾京師方急三鎮雖天下根本不敢愛也以是紓禍且為後圖公奉命割地可也既至深軍民固守不下公知人心未解即反其辭告之曰朝廷為奸臣誤至此若忠義報國吾已辦一死矣敵盛怒執殺之謂違使命以死非死使命也義與余曰公得死尚何言當崇政殿之問淵聖非决有棄地意公亦力言不可且謂戰敗而失其地它日我師取之直舉以與之它日我師取之曲時宰既詆其說又强以行大類漢遺狄山乘障事事不出武帝而出張湯爾使公竟致使命不死矣而豈公夙心哉當其慷慨城下痛哭以勉守者但見有吾心不見有使命也此時宰之命非君父之命此君父之命非宗廟社稷之命也臣受命於君君受命於宗廟社稷揚揚出疆舉地以與人曰有使命在吾為宗廟社稷懼矣使皆類此一𨽻可辦何以知義之士大夫為古語有之為人臣而不通春秋之義守經事而不知其宜遭變事而不知其權故曰大夫出疆有可以安國家社稷則專之當時人心如此使所在皆固守不可其紓禍不猶愈於割地邪况不可割吾前言邪夫前言忤時宰意一宜死知不可顧不得已為此來二宜死固守不下何人今搖之使背國歸敵豫何人三宜死死而死爾萬一覬吾地之存夫義無定名要於忠忠不在小諒歸於為國公得死尚何言公諱珣字全美郡之永和人登崇寧五年進士乙科歷仕忠州教授知杭州鹽官縣罷起授南軍司録以監司薦如京師遇國難及出使秩朝請郎加將作監丞公有子衮夭而不嗣紹興中上録公大節官其壻臨江曽敏敬恭敬恭故曽為祠於其里之薦福寺今像則文龍從寺識之堂既成尚謀結屋於左右使子孫讀書其中而奉其祀故鄉之好義者出力以助而州家亦可補其不逮是可以觀人心矣嗚呼公死何地公像在此公子為誰公也世有祠今其地址通逹靣大江停車艤舟顧瞻而徘徊者尚其念曰人誰無死廬陵貢士莊記廬陵縣貢士莊者郡太守豫章李侯某從邑人劉君某之請所建也郡三歲貢士六十有八人而廬陵得人為最凡申舉於監於漕若以前舉免者俱上春官率不下百數他縣貢各有莊廬陵獨無有至是嵗得米三千斛有竒郡博士偕邑大夫眂其入及期易為泉眂其人分贐之既奏名集英對亦如之或試國子監與選為諸生亦如之各有差士相慶出望外而屬某為記某不得辭請於侯問所以蓋劉君之子芮得田於宣溪王氏之甥館未幾悼亡以田質之能文法者屬之劉乎屬之王乎曰屬之劉哉芮曰已矣吾奈何有斯田也君亦曰已矣吾奈何使吾子有斯田也則遂詔芮曰女安食課進士業亦知士之貧乎士與貢亦榮矣然出門惘惘有道路羈窮之憂今聞郡有賢侯節用而甚愛士郡博士為諸生與貢者建莊侯斥已所宜得畀之學盍歸之乎芮曰敬奉教君疏於侯侯曰賢哉劉君已可有而不可賢哉劉君於是又建莊於郡庠之東以專待士之籍廬陵者為屋若干立規約刻石植之廡士以德君君曰非我也郡也郡倡而我和也士曰信噫君非侯孰倡侯非君孰相蓋兩德之某幸聞其槩於郡又聞君所以對士者則為之辭曰漢自董仲舒對策請諸列侯郡守二千石歲貢吏民之賢者各二人既而吏民有眀世務習經術縣次續食令與計偕漢待士良厚嘗以此意求之周周制三歲大比鄉大夫考德行道藝而興賢者能者以禮賓之諸侯歲貢士於天子六鄉之士由其家至大夫之庭登名天府官使於朝其往來資遣當有厚於漢而無傳焉至若貢自諸侯之國則道里相去又非畿內比矣曽未聞如漢所謂續食何故吾意漢無常制故曰詔下始為令周有常制故不待賓興歲貢然後為之所也按周賓禮甚詳凡侯國還職若遣其臣請命於天子其入意皆用賓禮而賢能謂之賓興當周盛時侯國館舍具修在六鄉則待以郊里之委積十里有廬三十里有宿五十里有市自飲食以往皆具焉鄭司農證以漢法曰廬若今候宿若今亭蓋漢所謂縣次者縣其總而次則候若亭也然則漢亦倣周而已矣不然安有賓士以禮乃不以待賓於路者待之與唐世最重進士科州刺史資遣今不盡見然其末年鎮南節度一武夫耳猶能歲舉鄉貢故事資以齊裝士不逺千里走其府推此可以想見其盛時矣士由鄉國而貢於上官豫道里費漢與唐皆然雖周亦然江西為士淵林異時不逺千里走鎮南即此道之士吾廬陵又淵之深林之茂者其産士富甚而續食齊裝之助曽漢唐故事之未講此三歲奉詔者所當念也李侯一開其端劉君若不約而合意氣相感固應有此或曰侯分銅虎符為郡身在外乃心罔不在王室今國事殷調度日不繼侯內撫其民外應餉運朝夕劬劬靡有遺力劉君不有其田而歸之郡賢矣體侯之意而用之於所急不尤賢與何貢士莊之助之亟也某應之曰有是哉堂堂天朝自公卿大夫士議論勤顧國體異哉子之言也夫郡為國貢士雖特出帑廩資其行其誰曰不可况田固劉氏所得有出於其意之所欲助者乎子謂今多事時也請有以曉子王猛偏方之臣也﨑嶇兵革間拔幽滯顯才能自長安至諸州亭驛皆有旅行取給之備英彥雲集國人歌之彼何時哉而猶所重在此今世運文眀每取士則命郡守身為勸駕郡守有土為政不為天子激昂士氣使厄於道路無以致身闕廷而曰是事緩吾圖其他則亦昧於輕重先後之宜矣尤非所以待李侯也既以折或者乃備書之石侯曰吾聞劉君好士而勇於誼今惠顧同里士君無德色而守何德雖然士一名一第秋毫以上孰非天子賜守與劉君皆無德焉可也因併記其語以告來者年月日某記復齊記昔者夫子讀詩至於髙山仰止景行行止歎作者好仁之甚以為忘身之老不知年數之不足也夫子何以知其人之如此哉即其慕望之心日有孜孜必求仁以終其身者是以深有味於其言也復齊羅君求豫記其齊於是君年八十有五矣豫以君之耋老儻不杜門却掃金玉厥音則後生小子得聞一言固所願也而何為反求記於余既遜謝久之而君屢言不止最後曰豫庶幾及見子之記重愧之蓋諷詠夫子讀詩之彌日嗟乎即此所以幸教我後生小子者非耶然豫嘗有疑於今之言復者類以為人欲天理消長之交也而豫觀之天地之心則有不然者夫天地生生之心謂之仁人生而得之以為心也大化之運晝夜寒暑相循於無窮往者過來者續本無間斷人以其消息進退之節分之則今日之終次日之始今嵗之終次歲之始於此有所謂復焉易曰復其見天地之心乎謂天地之心密運人有所不能窺惟於此時生生不息之機最為眀著故可得而見也此所謂仁也豈以既復而有仁未復而常有不仁哉今以理欲消長之交言復則亦異於天地之心矣夫日之時十有二歲之月十有二十有二之中復居一焉而為靜動之會若以天地本心全體言之則元亨利貞蓋無一息非然也聖人為夫不知此理者使於復時觀之如其知之則元亨利貞皆天地之心矣而何獨復哉彼以理欲消長之交言復者其於元亨利貞何以配之日之暮而夜也歲之秋而冬也將以為天地有不仁焉可乎或曰信斯言也人於天地宜無不相似者人之有不仁也奈何曰一日之間容有曀霾一歲之間容有乖沴非隂陽正理之所本有也人之不仁亦豈其所本有哉天地之復以夜旦冬春之端論不以曀霾而開明乖沴而復常者論人欲天理消長之交比之曀霾而開眀乖沴而復常則可比之夜旦冬春靜動之端則豫於此理自信久矣不知復齊以為何如也復齊老矣年有壯老心無今昔孟子曰大人者不失其赤子之心者也復齊自少壯以至於今更嘗經歷事變幾何而好仁之心本夫生而有之者終身而無所已豫之齒僅半何足以知君即其名齊之意推之足以當夫子所謂詩之好仁者夫今之名齊者往往不襲前人特自標異不必皆因名踐實也而齊之名復前人屢有之大儒先生為之記亦多矣君非不知而不厭其襲乃所以為有真見也與豫是以敬記之書扁者前太守豐城李侯某侯力學篤行尚友前哲而雅敬君甚則君可知也已君鄉先生歸愚子諱泌之子名蘋字華叔年月日某記青雲峰書院記曲江嶺南名郡山川之産多秀民自張子壽顯開元余安道鳴慶歷文獻承承越至於今業進士者有企慕前修之意求師取友走千百里外或纍歲而后還家江湖間有以所學教授其徒曲江士必在列而歲至吾廬陵者尤衆其人大率純實茂作為文章輕巧不足而質實有餘豫甚愛其有古之遺風使遇名師良友以古道相誘掖其所成就宜有大絶人者然近歲士習趨下號稱前輩者或亦止於傳習場屋之文謾不省講學為何事幸而收科自謂一第如探囊中物不復增益其所未能後學效之凡書肆所售謂之時文空囊市去如獲至寶而聖賢格言大訓先儒所為孶孶講切以覺人心者反棄置之以為非舉子日力暇到自吾里中士不免病此他郡之來學者何譏焉是徒使其不逺千里而來非惟無益而又害之也豫解褐且六年追念半生學力無幾每每發憤太息孰於私家思與二三同志專意從事於所當學然至者認科第為的則亦惟索我於所亟用之時文以豫筆硯代耕猶未得自脫於區區之故技彼已不相益而相習未嘗不怛然內疚於心也歲在丙午鄒君某與其弟某實來君曲江之屬邑仁化人鋭意就學惜其與處才數月未及以豫所見諗之君將歸請於余曰豫家有青雲峰書院因地為名蓋青雲峰之下為龍骨嶺書院席龍骨而枕青雲前有水焉抱書院而東謂之斗水伯父愛其幽勝屋於斯以為諸子藏修游息之所而豫父共成之買田其中收其歲入專以給游學之書費願為記之且幸教以為學之大方庶幾朝夕目擊而無忘執事之訓也已豫告之曰凡豫所願與朋友共學者非今所謂舉子之文之謂也學也者因聖賢之書求聖賢之心而為聖賢歸者也舉子之文不過求先達凖繩尺度學先達之文足以得先達之科第而已矣讀聖賢之書求聖賢之所以為聖賢也孰禦焉豫知子之嗜學也而恨數月之間未有以告子今且别忍愛言哉子之書院取名於山山之聳秀峭拔之狀非豫所覩也覩其名知其非丘垤也子歸而藏修游息於聳秀峭拔之山之下地之偏人之寂景與心會能無感乎詩曰高山仰止髙山之可仰何也人固貴乎自拔也孔子登東山而小魯登泰山而小天下何也居髙則所見者大也人不自拔則陷於汚不見其大則安於陋子行矣豫無以告子矣子歸見是峰而問焉君又請曰峯以青雲名决科者以為祥也豫兄弟學於此謂天之衢亨在此矣揭斯名也亦以動策勵之心焉何如豫曰培塿堆阜不能出雲出雲者必勢分積髙且大也夫學亦然集義以養吾氣是氣塞乎天地而天下事有不足為古之君子退然自養不求聞達一日見於用而天下被其澤何也藏之深而蓄之厚也子行矣豫無以告子矣子歸見是峰之雲而問焉君曰唯唯因次第其語為記嘉蓮亭記歲辛亥秋八月朔豫從二三子訪友人胡君伯雨於永水之陽古潭之上主人未出豫以曉凉徑造溪東之園溪水之旁故𨗳水為池至是築小亭焉工方治水豫問工何以亭也曰旌嘉蓮也今夏蓮一幹而二花者再俱實矣指以示豫二三子請於豫曰何為其然哉濓溪先生所謂净植亭亭不蔓不支者今乃出此竒乎豫曰子未讀吾家六一公所記許子春園亭乎六一公謂見子春家孝悌三世矣園之草木將有連理而駢枝禽鳥翔集其間將不爭巢而棲不擇子而哺也許氏之園未有茲瑞也六一公以其孝悌意之而已今也誠有茲瑞此豈偶然哉夫伯雨之有此園也豫未論茲花之為瑞大槩伯雨蓋有樂乎此也孟子有言賢者而後樂此不賢者雖有此不樂也今夫動植之類皆足以使人觸目興感而油然於父子兄弟之天詩之興是也草木欣榮鳥獸和鳴而人之胸中無生意以受之安知境之可樂所貴乎君子之樂以其胸中浩然與天俱春是以森然於吾前者即其充然乎吾心者也豫每從伯雨徜徉茲園見園之所有生意類與人同窺伯雨所得於眉睫間心知伯雨之有樂也二三子其謂人心之所最樂何樂乎樂莫樂於人道之盡分父子兄弟孝慈悌友推而放之無所不凖此分不盡吾安得無憂此分而盡吾何為不樂樂則生生則惡可已矣天地萬物與吾心一也豫知伯雨之胸中而不能一以告子子欲徴吾言乎豫之知伯雨也不如蓮蓮植物也而一再為伯雨呈瑞若特有意焉者鍾和育秀是誰為之然則理氣感通之說由詩書以來焉可誣也語將既伯雨諸子偕其諸父昆弟至詢豫言之本末豫亦自謂豫言胡氏子孫宜共聞也復具告之且使白於伯雨而刻之是歲淳祐十一年歐陽某記逸老堂記禾川勝溪仙臺之下有逸老焉曰張君以名其堂或問堂名於豫曰天逸張君以老與曰天不能逸人張君老而後逸與曰勞逸無壯老曷謂天不能逸人曰天雖逸人人自勞之天安得逸之血氣盛時騁其雄心擾擾無晷刻息天安得使之逸及其老而稍已者血氣衰焉耳曷謂勞逸無壯老曰固有少而逸者有所見也固有老愈勞者戒之在得而不戒也夫人之精神有限而富貴外物世之更相羡慕者無窮以有限之精神沒無窮之進取則於是又有未老而先衰者矣而其所成終亦何有故曰天不能逸人勞逸無壯老嗚呼豫視世之如此者多矣嘗試喻之天地之間峙者為山流者為川自開闢於今矣欲登髙乎則山也可欲臨深乎則川也可今築臺以為高鑿池以為深臺豈復高於山池豈復深於川也哉然世往往為之皆不自逸者也吾不求登臨之樂於臺池求登臨之樂於天之山川則焉往而不逸故凡勞我者舉非天也豫雖壯年而知此亦久矣今張君年踰九十聞其視明聽聰讀書如後生此豈無所得而然哉書曰作德心逸日休德者有所得而足乎已也至足在此而又奚求壯老一逸日見其休矣是謂康寧是謂攸好德康寧而壽張君字伯英豫蓋識其孫肖玉云巽齊文集卷十六
