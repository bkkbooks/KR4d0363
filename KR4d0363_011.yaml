body:
  text: 巽齋文集巻十一宋歐陽守道撰序李仲仁史考序老泉蘇公初得鳬繹顏淳之之文於京歸以授其子東坡公曰小子識之後數十年天下無復為斯文者也其後東坡盡得淳之之文於其子復以為精悍確苦言必中當世之遇而有感於後來之士鄙陋漢唐超出形器不知陷於慕逺忽近貴華賤實之失序篇之作三歎厥先君子之知言嗚呼文字之變未有已也以今日之文視前五十年其變蓋又逺矣愚初學文時及見前輩所著猶用心於考古厯代成敗是非得失必以序及之然後出意見超議論大格律一致而未有瑕也又其時靖康之痛猶在人心建紹乾淳之經營北方接於耳目之近士於江左六朝機㑹之去畱人謀之臧否往往朝夕講焉故雖舉子之文亦皆求為可用高虛議論有之矣而亦無幾自守緒天誅中原事去廟謨志慮三變而士氣隨之朝野之文介於故家舊物之未返者斬然於甲午乙未之後此去不待一二十年中天之禍直忘之矣士子筆墨間亦復為風氣所變如此吾於斯文觀人心之進退天未欲合南北之勢耶安成李君仲仁作史考二十篇其間多言六朝兵事其自序以蘇氏父子言兵見詆於清談之士後卒以兵不素講塗炭天下周文忠公讀而韙之他日又作燕涼洛楚蜀江淮弔古八詠文忠愛其音調悲壯有洩君豪氣激我懦衷之語嗟乎是所以為前此五十年之文也君之子季忱出以示予季忱氣貌偉然文采議論是似其前人者與之共讀數過慨然太息近世之學講道德談性命朱文公後伊洛而為諸儒宗天子既表章之學者翕然知所向矣然以愚觀文公身在畎畆而惓惓於當世之大義諸葛武侯張忠獻之心事無一日忘之他日奏疏間及於待敵復讐者至今凜凜生意也公若大用規模布置視葛張當更縝宻安得九原可作而問公開濟之盛心嗟乎季忱歸以子先君子之文謹藏之愚首告君以蘇氏所歎於鳬繹之文者志感也終告君以文公之學之志者哀斯人之不見於今也嗟乎季忱其亦有感於吾言哉胡彥和事海序藍湖胡君某訪予出其祖遯齋所編事海以冊計凡四十有八或曰博矣哉予曰約甚矣何博也始予讀書而未有之聞世間書巻且巨萬以為世所稱博學者將無一不用其力而後可家素貧不能多市書往往從友人借觀之則凡所謂僻書而罕見者有不足用吾力焉蓋自孔子没百家不足以窺聖人之道而又愧於無以自見也出其意見人自為書而世無大人先生為之芟蕪夷穢以清後學之耳目是以其書皆得不廢而荒忽詭幻鄙俚不經之説亦皆列於書目有國家者侈文籍之富不擇是非邪正而並蓄之學者以及見為博而傲他人之不知其為詩與啟者尤好用僻經以為竒使讀者莫得其引援之所岀則相與憚之而不敢淺視嗚呼士學至此其亦可歎也已今遯齋所抄門分彚列無所不有然皆所謂存一二於千百夫遯齋豈不能盡存之而僅以四十八帙為盡天下之僻書哉意者以為學者未盡見天下之僻書則將慕而求之妄意其中之或有得焉今每書各存其一二使學者每見一書之名則識其大槩止此以其所存計其所去其書之可取可舍皆易決矣好竒之士試於吾之四十八帙觀之蓋亦不啻至足然後反思天下之理果不出吾聖人之書而貪多務得之意遂衰此非遯齋之本意乎不然以天下無窮之僻書而約之於四十八帙烏在其為博若夫引用書目其首猶以六經及諸正史則觀者又當於雜然無所辨别之外而思之予生也後惜不一見遯齋而請其説遯齋字彦和書成淳熈丁未距今六十有二年云張景韶巽齋序為子有道無不可事之親為臣有道無不可正之君與人交有道無不可忠告之友為人君有道無不可心感之民順則從逆則咈順則易逆則强順則無迹逆則近名巽入也而為風風之入物物無禦者夫順焉往而不入君子之道順焉而已矣右數語某昔者甞書於牖某本名巽既易名竊第念舊名乃先子所命不忍舍去因以名齋今張君景韶齋名適與予同敬書所見以寄惟張巽齋其印證之送李叔元序李君叔元别予之贑之南安之嶺外予謂叔元此君家習之元和三年所繇道也韓退之有詩送别其詩曰行之何時到誰能定歸期揖我出門去顏色異常時既而嘆曰退之未知習之未第時常有岐路五年知己罕逢之歎矣然其賦曰昔聖賢之皇皇兮極屈辱之蹈道兮雖困頓而終不反其所為當時剛勁之氣蓋如此來南又他日事豈有憔悴可憐之色者哉叔元然予言為當刻語韓李處貧窮大槩韓言顏子簞瓢事曰彼有簞瓢以不死不憂而樂豈不易哉僕簞瓢無所取資則飢而死矣李亦言顏子簞瓢事曰簞食與瓢飲兮寧服輕而駕肥望若人之何如兮慙吾德之纎微然則習之學顏之意固有在而退之直窮甚可悲也語未竟叔元袖出序遊一篇曰濯濯之簞無顏之食安貧固貧有不可得予戲曰子非習之子孫耶何乃用韓意叔元曰未也讀至終篇曰名山大川可以豁襟宇逹人君子可以進道德起謝之曰君似而祖矣予幾誤憫子之簞相視一笑遂别贈宋義甫序卜地而塟倘有微妙不可測之術則非予所能知就所能知者言之山有山之情水有水之情識其情則吉㓙辨矣來山無情作穴强之以作穴應龍無情朝對認之為朝對左右無情拱揖明堂無情鍾聚水無情朝抱逺山無情映帶如此者雖術家百喙稱美不足信也夫山水之情與人何異有情則非天屬之親相為依怙雖僮奴亦將忠事其主無情則塗人之過吾門者爾於我何有哉予之所知如此雖無竒論然地之一有情者亦鮮矣或曰一或有情皆在可取豈能盡得其有情也曰不然數者之中有一無情則往往為假穴是固易以惑人者也亦審之而已矣然而予亦姑言其畧若其要旨不可不求之於其書地理之書富甚予雖淺陋目中所見亦不下二十餘家而鄙俚繆妄一見而棄之者不計其數自郭景純塟書之外有一書最可人意意其出於明理之儒者每愛玩之非特予愛玩之四方士大夫之能知地理者與之縱言及此則每每誦之如流也是書文辭真雅初無難暁而書肆所謂地理全書者乃獨遺此不刋今之術者無一二能讀或間能道其中數語則舛訛差錯則茫然矣亦其得於剽聞而非真見之者予每念卜地雖一藝然非留意於學安能通曉吾儒讀書終身方名為士術家倘以卜地為業則亦孜孜講明如吾儒之讀書可也而庸流至不識字畫逐一道塗問其所知則率道其童稚之時聞於其父師者鄙俚繆妄自謂終身抱至寶矣夫前所謂明理之書曽不知讀而寧從事於鄙俚繆妄之書何哉鄙俚繆妄之書其徒易於傳習又便於田家市人之聽其取信常衆得利常速而明理之書探山川融結之情引經援史逺及四方郡邑之大勢可與識者道難與俗人言也予延接術家多矣有吉水宋義甫甚熟是書與之山行其指㸃去取有過人者留予家兩月且為予親戚家卜焉予心是之既别贈之以序義甫士類熟是書固宜又其胸次不肯包藏隨其所見即以告人賢於他人多矣然予贈義甫行而輒言卜地之大槩予非敢以此自居也此事非人家子弟所常習不幸遭變故者往往未甞經厯之年輒為庸人所誑故特言之義甫所往之家人之弱子幼弟試觀予言未必無助黃師董族譜序族非譜無以知枝葉本根之分合然生今之世家有此者亦罕矣蓋雖大家往往失其傳也甞推其故私家世次之絶續係於天下世變之盛衰姑以吾家論之十世之間幸而有可考者由吾宋承平之時以至於今也等而上之雖欲知不可得矣熈寧間六一公作世次碑推其所自逺自司馬以下昔甞以為傳信今考唐武德至於廣明之亂距江南李氏有國嵗月蓋無幾耳而歐陽氏乃十三四世其信然耶世遇亂離人不自保遂使子孫不得盡知先世之所從來可痛也已黄君師董以其先世臨桂府君所次世譜示予予自臨桂以上得八世降而下又二世支分派别凡二百若干人昭然在目其偶失名字者蓋無幾余感而歎曰一世大約三十年然則君之始祖可知者吾宋有國以後也三百年間無大遷徙所以蕃衍生遂者非上之澤歟抑又有歎焉西北中原之人百餘年來或無噍類或靡止居東南州郡號為無事然而被兵者昔或不免近或有甚焉吾江右豈無小警而不日安妥是天私我以樂土也彼一日不保其生者視吾與君十數世父子祖孫相聚相保豈不謂幸歟夫幸而居治世生樂土知先世之所出則夫墳墓之當保族類之當恤門户之當念立身行已之當不負其先如之何不敬之重之君家世詩書且數有第而仕者雖未大顯而源流深長矣如君之資稟與問學文采黄氏亢宗不在兹乎君必勉之送李雲卿歸金精山序贑李雲卿工詩及畫以所畫嵇叔夜王逸少李太白林君復像示予叔夜以琴逸少以書太白以酒君復以孤山賦梅曲盡其蕭散閒放之趣既又各為一詩與雲卿遊者皆有詩合為一巨軸雲卿意亦欲予之為詩也余無詩才而有當為雲卿言者夫圖繪古賢尙友之一助也雲卿誠有慕於古賢乎則四人者若均有世外之趣而太白方於三人差不類余不為君評品乎次第置之可也又等而上之乎則吾他有所謂尙友者矣孔門諸子得將聖為之依歸誦詩讀書歌詠先王之道當其悠然自得葢有不知古今死生之為變也而況於貧賤憂戚曽何足以動乎其中夫子曰發憤忘食樂以忘憂不知老之將至云爾孟子曰君子所性盛行不加焉窮居不損焉士之胸中倘有毫髪窺見於此皆可以泰然自足而無願乎其外今雲卿有取於彼四人者余何足以知之然予甚愛雲卿有出塵之姿而怪其獨寄懷於夫人所可能之藝前軰先生又爭為好語以誇道之然則所以期於雲卿者似淺也予則不然以為雲卿甫踰四十進道之日甚長挾䇿出門取友無方一日歸返故廬坐對聖賢然後回視今日之所慕向者可以一悵然也詩不云乎高山仰止居魯國中則魯之東山為高身在泰山之顛則東山亦一丘垤而況平地乎嗟乎雲卿之索於余也淺余之望於雲卿也深又題李雲卿詩巻余生識字而不能詩自分終身不能或教予稍讀諸家詩且日一課習當能如其説又不能廢而歎曰已矣閒中添一擾焉用自苦如此李雲卿乃岀所作示予而問曰是於君意如何嗟乎予何以評君詩也哉然予見詩人多作窮愁羇旅之語或所遇本不然而猶寄託以致其思詩必如此而後工耶雲卿之詩不然甫開巻便得其冬至一詩盎然大有生意為吟諷數過是日盡巻讀之能使予心寛舒怡愉如得美食甘寢信乎詩有發於人而雲卿胸次可想也前日訪雲卿天慶觀古松脩廊寂不見人久而後得一道士問雲卿何在曰適至此借琴去矣又過一院雲卿在焉僕自理歸裝雲卿琴在手未鼔也予悠然久之為思沂上詠歸意趣闕早作書送雲卿歸金精山序今又書此數字雲卿留此月餘日予相見不數而心甚敬之其多能端不易及予特愛其心胸泰然有進於道然異時雲卿所能必盡落去恨相去地逺不能以時伺某拜手書贈羅陽卿序詩云天之生我我辰安在説者謂言生時節物歲時日月星辰推命之術在古不可考然其説尙矣韓退之稱李虛中深於五行書以人生年月日辰支干推人夀夭貴賤利不利先處其年時百不失一二栁子厚始貢於京師歲在鶉首試不利至癸酉歲酉辰合登第術者能先言之他日作序與蔡秀才謂造物前定若是之彰明也今術家推命儒者或不然之彼有所傳承矣余未之敢非也富貴福澤厚吾生貧賤憂戚玉於成惟其所遇皆當知造物之本意亦焉用議其術之有無哉里中羅陽卿於此甚精蕭君君輔作序與之謂推已與吳君叔將王君國用登科先後之次皆驗此則余昔者亦甞聞之今陽卿老矣硏思造化日益精到使韓栁二氏見之亦當在所信也而予復何云年月日桂里歐陽某書項國秀灸法序吉安項某善灸法謂予治病莫良於灸而藥次之古醫法也今藥醫多於用灸法病者亦非困極不議灸故灸法精者差少然業藥醫者亦不必人人精病者不問精不精輒試之或日一易醫數易而病不愈則曰命當然哀哉今之不以正命死者何限也夫藥物金石草木性之温良有神農書在可辨也然用且誤灸之為法也微毫釐之差輒與病應今繆者為之率以意易穴猶無衡而求輕重之合度且方寸灼其膚而滋一苦爾然則病不困極不議灸固人情所畏憚也余曰然以余論之不難於穴之定而難於理之明甞聞黄帝岐伯問辨語謂人一身闗節脈絡氣息皆與天地相應古之為醫者智足以逹天地之變故其視人一身由表見裏因影得形今之醫智何如也吾甞謂醫非儒學不明今也市人之子義之不知而曰讀醫書讀醫書者多矣況未之讀乎古語曰醫意也今之醫則可謂意也夫彼之意何如其意也國秀思之君之業精於他人多矣益進於學以大君之智則天地一人也一人天地也豈特灸法為然是學也吾儒謂之格物因書以遺之君曰幸甚年月日歐陽某書格齋序里中張季言名聞詩與余言曰往年獲侍雲巢曽先生先生實命之名又書為格齋二大字先生愛後學則至矣顧大學格物之説用力宜有所從而未之聞也余曰子不以子之名推之乎先聖不云乎詩可以觀可以羣可以怨邇之事父逺之事君多識於鳥獸草木之名格物莫近於斯矣夫一物各具一理學者不能一一盡索之要必有所觸焉此之觸彼之悟此一時也德慧術智開明之機體用顯微貫通之言觸斯悟悟斯暢暢斯融詩長假物以見意葢作詩者之心既有所觸矣得其篇章而讀之觸於詩人之心者今宜有觸於心又其為教曲而肆寛而不迫悠揚諷道其入人也深故當其有得懽忻怡愉天地萬物之理若畢赴於胸中而莫知其所自來究而言之則亦吾心之所自有者爾古所謂若江河之浸膏澤之潤渙然冰釋怡然理順惟取之詩為最近先儒謂讀書皆所以格物竊謂詩其首也子今原其命名之意而專求之詩求之詩次遍求之他經六經一詩一詩六經也萬物一理一理萬物也以子之名而遍求是齋之名可以併識用意之所在季言懋哉與羅術士序天之高也星辰之逺也茍求其故千歲之日至可坐而定也天之生斯民也命也死生有命富貴在天君子行法以俟命而已矣不義而富且貴無義無命富與貴是人之所欲也不以其道得之不處也貧與賤是人之所惡也不以其道得之不去也羅君甚精於星學其推吾命葢所謂善求其故者然以富貴相期則予也昔者甞有聞也詩云無言不酬無德不報羅君儒家者流敢摭所聞贈術士胡卿月序天地之氣崑崙磅礴雖有計其幾萬里者意之而已然平子以精銅八尺作候風動地儀置一室中而能盡知其動靜常變約至大於至小雖天地莫逃焉人之氣與天地相應眇然之軀不小於天地之崑崙磅礴胡卿月以鏡面滴水推人休咎果得其術宜有此理贈陳術士序六十甲子支干相配謂之納音者其法葢出於律故謂今人談三命為律星數為厯少知律者則三命恐未易精葢支干分而言之相生之理不易見合而言之相生之理為難明來往進退上下五行皆統於此今談納音何曽及此若夫以厯推星則稍知數者亦不甚差故甞以為言星猶可據言三命恐未有憑也今吾儒不能言命者葢鮮然三命人能言之而以厯推星反少何也步星之誤旁有善星者能辨之三命無一定之論惟其立説而莫之或奪也於斯二者宜何信姑信於厯而已其人能厯法甞窺其全文並有傳授且於世所用厯閲盡不廢予未學此不曉所謂然彼遇有以命問者往來吉㓙禍福聞者往往騐而神之則亦精其術者歟詩謂天之生我我辰安在言命自有之特不知今之所傳法何人精宻耳得失進退一出於數人而知此則逐逐進取可以息念惟某人他日對人即命言理使知樂天安分之無憂而勞智竭力於其所不得者之為無益也則斯術之於世道豈無補哉某人祖父皆吾州名貢士能世其學其能此非徒技也予知某人且十年前言予十年後事今往往驗甚欲予劇談方來之數而彼此未暇辨也别予入書舘且以其數遊諸名公間其行序以贈之題家狀序曽君某來訪袖籍一通告予是為明嵗題試巻家狀籍請題其首予思建炎戊申胡忠簡對䇿維揚行在所張魏公第其文為進士第一既而寘之第五雖第五然有魏公之定論在猶第一也天運再周百二十有一年矣當有真第一者當有再忠簡其人者第一易能也忠簡其人難能也曽君試為我搜之徒曰可第一而已矣則未為此籍重可第一可忠簡則為此籍重贈王介叔序永豐王介叔讀書郡學暇日來訪問曰民之於仁也甚於水火水火吾見蹈而死者未見蹈仁而死者也夫子言仁之可蹈而必無禍也或問乎夫子曰井有仁焉其從之也子曰何為其然也君子可逝也不可陷也可欺也不可罔也夫子言仁者誠急於救人之死而又不容以身殉死而無益於救也人固未有蹈仁而死者若井有仁焉而從之非蹈仁而死者歟予好仁而有仁焉而從人非蹈仁而死者歟予好仁而不知蔽蓋幾蹈禍矣予於此有悔焉予曰噫仁顧有禍哉仁人心也子欲觀人心之所同然乎去嵗子不忍鄉閭之艱食已無力以賑人而出輔頰舌以告於有力者子取禍之道予未之詳也郡侯不以罪子郡博士所以矜恤子者甚厚教且食之間甞以告予予謂郡博士曰人之過也各於其黨觀過斯知仁矣王子誠有過其初誠何心哉郡博士曰然夫子憫鄉閭之艱食與郡博士矜恤子之此來所謂人心之所同然也人心之所同然將不特一二人而已子豈惟當德郡博士固當深德郡侯豈惟郡侯自學職諸前輩亦復有謂子為不然者乎夫不以子為不然者何也葢亦曰觀過斯知仁也人同一心而誰忍禍夫蹈仁者宜無悔若夫朱文公釋誠意二字所謂實其心之所發者則在子反思而已矣介叔歸序其語以贈之送曽申甫逺遊序香城曽申甫過予道别予問申甫先生將何之申甫曰予聞玉笥西山之勝未之見也山去吾鄉甫三四百里而予年七十有二嵗恐以終不識山為憾知予此行與素識兩山者皆遺予詩其稱道兩山景物之勝固如在目中也予將按詩而尋焉子亦有以遺乎予曰予非素識山者使素識亦不告也先生自有目山至目當自識之何以他人預告為今按他人之詩尋兹山之勝詩之稱道有盡而山之變化無窮則竒偉絶特之觀遺於指疑尋按之外必多矣申甫躩然曰子乃能言觀山之法子終其説以遺予予曰此虛心法也何獨觀山先生行矣送行諸詩置之勿復記憶兩山之勝當悠然而神遇且先生不聞海上二父之子乎一父語其子曰爾往矣見徑寸之珠則拾以歸一父語其子曰爾往矣惟所遇徒手而歸不爾責也他日二子歸受拾遺珠之命者不得珠受徒手之命者得珠豈惟得珠且無所不得也何也受拾珠之命者惟珠之願見見珠念為之障見猶無見也受徒手之命者其心閒其心閒故萬寶横陳而惟所取子聽命於父者也目聽命於心者也先生虛觀山之心當如命徒手者之父竒偉絶特之觀其將焉遯申甫謝曰敬受賜抑予聞子之説有二用盍書以遺予予姑反告予子棫棠而出棫棠以子之説讀書予以子之説觀山是或一道乃次第其語為送曽申甫遊玉笥西山序巽齋文集巻十一
