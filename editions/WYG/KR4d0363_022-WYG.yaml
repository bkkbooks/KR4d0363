body:
  text: 巽齋文集卷二十二宋歐陽守道撰䟦䟦吴荆溪講義身在諸老之後心在諸老之先如此則諸老理學自我同然者出矣近年之學以目廢心曰吾見諸老之說云爾大非諸老所望於後人也愚嘗妄論講學窮理辟猶以歴步天千歳之歴一也同其大不同其細惟不能同其細乃所以同其大也堯歴固在厯家何不按而用之然冬至日之所在後堯若干歳而已不同矣况每後而每不同乎治厯者所以歳歳推測非以異堯歴也必如是故等千歳而上之與堯厯正合不然不合夫千歳之厯均之以步天也天有常法步天而合斯堯歴合已明此理者如生堯世斯能造堯歴者也講學猶之故曰理義心之所同然也荆溪先生之講義所謂躬自推測以上合堯厯者乎某䝉誤知累年今年甫侍教於湘江之上既受此編卒業則復於先生曰闗洛之學朱文公以心斷之今人何不以文公之學闗洛者學文公乎此編所謂穿鑿附和兩不可者承學切於此得先生之心矣退而附書其語於左題方山長鄙能小藁余在中秘時連歳考太學公試得莆田方君善夫之文皆寘前等初以為君精舉子業而已余寓舎與後村劉公隣君見先生退必過予間示予以四六等作往往體正而意圓詞工而事富質之先生則蓋甚許可之然後愧余之知君淺也君登第而予去國君當得教授來長吾郡白鷺洲講授餘暇過予尤數又得見近作數十篇通舊作為一集題曰鄙能如歳寒三友召除辭謝之類視舊為文房四友作嘗經先生品題者愈出愈竒不知先生見此又如何其歎賞也嗟夫斯文固有師友淵源一後村先生居莆中莆士如君出入其門沾被膏馥者不知其㡬先生再出掌内外制君亦游太學在鄉在國皆得在其筆墨之側染化深矣君專以文自娱而大肆其力他日躡武前軰非君而誰予深敬之又自惜也先生嘗謂予曰吾如子年時畱意文字正切子蓋勉之蓋有意於教之也而予力不足今别先生兩年見君寄夀先生致仕後詞曰但有門生來集序已無省吏催詞草而先生手啓謝君曰學廣文多筆精墨妙以歳寒之誼為晚景之榮君今年甫四十有一而先生垂八十矣一世文宗待後進若敵已然君得所依歸真如歐蘇門下士文氣安得不日壯乎感歎之餘題其巻首書美錦堂記後廬陵令尹温陵謝公作美錦堂記文成以示邑人歐陽守道曰子亦知為政乎是吾心也某莊讀三過則以三隅反曰何獨邑哉天下邑之推也宋有天下百餘年歴賢相凡㡬未有製此錦者也王荆公出而製之少年數軰競出敏手見製而不見錦章蔡諸人以為其伎末也割裂紛披又加工焉歴宣靖而此錦亡矣後來中興謂之再造非前日之天下也為國家任民社誠念其初之得之難毋以敏手自居幸全䕶之以付後人美錦而在足矣人不尤爾之不製也且世所乏非敏手也古語曰為者敗公曰子之說信遂次第其語於後題鄧景周平反録吾里鄧君景周為梧州簽書軍事判官而直藤州黎氏之寃獄出三人於死經畧司為劾藤守於朝得㫖䥴罷令於邕州邊靣自劾守武夫也利黎之財以招誘攻刼之盗誣之先籍其家將殺之以㓕口至是報虐以滅可謂稱矣而藤之權司理容州人李浚者獨以先斃佚邦刑然亦天殺之也李浚對君之言曰廹於郡命無可奈何嗚呼寃民至此尚有天日哉君以前後申牘示余并附見令清湘時平反孝子黄百六報父讐事二事皆卓然可書而清湘之平反易藤州之平反難藤州則與貪酷之守為敵也昔孫介夫為桂州判官經制溪峒司欲殺無辜十二人介夫鞫其獄持不可奏聞於朝皆得不死東坡先生特書其事曰介夫仁人也不然安得以一言活十二人於必死乎介夫贑名賢自有文集刋於郡然其姓名以此事在坡集中傳世俱不朽今之文章大家必有喜傳君事者余草具以告焉雖然君方壯年仕行其志世間寃枉待君而直者尚多他日自有青史書之如漢張釋之唐徐有功傳何但介夫名見蘇集比也君益勉之廬陵歐陽某書題莱山書院志醴陵李君文伯示予萊山書院志萊山其所居書院其一族子弟𨽻學之所也予昔知唐李長源有書院於衡山本朝李公擇有書房於廬山二公皆富於藏書既自讀䝉其教飬成就不少今萊山書院為其族公之屋宇日敞田疇日闢器用日備延師取友有以為禮書籍紙筆有以供費不獨愛已之子孫而教之凡兄弟之子孫皆愛之而教之嗟乎君家始為此議者可謂仁人孝子之用心矣昔者范文正公為族置義庄今聞興起者吾數見之矣為族立書院且飬且教前乎李氏後乎李氏同時乎李氏有㡬族乎余㩦孤姓來長沙數過萊山之側嗟夫何當升此書院之堂觀君家子弟忠信之風而歸以語予之族之親之友之鄉哉廬陵歐陽某書題吴荆溪㸃李核詩集廬陵之士以文受知於荆溪吴先生者已仕則吴建翁未仕則李王賓而予則介乎將仕未仕之間者余之文不足言亦不敢言也昨先生問我於敬簡堂曰江西見子文暨來嶽麓講義之外無有何也予謝曰山中常自課然必去嶽麓而後敢呈今非其時也如得并講義不作則又幸也先生頷之建翁今攝令湘潭兼以政事見矣予與建翁皆合忘言於文惟王賓思日精筆日老時以一篇娛先生先生撃節賞歎嗟夫人皆知吳荆溪先生王賓之文何用靳出哉予年餘在此每渡湘皆值無風謂湘無險也近日舟至中流巨浪翻雪幸而獲濟予曰噫予可以無渡矣湘水之風今亦出竒於文乎夫誰與風敵王賓示余此卷太息書其後巽齋歐陽某公權䟦玉笥山名賢題詠余少時觀詩話見有稱吉州玉笥山者意忻然愛其名觀郡志乃無有則屬臨江軍矣不能不為此郡失此山恨里人劉君虛舟徃為道士集録山房諸名賢遺墨而平園誠齋東山諸老之帖俱多想山靈亦忻然曰是固吾東家夫子贈我近年黄廬柬李三溪羅磵谷胡古潭徐西麓諸人賦詠又班班焉則吾郡初未失此山此山於吾郡正自兩有情也何壤地分畫之隔哉天下名山不得名賢不重青原亦吾郡佳處好事入山者不問七祖傳曹溪法而顔魯公黄太史之遺迹是問僧曰六一公吉州人有詩文潤色此山乎曰無則相顧欿然追恨當時之無能請也玉笥雖仙境亦何可無諸公屐痕千古須此墨虛舟此録有功山中多矣虛舟名善號虛舟讀老莊書黄庭經翛然有得時時吟詩有佳思顔貎自余十六七年初識時至今一也又未知更許時當何如其最可敬者素寡文不知山中人本色應如此耶抑為道日損損之又損此其候也間歸里必一過予予衮衮應酧中望其衣冠便凜然有塵外之想嗟乎安得移予與君泉石相近乎哉題陳推官歐鄉誓心録虞之臣臯配禹周之臣召配周臯以明刑邁種德召以聽訟見思於異世功德皆與禹周等茲事豈非代天理物一大事古先聖賢最盡心處也長樂陳俞尚友古人立志甚宏為廬陵推幕所書擬决遣數十百秩滿出以示余曰歐鄉誓心録取六一公夷陵讀舊案時語也君此心尚友六一公矣而自臯召以來同此心也予與君言天為民立君正以此故學士大夫以性命道德文篇議論自髙而薄吏事為粗淺大非天意君聰明絶人讀卷輒數行下隱伏之情不得遁枝蔓之辭不得惑真庖丁解牛手而哀矜審克常恐失錯觀此録名見其宏誓大願如此是可以對越在天矣此邦之民多受君之賜者然君職分有限其他寃抑無告為强家大姓姦民滑胥所賊害不得到君手卒受屈於昏繆之人亦何可勝歎哉予重為吾鄉民惜君之去又念君科第髙朝必以館學待君自此徑躋清華將非君志然則此誓心録之得續未知在何日何所也此又重可惜也雖然民之得受賜於我與否事不可期惟吾心在終有所施願君宏誓大願永不退轉他日縱在清髙隔風雨地位常以百萬億蒼生命墮顛崕受辛苦為心惟其所至而救之今録雖纔兩帙續續生意吾知將塞宇宙間矣封門外茶肆之鬼猶拳拳於范魯公曰願君無忘斯言嗚呼予之感慨嘱君寧不切於彼鬼哉後有續録尚以寄予題墨莊陳夫人賢慧録右宋尚書工部員外郎贈户部尚書劉公夫人陳氏賢慧録開慶元年五月甲子得其從孫某借觀之撰者安定胡先生之父而先生書也今所傳者則長沙易山齋再書擬劉公於國初為三司磨勘其官實工部員外郎其贈户部尚書而今書曰工部侍郎之孫公是先生墓誌稱皇祖以尚書郎有聲太宗時而今書曰真宗朝工部侍郎妻書者胡先生先生其居湖學時官為保寧軍節度推官今書保信軍節度推官略舉此三者不無誤字雖然是不足論也真本會當見之江西名家劉歐陽最居先皆有賢母陳夫人以墨莊教子鄭夫人以荻書教子陳夫人有墨莊故諸子之為學也易鄭夫人惟荻書故六一公長成借書於隣李氏子家是則歐陽難也此他日六一公記事有疑所以多質於公是與六一公之自道曰吾有蔵書一萬卷集古録一千卷至此則兩家相埒矣題劉繼芳雲萍録知我者希則我貴矣四方上下雲龍相從又一様意氣也余之衰朽愧見君之英邁况此篇題名皆當世名勝余敢列其末哉君告余此行之湘中予聞湘水合瀟水曰瀟湘合蒸水曰蒸湘諸所合水輒與同名而衡山七十二峰獨紫蓋一峰别作一向不與七十一峯同多合者如彼不合者如此君其以此山水問湘中士景定五年春正月辛丑廬陵歐陽公權奉題永新劉繼芳雲萍録題張和伯實軒里有二人焉其一務農重榖囷倉常滿而居無杇墁出無車蓋陶埴以為器布素以為衣所與往來者田父野人所親也問其生産累千百計其一侈然大家也居非徒杇墁丹刻而居也出非徒車蓋名駿而御也器珍玩衣文繡日撞鐘伐鼔歌舞以娛客問其生産亦累千百計踰數年而問之則前之累千百計者進而萬千也後之累千百計者降而不十百也又踰而問之進者愈進田父野人所親者徃來相歡如故也降者愈降前日之客㪚落矣務實者為内不為外為已不為人也不務實者亡而為有虛而為盈約而為㤗難乎有恒矣惟學亦然吾為吾學雖有之猶不求人之知也况無之以為欺實則新益無窮欺則素有先䘮故實無多少茍志於實雖少必多欺焉反是余之所有少矣然庶㡬田父野人終身相信不願重客初見敬而後見疎也髙安張季德為余言其族人和伯扁其讀書之室曰實軒余知其新益之多也季徳歸舉所見里二人之所為以告鍾伯玉西園永邑曾君允升為余言東固有賢君子曰鍾伯玉治西園於所居之偏植花卉甚富立亭館不一最勝者曰梅亭園主人時遊息其間亦惟斯亭意最屬人於花各有嗜陶靖節嗜菊周元公嗜蓮今園主人嗜梅亦可敬也亭亭霜雪中矯矯氷玉姿髙人貞士之所賞愛以此自古有和羮語世間侫舌例借此作梅好事梅可敬顧和羮也哉開此口者汲汲富貴人也梅有知當不肯與聞余未識園主人試書此偕允升諗之余既書梅亭數語遺曾允升以諗西園主人鍾伯玉允升曰鍾君梅亭之外所謂華蕚堂者更可道一二語與余曰此余所樂道者按詩註意蕚承華者也華在上蕚在下物同氣一種不可相無也異此則為豆箕非同一種者乎鍾君目其堂曰華蕚堂然則有異於鍾君者請愧之曰豆箕堂題山月亭晋人有言自有宇宙即有此山唐人有言今人不見古時月今月曾經照古人山間明月非東坡老仙泛舟赤壁指與客共者邪處處青山山山明月坡仙御氣乗風揮斥八極髙秋良夜安知此老精神不在霄漢之表俯顧人世見有所謂山月亭者當復撫掌笑曰取之無禁用之不竭吾之言猶信書以遺亭主人胡君季聲巽齋文集卷二十二
