body:
  text: 巽齋文集别集類三宋提要臣等謹案巽齋文集二十七巻宋歐陽守道撰守道字公權初名巽字迂父吉州人嘉祐元年進士授雩都主簿調贛州司户入為秘書省正字累遷秘書郎罷歸咸淳三年以少傅吕文徳薦添差通判建昌軍遷著作佐郎兼崇政殿説書兼權都官郎中終於著作郎事迹具宋史本傳是編分甲乙丙丁戊五集中如復劉學士書辨李習之以守其中為慎獨非中庸本㫖答丁教授書辨劉景雲中心為忠如心為恕之説本之王安石字説非六書本義凡此之類持論咸有根柢非茍立同異史稱守道少孤貧無師自力於學年未三十翕然以徳行為鄉郡儒宗葢崛起特立不由依託門户而來故所見皆出自得也史又稱江萬里作白鷺洲書院首致守道為諸生講説湖南轉運副使吳子良又聘為岳麓書院山長後萬里為國子祭酒復薦守道充史館檢閲萬里殉節忠臣子良得葉適之傳其林下偶談妙解文章肯綮觀於所主可以知其氣類吉州人文紀略又稱文天祥劉辰翁皆守道門人即守道益可知矣然則讀是集者固未可與諸家語録等類而齊觀也乾隆四十五年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:11b7bc9b32f2cb599a83e7cf920d5feb1d0615bdc38c150c1cf5f2ff423eedf7
