body:
  text: 巽齋文集卷十四宋歐陽守道撰記韶州相江書院記生民以來未有盛於孔子此親見聖人者之言也前猶未有後孰得而並之然魯孔子父母國諸弟子學於其門其沒也魯君一誄而止門人三年而歸闕里之教於是寂寥矣近魯者齊昔者歴聘之所首至孟子得其傳而仕於此亦嘗一稱仲尼而對其君然身不留道不行固無望其君能推其學之所自出而表章先聖於過化之地也夫道能信於萬世而相去未逺之時齊魯視之蔑如其空言之幸存恃有門人與孟子而已烏在其爲生民以來之最盛者哉夫亦要諸乆而已矣通祀比之社稷立學遍於郡縣巍巍乎萬世一人當時親見聖人者之言蓋至此而愈信也後千五百年我宋濓溪先生周元公出所著之書惟太極一圖與通書四十章而通書亦惟推明太極圖之意二程子少而師之至於朱文公繼作乃推尋二程子之言見其合於圖書而信其得於授受於是圖書之傳益以光大學者尊之㡬與易論語等天子特爲之表章於上自是元公之里居與其仕國所在奉祠堂建書院矣此孔子所未嘗得於齊魯者也何其盛哉竊嘗疑之當熈寧間元公在南二程子在北而元公以癸丑歳沒二程子母乃未之聞耶後十有四五年二程子之道下信於門人上信於君相而自朝廷至四方曽未有知元公之師道者其後洛學再厄而譏毁不及於元公則猶幸其未嘗彰顯於熈寧元祐故耳今學者得圖與書而學之蓋稍出於中興以後而最盛於三四十年也孔子得通祀與立學於千餘年之後而元公祠堂書院近見於百餘年間就百餘年觀之則熈寧元祐之人所未能通知者亦必待今日而後大顯晦乆近又各有時皆非人之所能爲耶嶺南韶爲文獻國刑獄使者臺治在焉元公所嘗蒞之官也徃年長沙愚齋楊公持使節築相江書院於㡌峯之麓中爲祠堂旁居學徒後人屡有増拓且立先聖殿而受賜額於朝矣越十有九年公之兄之子謙仲父繼以是節來又益大之視前加倍而規制之端正則韶士以爲是具上庠之體者也謙仲父前爲道州濓溪書院剏於其手先帝御書六大字以表之今復爲此於韶以成愚齋公之志殆若一家之事父基而子堂之者道猶魯韶猶齊二書院同出於一人甚矣於斯文拳拳也予昔與謙仲父同朝而韶士亦有與予相聞者以書來請曰元公昔使此部將漕兩年僅八月而去之其未去也廵歴屬部無虛月留此州之日甚淺所著圖書又未出是當時之親炙曽不若今日之聞知也二楊先生惠後學至矣願記書院之大成而因有以詔我予不敢辭則復之曰圖書固元公義理之極致然二程子之師之也竊意斯時講聞大意成書之出與否未可知也後又逺不相聞非若孔門諸子終其身而事夫子者故伊川謂明道自十五六聞周茂叔論道慨然有求道之志未知其要出入於諸家汎濫於老釋者㡬十年反求諸六經而後得知深味此語則元公固亦開示其端而徐俟其自得云爾夫以親受學於元公而猶曰未知其要及其得也則以求諸六經之力然後與元公之學脗合而無毫髪之差蓋六經聖人之心在焉元公之學之所自出也二程子從其學之所自出而學焉斯與元公同其所得矣今元公圖書滿天下其文至約家傳而人誦之也猶有如二程予自謂未知其要而又求諸六經於受學十年之學者乎必如是然後自得自得然後信元公真吾師也不然莫要於圖書夫既傳誦之矣所憂者自得不在我耳以元公爲之師猶退而求之六經者二程子也見元公於圖書而曰吾知之矣六經可以無求矣噫此則二程子所不敢也予方自爲此懼而安能效寸益於相江書院之士乎敬爲書院記歳月而已愚齋公名大異初建書院於淳祐丁未謙仲父名允恭更新書院於景定甲子次年咸淳改元秋八月廬陵歐陽某記白鷺洲書院山長㕔記皇帝在位之三十有九年詔吏部諸授書院山長者並視州學教授嚴陵黄君嘉爲白鷺洲書院山長聞之欣躍曰上嘉惠斯文至矣昔者山長之未爲正員也所在多以教授兼之自前年創入部闕建議之臣無見於教化之本原請以授文學之權入官者而書院滋輕矣今命下而輕者頓重其敢不盡心所職以仰稱樂育人才之德意然此洲書院可容諸生數百而余忝爲之長乃假私屋以居諸生訪我於燕閒無所布席私屋不可常假後之繼余者又莫知當寓何所即此一陋人且不屑來尚何州學教授之視乃以聞於郡得地於城内之東南出便門數十步即一葦至洲矣材木瓦石與凡工役百湏之費多方經畫銖積而寸累之佐以俸給之餘爲門㕔堂室便坐數處數月而成高眀寛潔内外整整無復缺欠其餘力猶足以備器用亦皆堅好可以支乆而書院養士之所資尚無積也黄君蓋去替纔期月其意徒欲自今山長有屋可居實與州學教授體貌均一以稱上所以假寵此官之意故其竭力如營私家事傳京師新進士之當注教授者曰白鷺洲書院山長新居成吾願爲黄君代曰與其爲他郡教授孰與爲白鷺洲山長相先後也若有快於心而求文於某以爲記竊惟古者庠序學校之教自國都至於鄉黨蓋域民而居各有所故即其聚而教之周衰道失民㪚於是先知先覺始自淑其徒於門而其徒固亦在國都鄉黨與凡仕聘徃來之國未有隠居深山衆徃從之如後世所稱逸人髙士之在某所者蓋時君雖不復修學及有如孔孟者則猶能發弟子孰為好學之問致諸大夫國人有所矜式之意未至與上之人漠不相聞也世又愈䧏詩書禮樂不在國而在野於是山中之教興然其髙者則遂爲藏身避世之歸而去眀德親民成已成物之學逺矣惟今所謂書院則不然蓋自五季斯文墜地之後先朝未詔郡縣皆立學之前巖穴之士自相講授而當時固已官其人又賜書籍於其山以光寵之至於大儒繼作以孔孟之事爲己任則又有出於公家學法之外五峯胡先生力辭召命自請爲嶽麓山長自是山長之稱人以爲非有實行粹學者莫宜居而近歳書院相望天子毎親灑宸翰以頒及是又優待其官如此蓋地方千里而教授纔一人郡客之而不敢僚今山長甫與爲二如吾廬陵士至二三萬挾策来遊者不於州學則於書院書院中授徒立所而爲長者乃王官受命於朝前代未之有也三代國都鄉黨之學無所與於巖穴之士後世山中之教不出於上之人主張而今日兼之我宋文風於是最盛矣或謂學以教授名官而書院但曰山長不無小異愚謂不然昌黎韓公謂師者所以傳道授業解惑故教授之名人皆知其爲師然自孔子教人未嘗以師自居子路而次以齒列坐猶曰以吾一日長乎爾母吾以也則長亦不居矣故史記弟子列傳人人書其少孔子若干歳孟子語其徒時亦自稱長者長固對少者言之視門人猶父兄之於子弟也夫惟有如此親之之意故教易入若曰吾師道也庸知其年之生於吾前吾後此在學者尊師則然而爲之師者豈敢謂道實在我哉某昔嘗侍古心先生於書院初建之歳是時山長未有人先生親爲諸生講授載色載笑與從容水竹間忘其爲太守古賢侯蓋有意於成就後進者使之親已如此此所謂猶父兄之於子弟今山長㕔成黄君日布席以待諸生其親之也又得加宻於臯比横經時矣敬爲君書此意使吾黨之士共體此以相親而并以告後之人君字亨父寳祐四年進士清苦有守居是官甚宜蓋雖己仕而未改山中之樂者六香吟屋記龍泉郡君中立名軒而舎旁列植竹桂梅蘭蓮菊名曰六香吟屋日吟其間立軒吟屋命意則有間矣而吟與學妨與君遊者將莫不疑之也乙夘之夏以其詩數十篇示余而請曰是其區區鄉慕時不自揜於五七字之間儻有契於子心者軒若屋願辱記其一余既讀而愛之熟視其氣貌細聽其議論知其爲雅志好修之士也爲之言曰世謂詩人者其人品最不一蓋亦有美才焉然嗜詩之癖或至於此以自足其平生棄其可學孔孟之身而畢力於漢魏晋唐翰墨之士之閫域是固稍有志者之所歎閔而其自附講學則亦徃徃號舉而實不隨六經之文儒先之訓摘取一二掲之齋塾軒忩使稱已者以代名字東南之士如是不可以百計矣而人才日衰觀世道者深憂之計今科舉之外士所爲尤異不入於此則入於彼以君之雅志好修亦豈不覩此而有所不快哉然予察君於微君蓋用意向裏者也以立名軒蓋有所願望有所從事非如彼所爲以代名字而已者余欲爲君記之而古今聖賢格言具在予何所見而敢贅乎惟所謂六香吟屋者有可與君言君多吟吟與學妨宜乎或以疑君今若舎吟而專學則更不虛此屋也昔之美人貞士鮮不以芳潔之草木自况之六草木者不惟爲供吟設也而吟又何必曰詩韓退之曰口不絶吟於六藝之文朱子曰整襟正坐緩視微吟吟固讀書之謂讀書於此芳潔之所如其有得環視草木若與我同一忻然者興趣所寄間一詩之亦何不可苐不必專以吟人自命耳噫亦嘗即六物之見取於君者思之乎人豈無不如彼草木者乎好惡猶人之情也則好善惡惡可以鼻之於臭推其心之所同然夫德修於身非有氣臭之可聞也而書惡穢德惡腥聞至於眀德則曰惟馨何也善惡充積之極皆將薫蒸浮逹於上下四方者故令聞廣譽之類言其聲見靣盎背之類言其色而此又以氣臭言之皆所謂藏之不可揜也君讀書之暇起而撫翫此六香於庭吾置此身於六香之間彼以香而爲吾所好安敢謂彼無知而不有好惡於我耶彼草木也謂之有知則否然而好則有知也知好彼而不知自好不可也不能使好我之如此六香不可也知自好且使好我者如我之所好豈爲媚於人哉有可好之實而已矣詩曰好是懿德中立勉之三勿堂記萬安賴君淵甫名其堂曰三勿長樂陳君舜卿書之以告予求記予問取義云何曰是孟子教人養氣之說必有事焉而勿忘勿助長也予曰然孟子固三言之而其所以言則二也必有事焉故勿忘勿正故勿助長也故曰所以言則二而已爾且孟子以舎苖揠苖爲喻非舎即揠非揠即舎而豈三說哉予將因所喻而䆒言之農之爲田終歳勤皆事也不敢一日忘所事雖然日至而熟天也雖有神農后稷不能今日種而眀日穫也今吾盻盻焉日擬其熟以療饑則必至於爲宋人之揠故不事者忘而正者助長也欲免此二病其亦即所謂養而深思之乎既曰養矣焉有忘而得謂之養焉有助長而得謂之養養也者常令生意接續不疾不徐無過無不及以遂其自然之天也天之於物春生而夏長之亦猶是也陽以生育長養爲事祥風甘雨應時而至所謂養也茍得其養無物不長不然非旱乾則水溢其爲失其養均也予嘗謂義理之學人人可從事求之常言自有至理今言養氣而多爲之說將愈見其支離不若深味養之一字知所謂養雖微勿忘勿助長之訓釋當自得之矣然予觀孟子此章冩其所自得者以淑後學謂之浩然之氣塞乎天地之間其說甚竒先儒以爲前聖所未發就實言之浩然也者蓋人人所同有惟其有之故可養也如其本無則復何養人於未有愧怍之先雖匹夫無不浩然者特不如孟子之知之且能言之耳一有愧怍雖平日號爲賢人君子至此亦且心不寧而顔忸怩故善觀浩然之本體者觀於其所反此浩然者索然時也吾不使之索然是之謂養而無害曰是集義所生者非義襲而取之行有不慊於心則餒矣知其如此義必盡而不爲一至之襲心必安而不使一事之餒此自吾日用飲食事也常存此念斯勿忘已未至於所養純熟之地不必急廹淺躁或常留悔吝以累其中或故作矜持以騖乎外斯勿助長已頼君以孟子本文之言勿者三故掲三勿於堂是其志也志立則氣從之予告以孟子本意有三之義而相與勉焉君他日義無一不盡心無一不安爲天地間仰不愧俯不怍之人然後自信其所謂浩然者固如此而孟子不吾欺也作堂記翠微亭記予既爲宋瑞記碧落堂堂之右一峯峭立平處有亭基宋瑞得之郡人曰是所謂翠微者也故與碧落並表於此郡中廢四十年矣亦復之山之腰曰翠微謂自下望髙蒼然一色至此而所見微也百圍之木在上平地以爲不盈拱把鴻鵠髙舉卑飛之雀自疑過之君子抗志浮雲之表不求合乎卑凢之見彼不我見則我尊矣雖君子何容心不能揮手謝衆人亦不能人人引其手使與已俱也老子曰摶之不得名曰微是山故嘗有仙吾知仙之爲道歛之使益微者翠樾滿山白雲徃來安知斯人不時到其間乎宋瑞小留待之同日記舜祠記僧了敬建學者皆言先王之道衰而後佛氏之說入於中國爭出力排之予謂佛生於極西之地去中國不知㡬萬里而其教得至此蓋亦甚異先王盛時吾中國之所謂西其疆理若邠岐之類固已曰廹近西戎矣而惟虞書稱外薄四海光天之下西之最逺者曰被於流沙流沙之名不再見於詩書也故曰後有作者惟虞帝不可及已况於後世雖吾先王衣冠禮樂之地猶且化而爲夷則夫流沙之外豈復知爲上世盛德之所嘗被者哉我不能有以化被而彼重譯之言得以行乎吾之境為中國者可以自反焉用彼之排也夫使盛德皆如舜則流沙固在吾風化之内也歴世愈乆被德當愈逺彼教能來者吾教固亦能徃中國之三綱五常獨不可入於佛之西方助佛之教棄其君臣父子與凡天性之親而衣服容貌不與華同吾之人有聞而倣之者既不能禁又利僧牒之鬻而許之則雖傾一世而爲佛吾將誰尤而可廬陵之屬邑萬安有寺曰永福僧名了敬者邑之劉氏子也削髪有年讀佛之書甚習然吾儒詩書終不忘於心其於鄉多與知名之士游而時以詩文示予予讀之見其所嚮甚正有父在志於奉養而牽於其教不能自還一日慨然謂予曰吾所居寺名曰韶山相傳舜南廵時至此奏九成之樂不知信否寺之後有髙潔之地未屋予欲以爲舜祠何如予曰悲哉子之妄也然舜前代帝非民間所得祠况爾異教乎敬曰竊亦疑之然嘗聞舜有天下而不與豈知身之爲帝今但以其爲萬世聖人顔孟皆許學者師之吾於聖人萬世如見耳前代帝祠在天下不一所其初若非民間私立而誰立且予教有所謂禮梁武者以梁武爲宗師是亦前代帝而世莫之罪也設他或罪我祠舜予退聽焉而安敢固哉予不復問祠之可否所欲問者南廵至此而奏樂此傳信乎否也予曰舜南廵至衡山書所記也此地去衡山逺未必然也今度嶺而南亦有韶石舜峯遂以之名州徃徃逺方之人思慕盛德䝉此名於山川間耳雖異時韶樂在陳傳至於齊吾夫子得聞之當舜生之時斯樂逹乎天下謂此地嘗奏韶樂焉其孰曰不然且王迹熄於春秋樂工固嘗散亡四出若非盛時之樂自逹於此又安知衰世之後無抱其器至如入河入海者何必曰舜於此自奏哉敬曰若爾則予爲祠屋復何疑夫敬之志可嘉書以遺之使其成則求石刻焉爲祠記巽齋文集卷十四
