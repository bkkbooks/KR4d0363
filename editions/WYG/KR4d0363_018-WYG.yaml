body:
  text: 巽齋文集卷十八宋歐陽守道撰䟦恭䟦真宗皇帝御製正說真宗皇帝御製正說五十篇分爲十卷咸淳二年秋八月忠訓郎臣顔錠以刋本示臣臣再拜受之作而曰此非民間所共見也敢問何從得之臣錠對曰去年進士試禮部有得之以歸者蓋閩婺書肆刋本然字小易漫竊懼非所以尊嚴我皇祖之大訓輒繕冩作大字刋之一字以上皆用原所得本參校無遺誤板藏私家并閩婺原本寳藏之謹所傳也臣又問曰禹有戒湯有嘉言文王有謨今見於尚書者非後嗣之所傳誦則世臣之所稱述也我皇祖之大訓布之民間刋本四出可乎臣錠對曰亦反復思之矣書肆固先刋而此因之也且堯曰言布天下臣無以詰臣錠遂請臣記其後臣仰惟真宗皇帝在御二十有五年宋有天下三世矣自唐開元以降惟此爲極盛之時駸駸乎唐虞成周也而帝德罔愆監之以恭儉撫之以慈仁鎮之以清净守之以抑畏際天所覆海涵春育用能上接藝祖太宗混一區宇之初意下開仁廟至今純用王道正傳臣不逮見咸平景德祥符天禧之盛而知其時海内安樂下至鳥獸魚鼈昆虫草木俱得以遂其生者帝之躬行爲之也每伏讀國史見帝臨朝與元老大臣議天下事至於清燕之暇召對羣臣從容話言無一而非上合天心下從人欲尚書以來所記何以加之聖子神孫雖不遍求龜鑑於前古若稽成憲固有餘師矣帝尤留意藝文肆筆成書皆可爲萬世法蓋前後聖製凡七百二十二卷宰臣常請雕版摹印頒賜館閣矣而正說之賜實在天禧元年之九月則此書流傳必自當時受賜諸臣之家以出凡我臣民得因之以聞帝言於二百五六十年之后而思所以䝉被化育至於今其有不舉手加額而繼之以泣者哉臣昔列屬太史氏幸因進書得俛伏拜稽天章閣下仰瞻雲氣想望奎文乆矣今放歸田里乃見所未見於臣錠之手雖至愚極陋視天禧近臣無能爲役而得讀此書比當時受賜一也臣錠吉州永新人見謂唐太師真卿之後江南入本朝少兵革而是邑尤僻左民生其間保丘墓全室廬長子孫興禮義世世享安靖之福今顔氏登科入仕相望文學彬彬矣此書之刋在山林而尊君父明德逺矣之思今昔同之臣於是不敢議其僭十有二月甲申臣歐陽某百拜敬書題虞堪畫武夷圖嘗聞此山有仙人蛻骨在絶頂上棺中棺只如世上木棺不掩亦不朽不知㡬千百年矣邑人請仙骨禱雨輒應即奉歸之然山斗絶不可攀躋山下能往取骨者惟二人未嘗過三人亦未嘗闕所謂幔亭者仙人成道時受宴於帝帷幔遍山山下人皆得與觀受麟脯異果之賜今旁山居者不一姓皆自稱真君子孫云右得之武夷山道士謾附志於此他日遇山中人當更問之廬陵歐陽某書題彭忠肅公訓子十箴某生晩不及識忠肅彭公而幸得與公之孫壻後林先生爲師友後林生於庚申第於庚辰計其在甥館時去公未逺嘉言善行家人所傳而國史所不盡書者必多接於見聞每念當於從容問之然聚㪚匆匆殊不滿願丙寅夏五月先生書來示公所製訓子十箴而公曰家邇年遭兵燹焚掠之禍遺書少存者孫某所寳惟此不燼之玉也讀之凛然如在問一得三之列嗟乎公當紹熈慶元間所論諌本仁義至今炳如丹書愠於羣小遇閔受侮而私居義方之教念世禄之所從憂君恩之難報使之謹身從事下以無忝所生上以不負天子家庭片語猶畎畆餘忠也第一箴大意在抑玭家訓上矣公之子孫既世守不替而故家流風漸被姻黨今後林先生之清修篤行某心誠服之忠肅公歿六十年江鄉師表猶有望也魯無君子斯焉取斯雖以某之不敏亦將服膺希賢論世之誨上泝淵源所自而願庶㡬焉感歎之餘敬書其末六月八日己巳後學歐陽某書題邢榮叔詩卷予讀北忩詩未盡卷言曰近世有一議論大欠商確東坡賦濓溪曰先生本全德亷退乃一隅又曰先生豈我軰造物乃其徒而其門山谷形容濓溪氣象尤極其粹後來所傳乃謂吕正獻作相伊川徃來甚宻坡與仲氏皆疑人才進退一出伊川而惡其妨已又謂蘇黄皆浮薄軰且蘇黄尊敬濓溪如此豈濓溪自有以得此於蘇黄與蘇黄可謂尚德矣濓溪得此於蘇黄何也予上下古今以爲天壤間每百年許必有一大議論其議論必有一大氣勢非再遇百年未易清平也北忩感予言太息乆之嗟且置是閑中焼香煮茶讀君詩三五首亦快活數刻矣寳祐甲寅秋七月廬陵歐陽某公權甫書於長沙定王臺之左題范氏誦清堂詩文誦清堂詩文客以授予讀之盡日仰先正之髙風慶名家之有後斯清也何獨其子誦之好是懿德者宜相與誦之也今時兒童走卒能道西堂公之清廉尊名固應與所至琴鶴自隨者儷美然予嘗妄論清之爲名本不專以自亷也清不專以自亷猶汙之不專以自貪下流之人何惡不歸貪纔其一事耳清以伯夷制行何獨亷也等而上之雖文王之德亦曰清清廟之詩曰濟濟多士秉文之德對越在天清德可以對越在天周之士有與文王爲一者矣人稟至清之氣以生不滓穢之宜有可以對越在天然而甚難如童子圎光罕有能全於盛壯衰老之年者也有以童子之心而愛此本然之清者乎若知本然之清之可愛則自應不忍滓穢世之所以逐於糞土臭腐者非固欲滓穢此清蓋原不知有此清也予知西堂公有集曰對越雖所記皆生平官政然觀其命名蓋有周士之意守志厲操有本者如是予爲公鄉人而不及拜公書於此堂中詩文之後以詒公之子堂中宜有公文遺言逸事藏焉他日儻可見乎寳祐戊午三月十八日廬陵歐陽某書題郭靖翁梅圖郭靖翁寄示余梅圖予展玩日薄晩矣入夜寒甚索一二句題後未得置之就枕夢一丈夫潔白清峭服如其容方獨立予揖之慨然謂予曰予適有思當就君謀之予曰何如曰予館於此有年向荷主人之知捐尋丈地以容我彼欲以利規主人者或欲歳效珍竒或欲日獻甘㫖彼皆善結主人僕役爲之游譽者多争欲奪吾地以居之賴主人不聽予得在此然今者主人愛我之過予反有所不堪方思去之聞君頗有山林之交試為予謀何適予曰何哉主人愛君之過曰予性便幽僻不願知於人荒閒之野寂寞之濱足以遂予之雅志主人既强我在此矣今乃欲築堂以即我而日延賓客以狎我使我日與紛紛者接夫紛紛中豈無修士雖然襟裾塵埃口腹羶暈者將昧予目逆予鼻庸能禁其不至哉予是以思去之予不幸有清潔之名主人惟無此意則已有則彼將競至借予以蓋汙也然將汙我且汙主人必不得已予將稱病正立談容若遽悴者予恍然驚覺斜月在忩霜氣透帷思之莫解其說既旦案上郭氏圖在予悟曰此梅之神也圖中有近樹架屋迎客㸔花等語梅殆有知耶書圖後歸之寳祐戊午臘歐陽某書題慈順堂集懿哉我朝之家法也帝躬行如二帝三王后内德如塗山有娀任姒風化所覃自族戚而天下三代而下王孫公子之多賢未有如今之世昔嘗見朱文公作篤行趙公墓碑孝友之行通於神明蓋丞相福國忠定王之父天生大賢必於是家可以觀積善之慶矣寓安成慈順堂趙氏奉親事長合門春和自前軰謝良齋周益公諸賢每詠歎之以至於今又三四世矣堂中収拾諸賢詩文重刋以詔乆逺矣萬石君家孝謹再世而後有不然者彼庶姓猶難之今以宗室能如此是家之昌當與國俱無疆予之所敬豈爲是一家哉願見作者歌宋麟趾題廖老菴地理書有爲郭景純塟書之學者曰贑進士廖老菴鵬圖大江以南諸名家先墓地形以告李後林先生先生命予題數字於卷首予惟老菴此圖纔數百穴耳而㪚在數千里乆逺者已三五百年三五百年數千里之間人之生不知㡬萬億而死得吉地以藏爲老菴所取者如此其少人無窮而地有限已藏者尚難之後人復安所措手哉吉地之難得甚於土石中之得金玉金玉是金玉而已耳自不好者觀之亦何足貴吉地則子孫得以安祖考之體魄祖考得以流子孫之福澤世之大賢君子實鍾其秀氣以生非但富貴也故自此術之行人皆好之好之而不得其所以吉凶之說此老菴之圖所爲作也按此而求合或可或否使後人無惑其用心蓋近於仁雖然予有問於老菴吉地能使子孫富貴而富貴不必皆賢或子孫有賢者生而不免貧賤是二者孰愈今人之先墓其見稱於名術之家者多富貴者也貧賤而賢者是亦必上世有吉地生之然以其貧賤也里人無稱其先墓者矣一抔之土不封不樹或且湮沒名術過之亦莫得而駐足熟視矣然則其得入是圖者鮮矣且安知貧賤而賢者之先墓不優於彼之徒富貴者乎貧賤人所不欲也今爲人擇地曰吾能使爾子孫世生賢如顔淵原憲如自古厄窮流落之君子清名垂於百世者彼且艴然不懌矣雖有顔氏原氏諸賢之先之墓之地近在咫尺夫固不願塟也噫可惜也今之人與貴窮人爵富敵縣官則願之雖然與老菴指示近世富貴掀揭天地者以告人曰此某山某水之爲富貴吾固知之聞者欣然羨之徐告之曰某人者富貴如此獨晩節末路有如彼禍敗吾亦知之聞者亦色變而神不寧矣此地又不願葬矣二者宜何擇也予老矣將營數尺黄壤以歸全既慮子孫有貧賤之憂又懼子孫受富貴之累老菴士也可與商他日請問之後林題胡自牧雲萍録此録何謂雲萍自牧年壯氣盛方結交四海以有所爲燕南趙北萬里外皆兄弟也自古恢疎磊落之士一意向彼此相成垂名千載後人指凌煙閣但曰此爲英此爲衛此爲褒此爲鄂未有復問其鄉里何許也想當時諸公定交正復如此此録何謂雲萍寳祐乙夘九月九日廬陵歐陽某書巽齋文集卷十八
