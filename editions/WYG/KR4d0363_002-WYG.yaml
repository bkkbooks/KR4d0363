body:
  text: 巽齋文集巻二宋歐陽守道撰書代賀游參政出守書某再拜比者伏聞暫釋大政出殿輔籓海内之士人人咨嗟以爲當今之時事變日稠人才日慳自分曹列司以下可不論至於器識在上心德望在天下議論風節在朝廷老成以柱王國剛正以儀百僚有人如明公顧不少安其位而今日請退明日丐佚不如其志不已在明公得矣天下何如也某之愚亦甚爲當世惜不但彼私議竊嘆者之云云雖然明公豈以退佚之意一動於中遽恝然於當世哉君子之所爲衆人固不識自古聖賢得君行道豈必曰取一世之事叢於其身而後足以福天下茍可以福天下雖其身之退而猶福也執要之途名利之府自一命以上有可攫而得之者人爭先焉此風至今日極矣長此不已貴進而賤退喜仕而愠已國家之名器爵禄粗足以供士大夫富貴利達之心而其末流有不可言者君子之進退衆人之觀瞻大臣之進退卿大夫百辟之觀瞻以上眷之慇懃人心之嚮望萃於明公公翩然去之立一進退之的於士大夫百辟衆人之上使人知有廉隅知有節操知所以貴重其身風俗之弊差可少救此意未甞不為福天下計也自古未有士大夫知㢘隅節操貴重其身而天下不可為也未有㢘隅節操之不立士大夫輕賤其身茍得忘恥嗜進無厭而天下可為也試與明公静觀今世之故豈曰勇退者衆國無與任事者乎嗜進者衆國事滋見其無可任者爾誠以任國事之心至吾何惡其進奈何操嗜進之心以害天下一人之心如此國有受害之處下有受害之人矣且十人且百人而受害者可知也一命以上之心如此國有受害之處下有受害之人矣且進而列大吏操重權而受害者愈可知也今之世所謂何以利吾家何以利吾身者比肩立也而末流可勝言乎救今患者救此習最第一事而他事隨時支掌出力修補次之明公進而任國事退而正人心意者請退丐佚若為斯地而人有不深曉其故者不然明公謂今何如時而顧以勇退為髙也哉上眷如彼其慇懃也而勇退如此仕不得志懷禄戀戀者恥矣人心如彼其嚮望也而勇退如此留不為重去不為輕以仕進自肥者恥矣明公非以為髙而人髙之此一行也而豈徒哉某藐焉晩末出入門下受教者舊矣知識凡近不足以管窺盛德竊以為天下之重非明公不可任如前所云亦非明公不可救故於今日之退不以知幾論不以保身論而直推明公之心至此嗚呼某區區之心固明公所夙許也守至迂之學無適時之才明知不與位稱而猶在此揆之胸中幸而富貴利達之念不先入是以其進其退未甞敢與私謀藐焉之軀不足道而知所自貴重則亦久矣今又於明公之出處甚有感也冩胸中之所知以諗左右而不計其詳焉他日其尙有以教之伏惟明公乃心王室訏謨辰告輔藩咫尺固不以去國自踈所冀體上之眷與人望之所依歸善調寢興爲天下加愛某不勝嚮望祈祝之至代賀杜立齋除同簽書樞宻書某得進奏院報明公以八月祇奉明綸入班西府幸甚快甚亟效時體作儷語修賀既成輙自愧曰此豈所以施於明公哉當世之有明公豈當俟今日然後大用大用則既晩矣欲賀當於天下不當於明公也然明公之清修髙節非某所知亦非某所不知天下賀宜有辭則亦宜進之左右某聞之西府號曰本兵實於天下事無所不與惟其號如此故位此者闗夷夏之觀聽特甚重而不輕古之君子其當重任也有不動聲色逺方畏之國家無事此非一朝一夕之故葢其所積者厚矣天下惟公論不冺没雖在異族有同然者司馬文正雖不拜樞副於熙寜而異時入相遼人相語震恐彼弱不勝衣之一老豈單于望容貌而却者哉所積者有以服其心也國積賢賢積望望積日君子居家而積國之望在國而積遠方絶域之望故有所不用用則中外翕然故曰以天下之重自任自任者豈臨事而主其事也哉平居暇時一出一處一黙一語一舍一取皆此自任意也故未用此賢也有用不用而人之賢已者無異辭斯人也不觀乎其他從以厭服公議而報國之事已足矣明公之於當世是也某所為天下賀者此也而又有辭焉今世惟明公不大用明公而大用吾君當以一明公而得數明公夫惟天下之賢者必有一二焉為之主則氣勢翕合而所謂為之主者亦誠以得主賢者為樂也自愛明公者言之直以為當世不一二人自明公之心觀之亦豈曰吾以一人之身而報國葢善類徯明公之今日也久矣法從之論思不如榻前之宻勿自兹以往共國事者往往有與已若是豈不足以大快吾志哉區區之愚始泛為天下賀中則特為天下之賢者賀因其可以為賢賀是以終則竟為明公賀某不佞思惟當世之故則熟矣扶弱補罅端未易一一細論得其至大者一説以為公論必大明而後天下可為異時救弊之證未知如今所觀故公議容有拂焉而猶可有説觀今之勢自非君子雜錯於中外百執事之列未見其可有明公在焉天下其無憂矣明公之心事天下通知之而某之知之也似深是以樂誦言之而不厭伏惟明公剛直之氣清淑之質得之於天地之異禀堅確之守邁往之操根之於學問之至正羽儀朝紳灼龜國事體有令譽厭乎衆聞渙號一頒中外鼓舞某往在班末甞在受知一人之數今以郡紱未觧無由躬詣台墀叙述萬一瞻望丹闕實勞我心至於區區為善類稱賀之心則固不待親見明公而後致其説也惟明公察之代人上李守書上蕭晦齋續後漢書某廬陵鄙人也廬陵史學自歐陽子秉唐及五代之筆以春秋大法正季世之事於是二書傑然出班范之上君子以為春秋以來未之有某之先祖晦齋諱某生歐陽公百年之後遍讀諸史至陳夀書慨然而嘆曰曹操死且千年矣猶得為地下之幸鬼乎於是取昭烈父子四十二年事收拾闕遺作續後漢書然後操及其子孫欺天下之罪暫見黨於陳夀者一日而正筆誅葢先祖晦齋之心扶綱常討亂賊不在諸葛忠武侯以下大誼誅操而不得作書者顧得以萬世大誼誅之書既成將獻之天子不幸賫志以没於今六十年矣葢春秋之後漢昭烈父子及唐五代秉史筆者皆出於廬陵而五代之書以歐陽子之得時行道遂大顯於天下續後漢書以先祖晦齋之韜光不耀乃久藏於私家書之有幸不幸如此某生歐陽子之鄉而有晦齋為之祖所宜力自振㧞庶幾萬一有立於世凡當世之王公大人有可告以斯文者奉手澤以請使得與歐陽子之書俱傳又不幸衰遲之蹤重厄於食貧王公大人相去之逺名氏不能以自達則此書之傳與否又未可必中夜思之先祖能體忠武侯之心於千載之逺某不能繼先祖之志於再世之近萬一遺編之存散亡失墜且死無以見先人於地下是以破箧之藏卧興對之時一發讀則撫而泣曰天乎斯文之未䘮也吾祖之心昭昭獨不監之哉顯晦有時謹守以俟而已誠不自意近者歐陽簿以告於下執事伏䝉台慈索去副本竊聞卧治之暇時一翻閲有意於鋟木以傳也家居去郡治少逺葢出而俟成命於歐陽簿之家旬月矣請謁不敢再敢以區區之所欲言因歐陽簿以告焉某兒時逮事先祖甞聞所以論事之意曰春秋之法失國之君生名之國君卒而後名曰某國某侯某卒今生而名何也以其不死社稷雖生猶死也國者先君之國將為先君守之守之不可則繼以死彼獻帝者以天下之共主一日而帝魏甘心焉即其奉璽綬歸孽丕之日雖不死猶死矣春秋一年不二君亦不曠年無君建安庚子之冬漢天子之位為丕所簒次年四月昭烈始稱尊號於漢中葢已曠年矣然則吾書之作以昭烈之年上接建安末年為正統而不疑於獻帝之猶存焉彼固大誼之所絶也小子識之夫昭烈之君臣於春秋未之講也而有暗合者焉春秋為萬世訓固有誼之所有而文之所無者作變事而權斯合矣當先祖成書之日朱文公通鑑綱目之書未出也近歲得朱文公之書讀之以章武接建安炎興二年書魏山陽公卒若曰獻帝至此特魏之山陽公爾綱目葢於丕簒之歲而久已絶之也此因奉遺言以呈而與歐陽簿反覆此事敢以先祖書外之意併求正於先生抑某有深言於先生者先祖殁而遺書存賢太守之幸惠兹郡者不知其㡬郡以積弊之極雖有長才亦屈於經理之不給而何暇與逢掖之士為商確斯文計中間惟駕部鄭公甞取先祖之書進於朝得百索本既而列之秘省辛卯囘禄之變此書必不復存今存者惟家藏之本某又幸而不死抱其所藏又見先生之此來凋瘵之郡游刅處之以其餘力飭學校祠先賢凡所以為斯文地者無不用其極然則是書之光顯意者决在今日無疑也前日歐陽簿以先生之意告某曰前軰作郡不肖泛泛刋書恐為郡家無窮之費然亦不可因噎廢食某聞此不勝幸願葢刋書不可泛耳使其書真有補於世教豈以例廢之哉今世無先祖之書而有陳夀之書學者不知漢有天下四百六十有二年而曰漢之後有三國漢之賊曰皇帝髙帝之子孫曰蜀主斯不亦世教之大闕而訓後世以亂臣賊子之可為歟先生之學自朱文公者也某之先祖未知世有文公之書而先得其同然者也文公綱目之作總為千七百年世變設而及昭烈父子者纔三巻愚以為建安之後炎興之前終不可以無先祖之正史也敢重告之執事伏惟深原先祖之心所以疲竭精力於此者固望一日獲見於世晦而不章如此其久自今亟賜之主盟而表章之則是書雖筆於先祖實出於先生他日因縁與班范之書俱為不朽則逝者亦増氣於九泉之下矣不勝企望廹切之私拱聼嚴命之下干冐威尊不寒而慄代人謝觧書某以舉子之文辱在鄉貢之末出而一謝太守當有所謂四六文今世之所謂啟者以贄於下執事舉子之文有志者羞為之然而不得不為者舍之無以自獻雖有聖賢之學經濟之才欲一日而見於用不可得也今之法率天下而為時文其孰能違之某固有大不得已於此者矣四六之文今世所謂啓某未甞學也文史足以自娯藜藿足以自給朝夕所與游者蓬蒿之士擇其志向之同義理薰炙未知世間王公貴人之門奔走伺候當用何禮則所謂啓者非我之所得用夫亦焉用學此而又其文自叙率用厄窮卑賤無聊可憐之語間或反是則有髙自稱道無復退遜以幸已知至於揄揚主人之盛德則當極其諛辭無以復加然後以䝉一眄睞今世少特立不阿之士亦安知非此等文體有以甚壊其良心也故時文之下而此文又其下下舉而第第而仕持此以幸人之憐已者當終其身其不自重可哀也且世無賢人君子則已有賢人君子其於人之佞已固將望而逃之而吾身進退出處自有義命語所謂巧言者鮮仁將焉用此甚巧之言以壊吾之良心哉某之舉而第與否第而仕與否不可知然而絶去巧言安守義命當自今日始某聞之人各有一初心平日為學一初心一日進身亦一初心未有不善皆知學顏子之學皆知志伊尹之志者也他日夷考則意向之所之不若二人是何也義理非踈也見趣非闇也剖别古今人品某賢某不肖非無所黒白也然而為彼不為此者境一變而心一移也夫惟初心難持能持初心可以大有為於世先生之初心某亦得而窺之矣先生出入中外幾年於此而今日安得窺其初心某見先生今日之心皆夫人初心之可願者也由今日而逆其心先生何以異於人哉能持其初心而已矣易有之履之初九曰素履往无咎象曰素履之往獨行願也伊川先生以為人於方進之初惟當安其素而行若富貴之心與行道之心雜乎其中則失其所可願某愚不肖竊謂一介賤士今有自進之階正履初九時也今日此心實立方來之得不辱其身以自附於前修在今日否亦今日然而立今日之心易持方來之心難由初九之素履積至於上九之視履考祥而後天地之間可以無憾士之立身如此所謂亦可以為成人矣國家設科舉以待天下士其未舉也教養作成無所不至然其間猶有進取之後顯畔吾道而末如之何者今是邦也不幸前修之典刑差逺而義利之限界漸以不明中朝名流有仕於此吾黨皆將視之以為趨向然而心事光明表裏如一如先生者近歲亦無幾至於鼓利欲之塲創茍賤之塗銷鑠太和壊治鍥薄使後生小子靡然從之以為當然則其遺是邦士習之痼病卒未易愈此亦志士仁人之所憂也先生於某宜何以教之某不敢以一舉一第為足以了此身而先生之為是邦亦豈謂一勸駕之勞足以幸廬陵士哉猥於參見之始不勝願望之私先生不鄙擲而覽之終篇亦必有悵然感於心者夫此正可為先生道未易與他人言也先生裁之代人為教官求職書某讀易至於艮之上九曰敦艮吉艮止也居止之終卦極則變而猶止焉其自處則甚厚矣聖人於象特以厚終稱之今夫不可以行而行不可以言而言輕舉妄動自取悔咎者固不足言矣非其地不行非其時不言以所負自重而不果决於進取世固豈無其人然而不見可欲而止者見可欲而動止於其初不止於其終故静久者躁必甚恬極者競必果此厚終之所以難而非終則無以見厚之至也某之無似自處於恬且静者素矣恬之為競静之為躁豈惟顧義理而不敢抑競且躁非愚性之所能是以自先生分考以來幸衡鍳之分明雖屢以區區之文辱知遇而學舍陞陟之常法未甞輕有所請今者先生得代而趨朝雖於某未甞有一級一階之進而夙昔文字間之受教所得為多且某受教之心與先生作成之心固皆不在夫區區陞陟之間也雖然恬静人之所自處而進退行止則時實為之以上九之敦艮終於艮矣而繼艮為漸非艮之欲漸也時乎漸則固無害於艮也聖人序之曰物不可以終止先儒亦曰山之所生與所反皆進也近日試先生置之首列竊以為有漸之幾焉漸進不極也名之曰漸序之不越次者也夫惟序不越次而後無害於艮不然則静久者躁甚恬極者競果前日之所自守者皆非矣區區之意以為先生三載於此某為諸生辱知既屢則自諸生而進之以一小職序之不越次者也易所謂漸也三載未甞有所請倘可庻幾所漸之始乎且漸之象曰山上有木木之髙有所因也先生為後學所宗髙山仰止景行行止某雖無聳壑昻霄之質涵濡善教差有生意且自幸其不為不才之樗先生更栽培之若自是而條達暢茂以大有所成則一柯一幹稍有益於人用者皆先生之造漸之彖曰進得位往有功也請以自此而往者為先生終望先生亦終進之代上執政書比者伏准省劄以某將漕江右就領洪都超從郎省華以閣職不辭而受非分所安謹已即日具奏矣渙汗不敢固請深惟聖主簡異之恩公相曲成之造豈伊綿薄所可稱塞抑區區素願两年所以施於廬陵而幸少遂者輙於拜命之始敬申書於閣下某書生無他長獨聞古所謂悃愊無華之吏日計不足歲計有餘者心切慕之而觀近世士大夫以才幹稱以風采聞則往往異是某之所自謂未必與此等意見合獨頼聖君賢相深諒其心故郡事幾及終更即畀之以一道轉餽按察之寄事任既重宜有改圖而某守其迂愚猶滯前見豈不願以才幹風采自見者作意為之亦非所難顧以為有君子之才幹不以苛急趣辦為竒功有君子之風采不以刻核峻暴取能名無能名上下俱利用度不為不給小大相安部屬不為不清如此而分一道則一道之福也不然無才幹而庸謬不可不庸謬而苛急趣辦愈不可無風采而罷軟不可不罷軟而刻核峻暴尤不可世所謂才幹固甞聞之矣一有財賦之責即以興利自居名色甚新計較甚悉上之人其謂果可以為信否也一利之興増入之數必多從其増入者而計之謂宜日富一日歲富一歲然而未増入之先如此其煎熬也已増入之後煎熬則又甚也日貧一日歲貧一歲所興之利將以誰歸如此而為才幹也其可謂才於其家也已夫事權在手何事不可為日取至弱之小民而榜敲之何財不可辦此正不待大有才幹者然後能致以毒民命以戕國脉則正不才之大者或者快其有用過矣似此人品當事任不過一二年而流毒常五年十年而未已後此者縱有惻然拯救之心而民病極不可復蘇席巻梱載之歸裝不可復得天下所以愈困而不可藥則誤認才幹之説壊之也至若所謂風采亦何難之有一道幾州一州幾邑時擊數人以振吾職㑹有不幸者當之寜過於多以立威聲雖傷於誤亦不顧恤如此則世且翕然以健吏目之矣其間又有喜怒任情專快怨憤變亂情實顛倒是非小吏在其下風惴焉數日以幸去未必以職業不修得罪而常以逢迎不至為尤未必以不得民心賈怨而常以游謁造謗為恐其有不吉不廸罪狀顯著則反佚在簡書之外非委曲於勢要則廽䕶於私情公論何以更得分明人才何以更望成就且甞聞之不教而誅謂之虐不戒視成謂之暴幸為所部之長謹身率先使屬吏如事父兄有所恥而不為不善縱無所按何所不可不幸不率教誨自蹈罟擭有終不可容者去一人可以福千萬人此固不得一以寛大從事也不然亦須為世道存公論為吾君惜人才且按察屬吏但當使人畏國法爾豈願其畏已哉今其甚者至於掩人不備笑語相接之間按章倐下莫知何時何其譎也彼實有罪自當聲之於衆而去之至公至正可以服人而將焉用是此誤認風采之説又今世之所是而不以為非者天下事勢極矣民命人才正須着意愛惜而此二説實敗壊之恐非國之福也懷此欲言有日於此深恐為不我知者病彼聞斯語且以為庸謬且以為罷軟曽是可以稱部使者之職不知世道不堪以决裂敗壊必曰才具必曰風采誤人多矣决裂之尤者也某之為此言則有所自信者矣待罪守土两歲賦入求額外之辦集固無之而若上供若和糶若諸司之應副若本州之支用亦未見其他有虧損屬僚人品自是不齊甞按二人非其得已中人之性可化不若律之以身自到官以至於今潜察一人之所為固有懲創自艾由貪而㢘若二人者矣自此轉餽自此按察必不使職事廢弛用度乏而部屬玩然亦豈必如今之所謂才幹所謂風采也自幼讀書以至作吏本之於古聖賢之意參之以世故治亂盛衰之所以然而反求諸其身得平實二字以為庶幾可以終身行之者夫才幹非惡稱惟心平實則不苛急不趣辦而賦入可以及數風采亦美名惟心於平實則不刻核不峻暴而按刺可以得真誠不自揆以為人人此心則可以結人心可以永天命助成國家無疆之福亦惟公相於得君行道之秋量能授任之際主張此意使某亦得以安其所素不復遷就他説以自轉移則為幸大矣有人此有土有土此有財有財此有用請於此為國家植根本有諸已而後求諸人無諸已而後非諸人請於此為官吏立標凖非曰能之知之而願有行焉昔周人稱召伯曰我任我輦我車我牛言召伯成轉餽之功也而滋養民力使有所從出則見之首章曰芄芄黍苖隂雨膏之漢魏相刺揚州守令多所貶退號為有威嚴者丙吉反以願謹重為請此非勸之無所刺也曰謹重則大有説也某才不敢望昔人而有此二職在敢盡布腹心於公相公相察之使誠得安其所素則某固亦願有以自見者㑹當罄竭以報萬一巽齋文集巻二
