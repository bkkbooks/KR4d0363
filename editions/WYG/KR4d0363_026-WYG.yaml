body:
  text: 巽齋文集卷二十六宋歐陽守道撰銘湧雲池銘雲騰山有檻泉出飈馭廟南渟為池可三丈溢流山下田受溉甚逺宋寳祐三年夏旱知廬陵縣事東陽劉侯汝礪登山禱雨見而異之知神所以宅其上而能靈也而除治不嚴澣濯者狎焉即黙念曰神幸應禱當旌斯泉使人知敬如蘇文忠公記常山雩泉故事禱已歸假寐若見車馬旌旗羅列庭中或告曰亟出拜驚起趨拜位風雷飛厲雨大霔是歳有秋次嵗禱仍應今嵗旱甚又禱每宿山中候命輒應山去城非逺也異時禱雨者或迹不至斯泉也人之狎之敬之亦非有加損於神也然遇泉所而神斯泉則其至廟何莫非如在之心否則山固當有泉而廟亦總總爾奚其神雩泉之詩曰我歌雲漢于泉之側誰其尸之涌溢赴節宜祖蘇語命池曰湧雲甃石四週而垣焉𨗳其下流入鳯山主人曾氏之池請公之以遺民澣濯主人許之得全䕶上流使不汙又夷其道以便後守令之至廟者民治道竊相語也湧泉也湧雲何謂南岳㪚吏歐陽守道代侯言曰易屯䝉需解同一坎出斯泉升斯雲降斯雨泉常而雲變常有所而變無方也水一勺龍生雲膚寸雨集夫豈在多有不測焉水也雲也猶有形也神也瞬息而千載心也俯仰而八極今茲廟祠唐貞觀中刺史吳公計其仙去玉笥山時㡬何年矣玉笥又非茲山而其神信於爾民如一日如往來見之當旱如雨如取此泉傾注於空中禱雨者之心亦然一念所感於雲不知於何起雨不知於何來强而名之雖謂蓄泄在此池亦何不可如曰泉不可雲則是人亦不可神矣宇宙間有變化流通之理爾未之知於是山中人請勒銘其上銘曰泉山雲天神古人今雲泉一氣神人一心嵗在丁巳七月甲子撰富田南禪寺鐘銘南禪師慧鑄寳鐘成餘山歐陽㢲公權甫讚歎說偈佛㓕度後有以聲音作佛事者諸具聞性從聲音度此鐘靈異能說萬法所以者何辟如有人夢想顛倒見種種惡受種種苦忽於夢中得聞此鐘恍然而覺既夢覺已心根清凈思惟正覺一切正覺從鐘聲生一切顛倒從鐘㓕此人思惟我今云何得此快樂是誰說法于何聽受了無說者惟有此鐘我當向鐘旋遶禮拜作是念已鐘則寂然鐘則非鐘是我聞性萬刼有盡聞性不壊諸佛神通由聞性入我願此鐘盡未來際常說此法三界人天以至鬼趣聞鐘一聲瞻仰敬禮是鑄鐘者即導引師草庭銘為張慶長作濓溪之庭有草不除云此生意與我一如後人慕之庭亦畱草根荄莖葉若見至道如我所見可慕匪名人同此心何獨先生不見周詩仁及行葦方苞方體其葉泥泥等而上之舜命益虞順遂動植而草與俱生生無窮天地之徳嗟人何為而戕而賊不踐生草仁獸猶然人肆殺心自遏其天燕坐静觀觀爾交翠何惡爾榮何愛爾悴此庭之内萬物皆春天地與我肫肫一仁自草而木鱗甲毛羽爾生爾育在我同宇豈其愛物而不仁民豈其仁民而不親親發用雖殊惻隱則一以輕較重則知仁術彼於人類如刈草然或同根生而自相煎人而至斯於草何惜彼痛不知一膜之隔君觀濓溪得諡曰元是固其心自本自根君俯斯庭其讀孟子恩及功加在推而已我作斯銘實獲我心君試聽之南風之琴純正堂銘西雒石行修寓居長沙郡其先世元懿公事太宗皇帝為樞宻使拜尚書右僕射未㡬薨帝悼之曰石某事君之心可謂純正矣方委用而遽至此豈命乎行修今以純正名堂碣銘曰齊聖廣淵明允誠篤宣慈惠和共懿忠肅傳載其名虞書所無或曰禹臯稷契之徒在帝盛時天運初㤗意有斯人九官之外名則不浮徳則殊尤徳人在庭與世作刑我哀季世葩榮實墜啁唽之音羽短於喙神宋立極帝樂再韶不顯石公翼舜承堯問公行事不簡不策問公話言不金不石知子匪父知臣匪君純正之褒熈陵實云風氣一初君臣隆古化覃下國農邠士魯惟正且純式此元臣孰圎爾觚孰玉爾珉愾我寤歎念彼京汴公家八世人事百變公昔鎮湘公孫居之廼居廼室有扁在楣豈無故笏不如華衮帝訓孔明以昭悠逺臣忠子孝純正之思百爾云來視我銘詩訥齋銘安成張士謨去年見余於衡嶽之麓氣貌静愿未窺其中徐叩以言若不能出口而曰予病從事於學而未之得也嘗扁其所居之室曰訥而請余為之說蓋張君年正少而謹重自愛為内不為外當今之世斯人其賢與作訥齋銘吉人之言辟之古樂和平從容典則質樸譁人之言何喙之鳴喧啾啁唽嘈雜紛争巧言孔任帝舜所畏利口惟賢乃敗商季是曰亂徳亦曰覆邦禍起澆薄福生淳龎我願張君由訥成德天下皆訥以長我王國題所寓維古聖賢日有孶孶今者何為飽食以嬉怠惰廢放病在自欺百年無㡬曾是弗思頻復不已死且及之各立爾心以為嚴師鐘銘我叩此鐘問鑄鐘者爾能鑄鐘不能鑄聲云何叩鐘而聲即應内外中間聲在何所方叩鐘時聲從何來叩止聲盡復從何去工不能答我將問鐘鐘不能言則將誰問當知此聲遍滿虛空在在處處等無有二此鐘空洞合虛空性普願聞鐘得大解脫尚友齋銘陳推官俞此齋何名名曰尚友豈無今人而古是取結交四方逺莫從之我未有聞友我者誰反求諸身以理自信前言徃行遺我符邙蕭然一室有詩有書如何千載今者起予誰謂世逺宇宙俛仰誰謂人逺精神來往凡友之道淑慎其身人將擇我匪我擇人矧是古人精金碎玉我立其側何佩何服使我見孔諸子比肩我不為騫何以友淵使我見舜九官接武我不為稷其敢友禹既曰尚友何古非今長恐伊人於我遐心朝夕兢兢惟徳弗類其人可作亦莫予棄人無志願乃流乃汙視此齋名偉哉卓乎相以銘詩有賓有主以此友古古人所許素堂銘與胡素行履九居初素履而徃獨行所願茲爻之象今子何為以素名堂我出我處我安我常禄以天下千駟其馬而君此心居然莘野夏時殷輅周冕虞韶吾知此樂猶昔簞瓢隱居求志行義達道利欲毫分不入吾抱學之不講世無天民戚戚寒饑哀哉窶人外固君民内亦妻子公私消長輕重彼此伊顔寥邈今我何師元祐相君温國是儀西洛退居形枯心苦餘年丘壑一日霖雨公心少慰已瘠民肥亦又何求布衾深衣是謂素履一念終始係之初爻易有微㫖爰初趨向白首以之使非剛者亦復轉移任重道逺將以誰責掲名斯堂式對朝夕謙山銘與胡自牧山在地中為山自如失其為山則與地俱髙不可孤卑不可汙退然臞儒卓然元夫慥齋銘李君士豪名齋曰慥以質於里人歐陽某思有以復君乆而未之得一日得其說曰此曾子之學也君繇子思子之說而質之子曾子之為人當信予說之不妄為作慥齋銘言不顧行將言如愧有不能行談何容易行必顧言言斯行之視言為的惟正之期顧言之行其言多懼顧行之言勇往疾赴中庸二語萬古聖傳我求其人曾子則然嗟爾君子胡不慥慥士豪立齋銘者守道黙庵銘躁人辭多吉人辭寡謂寡則可無終黙者天賦予形惟口司言聖人無言言則道存好言莠言惟謹其出不於五事偏廢其一何哉劉子齋以黙名我知其意過於矯輕回也如愚雍也不佞内足志恬養深氣定彼豈不言蓋由於天他人視之如不言然工夫至此回雍伯仲又如閔騫言必有中警軒銘易首於乾夕惕以厲繻有衣袽其卦既濟何日非警在始斯終何事非警微與著同辟之登車爾僕屡戒先民有言敬謹不敗亹亹紹甫寅畏厥心眡夷猶險履薄臨深紹甫警哉見石以虎抽矢向之一發飲羽尋樂精舎銘孔顔所樂使我焉尋尋之不見實勞我心實勞我心尋樂得苦殘編寂寥一慨千古請君無尋即已所安何故不樂地濶天寛是獨醒時亦孤往處後絶來蹤前無故步虛舟銘有舟在河一實一虛虛舟之行惟水所如值彼實者中流相觸彼舟之人駭懼淪覆此中空洞有觸無傷爾幸遇我免于䘮亡然爾當知實逆虛順順以天逝逆以人進偶然之觸聊發悟機胡不舍逆與順同歸敏齋銘學務時敏厥修乃來謙言不敏參與雍回我當退懦日以衰頺中夜思之謂之何哉巽齋文集巻二十六
