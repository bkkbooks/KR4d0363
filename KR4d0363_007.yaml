body:
  text: 巽齋文集卷七宋歐陽守道撰序送倪祕監序咸淳戊辰春天子趣親祕書監倪公于吉州歸侍講席送客皆有詩某獨無至江亭舉酒為公祝曰自昔經筵多名儒最盛於元祐然往往未嘗試民事公為天子牧小民有年矣前日外郡四方水旱盜賊願以上聞而不可者今談經之次可言也李文靖有人主少年之憂今天子飬德東宮已周知天下事然明主有絶人之資則憂深思逺之士反危之蓋人惟有所不知一知則惕然以警乃若無所不知則有時無所不玩古謂明主可為忠言亦難乎其言也今之大患在民力竭夫民力竭而上不知恤其咎在上今則不然上非不恤也而不得恤則其咎何在下之情不上逹上之澤不下流此如人之身腰腹之間有大積滯壅底焉縱能飲能食而不能化為血氣以周流乎四肢百骸也所飲食者適足以增益夫積滯壅底而已矣身有此病則飲食為積滯壅底之資國有此病賦斂為積滯壅底之資憶病未瘳也善藥善醫比未猝得亦須知其為病而有憂焉奈之何無憂之者其家人親戚相與熟視方且以其積滯壅底見於外而􅑎然大者以為膚革充盈也而不知此所謂蠱也告其人曰君方患蠱則其人必諱其人無諱猶可為諱與否在其人愛之者必告之天子與小民接今不得如國初時矣每大駕出則都人士女盛服靚粧焚香拜於道周氣象熙然太平矣呂文穆公有言出都城外不十里殍死者盈道不可以乘輿所在萬衆走集便謂之富庶也田里艱難為部使者郡太守則知之以嘗為部使者郡太守而勸講則雖無逸之書七月之詩猶未為深切也公必有以為上深言之矣請以是為送公行送劉雲昭序劉雲昭浙會稽山隂人也二十年前雲昭之父賓王為江西縣官官滿館於廬陵大家殁不能歸葬故雲昭久客於兹土今年科舉隆興會府試逰學士往赴得之賓王文詞有楚詞漢賦韻度清麗可愛既無祿雲昭孑然漂泊其不舍去詩書轉徙就他業固已難矣科舉中選於數百人中又甚難也賓王殁時寧望其子有今日哉雲昭之文可以取一第而無以行若使身為吾里土著之人猶有貢莊續食之計而鄉貢逺在會稽吾里人罕與接者若昔乃父所館之家縱助薄少亦安能盡給千八百里往返費哉雲昭來訪色若有望於豫之一言者萬物皆有託孤雲獨無依雲昭之名與字使逢靖節翁徒能悲慨而已豫又安能為雲昭重雖然世固有輕萬鎰之金而好一士者顧其人足以當所施與否國家立賢無方浙東之人舉於江西如雲昭者無幾身之空乏所為之拂亂亦甚矣天意其將就之乎一舉發軔前有修程雲昭勉之當其人貧賤而施恩於無用之地則必負知人之鑒者也徒手姑出門宜有慨然者書以遺雲昭東南行有峻峭倚天曰文山山中主人一字特出向人曰必得千金則一展看又勝於衰翁此紙百倍也咸淳丁卯十月十七日庚午巽齋歐陽某序送梁主簿序梁君一清初調官得臨武縣主簿將上來别而曰介也昔在父兄之側得見里之老師名儒從吾父兄延致者若干人次第皆成名去而介乃學試吏當其留吾家時固未嘗講及吏事今欲問之無所於問矣獨先生家食介也嘗望顏色而恨昔者不在執經之列也敢問為吏當何如豫告之曰未有學飬子而後嫁者也世之吏師號廉平循良有政事者其初皆由小官發迹當其為小官時豈人人有所受教也若保赤子心誠求之雖不中不逺矣此十四字者初學為吏之本主簿本職雖專在簿籍升降户口勾稽稅賦然縣官無多員既佐官長則縣事凡皆與聞矣事民事也每事心誠求之而已吾子其母曰未曉吾子居鄉里鄉里之細民休戚何嘗不接於耳目乃若産稅推割之不時輸納銷注之不謹重催白取縣吏鄉胥出沒賣弄於下而有官君子漫不之省書字紙尾承符者持去所至雞犬一空拘纍其人旬月不得脫號訴若罔聞知今歲甫了來歲如故甚者不家破身逃不已吾子所親見若聞者何限此弊雖不皆主簿主簿獨得不任其咎哉此特言本職事又如邑以多事分委其佐佐既受委訟牒至前裁決得專者十四五民不幸有訟望有官君子持曲直之平而曲者卒得逞直者卒負屈甚者民命生死懸於小官之刀筆一誤終成大寃吾子所親見若聞者又何限吾子雖今日甫為吏竊想平居於此惻然哀矜怫然疾惡之矣人之受害與已之受害一也異邦人之受害與已之鄉里親戚骨肉之受害一也平居之所哀矜之所疾惡今日惟恐人於我受此害惟恐我貽此害於人而每事盡心焉如此而不得自附於廉平循良有政事之吏吾不信也如此而不得見知於廉平循良之吏吾亦不信也臨堂桂陽之屬邑由漢至今多賢守長遺事有傳可為師法民淳朴有古風而聞其多貧薄少大家吾子雖一邑佐其亦深念之夫初試吏而有賢名他日何患仕之不進今如為髙者之操基址堅密數仭可也詩曰自求多福咸淳二年秋八月二十七日廬陵歐陽某序送王保義序昔漢王仲卿得罪死妻子徙合浦其後當國者白其寃徙居許歸太山居故太山太守為盡贖還田宅其未歸時已為富人蓋合浦産珠手取得數百萬産也今保義郎王君豈其苖裔歟何其坐父謫徙十有餘年雖寃白而一貧乃不自振也據其自云父諱顯文登寶慶丙戌第仕至監左藏庫後坐偽銀事羈平江妻子得從行田宅皆沒官此年昭雪而左藏亡矣君故以祖澤得武爵今雖敘復而不參注奉其母之四方幸父故人哀已者偶在當路則就攝官以茍微廩而又苦數竒往往席未暖去近之廬山持古心江先生書過豫豫讀之惘然思所以為地而不得也君亦知豫思為地而不得非夫可以為地而故不恤者留數日别去因問其所居鄉里則故括蒼人而父始家天台城中得罪時身年幼今不復憶天台矣因告之曰君盍迤邐歸乎易曰傷於外者必反於家詩之黃鳥曰此邦之人不我肯穀言旋言歸復我邦族君之宗族雖非其舊而天台今有名世大賢豫嘗事之江湖間豫觀其所至恤貧拯困為民父母君若歸而以此情告安知此先生不愍然為君地乎君先人所坐事豫不能知其詳徒據君所云如此豫猶未敢輕信故亦不欲以此先生氏號告君也君果家天台則歸當自知之而此先生必熟知君家禍之首末出豫此序以呈萬一有遇也豫不敢預必所知者此先生不忍人之心蓋所在見之矣寶祐四年五月十五日廬陵歐陽某序劉大臨序永豐劉氏子棨入郡城從豫學遂寓於豫屋之左為鄰三年其字大臨豫以為取義無所欲與更之而未暇為説也今以其邑推排田産賦稅而歸别且請曰先生何以教棨棨畢事而再來須數十日今願有聞以為此數十日之所請事豫告之曰大臨爾數十日即田産賦稅之推排而學焉何用置此而他問乎且吾子家有常産而歲收與輸官一惟幹僕之委負篋吾門曰讀書而已焉有讀書而盡付家事於不理也年今長矣學理家事則他日舉進士可以居官安知吾子不有四方之役乎如或知爾則何以哉田産賦稅民事之大者也今之奉州家檄推排於吾子之鄉都者亦吾子之師矣何事非學師安能一一指教儻有志焉則畎畝間若等第若丈尺者吾心目當用之處吾見今之稅家子弟但知食粟當其逸居固不足以負荷先業偶然出任人事茫無所措此等可憫笑者何限吾子勿謂今日辭我而歸收束詩書便無日益合念若曉推排正一大益也吾子纍世田産想賦稅皆古額無甚欺隱漏落之弊如其有之從今日得一番公私分曉乃是為良民者之幸官若有命宜敬聼焉勿以為厲已也然吾子未嘗經厯人事此歸得了自家可矣毋與他人若與他人則已所不能必納敗闕謹之謹之歐陽某書送黃信叔序新昌黃信叔與豫處數月豫日與之言豫能言信叔能聼信叔能問豫能答殊相發也將歸又請曰願有聞豫乃恍然不知所以告信叔戒僕束擔矣以豫之不知所以告也復留兩日以待豫卒無以告也則謂之曰子知豫之無以告者乎豫前者有知今者迷乎豫前者能言今者瘖乎夫豫駭於子之問故重其告重其告故卒無以告雖然子以豫之無以告者熟思之當賢於有以告也前日從容之言皆即事即物也故言終日而不窮今日不就無事物之可因而欲特言所未嘗言以庶幾慰子有所得而後歸之望嗚呼其何言哉孟子曰於此有人焉入則孝出則弟守先王之道以待後之學者曰伊尹居畎畝之中樂堯舜之道曰堯舜之道孝弟而已矣聖賢所謂道如此通天下愚夫愚婦與知與能未聞他有所謂道一二人可以特相授受而擅之以名家也前日鄰邑有某氏子者過豫坐甫定則談理學出入乎儒先語録者蓋數十氏豫不應徐語之曰子若生濂溪周子之前則如之何夫生夫濂溪周子之前者世無語録也而如周子者得於何所口傳耳授哉二程知之故皆終身不多道周子之語而學其所學卒以大合周之得為周程之得為程者如彼也今吾子生語録之世一出言則本語録豈徒不得為先儒將不得為吾子矣何也并吾子之身心皆非吾子所自有也若然者吾將名之曰巫覡之學夫巫覡託神以與人言不知其為神為託歟抑託於神歟俟其神氣蘇醒而復問之則曰吾不知適何言矣故身心者我之身心實知實行實得實用不如此者託於人與為人所託者也自唐而上若晉若漢士之學雖各有弊然其為之也亦各盡其心思猶未至一切委其口耳於他人也今書肆之書易得有銅錢數百即可得語録若干家取視之編類整整欲言性性之言千萬欲言仁仁之言千萬而又風氣日薄機警巧慧之子所在不絶産被以學子之服而讀四書數葉之書則相逢語太極矣自先聖所刪定詩書已有置之不讀蓋無問其他而理學自命者簞食豆羮見於色可也乞墦餘而歸不羞其妻妾可也殺越人于貨可也嗚呼其不為俗化一大厄歟孔子曰古之學者為已今之學者為人又曰文莫吾猶人也躬行君子則吾未之有得豫之不敏不足進於學而不為已躬行亦竊恥之幽居少事時自循省平生罪悔往不可追獨幸而無目前之過則掩卷沉思間亦窺見天地聖賢之心於言語文字之表若收拾餘年稍不愧於三代南畝之民則幸甚矣學不敢言也信叔不遠四五百里從豫於桑麻間坐卧一室書卷左右與同舍言惟存寄食於吾厨羮藜飯糗或日昃不至相與安之破屋穿漏值半歲多雨几席沾潤無厭色此意豈有為哉親命之歸則惠豫詩依依而不忍遽别豫亦為之黯然嗟乎子歸矣有吾孔子之書在以豫觀子既有意為已躬行者即此而加之意焉將惟日不足而又何異聞知之於其行也姑書所與語者以贈而其中偶及於俗化之云云者吁言人之過矣然吾黨不可以胥溺故私告及焉而幸勿以示他人也贈鄧山人序古人制祭祀之禮其初必有深知鬼神之情狀者不然則其所薦於其所嗜其所向於其所在曰事死如事生事亡如事存而間有出於事生事存之外不可盡以事生嗜好居處推者夫豈意有所則哉廟之用釁與求神於祊之類是已鄧慧觀至人家輒能見人之先靈豫欲驗其信否一日試與俱往七八家無不見者其言丈夫之位行婦人之姓氏與其容貌衣冠言笑教戒子孫聼之未有不泫然者也至於教戒之辭則率為勸善禁惡之辭人有隱微之惡亦能指實明告責以不可滋長以取譴造物妨絶宗祀則未有不聳然者豫問慧觀何以然所傳何術曰安得有術他人不見而我獨見正自不知其故耳人屈之往亦殊不樂與之錢亦間能辭不取自謂居家耕田為業不以此為利也又問可授之子孫乎則茫然曰豫何説以傳之嗚呼豫觀慧觀朴甚言語拙訥字文亦未盡通參之漢書所謂民之齊肅聰明精采不二神或降之聖人制祭祀則使為壇位者皆所不類而能如此豈朴於外乃所以為明於中乎呂雉田蚡將終皆有視鬼者見趙王如意竇嬰灌夫執之不置與左傳載申生事同彼則屈也非慧觀比石勒時有僧圖澄掌中見鬼神慧觀或似之其命名曰慧觀豈佛者之徒與是皆非豫所知惟其語可聽使人凛然思鬼神之德洋洋乎如在其上如在其左右也則一念之動戒謹恐懼而不敢肆可謂有助於人而無惡於世矣其歸也為序以贈之贈福上人序福上人以竹房吟卷示豫而問曰豫從士大夫遊多言僧詩宜脫去蔬筍氣君以為何如豫曰此評出於吾家六一翁雖然前為惠勤一人言也勤捨孤山西湖遠遊京師久之其風味固應有此亦不謂僧皆當如此也詩各從本色自佳今使山林髙人強説富貴豈惟不能亦不願若紈綺子弟作窮淡語縱使道得亦料想也蔬筍僧詩正味何必他脫去耶且非特僧詩吾輩正患不蔬筍如蔬筍其何潔如之屈騷蘭陶詩菊讀之直作蘭菊氣亦各從其嗜好發出也絶頂新秋之章僧家絶唱福上人既摘竹房二字自號矣豫讀卷中山宿溪宿之作便恍然如身厯其間而上人能道者豫不能道也使上人遂得翠微深穩處宴坐一室而塵緣酬應之作盡罷則髙標幽韻豈特傑出四五百年吟僧向上佛祖當别有點頭處也寶祐五年二月六日廬陵歐陽某書劉山立論藁序月澗劉山立少即負文名三舉而後第時年三十有七赴官未幾死可謂淹場屋矣如其年仕日固長也事業竟不及見獨平生遺藁在此其論也君精敏絶人而自視欿然與古潭湖伯兩友一日共説大學首章覺小滯兩人同難曰年今幾矣學不進奈何别半月餘復聚坐甫定即舉前語色皆若有大失亡者白鷺洲初築精舍古心江先生謂已第而未仕者盍俱來君虛心斂容遠袖書至又如弱冠少年作拜講下惟恐不得有聞也豫時亦與列每竹間月明對語過中夜無寐時精舍器具皆未備日或索杯水不能得相與安之君至期至意緒殊忽忽謂豫曰科舉纍我久人生得婆娑林谷貯滿腹書足矣何用他求嗚呼君所志如此撫此藁如之何不深為之悲歎君長豫七歲君名起時豫每讀君文不知君何友他日君辱友豫見其身自損抑乃知君之可敬不獨其文也君之子翔龍若族諸弟皆從豫遊而翔龍前年薦於漕闈其為人庶乎肖君者其於遺藁知所收拾此編外他日十餘倍也夫此固為人子者之事然豫每見此而多所感也嗚呼山立幸哉山立諱南甫家吉水永昌鄉是鄉多其徒云贈了敬序往年豫長嶽麓山中碑十餘尋其差古者其一李北海開元中為僧寺撰其一記國初初建書院忘撰者名碑言書院乃寺地有二僧一名智璿一名某念唐末五季湖南編户風化凌夷習俗暴惡思見儒者之道乃割地建屋以居士類凡所營度多出其手時經籍缺少又遣其徒市之京師而負以歸士得屋以居得書以讀其後版圖入職方而書院因襲增拓至今豫讀此甚善二僧之用心與豫同讀者乃笑之若謂此碑為不足存嗟乎自白鹿洞諸書院經近世諸大賢主張扶植必推本其初為何人之居出何時之意後雖有述而始作之善不可沒也智璿若某二僧者生於彼時同時有位與力過二僧者何限彼不為此舉而此為之豈不大可嘉哉獨以其僧也而今置之不道其亦不得為公也已吾州萬安縣有僧寺在韶山曰了敬者前太守於潛徐公靜觀先生書雲壑二大字遺之其徒目為雲壑上人邑之聞士賴子平劉元芳與上人為方外友而上人為之築讀書堂於寺之隙地求豫書堂扁不逺二三百里而來留十餘日而不厭此豈尋常僧家干求所可比惜豫不能作大字書嶽麓故事遺之上人有詩質豫其言心性多先儒語録中語然則築堂之意固有在矣贈郭元吉序鄭季咸善相人而旬日之間見季咸者皆走何必季咸曰某人死某人死而見郭元吉者亦走矣郭精易不幸屢中然走者亦可笑古人云吾已知富不如貧貴不如賤但未知死何如生耳范文子祈死哭嗣祖者以其死為福吳中髙士至求死不得死政自難彼走者獨安所避死小人幽慘不自知我歌相鼠不遄何待君子聞道於天順俟不二其自知久矣奈何以此懼之管輅嘗恨不壽景純臨卦得終卜人者不自卜豫將夢豫且焉元吉聞吾言變色起豫拊掌曰季咸走矣送陳駐泊序今之醫不知古有難經素問者十之八九陰陽五行之理蓋懵然矣藥方不過數十藥品亦不過數十視其篋之所有顛倒用之幸而求醫者命不死為醫者命當通則如是亦足以愈病人隨聲稱道之其受誤夭折者無數曰醫何罪彼命盡也醫既自恕人亦無責豫嘗見一人求醫醫至不肯用或問其故對曰彼未必善醫而我善相我見其面有殺氣不敢於彼手納命也噫醫不知脈不知方而求愈人病於幸中此手不持創之屠伯爾竊意世之志於活人者倘肯為醫必多讀古書而多讀者必山林之士豫不敢以此望於廛市間也安福陳濟庵之為醫近諸公間多稱之者前年親見其療廬陵宰蓋其病數種若不可為君曰不可惑也吾療其一而已矣其一愈數者牽連皆愈豫亦以豫病問焉君曰證頗與宰同然子將對一證用一藥耶若爾吾不能吾又療其一而已矣少頃藥力至常脈復療者固療不療者亦療自有同時俱愈之理而子不知也豫心是之及效果然君之用藥不盡守古方或損或益惟意所去取而告人則曰古方無不佳者然人各一病所感不同病或久近傳變復異使古醫在此亦必隨時處之安得以療甲療乙哉是大有理比薦與一故人其人平安無恙隨宜酬待之未甚異之也會其族一婦人病死將斂矣遣往視之君曰一部脈猶活未死也與藥灌一服而蘇家人大喜將以厚禮謝之君曰未也可活數月然須市藥修合及時亟救之少緩則前病再作無如之何修合者不盡如君説活僅六十日豫故人告豫以為神咸淳五年十二月初七日廬陵面墻翁歐陽某書巽齋文集卷七
