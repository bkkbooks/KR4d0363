body:
  text: 巽齊文集卷四宋歐陽守道撰書與劉後村書守道拜别四年矣不拜一書而意念所向無一日不在書也世人以此為尊仰常語難取信然聞有指畫空書佛經者不用一紙一筆而平生所積殆數千卷精誠之至此地大雨為之不濕東坡先生以為真實非虛幻也某於先生猶寫經者之於佛先生寧不鑒此精誠耶方山長前一月告我歸期而此書直待臨行數刻間方能作作亦贅矣懷感之極者有言猶淺也山長來時䝉寄賜壬戌送行詩近又得聞竹溪先生夜坐見憶聨書殳二韻先生於後進拳拳之甚矣回憶前事狂妄觸罪無可悔者獨惜昭慶寺中拜飲餞觴而小侍史以片紙報長令似之所遭繼得槧墨示喻曲折乃知奉纍有由而先生自此亦連疏請老雖先帝君臣之契如此浩然歸志終不為留也先生得去二十年之心至此始遂其為慰快可想而知然遂使宗工大匠忽動念於幾微者誰為之與先生還第三年矣耆夀康寧如此當時無拜留孔戣之疏者諸公為先生謀特重為先帝謀反輕也近見髙文續集不自序引緝熙宸翰與寵行扇面御詩冠之使人感痛不已去年鼎湖今夏橋山之變遙知法從舊臣情深父子甚於枯葵泫霜之句嗣聖訪落惟耉成人是任而先生茹芝山中何以追前遇而報之今耶竹溪去後村幾遠觀夜坐句想二老時時㑹聚不特如趙康靖作意訪歐陽公恨晚生不得步趨其間也山長之歸使人有偕行從往之意顧平生局促纒繞安能如季膺付二陸舟哉某今年五十有八氣絶衰無復有門外分毫意緒一自去國不以字到班行諸公間古心在建寧猶通問自其帥福袁歸有漸更不以名字到前動其記憶頗聞先生閒中猶對人拈起不肖不少置或為書以告人此雖愛我而非所願望也蘇子美與王吉州論郡政書守道仰惟閣下盛德禮恭如謙九二以貴下賤如屯初九往者親屈千乘俯臨陋巷閣下之意必謂某受㕓城郭或知民病而曉事情可以時備咨訪禆仁政之萬一非徒以其記誦文墨而姑與之也他日一再進見閣下必命以少俟衆客之退而特延之便坐蓋虛已盡下未有如閣下之用心而誤䝉禮遇未有如某之幸者顧以識見短淺未有所試民病雖接於目而事情實暗於心故久而未有所言今者民食最急救之之䇿一日少誤則有一日之患請為閣下條說而閣下擇焉伏聞郡家以米直踴貴為之措置而禁約增價誰為此䇿以誤閣下乎是促之使愈貴也夫今所患者米來無路增價非所患也上流至城近者不過八十里逺者百數十里爾豈應視若外路他州然乎今聞彼用遏糴之䇿而施於城郭之民全仰彼米彼米不至民何以為命且以吾之管內而八十里百數十里之上米不與流通則吾自食於帶郭之地者幾何竊聞諸縣約束其境內甚嚴未罪米主先罪般稍人稍畏罪無敢攬載某詢諸水濱以為米船曠日不至其僅有至者非諸縣之米乃帶郭境內人家之所發糶而其數目希少牙人與鋪户前途守等爭先糴之如攘奪然相與分三五石至十石止瞬息而盡未有一鋪得糴二三十石也如此而求價之不增其可得乎且吾州郭之地豈惟民數稠密而已倉廩在此受諸輸納者未畢也上流米下流通頗聞苗船陳乞通往計㑹用使亦自有費故中下稅户有合納州倉者米亦不來但止附錢與在城攬人使就此自糴而輸之如此㑹計則是吾帶郭境內之米非惟為供當所之民食且不足而又以供外縣苗斛之入倉者也此害不除何以善後今入春幾日景象如此自此至於夏秋之交米豈惟貴將至於無彼諸縣者能終不我恤乎今欲得出給榜牒勸諭諸縣使放米通行仍責令牙人前往諸縣招誘糴者如有米船經過口岸輒遇邀阻仰米主及牙人赴州陳訴則旬日之內米價不禁而自減矣此一說也市井常言凡物之價聞賤即貴聞貴即賤人聞廬陵米貴之聲如此彼有米者豈不願乘此而爭趨之若船隻流通趨者凑集則即賤矣蓋不禁米價乃前世良守救荒之所已行也兼糶者但當誘之使來不可恐之使匿彼若米載而來生事之徒與之喧閧以增價犯禁告則所增之錢不足以了訟費人思及此豈復肯來鋪户所以販糴者本為利也彼本浮民初非家自有米米所從來蓋富家實主其價而鋪户聽命焉今為之禁曰爾鋪户之價每升不許過若干若干者因鋪户而糾牙人之罪彼若懇請富家原以若干之價得之安能使之不營一錢之息而還以糶於人乎若使價長不已彼安肯折元本出糶以從官司之所禁乎事至於此豈惟富家畏事不肯出米而鋪户亦且縮手至於停閉非活法也故曰不患價貴而患米之不來其次則有勸分一說今郡之所見行纍年勸分其弊百出不可不察也勸分者待官司行下開場日分者也往時倉使徐侯守郡冬月米貴即嘗稟知徐使君請榜諭富家一面從便及時自糶止要民間有處可糴不必聽候勸分是時富家聽信米却自出其後郡遇凶年無不勸分而行之未有善者何以言之蓋城郭富家之有米多寡不一未必人人有餘也豈惟城郭鄉都亦然甚有餘者所未論請論名為富家者而其米未甚多者一自勸分久為定例於是此等所謂富家者不復前期私糶但謹閉蓄之以待公家一旦之命蓋不俟命而先自私糶不足以塞官司後日之責私糶而米竭後日無以應命罪且隨之彼止有此數也則其勢安得不閉蓄以待尋常此等富家與鋪户俱糶小民日糴斗升於富家既足以殺鋪户獨糶長價之勢而鋪户近有此等富家可恃若船米偶不至則轉糴於此等亦足以暫時應副鋪面至闕販勸分定例之後富家既蓄為應命之需於是官場未開之先鋪户與小民往叩其門而不應矣小民惟有取諸鋪户鋪户惟有取諸船米則其踴貴亦安得不謂之促其至此哉故嘗為之說曰二月已後富家之出糶此官司曉然勸之使分也正月以前富家之不私糶亦官司隱然激之使閉也每旬小民沾三日賤糴之利此官司一旦利之致其食賤也每旬小民有七日貴糴之苦亦官司積漸成之致其食貴也天下利害常相反而相生此豈徒滯一說之所能通乎去冬某本欲趂早言此第念小民但知勸分之為恤已安知此說正以陰消米價於冥冥之中傳聞易訛恐彼謂此但與富家為道地故不復言今者伏聞郡家舉行勸分見其端緒開場不逺則只望於所勸之中盡尋其弊而去之當去之弊不能知其方來惟言往歲之弊則可以推知矣户産有多少事力有升降所謂各廂之勸分糾首者必其事力户産之超出乎衆者也吏常與糾首為密而多拋子數與其下被糾之家使被糾之家無詞則均認定數者衆而糾首之責輕矣然而被糾之家爭多競少未有盡無詞者有詞以求裁減則往往妄疑以為必囑吏而後行於是裁減有囑吏之費當糶前一日呈樣定價一聽官判價隨樣而低昻亦未必皆由吏也然去年有以甚白占米官定為一升八錢者矣小民樂得白占甚於得白稻有何不可而如此裁之此雖上熟之年未有此賤當此饑歉但得富家出糶價平小民有處可糴則足矣何必限以一色晚稻而輕視白占如此乎人心懷疑以為此亦失於計囑之所致於是定價有囑吏之費及其糶也有所謂發下槩量之人有所謂㸃撞糶場之吏發下概量之人終日供待醉飽而優勞之猶不滿欲也而所謂撞場者意氣軒軒與富家抗禮稍可欺者復陵鑠之賄謝之間少拂其意則誘數輩細民使以升合慳折為言而罪罰立至矣升合慳折誠宜罪罰然為吏長意氣而使糶家凜凜亦豈所謂安富恤貧之得其平者乎復有家居城內使移米而補城外之零糶家居東隅使移米而補西隅之零糶米非輕齎物也用夫搬運費又若干就中豈可無區畫移那使各從其近者大率富家一番糶畢日夕張羅方敢自幸以為免灾使至於此安得謂勸竊嘗深念天下之事平心處之官司枵虛既不自力以養貧民則當使富家有樂奉公上之心不可使貧民有疾視富家之跡閣下所謂人各有心心各有理彼豈盡為富不仁哉勸奬之為好事而常使貧富相安則貧者有依富者無怨城郭之民尤當以富民為根本以大喻小則如前代都邑之處至徙四方富民以實之富多則常平米石之至此者亦多而凶年非所患矣不幸别有意外之患亦有所倚此乃保有城社之上計也十數年城郭富家往往徙去迫之至此蓋非一端而勸分不善亦與其一數年之後若使相次盡逃則細民復何所恃萬有一不幸患在意外官司安能與一城貧弱相保乎此亦長民者所不得不思非特為目前言也二曰賊盜樂嵗猶不能保盜賊之盡無何況饑歉今之所言不特為穿窬竊盜慮也蓋其大者有三死者有劫墳墓之害生者有販生口之害而去年以來則城郭鄉村羣起剽掠米糧財物佚罰漏網猶當為後之效尤者慮也所謂劫墳墓者比年屢見昔者城內某氏城外某氏諸家皆受其害發磚斧棺至於慘酷聞之於官官以常事視之被害之家亦無由竟其事最是五六年前有某縣某氏者所遭尤甚斷死者之身首狼藉遍地本州已結解上憲司而憲司悠悠被害者反受久困賊卒引赦輕斷愚民習見其然椎埋之風今之所有昔之所無一嵗間聞有三焉聞猶不審請言所親見近郭之民有晝葬而夜被發者三日之後其家往省則見所含米餌遺在草中懷疑而歸遂執前之輿負者同往啓視之則死者覆卧身不挂一絲矣長此不已此去人家葬埋誰能自保乎在律發冢見尸者其罪絞所以重罪之如此者蓋死者受害與生者受害不同生者受害能抗敵能告訴死者獨如之何哉自非官有嚴法則丘隴縱復深藏亦何足恃積年以來官司見民間墳墓之訟多或言犯地或言盜木訟者容有甚言其事而不盡實者官司雖遇實事至於椎埋亦輕視之往往意其誣罔使孝子慈孫吞聲飲恨凶殘盜賦得意肆行國家漏泉之澤使壅底至也所謂販生口者蹤跡祕密之甚日行田野間而其事未嘗一到官司無與禁也此等盜賊其鄉鄰視之蓋良民然朝夕在家縱出亦不肯過信宿是以人被其害而莫之疑當其誘掠人家婦女小兒之時半日踰時之間而事已畢矣人見其常在家而不知其轉致甚逺蓋此曹黨侣分布交結於三四十里之間各有定所有同郵置甲轉致與乙則乙轉致與丙藏其所掠於乙不過一宿而丙得之由丙以往莫知何所以人命為豚彘牛羊更遞得錢少者蓋才貫百而使人父子夫婦不相保故此中田野細民常有去失而鄰郡向上深僻去處傭奴妾婢常多吉州人不由父母與夫雇賣而得之老死而不可返此猶其幸而生存者耳最是事絶蹤跡無主名可訴兼被害者必是至貧之細民朝夕不給其婦子可以一飽誘者以至貧之細民而遭此無主名可訴之事只有付之無可奈何甚可痛也然此曹作過既久鄉人未有不知其影響但當是之時不可遽指端的故衆亦與之放過及其講傳明白則日月久逺雖知之而亦遽已矣其人或不耕無業或亦略耕有業但算其嵗入無幾而容易有錢可使使酒尚氣稱雄其里如此等類隅保鄰曲豈不知其所為只為此蹤跡難以遽知而或者涉虛則有誤執平人之罪實而佚罰後且報怨人心懼此所以各付之不問爾艱食之年此事多有牧羊去狼畜雞去狸非等閒不切事也所謂去年城內外逺近群起剽掠米糧錢物者某所居陋巷閣下千乘之所嘗往顧也前去二三十家有稍富者居焉夏六月中旬一日剽其家者數百人填塞街巷奪其廩粟并及他物而去是時某在長沙家人皇駭走書趣歸以此變昔未嘗有而後患未知所終也未幾續得螺山外墓山之報則守墓者之家亦被劫掠盡其家自此小米麥紵絲麻鍋釜牛犬之類掃地一空男子奔走逃避老弱被其捽縛使供吐所藏蓋皆鄉曲相望之人多素與親熟者城北出門三里某所親居之地群盜初過其家幸而獲免盜過門移時而返以他處所得憩於其家之牆外而分之人聲嘈嘈而不知幾十百輩後來所聞亦其近處人也此時盜同日起蓋十有餘所人疑其若有定數焉城郭且然逺僻可想他日官司捕治小弱之民訴於縣而不行者卒無如之何事在赦前無復問第今日復與去年等盜既習知漏網佚罰如此豈有悛心禁於將然在今日有不容緩者蓋此等所謂盜初非有平時纍犯之案往往有行止在藝業之平民也火烈人望而畏之故少死焉水懦人狎而玩之故多死焉以平民而一旦為此蓋由官政可狎玩之所致大抵比年州縣之間民間訴理罕有簡易直截而速與了結者謂之嚴固不能謂之寬又不可被害之家或反以訟久坐困故善良怯懦之人心知其難有忍而不訴今使忍而不訴可也官司獨不為養成大盜憂乎以上三盜區處異宜某不敢悉條其說閣下知之伏願一日之間常以心思耳目周遍四境數過仍各以訪聞預行約束諸被害不能陳訴者官司訪知亦自作施行如黃霸之治潁川密察所及至於郵亭細事皆接於視聽則姦無所容矣近臣官政患採訪路狹而下情不通官司既不輕信人言而所與接者官員士大夫亦不欲冒出位之戒故上之人無復有出人意表之施行以聳動愚無知者之耳目大姦窟穴近在目睫而上不知也伏惟閣下照燭幽隱度越尋常使蔀屋之民常若日對黃堂之清問則境內幸甚三曰疫癘昨者郡家以冬月疫氣流行為之舉行祈禳之典民間感激謂使君身處清燕而念及病者之呻吟真仁侯也近正月望復見建醮之祝詞皆拳拳為民請命之實意其人為某誦之愚心聳然閣下憂民至矣然以為愚所見祈禳之外恐須有以大正信妖之俗蓋疫氣南方為甚多燠少寒病固宜當疫之嵗雖北方亦有之今江鄉專神其說而民間獨以此病為深諱也舊見歐陽文忠公集為梅聖俞作墓志既口道其賢復明書其以疫死且言聖俞病時公卿大夫造其廬而問者塞路然則中原之俗豈嘗以疫與不疫與善惡相干涉而病疫之家朝廷貴臣俱往造焉安有所謂避忌蓋不正之氣遭者即病固無擇於其人此邦之俗有舉家病此而一人在外避而不歸則免歸而傳染則病夫避而不歸以求免其用心則不善矣何為而迄免不顧傳染而歸救其親其用心則已善矣何為而迄病即此自可思也氣接則病氣不接則不病也疫癘猶水旱然等謂之天灾水旱所被不能擇夫孰當水孰當旱孰當不水不旱者也氣之所為非一家一人獨能禱而去之蓋所關者大而致之之原則亦惡戾聚合所成閣下有千里民社諸祈禳比之祈晴祈雨正等爾此所謂有恤民之心者也民間家惑巫鬼則不可有也使巫鬼無害於人則信者不過為愚何足深較是非惟其滋長病勢而害人特甚故前代仁賢之吏未敢不教民以勿惑而且力遏痛懲之者此邦巫鬼之俗才遇有病凡盥潄衣冠洗滌穢惡皆切禁之晝不許啓門夜不許燃燈務使為幽囚以聽命原其本意蓋欲穢惡薰蒸䤃汙晦昧以甚之耳復朝夕與之祝白以竒名怪號怖其聽使自一證一候以往無不各有司之者彼氣方微體方怯而重怖之如此且禁絶親戚之往來親問者雖醫藥亦不得自由務使卜禱於神合用何醫卜而不許者不得用切脈觀色寒熱有憑者不信而信於偶然俯仰之杯珓或一切屏藥使叩神求水而服之如此則病者安得不日深日重以故民家一遇此病死者相繼而所謂禱謝之費至不可勝計幸而不死亦索然為窮人矣區區所以盡言其狀誠願閣下深知民害之至此極如西門豹聞巫禍於邑父老也閣下開藩在去秋當秋則狸俗妖習略息不審亦有以神廟罪人告者乎十四五年以來神枷神杖處處盛行巫者執權過於官府一廟之間負枷而至動以數千計重者裝為大辟籠首帶鈴其家自以子弟親戚擁曳之至廟以聽釋放或受所謂神杖而還此為何等風俗耶子弟親戚者固當擁曳其父兄骨肉為此耶民病固可憐民俗尤可痛開曉愚迷使一日曠然固郡侯教化事也若夫闤闠稠密之處或可使之減病則有一說蓋今溝渠不通致病之一源也自乙未丙申間三山林侯守郡最留意於此疏通浚導之後民無疫者數年其後豫章李侯於潛徐侯守郡某每嵗輒以告二侯行不如林侯之遍而病者亦少自徐侯以後郡政不復及此而為患亦可睹已溝渠不通處處穢惡家家濕潤人之血氣觸此則壅氣不行病於是乎生今通逵廣路猶無潔淨之所而偏街曲巷使人掩鼻疾趨如此則安得不病此州之地本自卑濕惟以此故雖爽塏亦為汙下即此乃病氣也豈復有使之者今若及此方春命廂所告示居民屏治蕩滌有磚石遮蔽者亦令暫施工魚鱗相次同力為之各自負挈置之城外空曠之所使積水流通則鬱積盤結之惡氣亦散矣但此雖非難事亦慮具文自李徐二使君之所行已不實應廂所奉行弛慢民間又多愚暗彼寧當病而信巫不肯先期而慮患此嚴以期督之以覆視核巽齊文集卷四
