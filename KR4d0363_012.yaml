body:
  text: 巽齊文集卷十二宋歐陽守道撰序四書集義序廬陵郡學後刋朱文公中庸大學論語孟子章句集注或問淳祐十一年通守古汴趙侯某博士海陵蔡君某又以郡學與白鷺洲書院養士之餘力刋四書集義者太守於潛徐侯某先守安吉與友人盧某之所集蓋文公四書定本之外凡平日交游書問之所往還門人請益之所聞與凡片言隻字不專為四書發而與四書旨意相流通散見於文集語録間者悉㑹萃於此初刋於安定書堂暨摹本至廬陵趙侯偕蔡君以為請遂命兩學之士復精校而刋焉四書訓說於是大備或曰文公先生之於章句集注或問也更定數次而後決然以詔後學蓋沈潛研索精約審訂用意至密而為傳世計至逺也學者學此足矣而又待集義以求備乎某曰不然聖人之道君子之學自有端的㑹歸惟見之之明則雖千萬言而未嘗不一如見之之疑則雖一二言未嘗不枝今先生之於四書也其沈潛研索而言者如此其從容酬應而言者亦如此其精約審訂而言者如此其敷暢宏肆而言者亦如此不於其言於其行則相去不知幾載所告不知幾人而無一不同深造而自得之居之安資之深取之左右逢其原於此可想見也章句集注或問之書固親定於先生之手然先生一言一話義理之歸於此者盡收拾而存之則豈不足以益見先生之心而為後學更互發明之一助哉始徐侯為州雅意於表章儒先風厲士習之事某間得侍見侯必亹亹以講學為言集義摹本之至自安吉也某最先得見竊歎侯於方今吏事日不暇給之時而所至輒留意此書如此獨恨安吉相去之逺欲亟與同志傳摹而未能也侯蒞事踰年而州學得蔡君為博士已而鷺洲書院又得趙侯為之提領惓惓斯文之意如出一人故是書得刋於此既成兩侯暨博士一辭命某為之序其辭不可謝避席言曰四書萬世之書也而方今世道一恃此以為命後學學此敢不敬哉昔者孔子曽子子思孟子著書以遺後人千五百年湮沒不章天以斯文畀於我有宋然後儒先輩出復為學者指示暨文公先生竭其心思役志於此一聖三賢之微旨發明盡矣運遭聖主書遂盛行孔孟以後未有幸於此時也是以講讀傳習上自天子之經筵而下遍於陋巷布之忩几縉紳場屋議論文章有一言不依乎此則五尺之童羞之文公先生可作豈不甚自慰哉今集義之書繼作讀之者又如終身侍先生之丈席而無一言之不得聞也抑又幸矣然愚竊謂世道依人心以立讀書為士不得不以世道為己任文公先生於此四書所為諄切反復以詔後學此心猶可識也講學窮理所以推見本心之體而究極之用此學而成當世宜有所嘉賴雖在窮約關係正不輕也而況於得有所施者歟天子方尊信四書士之得行所學亦未有易於此時也學文公先生之學心文公先生之心宜必有有志之士慨然深憂方今之世道者上念正君定國之道所以益聖德而端化原者何在下念斯民廉善之方所以遏人欲而存天理者何繇而必一本之於已患吾學之未成不患吾用之不及己為大人不患不能格君心之非己為先覺不患後覺之不可使覺根本先立望實斯孚積誠盡忠以俟感動一如文公先生之所以事君與教人者於以生全人類長育人材則前所謂四書當世之係命豈不深有望於斯人哉不然朝吟而暮誦之以資言語文章投好尚干祿利而已則舉世皆四書而四書皆福澤曽不少見於天下豈惟非今日所以纂集之意亦徒使或者重悲文公先生平生之志也某不敏不足與於斯文獨幸生聖主尊尚正學之時接儒先開悟羣疑之後而格言明訓又幸遇賢守二師儒盡取而共傳之且使抒寫愚見而附於右方敢不敬薦所聞推前之所望於大人先覺者諸公毋遜其責使四書綱維世道之明教幸親見之尤區區之願也彭石庭韓文覽序父沒而不能讀父之書手澤存焉爾石庭彭君乃取其先君子大庾君所著韓文㑹覽加損益焉可乎昔漢伏黯改定齊詩章句作解說九篇其子恭少傳其學後以黯章句繁多乃省減繁辭定為二十萬言恭於父書所損可知也班彪續司馬氏史記作後傳數十篇自謂事核文整其子固以彪所續未詳乃潛研精思欲就其業二十年而書成固於父書所益可知也夫黯之於詩彪之於史當其刻意著述之時豈謂子乃議其後哉然而恭也以為繁而省之固也以為略而增之非二子之敢議父書也所以成父之美也且使恭也不為黯省其繁而使後人病其繁固也不為彪增其略而使後人病其略則吾意人子之心有不若是恝矣大庾公用工韓文之久豫昔見楊文節公序篇亟稱之石庭人子也而損焉而益焉意者伏氏子恭班氏子固之心歟惜也文節公不可作文節公可作則其再讀是編也當如何而嘉嘆送張伯深序齊景公有馬千駟死之日民無德而稱焉徒富而無德雖以國君之尊人弗與也況他人乎當其存時奉養窮人欲威虐毒四境及其亡而無稱則有不若一介之士反得以著不泯於百世嗚呼愚讀大學至君子賢其賢而親其親小人樂其樂而利其利此以沒世不忘未嘗不慨然也人亦奈何不自力於善吾州之白沙有張姓應瑞名者嘉熙四年與豫俱貢京師而未嘗與之接也俯仰十有餘年豫以罪逆受凶禍而應瑞之弟應登亦衰絰造豫門曰吾父有善焉可以不朽願得世之大君子書而存之君為我圖也袖出一卷則子狀其父行蓋諱謨而字舜申其文可删者幾十七八讀且徹則謂舜申疾時一鄉人皆為之憂沒也皆為之悼疑其辭過夸然叙其所以亦有故也蓋舜申家裕而知恤鄉人之歉歲秋以三百萬易粟藏之次歲春夏出之而收原直一錢不增也曰富人無不蓄錢者使我害三百萬餘家明歲發而視之不過三百萬也我以錢易粟復以粟易錢亦得三百萬三百萬於我何損秋熟吾又為後圖則鄉人歲歲無飢也吾在此吾鄉人歲歲無飢吾又詔吾子孫以三百萬家不得有而吾鄉人子子孫孫無飢誰謂造化不及之不可補哉惜也吾之勢則隘也充而廣之在我後之人舜申之得愛於鄉以此往年有寇入境相戒無犯其門嗟乎吾視歲歉而官勸分不具文應者蓋寡也以彼視此舜申信善人矣死而有人稱固不必殊常甚偉之行也道人善豫有願焉道一張舜申之善兾為張舜申者十百也而州里為樂土矣大君子書而存之不惟其子願之豫亦願之然而宜誰告也應登曰嘉熙四年之士廬山江侯古心先生身勸為之駕豫兄偶與其列今以人子之情訴之於先生君謂先生能與我以文乎豫曰異哉子之請也豫昔者不敢以豫親之葬告先生而能為子謀乎且先生眼高千古誰可以辱先生之筆雖然先生愛廬陵之民深爾父之事或可以勸也自昌黎韓氏以來記人寸善亦多矣蓋不專為其人設而取其可以勸來者於是應登流涕再拜願得書一幅以往噫古心先生大人也書何容易抑子之求以為親也行乎已乎豫於子不敢知與乎否乎豫於先生不敢知也是為序陳舜功詩序沈休文長於音韻自謂靈均以來此祕未覩唐李德裕非之以為古辭如金石琴瑟尚於至音今文如絲竹鞞鼓迫於促節大概謂韻局則句纍不若不韻之為愈也夫自局於韻猶病纍句況一用他人之韻不局且纍乎唐人於詩和意不和韻亦曰和詩固不必韻也近世往往以和韻爭工甚則有追和古作全帙無遺如東坡之於靖節翁者語意天成一出自然不似用他人韻也由此言之才力有餘雖用他人韻亦復何局之有況自用韻而自病其局乎德裕之論正矣亦未可以概評也友人戴君吉甫示豫西昌陳君舜功雞肋别集舜功之作富矣大槩平易自無艱難辛苦之態詩之正也今所謂别集則往往與其交游親故賡酬所萃凡若干首蓋無非用他人韻者而意思整暇全無窘束於此而求工則可謂工矣詩之竒也詩固難於正而又甚難於竒竒不失正非胸次有縱橫出沒變化之妙豈易得此吉甫與舜功為詩交最久故集中用吉甫韻為多吉甫屬豫為序余謂吉甫曰君與舜功詩何似吉甫曰韻隱於山詞順於水和詩至此不亦可乎豫以吉甫為知言抑豫聞元白千里相思作詩寄贈用韻至於不謀而同此固非屬和之詩也吉甫與舜功定交屬和之詩則豫既見之矣若夫不謀而同韻則元白後豫未之聞二君交情甚至豫他日尚幾見之以為長慶後一段佳話李瑞卿詩序豫不能知詩豫之知詩自謂不在今詩人下也詩人論詩嚴甚而豫不畏何也彼為嚴以怖我者也南風之薰兮可以解吾民之愠兮南風之時兮可以阜吾民之財兮舜所歌也滄浪之水清兮可以濯我纓滄浪之水濁兮可以濯我足孺子所歌而夫子所取也二章語意略同聲律亦近薰時清濁體狀形容不過直致心辭而感人乃在言外使今日歌南風歌滄浪其求工於句字豈如此而已乎然則豫所不能者今人詩也不能今人詩定非缺事乃若感物而作足寄吾意則於他日縱不能舜之南風未必不能孺子之滄浪如徒論句律而已則滄浪又與南風何辨嗚呼是皆不足論也李君瑞卿讀書為文不自衒露豫識之有年矣而不盡知君豫則有罪而君無損焉近甫得其為詩藁百數十篇讀之作而嘆曰是可以得瑞卿之為人矣復有識君而不盡知如豫者其亦讀君之詩可也若夫一句一字商量吟諷以尋瑞卿用工得意處則當世詩伯富哉豫不當僭送劉季清赴補序科舉之為士病也豈不甚哉蓋不惟工文患得之纍其心也文可以得矣而貧無資者常厄於就試之費禮部國子監學在京師四方之士有不逺數千里試焉近且儉者旅費不下三萬不能儉者不論逺者或倍或再倍也士十七八無常産居家養親不給旦夕而使茫然逺行售文於一試試禮部得官猶可言也試國子監學補諸生釋褐未可期道塗往來滋數矣有親在堂朝夕侍養子於此時移甘旨之資為已旅費及坐而食於齊而白雲之日舉目天末不知我則舉匕而親亦已飯乎否也蓋困天下士使不獲盡分如此而獨以能試季能坐齊之文行取焉豈不異哉豫未第時有司間取豫文使試太學得公據輒藏之不往也既第當調官癸卯庚戌辛亥間復以無旅費不能往及其既也朋友始有動念而資之者然而人未我問則我不彼請也夫皇皇焉號於人求其已助而不忸怩其歸為覔官而已是豈不可以已哉以故親黨故舊間有試可就而力不能行謀於豫者常勸止之每有見聽者其不聽者則鄙豫言以為士生而志四方曽是區區者以無糧止況試於國學國學時人之所共榮聞名四方者焉發之亦所以榮親也而奈何局促尋常如是誠作氣勇往無可為有彼富有力者已不告則已告之損所餘以成人美豈所難哉況夫亦各行其志也安成劉君季清年少而文老身貧而志鋭勇往者也無可為有者也書序言以贈行季清其告夫樂成子之志者送諶自求歸建昌序旴江諶君自求好學能詩年方壯不事舉子業獨以所學與詩走千百里求師友堂上有母髮白矣求師友之念與思親之念互發而不相病也豫謂自求學不可不講而詩可無作講學而求師友於千百里外茍病於養親則師友亦可無求雖然豫豈謂師友之益可無也哉自孔孟以至近世先儒凡著書皆以明道也讀其書得其人百世之師古人之友皆在也是不徒走千百里外求之侍親之暇掃一室而日與師友遊足矣其於養親也無病矣自求為此學則身為君子身為君子則於親不辱而榮親之願望其子者為君子也如是而慰親之願望雖啜菽飲水得其歡心焉自求容貌癯而語言苦察其中心蓋無求於人也違親逺役誠為道義計豫悲其切於歸養而甚不得已於道路也以是道之豫既為諶君自求作序送其歸自求請曰子之懋豫以學也則聞命矣雅嗜作詩得意處自謂前輩作者不難到今謂我詩可無作豈有說乎豫曰有之君之詩甚工然未暇為君評也大抵作詩足以病學書曰玩物喪志先儒猶以記誦之學為玩物詩非玩物之尤者乎詩如三百篇不能不可作也後之號稱詩人者窮思極致於一草一木爭竒競巧於一韻一字此何所益而耗費精神虛老歲月謂不為學之病可乎是又有甚者詩當在山林丘壑間若日與貴人達官接則清致索矣或者反是吾學家法不妄取容於人而安得有此是不惟妨於學而已亦正與學背馳也陳后山詩所以至今可貴重惟其自貴自重公卿不得見其面也君為后山則詩雖少亦傳矣傳不傳何足計誠一意於學則詩無作何損也自求恬淡靜退人也視外物輕甚聞豫言也殊有當於其心并書以遺之送曲江侯清卿序曲江侯君清卿與其弟德卿共豫學五月而歸將别無以為贈遂贈以言朋友之道也惟國家以人文化天下士風之盛嶺海之陬無遜江浙況曲江為廣名郡有張子壽余安道詩書道德之澤而其地山水清曠韶石舜峯列秀森峙虞氏數千載之遺迹在焉想古風於寂寥隔千載其一日登高望逺九嶷蒼梧倣佛隱見皆足以起人悠然之思境契於心而道在耳目間矣士之生其間固宜秀頴明逹由積學而至於聖賢不難也況文章特學之餘事乎子韶人也豫將假舜之韶以與子論文夫韶舜之至文也金石絲竹匏土革木舜之所以為韶也八物之雜而聲成文鳥獸率舞鳳凰來儀韶之大成也雖然舜世之樂孰有外是八物者哉今為子取所謂管者鼗者柷敔者笙鏞者琴者瑟者石之可擊拊者也固不乏工之知音律者皆可能也然而器具矣而非韶韶似矣而非舜何也八物者舜樂之寄也原舜樂之所自本乎父子慈愛之間推而逹諸宇宙民物之生意油然天真之發見而動乎不自已之機此樂之不能不韶也不於其心而於其器則韶獨舜哉文之有聲音節奏不猶樂之聲音節奏歟而今之文則正聲罕矣鄙賤猥惡者下里巴人之曲靡曼幻眇者桑間濮上之音也彼豈不用意於文而卒之非吾所謂文理不明於心而徒治其言語之末俗而不雅淫而不貞有由也理之難明久矣安能使吾胸中豁然無所滯礙得之心而應之口與手者一不悖於理如古人之文乎易之文微也中庸之文粹也六經之文豫不能遍舉子取二書讀之愈索而愈不窮如山海之寶藏隨其所得皆足以致富而山海之所有不為之損顧吾力有窮焉耳不然何莫非吾取富之資富資於山海文資於理理資於學子歸矣於豫所謂理之明於心者用力焉本之於經而質之於先儒之訓說立吾心以為主而凡方冊之內有言理者畢赴焉使天地萬物之情狀盡至於吾前而往古聖賢之心事盡契於精神之表則吾見文思溢出欲已不能而何待於握筆引紙日孳孳焉以求工也曲江士風之盛豫雖未盡識意多有人焉子歸其諗之鄉先長者以決吾言之信否豫言倘其然乎它日非子見我則我遇子子出子之文豫將驚焉於其别也書此以告具以為再見之左驗送歐陽行甫序旁城之西原山有墓焉曰有宋詩人歐陽伯威之墓益國文忠周公葬其友人所書也伯威自號寓庵文忠與寓庵同生於靖康丙午生平相好及公謝事尋布衣交賡酬㑹集殆無虛日沒而葬之既為之銘且揭扁焉豫幼至其下則能動念曰此宗人而以詩名見稱於先生如此往往徘徊久之而後去其後稍長而見其詩編殘簡缺牘不能一再卷輒喟然太息隱之於心以為若稍有力當謀所以廣是詩之傳既而見其子行甫貧甚不自拔前廣文趙先生知其名招致學館今廣文陳先生又免其月書俾常在講下皆盛德事然學故例春秋丁祭食鼓不鳴者旬月或值假休又無所以廩嘻其可悲也已寓庵逸才清名蓋東坡於子野所謂遍交公卿靡所求希者身沒而無遺其子固其理也然靖節翁之達猶拳拳其子薪水之憂蓋將沒而不能忘平生得人一食輒欲冥報相貽他日而有振其子者靖節有不重感於蕭蕭墓門之下乎行甫謀於豫謂今郡縣學與二書院養士不一所而豫嘗為諸公顯人所與進蘄為一言庶幾又有矜而録之者則不廩於彼即於此以忘旦夕之憂豫謂行甫此不待言也諸公顯人皆樂於為盛德事者也君有不謁謁必詢詢必戚焉況君貧而能守老而苦學以無忝於前人知君者豈直戚戚而已將且歎且思焉慰靖節念子之心於地下思賢愛德同是心也故於往也書以遺之且以觀行甫之遇劉相岩詩序劉君相岩年少氣壯容貌軒軒望而知其非平凡人也所居去豫數舍間過豫輒留旬月豫夜讀書率先卧相岩能逹旦否亦四鼓文字英發如其人每歲郡當貢士必意相岩凡為相岩友者皆意之然連不偶數科矣相岩年正少小遲不足計然挾其文不得試意忽忽不樂國家官天下士不一途相岩得一官屢欲前屢欲却非其志也今日見其詩藁為讀五六過不去手豫初謂相岩富於才頭角不嶄然露不已今其詩不然思致幽潔如在山平水逺鳥啼花落間不見酒酣氣張悲憤激揚之態與相岩處四五年方知前日知相岩者淺也相岩少豫十餘歲豫固得以觀相岩之所就一第相溷末之也已相岩今為宜春酒官豫因憶往時劉季孫工詩能文最為蘇長公所知其初為某州監酒半山老人以使者行部至其廨季孫未出半山見屏山有小詩細讀賞歎既見不復問酒務事㑹郡闕教官諸生以為請半山判其狀曰監酒殿直一郡驚異繇是知季孫雖終身右列而詩文聲名有諸公之定論在他日入吾相岩廨中者安知無此知遇知遇非吾所應道也季孫忠義自立所長不獨詩文而吾相岩抱負益竒決非塵埃中物然皆發迹管庫殆未知所以淹回者何理三歎之餘為書此以附卷末送彭士安序孟子曰分人以財謂之惠教人以善謂之忠同里彭君袖詩遺豫道其艱難困苦之狀豫無以惠君請效忠焉士貴立志非志富貴也信聖賢之言而期於有立不以貧厄更所守斯之謂志豫未第時艱難困苦不減君惟稍稍知書之有味不肯舍去間嘗為人作賤藝力稍休輒讀書或時藝於手書在目鄰家有瞷我者見其釋藝執卷於雪簷間踰月而令其子從我學自此遂就書館稍稍得錢然口纍差衆貧亦至今乏絶之憂常在朝夕不肯俯首乞憐於人衣敝食淡處之稍久亦不足介意也今君年方壯讀君之詩又才思如許勉力自進惟書之為信人不已知雖强授書田間兒尚可自活顧世道艱於前時損金惠人者不一遇君奈何事此左計哉天之降大任於人不皆以富貴福澤厚其生君勉之讀書自信非為求知地然㑹有知君者毋徒為此戚戚也凡以讀書名者豫皆期以它日世間佳士豫尚當見君之有立而賀君焉送艮可赴銓試序漢世人主即位之初宗室或賜金錢或賜駟馬或賜金帛未有如我朝恩厚嘗貢名於禮部者至此皆得入官也名必宧字艮可者該恩貢交遊皆以為慶然郡當上其名銓部例自投牒申請艮可於衆中特自遲遲數月今年當往試殊無行意㑹其兄必官仕可在行都以書來趣然後匆匆治行或問之艮可愀然曰必宧生寶慶乙酉是年先皇帝即位改元自是在御四十年而必宧生長天涵地育中亦適及强仕矣往歲叨與漕貢則先皇帝乙卯之詔舉也賓天未逺新天子朝服視朝入反喪服率土臣民欲報之德昊天罔極而必宧敢以入仕有階為私喜乎夫登極赦書如此乃國朝故事率而行之受此恩者當共體隱痛非踴躍歡抃時也歐陽某聞之曰嗣聖繼明宗社之福也得官而喜臣子之情也艮可必宧乃能因生年以思先帝涵育之久因漕貢以思先帝詔舉之由受新恩於今懷舊恩於昔是可與事君矣艮可之字蓋以宧者室東北隅是以取艮然艮卦無可字惟王弼傳曰艮可施於面絶於背可也其意特以當止為可否若用大傳語曰艮者萬物之所成始而成終也易字艮成君生寶慶乙酉而官於咸淳新元昔者四十年如四時之一終而今又一初矣是入仕之初也字君所以祝君之有成巽齊文集卷十二
