body:
  text: 巽齊文集卷二十宋歐陽守道撰跋習子善逹齊子貢初年貨殖夫子惜之見於論語者一言爾游於諸侯所至國君分庭抗禮是厚誣也夫子夢奠之前子貢無非從游之日晚年所造絶異未聞性與天道所聞何語苐觀形容夫子之辭至於一再皆非他人所及與築室於場獨居三年然後歸之時其篤信實見何如哉孔門髙弟如此幾人結駟連騎抗禮國君稍有識者之所耻也謂子貢為之乎去聖門逺學者惟有取信於論語孟子諸書今論孟諸書不言此事但見子貢信行每可敬慕吾不信論孟而復誰信也子貢實先貧而後富先儒之言甚審蓋不先貧則無由有貨殖之事然貧富之間子貢有以處之矣曰貧而無諂富而無驕夫子許之又進之曰未若貧而樂富而好禮者也味子貢之語固與夫子有間然原其用意豈非病夫貧之不能無資於人不若留意治生之得以自足乎及可以自足則又未嘗挾之以自多此無諂無驕子貢蓋已能也即無諂二字足以見初年貨殖之非得已即無驕二字又足以見結駟連騎抗禮國君之大不然矣此語蓋出戰國策士借子貢以譽已而世儒信之使流傳至今學者不察將謂聖門髙弟親炙夫子猶如此他人何議焉此而不刋其為後學之病甚大逹齊習君子善自記名齊之意大槩謂理義有至樂而外物榮華無足以動其心讀之灑然足以知君所存諸公書具亟稱之而豫以夙昔交游之末亦荷不鄙而惠教焉豫之朽暗何足以追逹齊之見地苐世儒所傳子貢之事切嘗疑之非特疑之直深病之久矣茲因逹齊記文之所及輒舉子貢貧而無諂富而無驕之問以證焉惟逹齊胸中一無外慕之惑而研索義理既深得其趣矣則子貢受誣於世儒者逹齊宜不必信夫逹齊幸不豫鄙而惠教之切磋之義亦豫之不敢廢也劉紹佑千文跋𨽻書始秦李斯趙髙胡母敬三人通作二十張漢興閭里書師釐為五十有五每六十字為一章計字三千三百小學始於識字然必音韻諧協文義可通始便誦習是三千三百字雖不見於今然觀其有章可分則必有音韻文義者也梁周興嗣拾斷碑製千文行於世將千載彼所謂三千三百字非此類與吾州名進士劉君紹佑續興嗣文其數如之而文義非興嗣所及矣君以摹本遺豫豫讀而善之曰君於興嗣之文為續則楊雄訓纂之廣史篇也興嗣之文已用者不再用而措辭竒古􅗥出尋常則司馬相如之凡將無復字也若夫假字為訓而天文地理人事之端往古來今廢興得失之迹納巨於細該繁於約使幼學者口誦心惟預為方來大學之地此則致堂先生胡公叙古之本意豈相雄興嗣輩區區於字學者哉而君之自叙乃以為戎帳户版勾稽記識之助若自小其書者或者疑之抑不知書契本以代結繩君此言蓋原上古造書之本意云題賴淵甫復齊復之彖曰復其見天地之心乎謂復可以見天地之心非謂復為天地之心也二氣之有消長也是俯仰之暫呼吸之間也天地之心無方無體無始無終彼一消一長乃形而下者也然就其會而觀之則天地之心已無隱於我矣以復之所可見逆未復之所不可見者不可固不可見也然則天地之心何謂也曰聖人於易謂可見而已未及明言之也中庸則明言之為物不二者也焉有所倚者也晝夜之道也死生之說也鬼神之情狀也其然也有所以然者也所以然者無晝與夜無死無生也無鬼與神也而晝夜死生鬼神則不能自已也不能自已是亦可見也已嗚呼是豈不卓然而在目前也哉豫怪夫世之言復者不思聖人所謂而遽曰天地之心復矣則是謂天地之心囿於二氣消長間也而可乎萬安蕭君來言賴君淵甫以復名齊且曰賴君有得於復與他人不同豫不能詰也意者有合於豫之說乎因蕭君還書以諗之題危恕齊佩觹録後恕齊危先生佩觽録其子弟門人抄先生平日諸經釋疑也禮子事父母左佩小觽右佩大觽觽解結之具也其狀如錐以象骨為之取其堅强而不折滑澤而不滯常佩於身備適用也絲縷纓帶之結以觽解經學理義之疑以恕齊此録解故曰佩觽録詩不云乎我心苑結易解也心結不易解也士學於先聖之遺經或本末瞀亂或經緯錯雜蓋去聖既逺理固應爾無以通之此心之結當如何聖門之教人曰不憤不啓不悱不發憤悱之時結亦極矣然後聖人以一言啓發之聖人非靳於啓發也人不憤悱則其去滯求通之意不亟故聖人俟其至此而啓之而發之此為學者解結之道然世之學者或無結之可解意者資稟髙明而𡨕與理會耶抑學之不能問之不知思之不得辨之不明古人弗措而後人措之耶措之則無可言者如弗措也則先聖誨人凡條分縷析於先聖遺經之下者何莫非為我設束之不觀如有觽而不佩亦無如之何也已諸老曰近恕齊先生幸以夙學為此邦後進宗師是編之傳惟當與學問思辨不能不知不得不明弗措者共之伏讀之餘竊自太息而書其末題易象本㫖後劉君定子以所著易象本㫖惠教豫既録而藏之又欲取其間所疑槩之豫心而未盡安者告定子以折𠂻一是之論然而未之敢也微以言卜定子可否而定子慨然曰豫以是書來豈欲執事謾不加省而稱善哉有先儒之訓豫不當輒出臆見然而恃先儒之訓而不及求諸心則是名尊先儒而實濟偷也故是編之作雖不敢保其不畔而幽思窮探以得之又惟人之常情思而有得則必喜喜則見其得而不見其失此非獨豫病之將先儒亦病之故先儒晚歲之書比之初本幾於竄易且盡者蓋不肯以一日之見自安也豫實有志於學先儒之學而幸豫精力之方强子宜有以語我噫甚矣豫何敢疑焉而不告凡豫欲質者數事且如别録抑學者之於易非徒玩其辭而已也自强不息已當自强不息也厚德載物已當厚德載物也充此類則一象無不為已設又暢而通之則豈特一象一義也窮天下萬理無不在易焉亦無不在我焉象固未有盡也易固公天下萬世之書然我輩讀之當見古先聖人如特為已作者定子於此將終身焉子之不敏豈徒愧定子之著書而已哉他日當見定子以易周旋為易所謂君子使豫有所企望而常不及也易曰學以聚之問以辨之寬以居之仁以行之學聚問辨而能優游涵養則有以居之而不失是之謂寬既而體之於身凡天地萬物之理皆備於我而無可違者所謂仁也學至此則易之全體也而象可以忘矣定子將别書其語於卷末而歸之噫子誠有意恨豫相去之逺而不得日相見也題劉定子隂符經右隂符經三篇友人劉君定子疑有錯簡易處置三而為之傳周衰道術裂人各為書正言者或駁不純此書獨用反言而合於正卒莫知何人作也程子謂非商末則周末以愚觀之商自帝乙前多賢君亂獨受耳先王之道未散下無特為書者周末文敝百家競出雖大道既隱而實各有所聞卲子專指此為戰國時書宜可信然非戰國嘗為人用者也意者山林之士之作與亦大竒矣以性命微言如此而君子固窮小人輕命同乎一得末又以其道言兵此乍讀者所未喻也然余觀孟子養浩然之氣以為孟子而孟施舍之無懼北宫黝之必勝亦一養勇也是非固窮輕命之分而其流遂為强兵戰勝之術與蓋惟至靜為能至勇所養深厚則其發迅烈顧養不同而發亦異耳此書本出於儒者之學其精深之㫖定子往往得之愚獨為此說以補其一然亦作此書者之大意也題郭從禮雙清軒客有談萬安郭從禮扁軒曰雙清者莫知其所以扁之意或曰詩有心迹云者其所取也余曰不然天地至清之氣常在至靜中是軒虛敞前有佳植逍遙其間可以永日視世間汩沒塵濁之紛紛何啻已在隔風雨地位也清在軒不在心迹且迹即心也安有心清而迹溷者乎客曰軒名何取於雙余曰子不見六一傳乎以一人對五一之謂六主人而稱斯軒是雙清也客曰然請書以遺之於是乎書題易君竹所物各有所飛物有集所中澤鴻所也潛物有潛所池魚所也鴻不中澤而鳴嗷嗷魚不池而校人之腹則非其所植物各有所故前史有竹所今南林易君好竹以竹所扁其所夫竹以幽為所故宜乎深崖僻谷以潔為所故宜乎清泉白石紈綺梁膏之子德不足以媚竹而亦竹之好邀而植之其庭竹色悴焉失所也嗚呼竹與人與人非竹俗竹非人辱夫惟幽者潔者而后可與宜斯竹吾於易君爰歌淇澳跋介軒記後東萊吕元來訪言曰豫不幸幼而孤今壯矣先子之書在笥不忍讀也而先子以介名其軒目擊而心思焉觀志與行不在茲乎君盍一言以發明豫先子之志行余曰介堅也故甲謂之介取其捍拒彼不得入此也又分也故介加田為疆界之界取其别異彼不得混此也辨是非謹向背介之為義君子有取焉凡有取乎介者其人必可觀也徂徠石先生名介質肅唐公亦名介鄭公俠字介夫觀其名若字而知其人矣半山老人字介甫視公相猶布衣於我無加也夫其名字取此則持身制行亦必朝夕思焉以求無愧此前輩諸賢所以誠異乎流俗也子之先君以介名軒想其平生必有得力處矣然則是軒也子一字之家訓也思其居處思其笑語思其志意思其所嗜思其所樂子無亦見子之先君子於軒乎詩曰惟其有之是以似之跋趙武德墓志銘後漕貢進士趙君某以其祖武德公墓志銘示某而言曰此相國周文忠所撰也真蹟逸亡久矣比年乃訪得之某伏讀至武德公曽祖馮翊侯之諱忽憶馮翊侯之配夫人郭氏墓志銘乃吾家文忠嘉祐間奉敕所撰而真蹟副墨皆不可復見矣惟本幸存遂書以遺之嗚呼神明胄系何千萬年兩文忠之文與國無極洞巖在目西京天逺獨不能不為之感歎南北久離將合中原迅掃有期孝子忠臣同一企望也拱辰之才之大蓋非特馬少游所謂守墳墓稱鄉里者公侯必復其始尚懋勉之跋東坡贊孔北海真蹟東坡先生贊孔北海曰文舉在天雖亡不死它日舉北海論盛孝章事曰北海孝章猶在而向譏評者與草木同腐久矣先生尚友北海顧於千載之下數意其精神之存亡蓋先生學力死生禍福一不以動其心則其於世間不壞不滅之蹟自有深信其必然者先生於古人稱北海人中龍於今人稱張樂全龍章鳯姿而以樂全為庶幾北海至論死生之際亦曰公之所謂我不敢知乘雲馭風與汗漫期此等語所謂逹者信之衆人疑焉者其碑潮州韓文公廟意殆相發與清江孔漢叔示豫所藏贊真蹟敬書其後張南軒回周益公書垂喻近世學者狥名忘實之病此實區區之所憂者但因學者狥名亡實而遂謂此學不必講大似因噎廢食耳後世盜儒之名為害者多矣因夫盜儒之多遂謂儒之不可為可乎熙寧以來人材頓衰於前正以王介甫作壞之故介甫之學乃是祖虛無害實用者伊洛諸君子蓋欲深䆒所弊也所謂聖人誨人有先後學者進德有次第此言誠是然所謂先後次第須要講明辟如適逺豈可不知路之所從出不然只是𡨕行而已至如所謂不可以聖賢自期者則非所聞大扺學者當以聖賢為凖而所進則當循其序耳亦如致逺者以漸而致也若志不先立即為自棄尚何所進哉右此書南軒先生答益公也其說大切於今學者有講貫有體認講貫貴融會體認貴親切學不可以作此身分上事則雖矻矻終身何為乎李君嘗同余學時文技耳先學奧學余不能知固無以發李君也君示余以此書豫何言之有然余却喜此書平實簡切而今之談理學者茲昧昧也子路有聞未之能行惟恐有聞子夏曰日知其所亡月無忘其所能可謂好學也已矣知此一語行此一語是之謂實不自欺則進於誠靜時默思我所知者幾何而能行者幾何今之士人接物差少且從家庭推之從父母兄弟夫婦長幼上件件默對以及於宗族朋友鄉黨凡吾平日所行處能與所知者不畔否如未也則兢兢翼翼必求於如所知而後已是之謂不自欺不然雖親見孔孟日接程周不能為我益也益公蓋為此慮南軒又不可謂此學不必講而發明之蓋當時狥名之士已起人厭矣所謂王介甫壞熙寧以來人才原於祖虛無害實用此是指它本原之差介甫居家時事親孝與諸弟睦清修博學自非今世狥名之比但䆒本原之病終在與人主便說堯舜與公卿便說周孔少間所為件件變了所與親者却是虛浮淺躁之士同時司馬溫公却件件是實與它竟是相反左丞相蒲宗孟嘗對劉裕陵以今朝廷人才大半為司馬公壞裕正色視之曰卿乃不喜司馬某邪不論他事只如辭樞密一節他人則不肯矣溫公實行裕陵深知之人才之壞原於介甫而宗孟以為壞於溫公又蘇東坡議學校科舉狀亦言西晋與大歷之事至謂性命以為中人之性安於放而樂誕其病在學老莊之書坡公上數語亦有過當然此病乃正是南軒論介甫意也此書謂伊洛諸君子欲深䆒此弊請看諸君子所以救弊者何在諸君子即不教人作一場話說君收此書且併以愚語更就有道而問焉若欲從事茲學只恐在不自欺上看跋謝簿與張子復議荒政明道先生於主上元簿時偶攝邑事值陂塘大决亟發民塞之謂若請於府於漕司往復須月餘則苖槁矣故不復以是請是歲大熟伊川先生書此事而附先生語於後曰一命之士存心愛物於人必有所濟今臨川謝公力贊吾州前守史文忠公荒政則主永新縣簿時也公已為天子近臣直聲聞天下吾州人談荒政時事必曰謝主簿云意同時為郡屬吏幾人也去之二十四五年能令人記憶如謝主簿者無幾官豈有小大哉公之心即明道先生之心明道先生救民食於未艱之先而公救民命於乏食之後艱易不同而二人之心則一淳祐乙巳初夏讀與吾里張子復議荒政敬書此於後題張湯卿心醉詩軸東坡賦濁醪有妙理云嘗因既醉之適方適此心之正得醉於酒又如此况得醉經邪張君以心醉名堂敢奉二語以語曾雲巢與曾智甫往來書翰跋曾丈智甫與其宗雲巢先生為友學士侍郎公亦布衣之舊大小阮往來書尺編成巨軸出以示某雲巢年八十時筆法與往年無二前輩之敬見於寫字字占人夀理信有之學士往往在學舍及初筮時書智甫珍襲之暨貴顯名益大書宜亦可寶而軸中乃無有意者以其名既隆特欲小疏書問雖得書亦不欲示人耳是以可觀智甫友道之一二云釣雪圖跋雲坡李君釣雪好事者畫為圖見其釣不見其得魚也以示歐陽某某謂君曰有飲食之害者饑則無所擇寒魚能無饑乎然且垂釣久之而不可得人不以饑寒動其心誰得而餌之且魚惟不受餌故得免於刀几不然一餌之飽幾何身亦飽餌者之腹矣君不受世之餌而釣之於寂寞之濱魚亦不受君之餌而潛之於淵君毋釣之焉此魚蓋化於君者乃為之歌以寫圖外之意歌曰上天同雲兮雨雪其霏之子于釣兮在水之湄魚潛於淵兮不可求思泌之洋洋兮可以樂饑歌畢還其圖尹希聖詩集後禾川張誨翁娶酃人尹希聖之子於是希聖亡矣誨翁得婦翁詩藁間以示余而自作三詩見遺字句無塵能使人讀是宜為希聖壻矣誨翁甚珍婦翁之詩將求叙於當家豫非其人而得寓目况不能道希聖之詩之美則告於誨翁曰子年少子婦翁故藁姑藏之觀子氣貌知子之警頴異常人數倍也憶豫如子年時舉業才識畦徑先子初令讀詩書不許輒作文字去今二十餘年猶無所得豫之不敏如是豫豈有子之質邪以子之質而學聖賢之學沛然孰能禦之若夫游息餘閒吟咏情性詩固不能不作然不必如子婦翁之多也子婦翁之詩寶玩也余所進於子布帛菽粟也子能信豫言乎夫李漢集韓文公之文而其文亦韓子黃勉齊裒朱文公之書而黃之道亦朱子請擇於斯二者巽齊文集卷二十
