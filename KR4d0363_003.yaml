body:
  text: 巽齋文集巻三宋歐陽守道撰書與王􅋯軒書某廬陵後進文學一出人下年長以來自知胸中一無所挾不足以自立於世里有益友教我讀孟氏之書其説曰子之志吾知其願為正人子之質吾懼柔之勝剛也讀是書可以自廣可以有勇學所以變化氣質也子無忽某敬佩其訓從事此有日矣雖愚魯之資不能章通句曉然日自省循區區識趣頗謂少進至於今兹殆未知世間復有寵辱事也對䇿大廷愚不自揣輙及言路之是非乃不計文巻之經其目拜恩來歸既十日而倦就選意且以為奉親差樂不能仍進取非朋友相與作意從臾則至今一無官進士也葢愚性所安如此甞自謂世間同氣相求正未易得前輩典刑我之所願親者彼未必屑於相與其不然者彼固不我樂而我亦厭之他日出與世接正未知所遇何如誠不自意需次之日乃見當世盛名號有氣骨如正字者通守是邦而又備數於所謂鷺洲書堂為生賔通相遇也則其願侍教誨自應朝奉謁而夕請益顧且遲遲两月未即造前初則疑而去之繼而奉再三之諄諭黽勉禀承始敢就列而猶未之敢安也豈以正字不得我心之所同然者哉於正字之所以教學者誠有所未曉故也既奉命就列矣而尤未之敢安則謹治其説以探正字之諒與否正字而我諒則繼今受教其何有已不然區區之愚既有不安於其心而能委曲善柔進唯唯而退黙黙以茍飲食奉給之得者平日之所賤也而寜忍為此古人有言曰善人能受盡言雖以君相之尊而卑官賤職下至芻蕘敢以所見告者恃其有能受盡之資也正字於君相無所隱避某於正字豈復懼其我罪哉某有願言於正字者正當世之賢乃不幸而有輕士之迹士固未易輕輕士亦未易使日至於前皆委𤨏皆庸俗吾固得而輕之然聖賢待人之氣象尙有不然又况未必皆若人者乎鳯皇翔於千仞覽德輝而下之物之去就猶有擇也美哉水洋洋乎吾之不濟此命也夫夫子之有歎於此也惡傷其類云爾今書堂雖小某請以大喻之書堂天下也提督宰相也其間自執事而下百官有司也宰相秉國之鈞一日在位盡知百官有司之何若人若賢不肖一日而去之巖穴之士有肯復出而自賤其身乎一介取予與禄天下同則書堂之去留與後來仕路之進退同也正字之去之留之與宰相用人之進之退之同也愚聞之聖門曰進人以禮退人以禮人如某不足為正字道正字之至此且以講書彭君學録康君為何若人也使二老而無可取往時江史君亦自具眼者固不應枉駕而屈之又不應稱道其人見之記書院之石刻見之請賜額之奏牘也好惡不當以一人而定江史君之見借曰不然不應此郡之士心服之者衆而不服者寡也則二君亦必有可尙者矣講書彭君氣直面折人過是其所長學録多識近世諸賢言行而篤為禮者也此二君者其於區區愚見亦不能盡同然夙昔之心所素敬也後生小子未經師友執事學文好輕前輩往往自以為莫已若也為俗化地自應使之敬事長上稍存典刑此事闗係良不為細今若示之以無所可敬則異日鄉曲尚何望其猶有善俗哉正字固眼髙四海抑通守此邦教化自出能不為此邦後輩地乎二君之去如遣吏胥勒令去職而已安在其退人以禮也此某之所不容不疑者一也直學呉君氣宇軒豁語言剛正與之處數年未甞見其一日軟熟態其好修近於矯俗則有之若囘邪傾側不擇人而與處則保其終身必無也性若疾邪與人多忤招尤得謗亦有以取之然人品如此亦可謂不易得矣某雖晚末未敢妄議其為人斯人而遇臨事不奪㑹有可觀名雖肄於國學然居家之日甞多前此書堂扶植賴其力若曰肄國學者不當復有此書院則如某輩乃濫叨仕版者也未必彼不可而此可今其人未甞一識正字之風采而正字遽去之此某之所不容不疑者二也諸生之列賢否混淆然賢者亦稍稍多於不賢者以其混淆也而謂是皆不可存不賢者正恐他日猶有介紹可前而賢者一見風旨不一再至矣前日混試恥於自鬻者頗不肯就以為縱使中選何敢冒昧而處斯堂也愚心非謂正字之一切更新為非也其間誠有可鄙可薄者在焉去之誠宜奈何䲭梟巢毁鳯自不集何必不分䲭鳯而俱逐之乎此某之所不容不疑者三也某於正字敬其立朝敢言敬其輕視官爵敬其身負世望獨此身生於廬陵者也居於是鄉願為是鄉俗化計誠不願他日後生小子謂長上有時折辱之為可輕人品之可與為善類者與一二不肖無所分别故竊怪正字有輕士之迹是以冒昧不顧罪責而輙言之子夏曰君子信而後諫未信則以為謗已今正字不鄙而進之則亦既信之矣諫之非謗也亦明矣正字髙明之識且以敢言聞天下其不我罪也亦可必矣不然而猶罪之也已之敢言而罪人之敢言也諫而以為謗也則某居家姑讀吾孟子沈酣玩味之餘然後徐取他書擇其能調吾氣而反之和平者讀之此時無忤於人復至書堂亦未晚也正字可之否之進之退之某顏子之為師而黔婁之為友后山之與居而靖節之與稽其貧而不茍得粟也素矣願正字重議其可否而輕議其進退至於受㕓之氓敢貢其狂言於通守則鄭鄉校猶可議執政也況今兹有道之世乎明公裁之辭鷺洲月送書應倅伏䝉台慈以某備員賔於鷺洲書院賜之錢紙名曰月送仰認盛心感激何已安坐於家月得錢萬家本至貧寧不利賴抑前此所以再三控免者不為無説兹敢不避煩凟而申言之某於此書院之立敬之甚慕之甚未問前太守惠教郡士之初心但是一瞻御筆昭揭在上生是邦者忻幸之心當何如哉講明義理一正人心謂宜數年之間必有大可觀者詵詵學子夫豈無人而況長上輩行前此蓋有肯游其中以領袖後進者所恨一二年來戰士心於區區得喪之塲一二長上既頗引而去之而其間錙銖升合之予奪亦足以使或者為之動雖往事無足深咎然氣習日入於薄矣茍志於得何所不至外間識是非知羞惡之善士願以所學就正於師友者薄書院而不肯前何者上之人方謂一予一奪可以軒輊士子有人心者固懼或者之議已以為亦為是錙銖升合來也有如邇者某之承命以來蓋深認執事之盛心不可終避而區區此心尚欲因縁與進之後稍與其間一二知心商訂一是之歸以無負書院開創之本意耳然心事在我其誰知之亦或私竊相議曰是月又可得若干俸矣雖一再引辭未必不心欲之姑備禮而已矣噫嘻悲夫予豈斯人之徒與某之心徒以為書院者吾鄉里之書院扶持美意使不失墜正生長是邦者之不得解也書院不可望望去之以為髙武諭仕於此邦召而還朝則去之矣猶且畱意教育以士之無所聞見為已憂奈何以生長是邦者而視書院如浼已哉辭至再而不敢三蓋謂辭之不若俛而就焉以為中道之從也然而不能免於或者之竊議何也彼見比年士習之惟得是求也彼見某之素行之未孚於人則亦求所以孚者而已矣且某承命之初甞告於下執事曰必不得已請受其名而辭其實執事蓋心許之今緡錢亟至是將使並實而受之也是前日之辭為欺也若曰書院以為俸則不可受以為月送而將之以狀則可謂隆禮矣不可以辭為俸也而不受有狀以將之也而受之則是要上也始者公文名此錢曰朱墨之費蓋為㸃檢課册故耳亦既以故舊有嫌力其責矣㸃檢課冊之不聞預而朱墨之費則如故彼君子兮不素餐兮恐有誦此以見告者而無以對也數者隠之於心畧無一可昨告將命者曰幸返此錢於故府容某具狀辭焉伏惟執事深亮其心而特從之某誠有時造書院之心但得無此緡錢以貽或者之疑誚其造也無所愧於十手之指矣如此則所得多矣勝於緡錢之得遠矣以某之不肖猶能辭緡錢於書院則是凡游書院者果不計利之得喪矣外之善士知自貴重者可以來矣如彼則無一可如此則有數可所以决於必辭而期於必聽惟深亮其心而特從之續凟崇嚴不勝戰慄俟命之至通蕭宰書伏聞天子有命以明府宰廬陵某廬陵人也前令尹甞以學事之重不鄙庸陋引以白副於明府此來當用今所謂四六語者通姓名於下執事而半生學文雅好莊直不敢以四六語為當然未見君子遽道盛德以為佞獨念辭之不可以已既忝與學校而無辭以自獻明府其謂某為何人斯他日縱不鄙棄仍位之公堂而心不預孚則亦茍焉為容而已物不可以茍合故受之以賁是故敬撰其説而明府擇焉某聞之有人民有社稷必立之學此朝家之懿典而三代之遺意也夫學重矣而或者視之為文具其謂此告朔之餼羊也故寧弊弊於㫁獄聽訟之末而俗化厚薄之原在所不計蚩蚩之民奪攘矯䖍以麗於辟不婣不睦不弟不孝之事日至於庭居官者執而撻之戮之而無憫色無怍容其甚至於名為士者口誦孔氏之書而身為戰國亡秦史傳所諱之習俗當官者亦曰士行之不美久矣舉天下皆然而今有一州一邑者安能遽以身任教化人持此説莫肯扶持則夫淪胥以敗將何以善其後夫俗化有原士也者誦詩讀書知今古曉義理上之教化所先及士習既厚薰蒸浸灌漸及齊民蓋雖十室之聚亦必有一人為士閭巷之人必於其身觀焉見其善而忸怩於不善縱有冥頑無恥不可化誨者亦必有良心不冺天理油然而生者使此二人者數正相當則吾民亦已半為善矣又况人心同一天理蔽可使明而迷可使復乎有人民有社稷不可使士不知學其重蓋如此然自近代以來養士於學而實不以學教士口體之外文藝不廢則已幸矣德之不脩學之不講聞義不徙不善不改誰警䇿之舜為法於天下可傳於後世我由未免為鄉人誰以為恥士如此而為士則民何則焉文獻之邦化為陋風詩書之澤轉入市習日移月改而天下大壊矣嗟夫此正可與識者道爾有志之士得百里之地而為之宰便應以教化為第一事以風化之美惡為已責邑而無學猶當自我創立况所素有者乎若之何以文具視之廬陵為縣自宋興未久即有顯人以故鄉猶至今有善俗而士類特衆學宫之建自紹興以來百餘年矣其間賢令慨然有志於斯者猶可一一數中間稍失初意士各取廩食以歸而堂序齋牖空無一人比年初革弊陋差有書聲永嘉謝公尤以加意旬有課月有講當是時某歸自在所謝公實招致之愚不自揆亦頗以區區所見諗之同志曽未數數而謝公去繼此者非不踵前規縣事倥傯或所未暇課猶十之一二講則希闊甚矣某尸素其間蓋未甞不赧然内愧也明府此來諸生引領以俟訓已子路所謂比及三年可使知方子游所謂君子學道則愛人小人學道則易使皆在明府一意向間明府視以為重則風厲之下當有自奮拔者夫尊徳性求放心學之用工固自有的而其至切至近目前易按之理惟在明辨義利間今來自學校則相與為利而已干進公堂惟得是競士不重其身升合絲毫在所必較居官者亦不居重於學悠悠末習謂之何哉夫凋瘵之邑誠不易為簿書期㑹委至其前誠不易理學廩之慳乏養士之不繼亦誠不易充拓獨崇重學校一意肯以為一實事不以為一虛文則在有位者深切思之雖焦熬窘迫中常使此實意流行乎其間訓誨諸生必及義理文藝之外間察其操行之可取者而少進之舉善而教不能則勸始以此風士類終以此風齊民此亦仁人君子得位者之所屑為也某年且强仕於道無聞濫得一官而親老在念宧情特薄閉門讀書有友生數輩栖於私塾朝夕所與講論不敢自畔於聖賢雖無片長而明善誠身事親信友不敢不勉甞以為士生宇宙茍不能悟成已成物則已為乾坤父母之不孝子若不謹其身以不善不義為閭巷先則履戴間何以自容故每竊有志焉而前令尹進之公堂者亦往往以此又念尸素之甚無少益於學校輙吐所見以告下執事抑所謂同主學事云者特仍此學之久例一以待次官為之而某實非其人也明府之至倘不廢罷此例則别擇德望之可以信服諸生者延賔之斯席某何人哉致書之始未敢遽及專俟下車别布懇欵伏惟幸察復劉士立書又字成季某讀書自是心麄重以遭罹禍難心誠凋耗荒疎益甚猶以懼忝所生不敢不學時取故習温之尊兄進學日新豈某所敢望來書訓諭諄復朋友中求如成季有幾人哉敬佩厚意無斁然愚心於兄學有未喻者敢不一一叩請兄之意固望某早得所安必不以其愚鈍難鐫領解不速而遽厭之也中庸首章所謂慎其獨大學首章所謂致知在格物兄以新見易舊見自謂今日所悟卓然契先聖之本心而儒先皆未之知也兄斷斷以所見為是則某安敢異辭若猶取儒先之説反復敷演以與兄所謂新見者抗辯則此固兄之所決然舍去者其不見聽必矣雖然未能領解則亦安能茍焉以為同也中庸書自天命之謂性至君子愼其獨纔十數句而指示本體親切教人更無餘藴自此以下只反覆發明而已子在川上曰逝者如斯夫不舍晝夜此無極太極之妙亦謂之誠流行發見充滿周遍無所間斷者也而不可名狀及生生化化人物皆得之以生而人最得其全誠者天之道盡在我矣此不可名狀者如之何而名狀之其惟曰是無所間斷者是逝者如斯之説也以無間斷之心契無間斷之理當此心無間斷時即此理無間斷處無心外理無理外心安行利行勉强而行其至一也其不然者理本無間斷而心自有間斷心雖有間斷而理終無間斷以刀劃水使作兩截豈有此理故聖賢指此理以示人而教之以愼其獨愼其獨者無間斷心也久久則純熟矣篇中所謂博厚高明悠久之類則此理也所以行之者一之類則此心也天之所以為天則此理也文之所以為文則此心也彼聖人自然一自然純不由愼獨入而愼獨者亦終至此此者何博厚高明悠久天之所以為天者是已以兄之明豈不洞然於此而今日之説則謂獨即此心之正無二之名此心存而未發者無思無為不偏不倚是之謂中是之謂一是之謂獨某誠不能曉李習之謂愼其獨者守其中兄謂此語與兄合者也中庸曰道不可須臾離習之為之説曰心不可須臾動動則遠矣非道也即兄所謂不愼便去了者也某便不曉習之此語且喜怒哀樂未發之謂中發而皆中節謂之和未發之中不能無發發而中節則謂之和矣今曰心不可須臾動變化無方未始離於不動夫變化無方未始離於不動則可心不須臾動則不可動即發也但守取不發之中而禁其無發可乎先儒於此只曰此儼若思時也不曽禁其無發也習之謂心不可須臾動故以謹獨為守中而遂謂此心纔動即有睹聞其復之也遠矣此等語意佛書中屢有之而中庸本文恐不然也程子於不愧屋漏愼獨中間着一與字蓋語勢當然兄因此一字而遂判為二曰愼獨非不愧屋漏自得兄説莊然以思凡前之讀中庸畧有㑹於心者至此乃皆不是不知由前之説有何不可而必欲嗒然以坐無思無慮為守中耶又不知兄指獨為一為中别有何據而云耶獨立獨居獨言獨宿獨學之類皆一人無與為對之謂諸經中未有以獨字為心體者也果是心體字面程子何不軒豁明決言之而僅着一與字於不愧屋漏之下以疑後學耶此書末章自知逺之近知風之自知微之顯以下所引詩潛雖伏矣亦孔之昭相在爾室尙不愧于屋漏之類將皆不得為慎獨乎首言天命謂性而教人愼其獨終言潛伏孔昭不愧屋漏而復歸於上天之載無聲無臭首尾意脈圓備貫通未有如此書也至如大學亦有愼其獨之語係之誠意一章上下文以自欺為戒以小人閒居為不善見人則揜其不善而著善為無益閒居無人時也見君子有人時也獨字尤為分曉兄於此將亦以謹獨為守中乎某淺陋不敢與兄力辯兄實見教某豈不認誠心哉然兄至詆朱文公為不識字義則恐過矣格物之云前書固甞深言之以為心中無一物而備萬物之理理聚於心而散於物於其散者格之積之既多自有豁然貫通融㑹處此一貫也此下學上達也物之為言何嫌於指外物哉兄必曰不然以此物乃有此混成之物其為物不二之物引數物字以證物之非外物夫物何莫不自無極太極中來今未嘗從原頭格此一物則是謂即事即物者皆可外也夫無極而太極以生陰陽萬物萬事由之而出者隱而顯也萬事萬物推而皆可以知太極之本然顯而隱也兄以此物只原頭一物則萬物萬事之理皆可外萬事萬物皆可外則隱顯岐為二矣程子所謂今日格一件明日又格一件久之脱然有貫通者彼何謂也自此而往讀書窮理即事是學之教恐皆可廢矣夫當其未為兩儀四象則太極尙不可得而名而何物之云哉兄之下學記曰天也命性也道也是形而上者也身也心也意也耳目口鼻四肢也是形而下者也脩身正心誠意皆是下學而身之本曰心心之本曰意意之本曰知知即性也性即有物矣人茍能格其本心固有之物則知天而至於命此下學上達一貫之旨也夫聖人所謂下學直先於日用常行事所接處學之盡心知性則知天則反本窮源之極處豈初學可驟語之哉今以格其本心固有之物為知天至命之本而指脩身正心誠意之下學為格其本心固有之物之本信如此説則是大學之本文當曰欲格物者先致知欲致知者先誠意欲誠意者先正心欲正心者先脩身句句節節當倒看不當曰欲脩身先正心欲正心先誠意欲誠意先致知致知在格物也兄至高明何以一旦盡去行遠自邇登高自卑之見而為是不可曉之語耶兄之始學本亦自邇而遠自卑而高今學之幾年得所謂高者遠者則撤其梯級斷其塗軌告人曰合下便遠合下便高不從彼處節次也而可乎哉兄之學大概象山慈湖之意居多兄不謂學乎象山慈湖也將以象山慈湖為已合也晦翁之學兄往往以為不然當時講詰之紛紛猶彼此不能心服今某不自度其荒陋而持井蛙之見以對海若知其不可而不敢已者兄以愛我教我之心至則某不得以倘然受之也兄非他人汎名學者之比觀理如此其富用工如此其至著書滿家直以開曉後學為已任竊料兄所屑教者甚少如某之愚兄辱收之以為氣味之同愚心有所未安如兄之學若又隱黙不言茍焉阿和則是兄固厚我而我則薄兄也且自某之外肯以所未安者復之兄知猶有何人哉是以盡冩所見以求一是之歸如曰不然更乞賜教别紙所教尤感昔有陳絳者在福州賍汙之名徹於上聽王沂公為首相亦信之吕許公獨不謂然一日出一御史為本路澧使往按之憑一衙校䕶獻荔枝者之詞以為所聞皆實也賍以百十萬計上下俱無疑矣絳不心服遂起制獄他日反皆不實沂公雖重德不無輕信之失許公心事人謂不及沂公也而於此乃得之何耶君子重入人罪不敢欺天且賴兄更詳之今之所謂君子今之所謂小人百年論定安知不易位也此一紙自合詳答作此書已三二千言故於彼畧焉雖然感兄左右正救之意不敢忘也巽齋文集巻三
