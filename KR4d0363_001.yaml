body:
  text: 巽齊文集卷一宋歐陽守道撰書通荆溪吳運使書戊申年時荆溪漕江西某杜門窮居常深有感於當世之故夫天地必有所依以立人類必有所依以生天地所依以立者人人類所依以生者聖賢而聖賢所以生人類立天地依於人心之理義悠悠斯世頗未有為世道熟計者則其末將安所底止淳于髠有言今天下溺矣彼誠嘗試孟子之言然猶知天下之為溺也一世有胥溺之勢猶認之以為平地之安滔滔汩汩而莫之返求如淳于髠之能知溺者亦罕執事者且以為何如時也自恨氣力之微不足以出已溺者而生之而又竊自幸棲身於尺寸不溺之地環顧左右前後之未溺者疾聲大呼使知浸淫之將及而兢兢毋失足焉則聞之者不諒而謂已為駭衆嗟夫使斯人皆溺吾亦將誰與並生也然則吾之所以疾聲大呼使之知浸淫之將及而兢兢毋失足焉者吾亦以自為疾聲大呼而不吾信吾有深自悲而已矣深念當世之故誠未知其所終理義大明之世編户齊民可使各有士君子之行昔者所謂風俗淳一運祚長逺者非空虛無據之言也由今之道無變今之俗曽不足為十年計也扶持歲月以幸其不壞亂立身此時能無恐乎漢人有言俗流失世敗壞因恬而不知怪謂為是適然耳孟子曰我亦欲正人心夫此未易與流俗言也今之所藉以綱維世道者誰也觀於官府而未見大吏之於小官有以養其材而勵其節也士一入仕則習為一等無用之文孔門所謂巧言孟子所謂以言餂人者權勢所在雖跖蹻不患無說以譽之也曰非此無以取上位之知也然而誠有階此而致身貴顯者焉則上之取才在是也昔人入仕舍詩書而學法律今人入仕脫舉業而學四六何降而愈下也且夫士得一官將受人家國天下之託所當學者何限而顧敝精神於此又復不量其人之可依與否而一槩伊周之有如不幸比之匪人何以自拔也大率今之世居官一二載則舉止圓熟言語低回無復有山野生踈之氣所謂養吾剛大將輕貧賤傲威武者其勢有所不行雖君子所養决不計他人之待已何如然而特立獨行亦可謂甚難也學法令者以吏為師此秦人之說原今取士為吏吏道仍與士學兩途一切吏文嘗求是正於老且黠者則上下以為穩設有守書生之故學而少出意見則詰難且至或侮笑之由是書生常得迂濶之名而先王之道遂為當世之棄物凡今揚揚得志時人謂可任以事大抵熟於吏文者也所謂書生幸不見擯則異待之曰是學館之才也士挾學以遊今之世其將焉用今所謂仕宦取知於上者曰政事曰文章文章前所云也政事後所云也等而上之卿相亦由此其選也是其中亦復有王佐之才經世之業乎觀於學校而未見師友相親於善也來游其間者視以為飲食之地而已矣而教者亦不曰教也持飲食之具以邀士曰吾能進退爾也一日橫經襟佩雲集講者腐聽者倦漫不省為何說忽焉而散以是為故事之不可廢他日則以所謂試去留之進業而受知者何人也請益而有聞者何人也教者認末為本矣士亦不自愛也夫今日之韋布他日之縉紳士大夫也未有貧居簞食豆羮見於色而他日能為清白吏以與天子牧養小民也未有交遊親黨之間見便則奪營求自眩之態日用於師儒之前而他日能安於命義難進而易退也未有居鄉不顧細行禮義廉恥不以自律而他日置之民上能以理道化其下以無諸已者非諸人也未有其為士虗棄白日束書不讀游談無根而他日可與臨大决議藉其見識以定可否為據依也他日國家豈能别得一等士子而取之用之乎人才不競亦可睹已則亦安得豪傑特立之士崛起於波蕩風靡之餘所見者大所任者重可寄以國之安危民之死生也觀於閻閭田里而其等而下之者從可知也自古雖有聖賢之君慈惠之師亦必不能使風化遽達於編户齊民是故闕抑學校之事夙昔竊嘗有志今復何幸奉命承教且將親見君子之末光惜也某未之能前也某有母年八十有一體氣日衰疾不時愈前此未嘗敢違膝下而就逺館於他人之門竊第於歲辛丑而參選得缺於甲辰之三月遷延至此蓋亦謾書仕籍而非果有霑祿想而念親食不過一匕雖復三釜非老且病之所盡嘗而焉用以已之寸進勞親之顛頓官期若至勢亦不行昨者古心江先生將漕亦嘗招而館於所謂雙桂堂者半月而告歸踰旬而得請當時甚悔逺遊之輕今親年增髙愈非前比瞻望崇臺一葦可杭之地如在天上則又安敢詣所謂西澗而為旬月之留哉先生之禮意可拜而不可受先生之道德可仰而不可親則某之分也伏惟先生清明之禀卓異之資淵源之學深厚之養蓋伊洛諸君子續道之一脉而范司馬二文正憂時之盛心不特凡為士者知所宗主依歸而匹夫匹婦皆知當路有豈弟君子為之父母去年崇臺一二大政廣上恩而蘇民瘼者實非今之君子尋常意度之所能行而講義流傳大體小體之訓真切懇到聞者動心則某亦復得之郡史君伏而讀之矣夫惟君子務其逺者大者迂愚不能與世上下當世如先生得自附於下風幸也然而未之能前者則又有所重也雖不能前而當世如先生不可以踈逺自外所欲感慨激發反覆究竟以共論事之終極者舍是其將誰告是以輒列其說公餘一覽意者亦將有動於斯言天地之數盛衰之運倘不在他人而在先生之身則必有以處此某往者記監丞祠特一時斐然之作偶以事於學校繕寫申呈非有意於求知旋䝉衮筆奬借踰分蕪纇之文不足多辱亦知先生誘掖後進收拾寸長之意矣繼今其敢不勉書册之外無所作為固將沒世畢力於此以庶幾一言之幾於道惟有以終惠而幸教之某私居久欲裁尺書通姓名於下執事而不克兹因郵遞敬布腹心引睇穹崇精爽飛越不勝區區依鄉之至不備答荆溪吳運使聘書癸丑年時荆溪漕湖南某復䝉專使賜以手書及公牒咨目各一通路費官㑹千緡俾某前詣使臺禀議充嶽麓書院山長書辭謙下禮意優厚祗受惶恐莫知所對心口相謀蓋纍日而後敢遵禀詣臺之命乃若山長職事則峯先生所謂繼古人之後塵為方來之先覺其自任與望後學之意甚大晚進小生汩沒無聞不宜冒昧在此遽以之自取辱也某聞至誠之感物也雖無情者猶為之動而况於人先生以貴下賤至誠著矣某雖木石亦為先生動矣一區區未嘗接識之後進偶然知之不忘於心六年如一日下不求上而上求之不得其至前不已也此意豈獨為一某哉凡以體天心立公道盡已分而初不以為其人賜也使先生由此大用於世司一世進退人物之權則視內外百官皆天位職有其人而與共之治之視一世人物凡有聰明才知稍出於人者皆天以遺夫世所仰賴之人而我當使出其有以施於彼也將皇皇汲汲日以失士為憂豈復俟人之求已而視名位爵祿乃自我出哉近世每病人才之陋不知懷寶遁世無處不有上之人欲俟彼之自進彼非自進之人也則明知而明棄之斯人不可得則惟求已者之是用彼之氣已卑而此之勢甚尊挾夫甚尊之勢以臨之則夫卑而前者安得復有國士於其中也天位天職一切視之為能富貴人能貧賤人之具曽未有駭目於自下求上之非而動心於已責之不盡者人才之陋固宜然亦徒見其陋於所親接而不知夫未嘗陋者固在耳目之外也易曰以杞包瓜含章有隕自天詩曰有卷者阿飄風自南以杞包瓜則有隕自天矣有卷者阿則飄風自南矣人君猶然而况自宰相以下以至凡為人上者乎先生道德文章卓然為當世望士若有求於先生正恐如蘇公之告富公所謂無間而可入者然且自視欿然若無一有而緇衣干旄好賢樂善之意在當世諸公間為最著某不知先生之施於他人者獨以某占之某於先生非有介紹之先游談之助與邂逅闕此一二處皆一世人所共識雖間僻隱伏之所而有耳者聞目者見譬之至寶藏匿夜光燭天異哉大勢之所在也其在間僻隱伏之所易識也其在州縣愈易識也其在朝廷尤所易識也然而有懵焉而莫之識者矣莫之識故大勢亦一去而莫之返今天下大勢執事之所踐歷與某思慮之所及大槩亦可見矣荆益故荆益也江淮故江淮也人之所謂大勢非某之所謂大勢也所謂大勢以其關係於社稷之安危生人之休戚有之則重無則輕有之則中外歸心無則失望此為大勢而已矣今亦能幾處而已雖然不欲言也雖然亦不待言也夫惟賢人君子能為天下國家愛人材亦能為天下國家愛其身蓋勢在人則重在人勢在已則重在已其心公乎天下而不以進退用舍二焉夫是之謂以天下之重自任伏惟執事天與間氣人惟舊德洊厯要地無適不宜然且以二三十年之聲名而徘徊容與經綸大手未遂展布某不佞誠以為天下大勢要有在也若某不過能識所在而向依焉在此無竒復歲異一歲既竭吾才未知善後之䇿然念平生知已間有所懷欲對靣一言往往隔在千里外而誰與語公論固有歸善類固有主中外顒顒之望今當誰屬向風拳拳輒以愛大勢之說為左右告執事以為何如時拱侍一寫我心代通內翰書某比承光膺新渥進直禁林區區鄉依之私倍用欣躍執事經綸器業不應久在代言之地而方深以為執事喜者為斯文也昔人謂文章與時髙下在某殊不謂然時之髙下文實為之爾從古雖甚不足道之世必有以文自任之人其人不達則已其人達其文顯昭蘇衆聽鼓舞羣動時事當復有可觀者春秋之鄭宜無子産之文而子産之文足以起鄭唐之中世宜無陸宣公之文而宣公之文足以重唐二人辭令詔誥至今讀之猶有生氣文之能為時髙下政若此使在安平無事之世而斯文所屬靡靡不競則氣象衰颯國亦隨之今之文在學校在舉朝之議論士大夫之文而所謂翰苑天子之文也天子溫厚則有德嚴重則有威理以開人心氣以張國勢所謂大哉王言一出而天下響應者此天下莫大之文也學校之士與舉朝士大夫之文所學所見蓋人人殊不能齊一是故其髙其下不盡關於世道惟天子之文人以一字定從違國以單言判輕重而其文體所尚播告之下亦復翕然化之代言之選何可輕屬某無似竊嘗妄論今世以為必得深厚雄渾光明俊偉之才以為深厚雄渾光明俊偉之文而助成夫國家深厚雄渾光明俊偉之氣象竊惟執事天與異質斯文所歸奮自岷峨翺翔要途者有年矣簡在上心柄用已晚顧以絲綸之重非宗工大手不可付是以在此上之所以幸斯文者甚大惠也有識之士人更相慶矧如某趨承之舊辱在異顧不後他人是雖玉堂之廬在他人為榮在執事為淹然方為文體幸方為國體幸未暇計其他也阻以守籓無由靣慶不審邇日台候何似伏兾上體如眷精調起居匆匆上狀不宣代通淮東趙樞密書伏承奉詔入覲正位樞府宗社幸甚中外幸甚某聞之古語曰兵難隃度爰自本兵重任專寄文臣而其間有自從纍遷拜不厯藩閫者軍戎之情非所素知是以其所建明與所施行往往乖違不便在外者難於禀承而甚者或坐失事㑹在祖宗時或以方面久勞使內外一體事便順而多成人各有能有不能而兵者重事又非可以人人能也士大夫恥不談兵以為仕於艱難多事之世如於兵有所不知則世以為不適用之才是以開口議論若素習者某地為險若易某兵為堅若脆若為當急若為可緩身在兵間者往往笑之而聼之者或為其所詘也托其所言而見之行則外以為無可與行者否則信而用之投之以非所長則動以敗告彼固以不知兵為恥不知强而知之之大恥也天下惟通才不常有目不接行陳足不及塞垣而曰知兵云者非夸則誣彼以夸與誣媒其身而國受實禍故夫朝中之官茍有關於兵事者非真知兵之人間不可任而况宥密之地天下之兵權舉歸之其關于安危至大至重自非真知明識精謀逺算熟於方靣老於事情者不在此位伏惟閣下天之間氣國之重臣忠赤通於神明威名震乎朔漠爰自犍為不道所在震擾而東淮獨屹然以固田野墾闢民物康阜歌舞嬉遊者聞敵騎之至容色不少變於尋常少焉僻師一出殱除幾盡餘則呻吟以歸舉足不敢靣故道天子以閣下久勞於外且東淮倚以為安不若置諸左右使兵事一出其手則吾國長城東海而西蜀也渙號揚廷朝野相慶某藐焉書生昔未嘗通名於下執事一聞親命踴躍於中輒奉咫尺之書以賀賀在國而不在閣下之開閫於東淮也東淮之重在閣下今則將無往而不在閣下昔者東淮雖許專制而國論大意必不能盡與閣下合也是以容有所拘而不得為今西府大臣國論自出昔之不得為者今當無往而不可為也以事體言之今大而昔則小以事權言之今易而昔則難閣下之位西府自與他人不同無中無外能言之而知當代有閣下舊矣徒以為閣下未在此也故天下之事至此一日在此天下改視易聽凡昔之邊謀軍政日復日歲復歲不快人意者今當大快昔之外侮內訌日復日歲復歲而窺覦不已者今當大懲或者亦竊料閣下之心亦必有快於盡為所不得為者立中興之雋功塞通國之大望在今一反手之力也區區所以願一賀者為此來也坐念往事未見良圖天其實以祖宗積纍之厚故不使此敵得所大欲如必曰作大措畫使三陲晏然盡如閣下之所以為東淮者竟何如也宰相以都督歸相樞府以大帥還朝豈惟吾舉國之內快此一舉卓然知天子意嚮專在邊事則聞風者早已心破膽裂矣竊謂有吾國之時有閣下之時天幸數至吾國之時也得為前日之所不得為閣下之時也興言及此視日如流不勝拳拳憂時之心敢略布之左右稱慶之始餘不敢詳惟閣下察之代上吳尚書書某自抵廬陵日欲奉尺書於左右公事填委因循數年大負愧責坐念執事歸卧家山亦已久矣久而未起豈今世用人大患亦在因循耶某嘗妄論今世之事非嘗試者所可當諳厯之才力量自别比年時論專歎才難而屢試輒驗者往往使之以閒逸此意頗未可曉且人才非有難見以一人求之常不足以天下求之常有餘今塗之人稍能論世故者皆知曰某人在某所堪某用某所有某事須某人所謂十人之衆未有不公而說也不知衆所指目每每不偶又獨何哉豈公論雖在人而若人用與不用要是天意欲平治天下有速有遲故耶某於執事非區區懷戀知己之私徒端居深念以為近世於人大率以難取之以易遺之數十百人之中得一人焉此一人者必有大過乎數十百人者也少焉棲之於閒逸之地則又他求一人於數十百人之中而不可得及其得之則又未足以深愜天下之通望天下之通望不在今之所取而正在昔之所置然則用人尚可以為有定論否也欲無才難之歎可不可也身在外服不當出位而思然此非以為一二知己者恨時事大抵然爾執事雖暫退適經綸重任終當屬之此患不除不可以望人才之用此亦身在其中者之所究知也某兩年於此幸甚無他然此州凋弊之極僅逃吏責無能有所作為以償夙心去冬以來屢祈解職未報俞音幸亦駸駸受代矣往膠庠謂天下事當無不可為者及在班行漸知牽制之狀而猶謂若身親之容可措手自為此官焦熬萬狀下無以寬民力之重困上則數窘於諸司之煎迫補破架漏以日為年耿耿心事莫遂一二然後益知當世人才臨事輒辦如執事者久於家食端可深惜此公論之所以信向而不肯置也伏兾上為廟堂厚自保愛末由侍見伏紙悵惘巽齊文集卷一
