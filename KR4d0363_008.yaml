body:
  text: 巽齋文集巻八宋歐陽守道撰序清溪劉武忠公詩集序百年來中原故家家長沙者頗多予雅好四方之文獻比雖幽居南嶽之麓而美人勝士不鄙諺予者亦相踵至坐甫定則必敬問其先世想喬木之所在動黍離之遐思往往酬接未竟繼以悲歎嗟夫予心猶然則夫僑寓者子孫之心豈相逺耶寓劉陽縣有曰劉兩府者謂紹興功臣武忠公也公秦州人其元孫坦示予以神道碑與公清溪詩集神道碑洪景盧撰予三十年前既讀章茂獻所作公傳矣碑傳詳畧小異而大槩予所知也惟其詩集則見昉今日葢公之生不幸姦檜用事才志抑不及展順昌之戰勲名甚盛然在公猶毫末爾後遂韜晦自全詩酒間功臣至此亦大可悲矣集中有讀郭汾陽傳四絶者可見其情也餘二百餘首或愛其幽淡閑雅有塵外趣囘叱咤雲雷之勇為吟㺯風月之歸如岀二人以予觀之此葢公平生兵法也決機兩陳之間力不敵則寧使敵易我在順昌時使人以太平邊帥子誑敵者乃公取勝之第一籌也後來不幸遂當以此施之於檜我之氣吞讎敵不可使烏珠知之亦不可使檜知之烏珠知則敵堅檜知則身危兩當愚之而後可檜方喜其易與曽不知正墮術中也此英雄所以高人數等歟檜與國宰乃使元功宿將以烏珠待已國事至此尙何言哉百年之後予乃讀此集而歔欷公乎有靈母謂世無識此心者陳舜民詩集序天寶後詩人好為愁苦羇寓之詩吾家六一翁載此於五行志以為妖五行志志災祥多矣詩亦有闗係歟治世之音安以樂其政和亂世之音怨以怒其政乖亡國之音哀以思其民困氣之所感作詩者亦不自知其然也陳君舜民工詩工且富工不必富富不必工陳君兼之予恨不盡見恨不盡識諏之知詩者一口曰舜民詩平易自得噫亦所謂治世安樂之音也予獨為舜民喜也歟聖代累世之澤沈浸醲郁齊民飽食以嬉而才且秀者彬彬輩岀作為詩文前代詩人或曠世間見纔以一句一聯一篇稱而今以詩鳴者往往精到當其得意自許亦何啻家蘇梅而人黃陳也視唐天寶以後詩人氣象何如耶平易自得如舜民詩亦可以甚幸其所遇矣詩之為詩既可以觀所遇又可以占方來宜吾於舜民甚幸之也昔邵先生字堯夫自集其詩曰擊壤微五聖百年太平之盛無此集也詩人謂先生字堯夫而集名擊壤甞有先生全道總無遺之句堯夫已矣舜民詩何以之名送譚道士歸湘西序予欲與道士譚君享夫言大學旁人得無怪予矣乎噫予可言譚君可聽也君昔學於孔孟去而之老莊其之老莊也視老莊之徒不屑也則將歸而之孔孟自其未歸言之當名君為畔雖然李陵晚年倘不手循辮髪曰吾已變服不堪再辱則隴西諸族其終恥之乎夫君中去而之老莊其心尚諒也大學曰知止而后有定定而后能靜靜而后能安安而后能慮慮而后能得前日葢未知止爾若知道至於孔孟止矣君復何之惟未知止故以為廣居正位大道猶有外也出而求之此雖前輩間亦不免而終以畔坐享夫君之今日真可與為吾黨矣葢既出而求之無有也則其歸心純一無復外馳靜安慮得君雖老尚可望也夫今之為老莊之徒者又不得謂之老莊宜君之不屑也君浮游四方多識前輩今還長沙寓城中壽星觀則數涉江訪予於嶽麓書院其言曰予嗜讀書然自為道士力不能養一僮故書亦不自隨隨寓借讀而已今老矣勢不能復客於諸公惟往來書院聽講論之餘亦足以樂也而數涉江良苦願為我謀之予曰予安能為君謀君盍往告漕帥荆溪先生乎書院之左萬壽道宫在焉書院新闢一逕直蒼莨谷以道宫之在其上也名其逕之亭曰歸儒於是數月矣君若老於此宫而應此名無與彼事而惟此名之思也亦足以遂君之志矣道術裂二千年將合合必自兹逕始寶祐甲寅夏六月哉生明廬陵歐陽守道序進士家狀籍序乙已秋八月望吾與友步月至郡貢院至東門天闊月高夜色如晝風從西來古木撼響相與席地而坐感念疇昔話裹飯待暁時事提筆鏖戰猶有壯心顧謂予僮歸取酒來予當醉此明年今夕此地為他人戰塲矣酒至飲數行月色正中譙樓三鼔望數十步外有一人若攜文書以來誰何之不應舊時相傳貢院有神頗現物怪予方心動攜文書者至前揖指予缾曰能與我共乎則酌之飲又指貢院門曰何地無月而飲於此予益心動則示予所攜文書曰此為明年進士家狀題名籍日吉辰良為我書其首我挾筆在此矣予索筆問曰子氏名可得聞乎曰予即劉寶臣也前嵗題名籍首君實書之是嵗得儶甚盛願修故事予於是釋然笑曰别子久不相憶子幾嚇我抑予初疑子鬼神子是籍必靈取巨觴滿引戱祝寶臣曰願子神相文盟此籍收拾萬人英此籍得人子亦榮子効其勞相之成名人之謝子曰旨酒肥牲寶臣舉酒曰敢不飲此以從君祝於是各大笑去雲萍録序安城蕭正伯以雲萍録求予序予告之曰雲萍指暫聚忽散言也君行四方與誰游居是録所題為誰姓名王公大人不可以雲萍比也當君之世數十年之内彼自非有大進退雖遷除不一亦隨其遷除而有常居君不欲見則已欲見則往即之豈望其與君他日相遇於南北東西耶然則王公大人之姓名不必録於此録於此者其必班荆而坐傾蓋而談者也布衣之士未甚知於當世其中多有人焉君幸而識之則當謹記其姓名以觀他時之所立雖然亦豈無晦姓名而不君告如史傳所謂某處丈人某處老父某處耕者釣者樵者負者乎君將何以録之嗟乎予甚欲君之多見斯人也贈周生序吾鄉有為儒家製冠者曰周生繪楊誠齋東山二父子像而日拜之古心江先生來守郡非有私惠於生也先生去十有餘年生每語及之則聳然拱手起立予數見之矣未甞夷踞而語先生也康敬齋之塟予實狀其行以告古心求銘生得而讀之慰甚在敬齋墓所向予磬折不能已生也豈非民之秉彛好是懿德者哉觀生所好知生所惡也所惡生固不言也然而其人不在生所好之列是不言猶深言也生製冠以給朝夕無贏餘之求其心閒而不亂故好惡無私推其向背有見賢思齊見不善而内自省之意焉他日生求予詩予作君子正冠三章以遺之其詩曰君子正冠聰爾耳兮爾耳不聰易人之臧否兮冠者爾恥兮君子正冠明爾目兮爾目不明易人之慝淑兮冠者爾辱兮君子正冠公爾口兮爾口不公易人之賢否兮冠者爾醜兮生所居去吾家五里而時一過予予未易得此於生也復為書此嗚呼予至於懼生之好予不終則予之兢兢甚矣送歐陽山人序卜地塟親人子大事而儒者與術家所云或不盡信近世朱文公獨從之至於江西業此術之衆則又奏之奏疏其於寧親燾後至拳拳也妄意富與貴於塟親之時是誠何心然使體魄得安子孫綿逺則非特存者此心逝者亦此心也盡存者之心體逝者之心猶恐有誤如之何而忽之予同姓賓鄉家同邑之宣溪葢刻意於此者暇日來訪與之周視先塋訖事言曰君家子孫貧賤無能愈於今日若節春秋樽酒貳簋展墓而返則亦世有人也予謝曰得此足矣别去書以送之送劉雷震入太學序予行次東岡友兄劉成季為予言監補榜至同姓復可今以雷震名中選矣復可赴試時過予而後行今聞其中喜可知也復可未歸予畱成季家三日今日過復可叔祖叔秀則聞復可在吾郡城中矣吾與姪演如潭不能待也復可向畱吾齋日久今將入天子之學愛之能無告予十餘嵗時受書父兄之側則知漢董仲舒所謂太學賢士之闗矣心以為太學所養必皆天下之賢士甚向之後見唐何蕃正色叱六館士何為蕃者一而蕃之外如彼甚矣使人為縫掖短氣也然則我朝之學果有異於漢唐之學乎唐如彼漢仲舒所云又方言之而未有其地與其人是千百年間使人望於太學者甚輕不輕而重則予於我朝望之切矣然三百年間士之出其中者又何可以一言斷是太學不能成就天下之士士之有成就必自愛而後可向時予數故舊在太學間謂予言齋舍讀書之暇甚少予駭問其故曰讀書毋於齋舍乎望也四方望京師逺者數千百里廬陵非甚逺猶千七百里每一往返費日葢兩月矣至而畱焉有應試之費日有謁報之費日有游宴之費日應試强於師者也謁報游宴强於友者也三費日之外澄心靜念以親書巻者無幾然而不得親吾聖人之書而不得不親所謂時文之學者又十分常七八是豈吾所願學哉不可以已也予聞斯語而悲之今復可年甚少讀書無已處而在復可則如食方舉匕時也日力奪於彼得無憂乎雖然在人而已應試不可以已此外掩闗安坐惟聖人之書是親又誰得而奪之天之賦人以才將以何為忍小用之是自賊也太學造士之法今固不古然原國家立此之初意豈使我取聲名得官爵而已哉負國家立此之初意則又不特自賊而已是將使國家遂無可恃以造士之地其罪何如哉予愛復可以少年而入此又懼復可萬一為此奪不得終其慕向實學之本心也偶畱叔秀小齋案上有硯墨筆紙故書此寄才甫兄弟使候其歸而以送之以見予區區愛助之心焉送卜塟者覃生歸寧都序程子言親有疾委之庸醫為不慈不孝夫人子不可以不知醫而親没卜塟其事尤重委之庸卜可乎朱子謂古人塟皆取決於卜今人不暁卜法只得從俗用術家擇之愚謂術有疎宻擇塟地而術疎猶之庸醫也醫不皆庸因一庸者而盡謂天下無醫不可也人子當知醫此語有二義證治畧通大概不致為庸醫之所誤一也業醫者不一平日與之接識且以所見聞劑量其高下二也不幸親没而塟所用術家亦猶是矣古人附於棺者必誠必信勿之有悔況安厝之所而可以容悔乎親存而安其體親没而安其體擇醫擇卜求安一也嗚呼人子當親安時誠於兹事諱道不幸有變親友各薦所知雜然至前非能知其所使也外惑於薦者之所主内迫日月之定制而所謂地理又非已之所素講求其不誤難矣哉覃雲甫之術後林先生李侯敬愛之某於雲甫無一日之雅幸而得之以安予親者侯之使來也侯之學無所不通雲甫受知於侯則所挾可知矣雲甫非借侯以為重而某又非徒信侯之一言者聽其議論觀其指畫有契於人心而又感其為予盡心也於其行也序以贈之嗚呼予衰絰中敢文乎哉然亦告夫不幸有親之喪者知吾雲甫為可信而重思古人必誠必信之説而已淳祐己酉李氏賦編序國家以科舉取士士不為舉業者吾見罕矣茍為士則學所當學日孳孳以終其身今移孳孳於舉業於身心則無得於天下國家則無用然而士不敢不為者勢驅之也予昔時從事於此未甞不自笑也以予之心度他人之心知凡為此者通病之也況詞賦之為技視他文尤難精曠旬月而不習則他日抽思良苦他人之已中選者不時取而讀之則無以熟有司之程度常讀常習以俟一日之試幸為有司所中則縁一句一字可以取時名享禄利今之甄拔人才固在一句一字之間也古者人生八嵗入小學十五則入大學士以此自進於聖功而國家以此得王佐今八嵗則習聲律對偶十五則問場屋得失矣嗚呼科舉之害千百年未易議其革也士不能由科舉則所謂讀而習之者亦安能自已哉李君編所謂集賢賦實以資同業者讀習之助也其編始於今嵗推而上至端平甲午繼此皆以日月相次凡省監郡邑學之所取皆在焉魁文録其全篇餘則各韻各對擇其善者其用工斯已勤矣同業之士得之足以省節録之勞而他有以用其暇也歐陽文忠公甞言士學聖人之學逺且大而用工多則聲律之精當有所不暇必有用心精者若櫛之於髪續之於絲雖細且多而條理不亂使學之者有以取焉而得暇以事其所事善哉言乎公所言者聲律也李君所編聲律之文也故予竊取其説以序李之編呉叔椿詩集序近世文慕古而詩尙今其曰古詩學漢魏晉宋體爾餘皆唐甚者專主晚唐未有以刪前詩為詩也孟子直謂王迹熄而詩亡今乃所主如此詩與非與予資鈍而不耐勤視世人用工於文者十不及一至於詩並其一之工無之詩家不知其幾千百予不能成誦一篇也案間有詩集豈不展翫然視詩如文視文如詩未甞用詩家法尋其所謂鍛字煉句者惟意思暇適命兒童善抑揚音節者雜取國風雅頌歌之間與相和當此之時胸襟悠然有不可名之樂視世所謂詩人苦思得句而後自快者予不與易也然則予不作詩而固享有詩之至味矣譬之金石絲簧雅鄭之樂皆所通用予直簣桴土鼔不惟無所好於鄭乃並與雅不與知然簣桴土鼓豈胸中無樂者所能與哉呉君叔椿之詩亦予案間之所展翫也叔椿畱意此者其得詩家法非予所能知然喜而賦憂而賦凡有所為而賦亦各於其性情之所感何必曰此為漢魏晉宋體此為唐體耶予識叔椿而未及深接聞叔椿居家居鄉一二事大抵近厚今年有甚德其父君之賢者為予極口道之叔椿之厚固有自來夫厚詩教也世於詩或刻深然亦象其為人人而厚雖不為今所謂詩而詩之本具矣叔椿没其子某裒其故藁得若干首藏之而屬予序夫予非評詩者也而妄叙其意如此嗟乎某也其無以予言示之詩家乎哉寶祐乙夘五月丙申朔廬陵歐陽某序巽齋文集巻八
