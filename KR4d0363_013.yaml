body:
  text: 巽齋文集卷十三宋歐陽守道撰記州學三賢祠堂記廬陵郡學有唐顔文忠公祠舊矣今太守金華倪侯普附以建中宰相姜公我朝余襄公號三賢祠顔公大歴中别駕姜公永真中刺史余公慶歴間知州事也廬陵稱文獻之邦蓋歐陽文忠公而下皆鄉先生故事學祠之合於有道徳者祀於瞽宗之義顔公京兆人姜公日南人余公曲江人吾郡其仕國也祠之何漢蜀祠文翁南陽九江祠召父其比也而三賢之髙風大節宜表章之為賢者勸則闗於風化又大矣學記曰三王之祭川也先河而後海或源也或委也此之謂務本郡守古諸侯别駕其貳如古命卿此天子所使承流宣化者雖三君子皆以謫至然實風化所繇出其人而賢境内人士固將則象之茲不謂之源與廬陵故屬豫章太守如東漢仲舉既以名節師表海内所蒞之地宜有聞風而興者然尚矣三國六朝守廬陵者名氏皆可攷風流蔑如也唐中世顔公始辱臨之而無君長之權姜公以故相來而新舊史不同蓋莫詳其是否獨余公畱期月而去之蓋邦人利賴其福澤亦淺也然髙風大節皆當時之所素傳則夫一日之親炙與未見而想望之者宜其可以使人沒世而不忘也顔公之來此也與詩人文士倡酬為樂世傳其廬陵集十卷今溪山深處猶有公手自題名刻石如新蓋遷客放浪自適之常而其力抗禄山而折元載之勁氣亦必有得之於容貌詞色間者姜公未必果來就使其來起家一刺史耳閭巷小民安得盡知是嘗策朱泚之必反諫唐安之厚塟者然而為國忠謀觸人主不測之怒未有為士而不講聞之也余公世近郡人紀其居官如詢細民之疾苦疾健吏之刻削往往踐其表謝之言而力行之此求牧與芻者之職公之可敬不在是也為館職救忠賢為諫官排姦倖皆前日事公又非以自多而期人知者然其歸也士有間闗千里渉江逾嶺而從之此豈聲音笑貌之所能動者哉之三賢者功在朝野吾廬陵尚論其世以為猶有君子之澤存焉夫固不待以其立身事君者教人而秉彛好徳自興起於不言之表今居而逢掖出而縉紳皆知以前修自期是可以推其所自來矣倪侯我先皇帝親擢御史也論諫之外宻侍經帷其所開陳與凡欲言而未竟者予時沗同朝得竊聞之去國之三年詔為吾州予里居之暇時時奉候從容意未嘗不在風化也曰國之存亡民之死生寄於士士之人品髙下即與世道為重輕志士仁人儻自任必自養挾書遊學皆當端居深念之矣士亦知侯有素信嚮翕然三賢祠之成也侯屬予記噫此盛心也予敬諾而重其事比侯將去乃克為之屬之權州事孫洙刻石焉夫三賢皆吾州師表侯又表章之使拜於堂下者皆有動乎其心退而又瞻鄉先生之像次第相承以至今日源委皆可睹已先聖有訓焉知來者之不如今也侯今再入為秘書少監兼侍講予與二三子又將於侯觀焉姜公刺州在大用而不得志之後余公晩年驅馳四方以功業終惟顔公再入忠信讜議不衰於前而巋然一節落逆賊之膽而奪之氣蓋尤光明之最君子所不願者其時而乆逺相期為國元老昔在文武不貳心之臣保乂王家用端命於上帝顔公有焉可以為侯願之也詩曰人之好我示我周行又曰無言不讎無徳不報咸淳四年二月壬午朔歐陽守道記吉州吉水縣貢士莊記士大夫出從王事有當為而不及為者矣有可為而不能為者矣為其所不必為者有之乎上不以命我也下不以望我也為之難不為固無咎如此而猶汲汲焉為之其未為也歉然如吾分之不盡也其既為也又歉然如吾義之不終也是何必哉人謂不必為也吾見其不可不為也嗟乎世安得無斯人然亦罕矣三歳科詔取士有司第士之文以其名上謂之鄉貢其人詣行在所逺者至數千里近猶千百里旅食不與給也能行與奉詔者不知吾以其名上吾責塞矣異哉貢也者名上而實從之也士不可以他貢比請比之金玉之貢貢金金至貢玉玉至不充庭非貢也奈何士名既上而能行與否吾不知耶無他彼謂上以禄利誘士士真可以禄利誘也吾上其名在彼已榮彼將自行有不能行吾何以患其不自營不營不行於科目何重何輕持此心以待人是自有科目百世終無自重之士也士不自重曰吾舉子氣習則然固宜爲或者所厭薄然以予觀於廬陵郡邑好修自晦介然有守者雖城郭閭巷常有之山林田野間正自不乏顧彼無求於人又不肯矯然自異故人莫之知耳聞科詔而出以其藝獻君臣之義不可廢也有司旣以爲可貢并日食易衣出者始從今日求貲以行人方羡吾與貢之榮而不知吾于役之苦然則不若不貢猶足以全吾平日之素履也漢舉明經術通世務者縣次續食與計偕今雖無此然縣有賢令則視士之不能出吾境者宜少動心矣吉水郡屬邑之大者應詔之士居八邑十二三焉與選亦如之異時由進士爲臣者誠齋先生楊文節公爲第一而公固寒士也終身由夷之操已見爲舉子時故老所傳猶可畧見其與貢而無以行之狀安步晩食幸而能逹及既入仕而之官也猶然去之百歳後進有化之者其不能行也儻有不腆之田廬則鬻之無則止車馬僕賃之資薪桂㸑玉之費一不以累人也山川猶昔固應生此秀士又况前軰風流未逺乎今三山陳君昇之宰是邑也曰生誠齋之鄉皆可望以誠齋之操然而士不肯求於人可也我聽其自行自止則不可爲政兩年下不忍刻其民上不敢闕版曹之經賦而餘力猶能置田立莊積其租入易鏹而藏之三歳則發焉而等第均送君子曰是舉也君之待士厚而事上敬豈貨財爲禮之謂哉君不謂士一與貢皆汲汲於自行而謂容有不能行亦不以告人者是一以誠齋待之也所謂厚也而何謂事上敬君名莊曰貢士豈以是區區者爲士賜也所重者其人貢矣吾爲吾君敬之敬在貢也貢而逹然後吾事畢也莊成適當分送之歳士既德君而請予記曰莊有記則乆且慮後之守掌者或以一旦之急而移之他用也予曰無之夫君既爲厚於前其誰忍薄於後况此爲貢士設則其存其否上闗於吾國之貢舉焉有上欲士之能來而下乃奪其所以來之資乎且其中有君所捐之俸在君以惠士而誰當取之也不厚且不敬是大不韙後之君子吾見因君之所爲而増廣之焉用爲彼慮哉莊之田租四百石有竒是爲記咸淳三年臘月吉日歐陽守道記善慶堂記趙君覺夫作善慶堂於餘干之私第今禮部侍郎西澗葉公實書其匾而覺夫命某記之某惟覺夫先世積善垂慶之大且逺豈與夫匹庻之家區區一善亦足貽其子孫者槩論某見聞淺狹不足以發揚萬一遜而不敢爲而覺夫固以請廼不果遜覺夫名必道福國陳公所稱篤行趙君之曽孫也篤行公之行至矣竊嘗得朱文公先生之所紀而伏讀之輒悚然起立想其德容而願端拜之自載籍以來所見篤行如此蓋無㡬也而大丞相福國忠定王實爲之子紹興慶元之間作宋周召子子孫孫與國咸休上天福善之理豈不昭然甚明矣哉或曰斯其所以爲覺夫先世之善慶與某對曰噫是何言也詩不云乎亹亹文王令聞不已陳錫哉周侯文王孫子文王孫子本支百世恭惟我太祖太宗聖德神功配天無極本爲天子支爲諸侯自百世至千載何有窮也蓋漢恭憲王太宗之元子七世而生篤行公八世而生大丞相於今甫十世也善慶之源譬之黄河雖世所傳崑崙之自出猶莫可窮况能知其升䧏流通與天相際者然嘗妄論源一也有濬而道之者蓋不皆然其能如此則傳國之長必特異乎其他故曰無念爾祖聿修厥德作是詩者夫豈但爲成王以後本宗言哉支庻皆文王之子孫則修徳永命以各保其家國皆當凛凛而不可忽也春秋列國廢興存亡今可覩已我太祖太宗之支庻由篤行公至於今日天之福是家者特隆夫豈其所偏蓋深惟其積累之初意一意踐修以得此報自然異也以予觀於覺夫秩卑禄薄室宇隘陋侍親來廬陵朝夕惟親之不適是念官爲法掾聽其言未嘗不依於仁恕也歳值艱歉覺夫對予每及之色甚不舒雖非其職有惻然之心焉覺夫留此三年予不能常見於其將歸乃辱論交而得其一二如此其殆如前人之善慶又所謂濬而𨗳之者乎抑予終有感於篤行公之平生蓋其百行之揔朱有出於孝之外也昔讀中庸見所謂天之生物必因其材而篤焉係於舜孝一章之内若曰天之於舜使其宗廟響之子孫保之蓋舜以此得之云爾舜與文王之德一也予既爲覺夫誦文王之詩以眀念祖修德在支庻皆當自勉而復舉中庸之此章蓋篤行公之覆燾後人者有合於斯焉今之於前即後之於今也世世肖似則其爲善慶也愈大以逺矣斯言或可識於覺夫之堂之壁廬陵歐陽守道記四益齋記吾里李君孟仁名其齋居之室曰四益而請記於予無益之言勿聽無益之事勿爲無益之文勿觀無益之友勿親南軒先生張宣公所以誨其仲氏尚書公也去四無益得四有益名取諸此予爲三復宣公之箴而告之曰箴盡矣予何說以記抑予少多病有老人告予盍從事養生之法就問焉其言無以過人也心頗易之予所親藥餌老人視之皆無所可否而予飲啖頗雜稻蔬之外惟所嗜則取之一日食果少過老人愕然曰食此寧有益乎予曰縱無益寧有損老人歎曰宜子之多病也無益即有損也豈有既無益而又不損者人之胃氣日夜運動㪚食物之英華以爲榮衛故惟胃最勞然惟其有益於榮衛也今子取適口而役胃於徒勞雖珍果鮮錯與土炭何異曷若盡罷使胃得休息以時而納常膳胃得其職則百體安矣予悚然敬受其言而因以悟曰古人言無益能害有益不曰有損者能害有益也人皆避有損之害而未必避無益之害有損之害易見無益之害難知有損之害如惡毒之物自古明著其說曰食之能傷某臟發某疾故人不食也無益之害前所云是予之病豈惟體膚而已德之不修學之不講抑坐此也故曰無益之言勿聽不必曰招尤速禍之言而後勿聽也無益之事勿爲不必曰反道敗德之事而後勿爲也無益之文勿觀不必曰惑世誣民之文而後勿觀也無益之友勿親不必曰𨗳邪濟惡之友而後勿親也無益也者凢不足爲有無者也嚴哉宣公之箴果哉孟仁之志乎子無以告君矣雖然四箴之中所謂無益之文勿觀者謂出乎人之文也予欲試附一語於右曰無益之文勿作謂出乎已之文也古人之文至於今百世惟其有益故常存也今競詩文誇四六敏者既以所嗜不自休鈍者亦復抽揠窮日以取妍此人通知其無益而甘爲之者徃時䝉齋袁公亦嘗告其所厚曰毋弊精神於蹇淺聞者爲之絶筆夫愛養精神而用於所當學此進德修業之所以得及時也寳祐二十年二月六日㢲齋歐陽某記定軒記予友瀏陽胡君景富匾其讀書之所曰定軒書來求文爲記或曰果哉景富遽以定自居乎予曰定也者游心於外方自此已專心於内方自此始也此景富識所見也猶曰居之太遽則終身倀倀何之乎大學曰知止而后有定定而后能静静而后能安安而后能慮慮而后能得由定望得非一及也然定則可以專矣且不見夫卜居者乎方其未得卜也將之左意其宜於右也將之前意其宜於後也相攸未决乃心方惑雖欲營之如之何營之厥既得卜心不二向縱有二議莫之能摇於此擇匠於此選材於此畫規模於此成棟宇而於此安吾身於此長子孫其决在一得卜時也擇匠選材畫規模成棟宇得卜之後正爾有事則定也者豈謂自居之適而遂無所用心也哉人非生而知之者其始學未有遽見其的也顔子天資亞聖猶曰仰之彌髙鑽之彌堅瞻之在前忽焉在後當此之時㡬無所措力程張朱子由今觀之可謂上接孔孟矣而汎濫於諸家出入於老釋昔者莫能免况他人乎顔子得夫子博以文約以禮然後實見所立卓爾之地程子求道之志茫然者十年然後反求之六經而得之張子見二程然後自信曰吾道自足朱子見李延平然後就平實而悟前日之說皆非此先師諸老知止有定時也景富試觀先師諸老既定之後所有事者何如則循此以至於得乃可言矣世有資禀絶人獨於道則無見一彼一此莫之有定遂䧟於迷誤者亦有早遇師友粗有見聞定則定矣而不盡心於所有事均之爲無所得者故曰定非終事惟知終事之不出乎此而汲汲焉求以終之可也予與景富相知於文字間者十有餘年去年予來嶽麓始有交遊之契蓋孫而敏者也每以書來予畏君之進如川之方至以莫不増則夫以定名軒也予知其端居於此若將終身一毫外騖之相不存而益致其力於知止並進之域其得也孰禦夫未定患乎於外者之廣莫既定患乎於内者之狹隘予前不云卜居者乎相攸决矣於此篳門蓬户於此築室百堵夫各一居也景富擇之廬陵歐陽某記石礱廟碑石礱廟在廬陵郡東十里不知創何代今天子以郡士言神靈異有狀甫賜廟額曰孚應相傳神姓劉氏諱煐與石勲石材廟爲伯仲季漢長沙王後也然無所考三廟相距一二十里皆依石爲屋而石礱尤竒險宜爲神所宅然予謂斯神亦安用知名若氏哉自古相傳巖棲谷隱之士雖不屑爲世用而其功利有自然及物人神一也藐姑射山有神畏壘山有老氏之役疵厲不作而年榖屡豐吾不知其何故石韞玉水含珠山輝川媚猶不容揜而况德人之所居乎夫德人固辭名名從之非其心也石礱廟祝有年逺近之民躋舉請禱神既應之矣則相與推尋名氏而請廟號以爲榮既有廟號則他日君之公之侯之王之下得屡請而上不靳神居石礱而承天之寵如是哉以予觀於石礱其山谷連接蓋自芙蓉峰蜿蜒而下上迎大江方其未爲石礱土石相半至此乃純石牙角怒㧞若龍若虎而瑩净堅細率可愛玩世之好事者第太湖之甲乙拾菱溪之一二詫以爲異寳此乃山積林立不待聚而有之其峭㧞處有瀑布斗落以故居民絶逺樵牧無所利而至使其不爲神有亦必有隱君子即之矣以理推之神其或者斯人之流不然則茲山骨脉堅壯氣勢磅礴又有以發神之靈而相為用宜神之靈異也景定元年春予留山下月餘識其里人王君國英王君嚴事斯神甚至以神之廟號一新而未有碑來求予文乃爲言神之所以爲神而又作詩以相里人之有祈者疇居此山非人伊神不顯維神有澤及民既祀之廟又請於朝天子有命神德孔昭山石巖巖幽居之最胡能及物使物䝉賴吾聞至人退然無爲功被天下而物不知譬如空谷聲至響答響從何出聲亦誰納及物無心况尸其名匪我應彼彼則有情孰像神容命服是飾那知超然揮斥八極當其潛時卷石可宫翕忽變化乗雲馭風我不知神昔者誰氏視其擇居如隱君子禦灾捍患人則德之千古石礱社而稷之巽齋文集卷十三
