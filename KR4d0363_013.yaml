body:
  text: 巽齋文集卷十三宋歐陽守道撰記州學三賢祠堂記廬陵郡學有唐顔文忠公祠舊矣今太守金華倪侯普附以建中宰相薑公我朝余襄公號三賢祠顔公大歷中别駕薑公永真中刺史余公慶歷間知州事也廬陵稱文獻之邦蓋歐陽文忠公而下皆鄉先生故事學祠之合於有道德者祀於瞽宗之義顔公京兆人薑公日南人余公曲江人吾郡其仕國也祠之何漢蜀祠文翁南陽九江祠召父其比也而三賢之髙風大節宜表章之為賢者勸則關於風化又大矣學記曰三王之祭川也先河而後海或源也或委也此之謂務本郡守古諸侯别駕其二如古命卿此天子所使承流宣化者雖三君子皆以謫至然實風化所繇出其人而賢境內人士固將則象之茲不謂之源與廬陵故屬豫章太守如東漢仲舉既以名節師表海內所蒞之地宜有聞風而興者然尚矣三國六朝守廬陵者名氏皆可考風流蔑如也唐中世顔公始辱臨之而無君長之權薑公以故相來而新舊史不同蓋莫詳其是否獨余公留期月而去之蓋邦人利賴其福澤亦淺也然髙風大節皆當時之所素傳則夫一日之親炙與未見而想望之者宜其可以使人沒世而不忘也顔公之來此也與詩人文士倡酬為樂世傳其廬陵集十卷今溪山深處猶有公手自題名刻石如新蓋遷客放浪自適之常而其力抗祿山而折元載之徑氣亦必有得之於容貌詞色間者薑公未必果來就使其來起家一刺史耳閭巷小民安得盡知是嘗策朱泚之必反諫唐安之厚葬者然而為國忠謀觸人主不測之怒未有為士而不講聞之也余公世近郡人紀其居官如詢細民之疾苦疾健吏之刻削往往踐其表謝之言而力行之此求牧與芻者之職公之可敬不在是也為館職救忠賢為諫官排姦幸皆前日事公又非以自多而期人知者然其歸也士有間關千里涉江逾嶺而從之此豈聲音笑貌之所能動者哉之三賢者功在朝野吾廬陵尚論其世以為猶有君子之澤存焉夫固不待以其立身事君者教人而秉彛好德自興起於不言之表今居而逢掖出而縉紳皆知以前修自期是可以推其所自來矣倪侯我先皇帝親擢御史也論諫之外密侍經帷其所開陳與凡欲言而未竟者豫時沗同朝得竊聞之去國之三年詔為吾州豫里居之暇時時奉候從容意未嘗不在風化也曰國之存亡民之死生寄於士士之人品髙下即與世道為重輕志士仁人儻自任必自養挾書遊學皆當端居深念之矣士亦知侯有素信嚮翕然三賢祠之成也侯屬豫記噫此盛心也豫敬諾而重其事比侯將去乃克為之屬之權州事孫洙刻石焉夫三賢皆吾州師表侯又表章之使拜於堂下者皆有動乎其心退而又瞻鄉先生之像次第相承以至今日源委皆可睹已先聖有訓焉知來者之不如今也侯今再入為祕書少監兼侍講豫與二三子又將於侯觀焉薑公刺州在大用而不得志之後余公晚年驅馳四方以功業終惟顔公再入忠信讜議不衰於前而巋然一節落逆賊之膽而奪之氣蓋尤光明之最君子所不願者其時而久逺相期為國元老昔在文武不二心之臣保乂王家用端命於上帝顔公有焉可以為侯願之也詩曰人之好我示我周行又曰無言不讎無德不報咸淳四年二月壬午朔歐陽守道記吉州吉水縣貢士莊記士大夫出從王事有當為而不及為者矣有可為而不能為者矣為其所不必為者有之乎上不以命我也下不以望我也為之難不為固無咎如此而猶汲汲焉為之其未為也歉然如吾分之不盡也其既為也又歉然如吾義之不終也是何必哉人謂不必為也吾見其不可不為也嗟乎世安得無斯人然亦罕矣三歲科詔取士有司第士之文以其名上謂之鄉貢其人詣行在所逺者至數千里近猶千百里旅食不與給也能行與奉詔者不知吾以其名上吾責塞矣異哉貢也者名上而實從之也士不可以他貢比請比之金玉之貢貢金金至貢玉玉至不充庭非貢也奈何士名既上而能行與否吾不知耶無他彼謂上以祿利誘士士真可以祿利誘也吾上其名在彼已榮彼將自行有不能行吾何以患其不自營不營不行於科目何重何輕持此心以待人是自有科目百世終無自重之士也士不自重曰吾舉子氣習則然固宜為或者所厭薄然以豫觀於廬陵郡邑好修自晦介然有守者雖城郭閭巷常有之山林田野間正自不乏顧彼無求於人又不肯矯然自異故人莫之知耳聞科詔而出以其藝獻君臣之義不可廢也有司既以為可貢并日食易衣出者始從今日求資以行人方羡吾與貢之榮而不知吾于役之苦然則不若不貢猶足以全吾平日之素履也漢舉明經術通世務者縣次續食與計偕今雖無此然縣有賢令則視士之不能出吾境者宜少動心矣吉水郡屬邑之大者應詔之士居八邑十二三焉與選亦如之異時由進士為臣者誠齋先生楊文節公為第一而公固寒士也終身由夷之操已見為舉子時故老所傳猶可略見其與貢而無以行之狀安步晚食幸而能逹及既入仕而之官也猶然去之百歲後進有化之者其不能行也儻有不腆之田廬則鬻之無則止車馬僕賃之資薪桂㸑玉之費一不以纍人也山川猶昔固應生此秀士又况前輩風流未逺乎今三山陳君升之宰是邑也曰生誠齋之鄉皆可望以誠齋之操然而士不肯求於人可也我聽其自行自止則不可為政兩年下不忍刻其民上不敢闕版曹之經賦而餘力猶能置田立莊積其租入易鏹而藏之三歲則發焉而等第均送君子曰是舉也君之待士厚而事上敬豈貨財為禮之謂哉君不謂士一與貢皆汲汲於自行而謂容有不能行亦不以告人者是一以誠齋待之也所謂厚也而何謂事上敬君名莊曰貢士豈以是區區者為士賜也所重者其人貢矣吾為吾君敬之敬在貢也貢而逹然後吾事畢也莊成適當分送之歲士既德君而請豫記曰莊有記則久且慮後之守掌者或以一旦之急而移之他用也豫曰無之夫君既為厚於前其誰忍薄於後况此為貢士設則其存其否上關於吾國之貢舉焉有上欲士之能來而下乃奪其所以來之資乎且其中有君所捐之俸在君以惠士而誰當取之也不厚且不敬是大不韙後之君子吾見因君之所為而增廣之焉用為彼慮哉莊之田租四百石有竒是為記咸淳三年臘月吉日歐陽守道記善慶堂記趙君覺夫作善慶堂於餘干之私第今禮部侍郎西澗葉公實書其匾而覺夫命某記之某惟覺夫先世積善垂慶之大且逺豈與夫匹庶之家區區一善亦足貽其子孫者槩論某見聞淺狹不足以發揚萬一遜而不敢為而覺夫固以請乃不果遜覺夫名必道福國陳公所稱篤行趙君之曽孫也篤行公之行至矣竊嘗得朱文公先生之所紀而伏讀之輒悚然起立想其德容而願端拜之自載籍以來所見篤行如此蓋無幾也而大丞相福國忠定王實為之子紹興慶元之間作宋周召子子孫孫與國咸休上天福善之理豈不昭然甚明矣哉或曰斯其所以為覺夫先世之善慶與某對曰噫是何言也詩不云乎亹亹文王令聞不已陳錫哉周侯文王孫子文王孫子本支百世恭惟我太祖太宗聖德神功配天無極本為天子支為諸侯自百世至千載何有窮也蓋漢恭憲王太宗之元子七世而生篤行公八世而生大丞相於今甫十世也善慶之源譬之黃河雖世所傳崑崙之自出猶莫可窮况能知其升降流通與天相際者然嘗妄論源一也有濬而道之者蓋不皆然其能如此則傳國之長必特異乎其他故曰無念爾祖聿修厥德作是詩者夫豈但為成王以後本宗言哉支庶皆文王之子孫則修德永命以各保其家國皆當凛凛而不可忽也春秋列國廢興存亡今可覩已我太祖太宗之支庶由篤行公至於今日天之福是家者特隆夫豈其所偏蓋深惟其積纍之初意一意踐修以得此報自然異也以豫觀於覺夫秩卑祿薄室宇隘陋侍親來廬陵朝夕惟親之不適是念官為法掾聽其言未嘗不依於仁恕也歲值艱歉覺夫對豫每及之色甚不舒雖非其職有惻然之心焉覺夫留此三年豫不能常見於其將歸乃辱論交而得其一二如此其殆如前人之善慶又所謂濬而𨗳之者乎抑豫終有感於篤行公之平生蓋其百行之揔朱有出於孝之外也昔讀中庸見所謂天之生物必因其材而篤焉係於舜孝一章之內若曰天之於舜使其宗廟響之子孫保之蓋舜以此得之云爾舜與文王之德一也豫既為覺夫誦文王之詩以眀念祖修德在支庶皆當自勉而復舉中庸之此章蓋篤行公之覆燾後人者有合於斯焉今之於前即後之於今也世世肖似則其為善慶也愈大以逺矣斯言或可識於覺夫之堂之壁廬陵歐陽守道記四益齋記吾里李君孟仁名其齋居之室曰四益而請記於豫無益之言勿聽無益之事勿為無益之文勿觀無益之友勿親南軒先生張宣公所以誨其仲氏尚書公也去四無益得四有益名取諸此豫為三復宣公之針而告之曰針盡矣豫何説以記抑豫少多病有老人告豫盍從事養生之法就問焉其言無以過人也心頗易之豫所親藥餌老人視之皆無所可否而豫飲啖頗雜稻蔬之外惟所嗜則取之一日食果少過老人愕然曰食此寧有益乎豫曰縱無益寧有損老人歎曰宜子之多病也無益即有損也豈有既無益而又不損者人之胃氣日夜運動散食物之英華以為榮衛故惟胃最勞然惟其有益於榮衛也今子取適口而役胃於徒勞雖珍果鮮錯與土炭何異曷若盡罷使胃得休息以時而納常膳胃得其職則百體安矣豫悚然敬受其言而因以悟曰古人言無益能害有益不曰有損者能害有益也人皆避有損之害而未必避無益之害有損之害易見無益之害難知有損之害如惡毒之物自古明著其説曰食之能傷某臟發某疾故人不食也無益之害前所云是豫之病豈惟體膚而已德之不修學之不講抑坐此也故曰無益之言勿聽不必曰招尤速禍之言而後勿聽也無益之事勿為不必曰反道敗德之事而後勿為也無益之文勿觀不必曰惑世誣民之文而後勿觀也無益之友勿親不必曰𨗳邪濟惡之友而後勿親也無益也者凡不足為有無者也嚴哉宣公之針果哉孟仁之志乎子無以告君矣雖然四針之中所謂無益之文勿觀者謂出乎人之文也豫欲試附一語於右曰無益之文勿作謂出乎已之文也古人之文至於今百世惟其有益故常存也今競詩文誇四六敏者既以所嗜不自休鈍者亦復抽揠窮日以取妍此人通知其無益而甘為之者往時蒙齋袁公亦嘗告其所厚曰毋弊精神於蹇淺聞者為之絶筆夫愛養精神而用於所當學此進德修業之所以得及時也寶祐二十年二月六日巽齋歐陽某記定軒記豫友瀏陽胡君景富匾其讀書之所曰定軒書來求文為記或曰果哉景富遽以定自居乎豫曰定也者遊心於外方自此已專心於內方自此始也此景富識所見也猶曰居之太遽則終身倀倀何之乎大學曰知止而后有定定而后能靜靜而后能安安而后能慮慮而后能得由定望得非一及也然定則可以專矣且不見夫卜居者乎方其未得卜也將之左意其宜於右也將之前意其宜於後也相攸未決乃心方惑雖欲營之如之何營之厥既得卜心不二向縱有二議莫之能搖於此擇匠於此選材於此畫規模於此成棟宇而於此安吾身於此長子孫其決在一得卜時也擇匠選材畫規模成棟宇得卜之後正爾有事則定也者豈謂自居之適而遂無所用心也哉人非生而知之者其始學未有遽見其的也顔子天資亞聖猶曰仰之彌髙鑽之彌堅瞻之在前忽焉在後當此之時幾無所措力程張朱子由今觀之可謂上接孔孟矣而泛濫於諸家出入於老釋昔者莫能免况他人乎顔子得夫子博以文約以禮然後實見所立卓爾之地程子求道之志茫然者十年然後反求之六經而得之張子見二程然後自信曰吾道自足朱子見李延平然後就平實而悟前日之説皆非此先師諸老知止有定時也景富試觀先師諸老既定之後所有事者何如則循此以至於得乃可言矣世有資稟絶人獨於道則無見一彼一此莫之有定遂陷於迷誤者亦有早遇師友粗有見聞定則定矣而不盡心於所有事均之為無所得者故曰定非終事惟知終事之不出乎此而汲汲焉求以終之可也豫與景富相知於文字間者十有餘年去年豫來嶽麓始有交遊之契蓋孫而敏者也每以書來豫畏君之進如川之方至以莫不增則夫以定名軒也豫知其端居於此若將終身一毫外騖之相不存而益致其力於知止並進之域其得也孰禦夫未定患乎於外者之廣莫既定患乎於內者之狹隘豫前不云卜居者乎相攸決矣於此篳門蓬户於此築室百堵夫各一居也景富擇之廬陵歐陽某記石礱廟碑石礱廟在廬陵郡東十里不知創何代今天子以郡士言神靈異有狀甫賜廟額曰孚應相傳神姓劉氏諱煐與石勳石材廟為伯仲季漢長沙王後也然無所考三廟相距一二十里皆依石為屋而石礱尤竒險宜為神所宅然豫謂斯神亦安用知名若氏哉自古相傳巖棲谷隱之士雖不屑為世用而其功利有自然及物人神一也藐姑射山有神畏壘山有老氏之役疵厲不作而年榖屢豐吾不知其何故石韞玉水含珠山輝川媚猶不容掩而况德人之所居乎夫德人固辭名名從之非其心也石礱廟祝有年逺近之民躋舉請禱神既應之矣則相與推尋名氏而請廟號以為榮既有廟號則他日君之公之侯之王之下得屢請而上不靳神居石礱而承天之寵如是哉以豫觀於石礱其山谷連接蓋自芙蓉峰蜿蜒而下上迎大江方其未為石礱土石相半至此乃純石牙角怒拔若龍若虎而瑩淨堅細率可愛玩世之好事者第太湖之甲乙拾菱溪之一二詫以為異寶此乃山積林立不待聚而有之其峭拔處有瀑布斗落以故居民絶逺樵牧無所利而至使其不為神有亦必有隱君子即之矣以理推之神其或者斯人之流不然則茲山骨脈堅壯氣勢磅礴又有以發神之靈而相為用宜神之靈異也景定元年春豫留山下月餘識其里人王君國英王君嚴事斯神甚至以神之廟號一新而未有碑來求豫文乃為言神之所以為神而又作詩以相里人之有祈者疇居此山非人伊神不顯維神有澤及民既祀之廟又請於朝天子有命神德孔昭山石巖巖幽居之最胡能及物使物蒙賴吾聞至人退然無為功被天下而物不知譬如空谷聲至響答響從何出聲亦誰納及物無心况尸其名匪我應彼彼則有情孰像神容命服是飾那知超然揮斥八極當其潛時卷石可宫翕忽變化乘雲馭風我不知神昔者誰氏視其擇居如隱君子禦災捍患人則德之千古石礱社而稷之巽齋文集卷十三
