body:
  text: 巽齋文集卷二十四宋歐陽守道撰説黃強立字説強立強斯立也人皆欲有所立立而依附之待何立之云或曰依附當問正邪是非人固有師友固有氣類概謂不可自愚也自孤也豫曰不然後進師先進期於似之非依附也道義同則相親我於彼猶彼於我非依附也依附也者已不足也已不足者才無彼即無以為我也夫已之不足無亦反求諸已使充實有餘奈何若弱蔓之於長松然哉反求諸已使充實有餘強者之事如此者立黃君幼端梗立不倚豫字以此夫立卓哉豫有志焉而未之自信也豫之志立猶嬰兒之初嬰兒之立也每踣今日才斯須而踣他日倍此久而後踣又他日數倍此久而後踣以至於終不踣則是立也立而又踣踣而又立其氣力何如也德業人之氣力也一立而遂不踣者充實有餘也史策所載有特立者有與人俱立者當其立未有以異也彼失所與俱或前立而後踣然後知特立之為真立也嗟乎君既字強立矣豫觀君君亦觀余今日未也相期於他日時出而共讀之臞山説萬安賴君子平豫識之十五年其為人有出塵之姿號其所居曰臞山蓋取司馬相如所謂山澤之臞之云而用栁宗元蒙愚於溪之意鄉之逹尊名士為詩賦之皆謂刻苦詩文清峭不俗此賴君所以臞而遂指山以自况也君又徴豫贈言其敢無以告君雖然請異乎諸公之撰今夫腹飽穢腥靣盈垢膩使人望而憎之者雖儒冠在首夫固非吾徒也目茫乎其逺望意有注而凝思精神凛然骨見衣表此世之清士非邪然豫請有以問之行道如醉閔宗周乎哀吟憔悴思懷王乎食少盡瘁為蜀漢之偏安乎攢眉吞哭為安史之挻亂乎身須人扶死不瞑目為熙豐新法之未變乎斯人身任乎國家志存乎君父憂憤菀結雖欲自解而不得也不然則吾身亦甚重矣而敢不自愛哉誠意不欺心廣者體胖也集義養氣浩然者無餒也公孫碩膚赤舄几几周公不以拂亂動心而申申夭夭夫子燕居之氣象也若此者固不以專論形骸然而道義充周之士枯稿者亦鮮矣且吾身固將以有為也血氣盛衰精神壯老豈於天運世道無相干涉而敢輕役之乎然而世之雕琢天和以求工於無益之詩文者恐與酒色傷生較得失於尺寸間也夫臞必有為而臞幸無憂憤菀結如前數君子之所遇則宜有學道養心之樂以敬天之所付賴君學者吾知不因詩文臞矣吾恐後人徒見賴君工於詩文而謂君以不資之身如此而溺於所嗜也故告之以此願君審輕重決去取而厚自愛焉璞説贈彭君碩吾嘗惡卞和以為和賊夫荆山之玉者也玉在璞無人知之是塊然者一石而已矣玉何與和事而必欲出之三獻三刖無亦天地之寶惡夫賊之者玉實不幸和以自纍足不足弔也君以璞自命璞也願君無遇和也玉在璞璞在山猶不幸而蒙斯人之知奈何君日與人接而文采每每發見不少自閉乎彼將剖君之璞使君之一旦赫然露於世則君將奈何嗟乎君自此詩文可以無作矣柝説里有富者重門擊柝夜柝聲徹明一旦正晝暴客來虛潛一人於門內之隱處深夜啓門納其徒執擊柝者殺之以其柝終夜擊主人家長幼寐且寤聞柝聲以為安也天明而興視室户洞開囊槖器具掃地空矣怒擊柝者不職曰何終夜有聲曾不知盜之已入乎遍呼其人不得得其尸君子曰主人之遭誤也以柝之不絶聲也盜可謂黠矣使殺擊柝者而廢柝不鳴主人必疑怪起燭之今柝聲無異於常夜故恣盜至明主人不覺也仁義道德之言非大柝也邪墨説余於墨不能評近一道士訪余案間有胡朝宗墨寸許道士取玩之歎美再三曰今人少能作也余問道士此有何異而歎若是道士曰俗墨熱此墨寒俗墨著硯散而少凝渴而頻飲非硯罪也墨去熱未盡也墨質膠煤為之安得不熱脫胎換骨之法能使膠煤為氷玉則墨之妙至矣墨寒者其德貞君試取此墨用於未滌之硯純墨自聚不為餘塵故穢所侵奪經宿硯乾其光濡如余驗之信蓋自此益寶朝宗墨而道士膠煤氷玉之語要是墨中至理不可以無傳因書遺朝宗道士軒轅抱一會稽人則齋説贈胡聖則聖則名齋則問豫則豫謂即古人執柯伐柯之則今以物相凖皆曰則手約大小曰手則身度長短曰身則以舊凖新曰舊則又如物之重恰及千錢無過不及曰一則皆俗語也而則之義甚明則格樣也所謂有物必有則蓋合格入樣處父必慈子必孝父子之則君必仁臣必敬君臣之則不然則君不君臣不臣父不父子不子是此物非此則近諸身冠以首為則袂以臂為則帶以腰為則屨以足為則各於其當然者為則茍失其則冠袂帶屨皆為無用則亦焉用他求當然而然斯之謂已然則為人當何如曰人以聖為則聖者人之成式也故曰知之曰明哲明哲實作則人以天為則天者人之成式也故曰惟天為大惟堯則之人之則聖聖之則天皆其理當然此求於合格入樣吾懼夫世之言則者太精微太髙妙故以俗語告聖則請聖則以合格入樣為終身之則廬陵歐陽某説歐陽順升字説同姓名木居安成黃牛石者請字於余余字以順升他日其伯父寧鄉主簿遣順升來請字説豫告之曰順地道也木得地道以生故以順而條逹暢茂幹幾柯幾枝枝幾葉有一葉反而向下者乎試強之以向下則悴而稿矣地道承天木生於地而上聳其理然也是之謂升人之升於德亦然無非順者仁為順不仁為逆義為順不義為逆孝弟謂之順德又先儒釋名義之最親切者也前百順而後一逆百順為一逆敗矣積小以髙大者非百順之難而無一逆之難順升戒哉任法任人説甲與乙為友一日議逺遊乙曰吾與若相好有日矣而道途之事未之諳也請歸各治行李若其謹哉甲曰諾乙歸踰月而告甲曰吾行李具矣甲曰何久也乙曰吾治筐篚工五日而告具吾治吾鎖鑰工不終日而告具吾視之皆不堅良也盡舍之易他工筐篚十有五日而告具鎖鑰三日而告具吾然後敢以行也甲曰子何謹哉吾不能望子乙曰子之行奈何甲出而示之其不堅良尚不能如乙之前所棄也乙曰茲行也非嵗月可議歸也而率易若此奈何甲曰無憂也吾之荷以行者其人忠於是二人具行未半途而乙逸其僕筐篚鎖鑰堅良也僕負之以逃乙追之不可又不能返也依甲以俟俱返甲之資裝厚極其所之而後議歸一日僕驚呼而告曰僕所負故也今晨起而輕於他日主盍發視之視之則喪者過半矣僕以為朝夕守視莫知喪之何時也蓋幸而僅有存者甲乙俱困以歸乙問甲曰吾僕負我子謂子之荷者忠而何為喪之不自保也甲曰噫吾留意於擇僕而率易於治裝子留意於治裝而率易於任人二者胥失也然豫所遇者竊盜之自外至者也餘資之僅存者幸爾雖然亦愈於子僕一逸而盡空也有説國事者聞之曰甲任人之類也乙任法之類也任法者自謂關防周密而不知所任非人則并與關防者而盜之任人者能擇可任而任之矣而關防無法則禍蠧將出於所不意而為我任者亦莫如之何也或曰不然甲遇盜是無如之何也使盜盡奪之縱關防周密亦必不免而何率易之罪哉彼乙留意於筐篚鎖鑰曾不知荷者之即盜也甲所遇盜禍在所遇之時乙則未出門而知其必喪矣此任法不若任人之説也陳山長字説會稽陳君以開慶己未來廬陵秋八月望為諸生講中庸大義豫之子浚與聽焉退而私請於余曰陳先生之所講雖非浚之所能盡逹然其反覆懇到作為大篇宜有可以句尋字繹浚也他有疑焉而不敢問也豫曰何哉爾所疑者曰先生之名既取夫粲焉可見之義而其字子微反若晦匿沈潛而不知何也豫曰汝未可以驟語然所貴乎學學乎此也天有四時風雨霜露無非教也地載神氣神氣風霆風霆流形庶物露生天地之變化如此孰得而窺其所以然者故曰君子之道費而隱用之而不匱取之而愈有者隱也隱也者始乎隱終乎隱也學者豈不知所謂體用本末然大抵謂隱而費耳惟中庸言費而隱蓋酬酢萬變而不與俱往猶易大傳顯諸體藏諸用不曰顯諸用藏諸體也學不進此則有即物即物也者非世俗區區之所謂即物也名垂千古功濟天下由即物也豫嘗喻之賢聖之道如日月萬物被其光而日月不施明焉彼即物者燎薪者也燎止而灰燼矣中庸一書或言隱或言微知之者可與入德極德之至溥博淵泉而時出之其末章曰德輶如毛毛猶有倫上天之載無聲無臭至矣卓然有德於此者豈非富有之謂大業日新之謂盛德哉豈非君子盛行不加窮居不損者哉豫比與陳君語知其為灑落人也宜以此字表此名也汝他日侍側試以余言叩之浚他日以豫言叩之陳君曰然因録為陳君字説岫雲説人之狀山形者曰巔曰頂曰靣曰背曰腰曰足皆取諸身也曰嶺何也嶺猶領也曰岫何也曰岫猶袖也嶺髙而未極於高如衣領然岫則藏蓄如納物袖中靖節曰雲無心以出岫蓋岫可藏雲也逸上人在石屋山中性極好間而山又深窈與間相宜請兩字於豫以為號為號之曰岫雲雲飄搖空中為風使也岫之形橫遮直障風不得入故雲可以無出夫岫中有雲而風不知雲之打乖安樂窩莫宜於此逸上人知之乎汝為雲豫當為此岫主而日玩汝焉雲不肯為雨則不黑不肯上薄日月則不隨早暮晦明以變於是乎滿岫純白郁郁紛紛常供岫中主人之玩而岫外不得知雲可謂自適矣作字遺之因以為説羅象先字説湖西羅士從遣其兄之子似公來見既見則得士從之書曰斯子也質美而學知方矣願有以教之豫敬受而問其字焉曰未也似公之生日月與時皆與先祖同故以名惟先生教之豫字之曰象先而為之説人之祖父生子孫無不願其肖已也歉然以已為未足又願其等而上之然而得其肖者難矣祖父願得肖子亦常恐其不克肖則有等而上之之理而子孫不敢知也夙興夜寐無忝爾所生而已詩書以來教人皆然近世學者年未弱冠曰吾學大學矣人當作第一等人也孝弟忠信童子之習聞也性與天道聖人之精藴也斯人也夷考其終第一等人正未易作而凌忽時人貶斥前輩一切謂不足道不自知其陷於輕薄子之歸甚則侮厥父母曰昔之人無聞知矣嗚呼安得厚重少文之士與之學古之躬行君子乎豫嘗疑三代之後本朝之前千百年間名賢言行甚多若擇而録之何必盡劣於近世之先正蓄德之助是亦有取竊有意焉而未暇也象先之名唐之陸文正公得於人主之所命曰子能紹先是謂象賢故易其舊名景初而賜焉陸公之賢不在以賜名為榮而真有以象其先人者乃榮也其父元方仕不遇時而正直清謹善自治於昏亂之際而無玷象先似之為一時望其兄弟俱有可稱蓋是父有以貽後人矣記曰使人稱君子之子是使其親為君子也况其親素為君子者乎羅氏孫於爾祖其如此象之罔使陸氏專美於唐豫雖不識羅氏祖而其諸父兄弟則多識之矣世積之善必有自來惟其有之是以似之象先勉之陳惟月字説陳氏子惟月從豫學舉子之文有年今嵗戊辰補太學生將行而問曰惟月之名取洪範所謂卿士惟月也字以月卿里中之友云爾卿君所以命臣也惟月方學而以洪範卿士自居其何敢願易字於先生而受教焉豫曰善遂字之曰學可請其説豫曰積日為月積月為嵗天也人君以釐百工故躬自以嵗省而卿士月省焉師尹日省焉民則觀星以知時作事自天子以至臣民無一人敢曠日也士下無庶民之勞而上未有百官之職則何所用其日力孔子之門其自程課者曰日知其所亡月無忘其所能可謂好學也已矣是亦以日月計也日知其所亡者吾知所未學凡幾昨未學則今學之不宜曠今日而俟明日也月無忘其所能吾知所已學者有幾今已學則後不可忘之不宜新功未續而故業又失也學如不及猶恐失之古之學者汲汲如此吾子以惟月名則其以月省省其學而已矣嵗十二月使一月增一能尚可積而多能也况月之所增不於一而止乎吾子今入太學太學月有書進退優劣師儒視其藝而程課之進而優則升舍而釋褐此學法也然用其力於藝至釋褐至矣學官以教育英才為已任者豈期望弟子止此乎豫私孰之友出幽遷喬得列於太學生者恆有之仕與未仕去留相半以吾子之藝而自視同門之前輩孰愈當自知之况四方多士林立於前往往平日傳録其所著作而讀之者今乃與之俱就師儒之衡鑒吾知吾子慨然矣雖然所貴乎入太學為其有四方多士可以相觀也徒慨然則不可其必有思齊之心吾子亦月異而嵗不同矣月異而歲不同何獨藝也他日願見吾子之為文而驚焉今之學官蓋有豫之夙昔師友余以病不能奉竿牘介吾子而見於門然吾子既為其諸生矣不在豫之介也既拜而得侍函丈之席其以豫之贈吾子者告以聞而歸還以教豫十二月庚寅歐陽某書掌卑幼財産説昨見某氏卑幼之訟謂掌管者不照常平法不於逐年理算二分營運出息飬贍心竊疑之若法果如此則掌管者更與孤幼作幹人也恐法意不然今日讀法乃知卑幼財産籍記於官季一給之若家資不滿五千貫者入詞召保抵當給借每歲營二分之息出入有常平司常覽察之語蓋法意以其原財有限若今季給若干明季給若干則有時而盡故於此少者給借此營運之本也可謂慮之周矣倘執此為説便謂凡掌管卑幼者於其所有財産之數萬則出息二千十萬則出息二萬百萬則有二十萬是卑幼安坐役其尊長作幹人也十數年未成丁則息錢多至於無算成丁自立之後皆可以訟其尊長取息錢也法豈使如此多財者更須營運乎今世此訟甚多仕初入官不肯讀法詞狀到前每為所惑不可不戒也寶祐乙卯上已書劉暉明夫字説東岡劉君暉得字於鄉之逹尊曰明夫而問豫字説君之字因名生也臨文不容避君之名蓋聞暉也者光也景德廣韻注輝輝皆釋曰光而暉之下文釋曰日色玉篇亦然君之字明夫蓋取日光為義然玉篇眀字不從日而從目故日部凡二百四十字暉字在焉而明字獨不與别自有眀部凡三字而已釋云察也清也審也發也廣韻亦同釋云察也目部凡三百四十字眀字復與焉釋云視也豫於是疑古人所謂眀之從目正如聰之從耳玉篇釋聰為察故釋眀亦為察如取察義則從目宜矣然易之離為日象明兩作離明出地上明入地中之類亦以明字代日則明從日為是不知玉篇何以收眀於目部不收明於日部也揚子雲言日者羣目之用道者羣心之用蓋曰心者體也道則心之用也目者體也日則目之用也此二語可以復君然則眀固在我而已使眀不在我雖有日亦何所施明夫求諸在我者而已正字豫舊職也故以文字説為君名字之字説巽齋文集卷二十四
