body:
  text: 㢲齊文集卷十五宋歐陽守道撰記知非齊記前太守豐城李侯扁其所居讀書之室曰知非而移書於某使為之記曰豫少而讀書頗有四方之志出身從仕三十年矣切守聖賢之訓以為處事接物反之吾心而安則為之不安不敢為也然不知吾之所謂是乃人之所謂非自信不移以犯世僇且以區區一書生而天子畀之民社曽無一二善狀以上稱宵旰憂民之心亦既自知不能祈解印組而去計不决卒自納於罟擭陷阱而無所避當此之時此身九死不足復顧而臣子至此上負君親則雖偷生假息而不知天之我覆地之我容也今行年五十幸而天子寬貸弗誅而來日幾何補過無及猶思竊取古人知非之云以名吾齊朝夕觀焉以愧痛悔艾子有以告我乎某復於侯曰侯誠有取於知非之云則侯所知者他人不與知也是非之心人皆有之以吾之心省吾之身而從事於克治之學辟如善衛生者四肢百骸少有疾苦皆能自覺其所從致之原而於治療常易也疾在吾體而問之他人彼非真有察脉觀色之明亦安能知吾病之真在乎雖然辱侯之問不得不有告也敢問侯之所謂非者何也實自見其非乎抑因人所為非而亦曰非也古之賢聖未嘗不受盡言聞怨詈則皇自敬德聞人告以有過則喜然至於非我不以其道則聖賢容有弗受者矣彼有以奪吾之自信又况今日之事侯似有恐懼憂患之纍焉夫憂患恐懼不能無亦不可無然至於虛心觀理之時當如湛然止水纎芥不留而後一毫髮可得而盡燭也侯方在恐懼憂患之中而以知非自命是水方動搖而遽監焉者也萬一憂患恐懼稍失其守則非者未必知知者未必非後之所差滋有甚於前矣願侯於此正心而靜觀之夫天與人以善不與人以惡是以人當為君子不當為小人得是非之正吾為不負天矣人縱我非而實則天之君子也失是非之正吾為負天矣人縱不我非而實則天之小人也是非之極至於判焉為君子小人而是非之分惟吾心獨知之是天之惠我光眀使我得為此而不為彼也然則人惟毋失是非之心人而少失是非之心非所以事天也天君一也為天之君子以事君吾無欺也為天之小人以事君吾欺也侯誠於此而內揆焉則是非之正卓然不失不是其所非亦不非其所是矣侯知天命而畏焉者也夙夜戰兢上帝臨女於以答聖天子全宥之恩其庶幾乎某淺陋無聞而侯辱命之倘以斯言為然則請記於齊之壁雩都縣重修主簿㕔記主雩都簿劉君季眀用私錢新公廨而以書請記於余曰事末爾不足記仰而思之我王官也登降王民勾稽王賦敢曰吾一簿卑乎今廨之僅存者敝甚敝者撤矣豫居此必千日而後去千日之久上加漏旁加欹是僅存又將撤也撒且盡後無為此官者乎豫以私錢新之非也使公錢易得前人不以是敝者付豫矣豫不可以愈敝者付後人子盍為我記之使來者知其嘗敝如此而新之之難也豫復之曰今所在主簿若無所職然數日待更誰復有意於治此廨其知有此職者也敢問簿何職簿為輸賦之民設也有此邑輸賦之民而後有此官此邑輸賦之民散居於郭於鄉於大山深谷之間而名數皆在簿也主之者不朝夕人人見之知其名數若常在目矣古人之敬民見其名如見其人故成周之世拜受民數以圖國用而進退之其藏也於天府此國中都鄙郊野之數也諸侯各敬其國之民宜亦類此郡縣立而海內一民一賦皆天子命官以主之今縣之為簿也曰某縣某鄉元管户幾何新收户幾何祖額稅租幾何開闢减免幾何其或登或耗即國用進退之原也縣以簿申州州還付之縣而遂為帳申之轉運司轉運司為帳申之户部其由此而登之天府如古之重其事與否與非主簿所知所知者簿之方造吾固與之矣主簿卑官也坐之不庇風雨之廨不辭獨不念簿所登載之户先王所敬也人之有寶器而甚愛之也繅籍以將之縢匱以藏之而守掌者亦藉是以享室宇之安吾主此簿而堂不足以容已廡不足以容吏顧於此乎日視其舊管新收而計其賦入哉嗟乎是亦䙝民數矣孔子式負版者負於他人之手先聖一見則式之况官號主此而常接於目乎然則一新此廨若將以宇覆此名數宇覆此名數是亦宇覆此人也庶幾知式負版之心者也請用此書君意何如他日君書再至曰美哉其言之乎其又警豫願得刻之石乃書以遺之廨外門內厦出入游息之所昔無而今有者居三之二其一因舊而大葺焉君去年攝丞通衢二門其一屬丞者君餘力所及也君為是役邑宰趙侯亦有以相之是以速集於成君名鋒豫同郡人趙侯名若僖晋江人寶祐三年四月甲申廬陵歐陽某記吉州龍泉縣丞㕔記縣置丞尚矣龍泉丞省於紹興復於紹定其省以主簿兼之其復以兼主簿以主簿兼之居主簿廨治丞事宜也以兼主簿丞宜有廨矣而猶居主簿廨主簿廨又敝甚不可居而自復至今久敝無創建者何故縣知有令不知有丞今所在然也不惟縣不知有丞丞亦不自知丞何謂不謂縣事皆已當問顧謂問侵令大扺以善避權勢為賢丞自處如此令利之丞不自處如此令直以為侵已也韓退之記藍田壁已云然則丞不丞亦尚矣丞省無廨丞復亦無廨噫何怪哉豫章熊君逹生為丞之朞月所居主簿廨一日壞君謂吾丞也丞廨宜我始於是度地於是市樹於是鳩工為門為㕔為廊為東西便㕔為堂為室規模宏而制度稱觀瞻聳而閒燕適異時主簿廨西靣至是而南主簿廨故有堂堂前有小㕔君謂吾職共二是亦不可廢遂以餘力葺之東偏凡用緡錢千錢大半君俸也書來求豫記豫為之辭曰古今殊時封建郡縣異制而理民一也縣雖統於郡百里猶子男國小國必有大夫縣必有佐二以侵長自嫌則大夫於其國君也自嫌乎抑可所否所以相成乎丞八品官命於天子天子命我丞而自嫌侵長此於長為媚偷已逸而已且長固有大負而小試安知無集衆思廣忠益之心奈何一以喜顓惡逼量之也大夫於其君猶曰君臣令丞比肩立丞於縣亦尊矣居室以便閒燕姑勿論諸為聳觀瞻地其規模制度自宜下令一等非曰以自尊大將使民習知己之可君長令或召趨朝或上府若使家則百里皆吾責於以鎮撫順便也今民甚易丞也民甚易丞丞自卑無以為縣重也然則君之新丞廨甚宜於龍泉尤宜復丞之初郡太守西堂范公應鈴實請於朝曰龍泉外鄰猺峒內蔽遮萬安太和得丞贊縣一郡䝉利范公之請如此而既復之後二十有七年丞無廨嗟乎是役可以已乎君家范公同郡而公所首辟縣宰熊君大經之弟之子也儒術吏事聞於公講於家熟矣其來此善於其職行令事五月餘公廉眀敏大得譽於其民故豫樂為之書寶祐四年三月朔日迪功郎新贑州司户參軍歐陽某記經訓堂記廬陵歐陽氏聞天下謂之歐鄉族蕃甚旁出江以西數郡然唐肅代以前皆出長沙長沙族今少廬陵而視他郡尚蕃昔之未徙者也又有自廬陵復長沙者蓋江湖地大牙入廬陵士溢出挾書常館數郡外視長沙江鄉然至率見賓禮或遂寓居今二郡歐陽族不可盡辨豫廬陵族也寶祐癸丑夏四月始來長沙讀書嶽麓書院有講書君諱新字仲齊者以髙年篤學見推流輩見豫來甚喜數出講書業示余余心敬之問其先世次曰亦廬陵族也徙宜春又徙瀏陽今又徙於此數世惟書一卷故其徙也輕然吾有請於子自吾先祖以經訓名堂其後家屢徙而先志不敢失今老矣又日以詔豫子孫庶幾其克紹也子為我記之豫茫然以思夫世次不可知而同姓則皆曰宗宗人世守經訓美事也豫於斯堂其可無辭蓋敬諾君之請而未及作也會歲晏歸君遣子必泰送豫醴陵門外豫别謂之曰還告尊公眀年春三月至償諾責矣至則後前期半月首訪君君即世矣豫哭盡一哀問曰適前半月也嗚呼豫感昔人掛劔之義忍忘君乎經訓堂君受之於父祖而貽之於子孫也請豫言以遺子孫如之何以君沒且已秋豫又將歸乃記之昔者太史公談且死語其子遷曰先周室之太史也自唐虞以來世掌天官絶於豫乎豫死爾復為太史以卒豫志遷泣而志之其後畢力討論之死無二起自黃帝迄於麟止終能成一家言夫自重黎至於談遷綿百世矣夫父子相語猶稱唐虞以來所掌古人懼墜先業如此也後世俗衰逺論姓氏者或召訕侮不知數典忘祖周天王感其陪臣孔子少時孟僖子屬其子曰聖人之後也爾必往學禮蓋文獻之傳上有所因為其後者於此思之則知其身敬其身故世其業豈惟禰祖曽髙之近哉雖百世可也歐陽世逺矣自漢興先聖之書甫出壁藏即以經師名家立於學官講於禁殿而父子祖孫傳於儒林漢氏既衰斯文中喪涉唐武德正觀復起率更令在諸儒間其文藝亦拔一時而名後世暨於文忠公生遇聖代卓為儒宗既以粹然經術佐天子致太平而孫石之學曽蘇之文扶翼主張一於公是賴士到於今受其賜也蓋自周衰至於今天下凡三治每一治歐陽氏必以文學著聞雖不盡同而大較可見已嗚呼天其特以斯文厚歐陽氏也與何千百年間先業之幸不墜也文忠公嘗碑世次上推漢唐皆出於一而豫往來江湖又喜業為士者之多則夫記斯堂也而豈徒哉昌黎韓文公教其子曰文章豈不貴經訓乃菑畬公乃為此言世疑而非之也然能言經訓公亦異乎人之言經矣訓也者親受聖人之訓已然也父祖有訓師保有訓訓甚尊不可䙝也世世子孫之讀經也無有師保如臨父母委心聽命惟經之從則君命我作記之意不泯矣重建臨江太守彭公祠堂記有宋寶祐三年嵗在乙卯臨江重建前太守彭公祠堂公諱合字子從官至朝請大夫纍贈特進廬陵人也守臨江始紹興十有七年再期而去於是百年之間之為守者且四五十不如公吾不敢議如公豈無人而郡人惟公之思祠再燬再新之觀今之百年而後之永世無斁可知也臨江人道故老之言曰公未為守時嘗為清江簿郡委受秋苖公以斗斛付民自槩鄰州瑞若袁胥怨我不得為彼民邪郡公以訴於監司暨為守適有寬詔舊賦皆放免倚閣而省部所催名色猶夥公以聞并蠲之連嵗旱又以聞减新賦大半遂發義倉糴客販以活饑民漕司方責月樁錢急公移書告之更求資助清江舊管鄉四與其一自新淦撥吏者而五其四秋苖耗外責耗其一不然不然者通他邑皆不然也公曰是安得偏受其害為窮弊源則前時有司造簿附於正後人不察而再加焉民大困又以聞得㫖蠲如章四鄉至今受其賜郡更兵火士應舉劣承平時舉額困損十有二公勉諭士嚮應又以聞原額復是時東南粗安天子留意民事公以一支郡數有奏請罷行害利惟日不足至斷獄聽訟必計及風化嘗言長民者當一以文翁黃霸卓茂魯恭為法使百姓有所觀感而禮義亷耻之俗興今見於遺文溫然君子之言也公見德於其民以此豫觀公卒時魏國張忠獻公哭之哀謂公才宜用世而狹於所施他年國史姑載公循吏傳以魏公之許可證臨江之去思故老之傳皆實録已雖然臨江之人知公臨江之政宜也公去臨江守永使廣西去廣西使湖南最後以尚書郎總六路賦所至皆有善政非臨江之人所與知今豫記公祠將牽連書之而不勝書也書其一二大節使見公像者并見其為人焉公自紹興初年改秩嘗以邑最受知天子親録姓名於屛風獨不肯少屈意當國者秦檜相茍賤之夫往往旬月取通顯公一二十年間奉祠待次之日居大半泊如也守永魏公謫居在焉檜晚年伺遷客動息日甚稍與交際禍且不測公一無所顧特為魏公築室以便其奉親休暇或節序必移具勞苦之魏公亦數從子孫與公遊刻石紀勝傳於逺近湖南帥若監司有受檜密㫖圖魏公者公之守此蓋蛇虎搖毒磨牙必向之所其不并噬也幾希公非惟不避即之益親魏公危跡藉以少安者蓋兩年餘天其以公為魏公地邪不然檜何患於無人守永也其後公以乙亥六月去永而檜以是年十月死使其不死無根之獄已羅織魏公則公亦安有免理蓋公不特厚魏公而於檜所欲殺若李莊簡胡忠簡諸公皆厚矣天全諸公亦使公并全公不畏禍而禍亦不及是可以為世之君子勸也公晚方持節納祿掛冠之意每形於言魏公父子屢書止之朝廷欲藉公用奏至輒不聽其在湖南前執政為潭守甫至折盜足三十有二人皆罪不應死且案未具公曰是不殺也國法無之豈以大臣出帥可淫刑以逞豫憲臣也其謂斯何立具奏自劾其無所回屈類如此嗟乎臨江善政公緒餘也而豈無所本哉孔子稱剛毅木訥近仁公惟如此用能直遂本心以濟人利物世未有軟熟便佞多欲易怵之人而能流福澤於當世植風聲於方來也豫生公里猶及見諸老遺墨自忠簡以來若周文忠楊文節皆推公前輩目為巨人元夫獨恨公事蹟於後生耳目未盡稔此而書之亦足以遺是邦君子之賢賢者所去見思猶有已也好是懿德無有已也祠在封溪之上威惠廟吳聶侯神之右嵗逺迹陳尚或證豫文而又新之十有二月甲子朔迪功郎新贑州司户參軍歐陽某記袁州慈化院刻漏記宜春郡南泉山慈化院僧道果作刻漏請記於廬陵歐陽某某許之方隆暑未能秉筆僧五至請益勤座適有他客問果曰爾之寺作刻漏何也今夫刻漏內自天子之宫禁外至於朝廷百司若諸道州縣之治所莫不有焉為聽政也昧爽櫛冠平旦視朝以至於嚮晦入宴息不敢虛棄寸隂雖夜未央夜未艾而不知安枕之適此臨政者之事挈壺氏之職所以不可曠也爾之徒所為晝夜有事者亦簡矣昏曉以鐘為候既不啻足而又刻漏云乎哉雞初鳴咸盥潄衣冠佩帶以適父母之所士之家禮禮也日出而作日入而息農之田業也昏眀蚤夜之候固不必家有刻漏矣然而其事有常無先後時者爾之徒棄親從釋非有定省之嚴粥鼓齊魚聞聲而食非有耕稼之苦而又何以刻漏為也僧笑而應曰然誠無事乎此也抑是問也知刻漏之為器矣夫刻漏則器也然吾昔者有誤入焉因作以示吾之徒云爾豈真謂昏明早夜之無辨而須此哉客遂請其說僧曰作在我悟在人而焉用切言之雖然豫亦有問乎君夫自子至亥謂之時自一至百謂之刻分之者天與抑人也𡨕然而運者天也何時與刻之知人則巧矣以一分之為十二十二各分之為八八而不能滿百又分之為初初是皆人實分之而天何與焉然而天𡨕然而運曽無一息之差人巧矣而測度常失之眇忽是何也人之分是時刻也豈不能以意為之而又何為取信於是器之水夫水安知時之為刻刻之為一為百哉然浮箭有常誰為之者君亦知之乎人惟巧故差水惟無情故信天之𡨕然而運也水之升降流注也其無情一也嗚呼孰謂有情而無情者有情而無情天且不逺矣君無於我乎問也君其問諸水某欣然而作曰豫不能作記爾之言亦可書也吾為爾書是為記存存齊記安成蕭君次膺名其齊曰存以告東山先生楊公楊公增一字曰存存而為書其扁後二十餘年蕭君求豫文以為記且諗豫曰子謂存存何以異於存也豫以所見對曰操存人也存存天也君有志於存楊公告君以存存豈謂存之上又有所謂存哉請言存存存存猶生生也凡天下之物生必有死存必有亡茍存必有亡茍麗於形無不歸於壞滅不曰生死而曰生生不曰存亡而曰存存則豈非不壞不滅者哉而誰能識之聖人指以示人曰生生之謂易曰成性存存生生之生不與死對存存之存不與亡對識易之所謂生生則知性之所謂存存矣水在地中不以掘井而有不以廢井而無故曰旡喪旡得往來井井日月在天不以人所見而見不以人所不見而隱故曰日月有眀容光必照焉比存也朱吕二先生編近思録首卷示人以道體而後及凡為學之事然則從事於操存者茍不先眀乎存存之本體則雖曰操存無乃外襲取之以極力控持為能哉君日處是齊而思道義無不一出於成性以為固有以為當然以為不可須臾離則於楊公所以詔君固自得於意言之表是為記巽齊文集卷十五
