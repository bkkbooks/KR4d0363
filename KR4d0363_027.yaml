body:
  text: 巽齋文集卷二十七宋歐陽守道撰贊針理堂真贊未見其人見其寫真從紙上之顔靣尋筆外之精神意者今古填胸而漁樵爭席藜藿在釡而堂室生春吾何以知之蓋老而不衰者仗理以為氣臞而不稿者其德之潤身也四有堂贊并敘豫前年春讀先皇帝日歷觀慶元嘉泰開禧間依倚韓氏聲光者其立取富貴可畏哉天相吾廬陵周公文忠孫公獻簡坐學黨擯斥於前楊公文節髙卧不起憤死於後其餘中外仕宦乃無一人受汚羞鄉里者嘗聞之長老宣溪委軒王公諱琳是時監車輅院聲名藉甚韓願見之不可則託公所厚委曲風諭卒不為屈愚心慕之及是尋公姓名事迹於史官僅見其守南安日奏罷貢銀一疏蓋韓敗於是有年矣而公位竟不滿德以卒嗚呼吾鄉為江右文獻國不在乎公卿大夫之比肩接武也命有窮達位有髙卑往往各以風節自植立後人蒙賴何莫非君子長者之澤如王公者卓乎自守不愧於同時諸老廬陵所借以增重非耶公之子宣義郎致仕諱得之幼有卓識吕忠公請居來此公遣往受學忠公亟稱其進夫公家居時能使其子學于權姦所仇視而擠之死者則其不肯降志辱身固素所蓄積已宜乎宣義公之克世其德也宣義公之行尚書郎廬東黃公炳狀之甚備蓋孝友豈弟古之篤行君子若其淡泊寡欲有世外逸民之風而亦不自異於人四有者其堂名也萬卷書一壺酒千竿竹一炷香此昔人之自矜所有者而宣義公采之以為號如六一然宴坐其中以著作自娛若曰吾有此足矣餘不必有也宣義公之子曰季雍以世科踐世官歸食祠祿今起為衡州令聞廣譽又肖其先家郡之南自稱南山老人惟先世之書是翻是繹將彚次四有堂之文而刋之未就間以書告余曰吾先人不仕其傳諸方來者獨行狀與遺文耳豫受而讀之悲豫聞王氏自前代多顯人漢子陽傳三世俱清亷江左風流自茂洪以下至本朝百數十年稱三槐家皆父子祖孫名德相望者今宣溪之王其庶幾乎豫與南山君交遊有年宣義公就飬髙安時豫猶及拜别後聞其沒值豫亦居先人之喪故不得與挽此二闕焉乃追作四有堂贊以寄南山君聊見豫亦稍知宣義公之心者其辭曰貪夫長物萬有不足亷士雅好四有有餘無金玉玩有萬卷書忘寢與食玄晏我徒無軒冕情有盈樽酒揮觴自樂靖節與友或如香山繞室種竹森然滿庭對此幽獨又如蘇州掃地焚香超然燕處萬慮消忘彼四賢者各從所好此堂兼之於以終老我論其世何必古人厥有君子玉雪其身富貴之求擾擾一世本慕紛華迄處惡穢嘉泰名德廬陵委軒四有其子南山其孫景定癸亥四月甲子歐陽守道撰并書銅陵節婦章夫人贊并敘節婦章氏夫人池州銅陵人也夫曰同邑羅君諱懷表景定三年八世孫黃裳由籍田令添差通判吉州與州歐陽守道善從容語及先世某得聞夫人之節逆推世次蓋治平熙寧間羅君年二十有六卒夫人年二十七子方孕晨夕泣柩前祈生男與奉羅氏祀誓無他志越四月子生男也是為贈宣教郎若容宣教公生三子次子復由上舍登政和壬辰科終朝奉郎遂以起家羅氏之先嘗五世不分為銅陵義門至宣教公之世與諸父兄弟號八房羅生息繁而詩書逺迄今科第相望闔族踰千口而宣教公一房百六十年間且五百餘人矣皆夫人一遺孤之後也可謂盛矣余讀史記趙世家至程嬰公孫杵臼存孤事常念二大夫節固髙然孤未生而難作其母唐姬晉成公姊也匿於公宫當此時孤之得生也難及為亂者入宫大索母匿兒袴中祝於天曰天不絶趙氏也則兒不號竟索者出兒如所祝他日二大夫乃相告語一死一生以全之於山中蓋自是孤不在母至於未入山之前母子之命懸白創間二大夫雖忠赤力未有所措惟姬一念通天其自叔帶以下實嘉賴之趙於是復大此事不合於春秋左氏傳太史公多採異聞二大夫之德遂見旌於百世之後然太史公書大夫之事動人耳目人共偉之如其信然則姫氏身當大難以一念使夫族不隕讀史者猶可以永慨也使姬為偷生計懼兒纍已直棄之耳二大夫復何所存哉故豫以為趙若果以此續則姬氏又為厥初生民之首古今此事罕見雖王公匹庶世族有大小而幾亡幸存託於一婦人之節一也惟羅自得姓來名著史牒蓋僅有存而銅陵族之上世又皆隱德蓋夫人所天甫冠而婚耳其志行宜未有傳微夫人沒且不祀安知有今日哉夫女生為姓當夫人夫已逝子未生之時絶續凛不可保而夫人自誓之烈遂為數百子孫蕃衍盛大之地天道亦昭昭矣夫人子婦配宣教公者曰安人盛氏宣教公卒之年亦不滿三十而盛氏教其子朝奉公甚嚴朝奉公入太學十年而歸曰汝學不進名不成往耕爾田毋吾見也兄密遣以資再入學終不得見母而行後三年遂登科其仕也嘗為胙城令金人奄至以死守事聞特詔改令入官以勸忠義坐以秦丞相不合故官不顯是以安人教子諒不特以科第為成名而已能使之受教有立愈可賢也非是婦不稱是姑羅氏之興宜哉羅氏家鳯城山章氏家雞籠山六世通婚姻章亦詩書名族夫人父諱天平開慶己未第三人進士及第應雷其諸孫也某聞人談忠孝節義事輒聳耳改容思廣其傳以勸薄俗而亦深願其能如此者果獲祐於天以遂其心使疑者無報施善人如何之歎則其於勸也易以豫觀於今通守君享有先世得天之報而於其福澤所以培厚增髙引長而浚深者每曰是在我心不敢負我妣祖然則羅氏之世後此又可知也謹為撰次節婦章氏夫人事為之贊其辭曰我觀古人興亡之理國以其臣家以其子婦之事夫與臣子同其節不回如孝與忠池陽之羅族於今大子孫繩繩方興未艾孰知其間不絶一絲百世係命未乳之兒惟夫人章遭罹荼毒言念君子命之不淑泣籲於天命我以男如未亡人同穴是甘羅氏之先義門數世得請上帝爾嗣不墜是生遺孤其苦其艱夫人盛年髙節如山當時一念至于今日孫曾雲裘才子世出匪世曰才惟德之培念茲絶續雖逺猶哀嗟哉人子人臣人父天監人心在汝左右各敬所天存亡以身爾所欲存天不違人我為羅宗詔後無已羅宗世祀夫人不死曾景和真贊人有蒙蔽我啓迪之如已通明人有疾痛我拯療之如已蘇醒安得人人子孝其父弟弟其兄安得人人全其天年夀考且寧聞君先人所志如此所施不宏君以所聞自幼守之至于百齡觀父之志知天之德天德曰生此心何在在孔孟書與黃帝經如其有濟雖在窮居是亦達行天之施報其忠昭昭其終𡨕𡨕吾知君家蕃衍盛大子孫之慶咨爾子孫勿替引之又無忝于家庭曾君景和之真璧潭上人贊我有尺璧如月斯圓而沈之淵彼月在天其影在水與璧相似當沈璧時見水中月光明瑩徹當知此璧即月之精有此光明有此光明而無此璧月滿一輪水深千尺思誠針大易無思聖人不思我則未然思則得之其思維何思誠其身一念不實有妄無真未悟此理請觀諸天自剖太極百千萬年一晝一夜日月代眀一寒一暑四時錯行以及萬物動植飛潛各正性命巨細洪纎一息無繆一毫無差彼曷能然非誠而何厥初生民惟帝降𠂻至實元妄本然所同二氣五行所稟不齊私欲蔽之良心始迷豈無良心舍之則亡以偽為歸終然不臧曷不反思此豈其初恭惟先覺垂世有書尼父遺言見於中庸及孟軻氏傳得其宗思誠如何明善其原絶其惡根則知所存然後固執拳拳服膺人十已千何患不能其初最謹相在爾室隱顯無分內外惟一始之固執久之則安學力所到希聖不難我讀二書有契於心反是不誠有如此針旅針艮下離上其卦為旅違其止居麗外爰處初六之災瑣瑣以窮使其有立雖困可通六二懷資童僕斯得中正之柔人與盡力九三反是衆心用離於此則暴何恃不危處柔悔剛其惟九四惜哉不遇未快其志不若六五其德文明有以自賁譽命斯榮上九何為羈寓而亢遂失所棲則將焉往古觀之易處旅良難有得有失有危有安當思此時與家食異禍福自求請繹斯義食針訓小姪厥初生民未有火化茹毛飲血久乃教稼教稼伊何時維神農播時百榖后稷嗣功嗟此粒兮古云艱食凍耕熱耘農夫之力今我一飽孔逸且安不歷田畝儔知艱難對食而思人當知足素餐是愧敢饜于腹維此疏食以實豫飢過此有求非分所宜貪暴無饜名曰叨餮干求無耻名曰餔啜不可紾臂不可朵頥飲食之人則人賤之先知艱難次顧亷耻是謂食針以勵汝也勸學針訓子丙午十二月四日筆墨少暇感嵗事之將闌念兒年之浸長訓以一卷未克專心大懼因循至於失學懷不能已作韻語以貽之篇首本之得姓以來效用陶靖節體也歐陽之系姒姓其先脫民於患禹功則然遂宅天下惟有歷年在帝少康祀夏配天崇崇會稽禹迹所止帝迹其地胙封庶子跨商歷周世越千祀至踐作伯斥大疆里後滅于荆曰王無疆乃封子蹄歐餘山陽因地為氏子孫用昌爰有顯人史册相望𣲖分為二千乘渤海書學名家千乘斯在漢後無聞久乃湮晦惟渤海族綿及奕代西晉之亂避地中原家于長沙苖裔幸存又歷數世為陳將門更隋而唐率更其孫父子一家筆法遒徑至今遺刻墨妙輝映孫吉刺史與安福令因為吉人表表著姓散在諸邑譜牒斷亡文忠敘略碑于瀧岡但本一祖不分殊鄉曾玄雲仍莫可盡詳我家上世詩書紹讀元祐紹聖猶貫安福監簿再貢郡籍所録繇儒行遷城西九曲暨屋凝暉四世居之門户未墜一卷是貽爾祖豫父豫父豫師亹亹誨言開其識知載色載笑匪怒伊教謂我務本遲我計效惟其善行是則是效嗟豫小子曷追來教方寸之吉上帝實臨固應流慶式克至今爾曹何恃爾祖此心庶幾蒸嘗世世居歆演也既冠幸而克念其幼學言長育以漸獨爾浚乎勞我訓檢歲月侵奪童習未厭爾為豫後望爾成人失今不學何以立身靜坐沈思得義之真胸無義理靣有俗塵汝不靜坐東西其走放心不間外物易誘汝不沈思不心而口辟之嚼蠟所得何有至於文思有塞有通初如鑿井畚土勞功得泉可汲渾初清終一日開明何有昏蒙爾後念哉豫念思苦無此詩書無此門户爾食何耕惟學爾土爾居何覆惟學爾宇爾視爾父舍學何營有如不學無恃以生學為君子爾為令名不學下愚身辱家傾視爾兒嬉我心孔悼爾為豫子使我憂惱儒冠而易羞及祖考咎將誰歸誨爾不早歲聿其周復見春初少者日壯念之惕如過時失訓豫責有餘有人心者尚感此書巽齋文集卷二十七
